body:
  text: 遼史拾遺卷十五錢塘厲鶚撰志第十一地理志五西京道西京大同府元魏宫垣占城之北面雙闕尚在清寧八年建華嚴寺奉安諸帝石像銅像國子監補梳裏樓補通鑑地理通釋石晉十六州考曰雲州雲中郡貞觀十四年自朔州北定襄城徙治定襄縣治雲中縣本馬邑郡雲內之恆安鎮武德元年置北恆州貞觀十四年置定襄縣開元千八年更名天寶元年曰雲中郡升大同軍節度使會昌三年置大同郡都團練使治雲中乾符五年升大同都防禦使為節度使水經注曰平城王莽之平順也魏天興二年遷都於此太和十六年造太極殿東西堂及朝堂夾建象魏乾元中陽端門東西二掖門雲龍神虎中華諸門皆飾以觀閣鶚按魏道武遷都平城魏書在天興元年山西通志曰後魏宫垣在大同府城北門外有土臺東西對峙蓋雙闕也後為天王寺汪承爵大同府志曰華嚴寺在府城含和坊遼建奉安諸帝石像銅像計石像五銅像六內一銅像衮冕垂足而坐餘俱常服山西通志曰張起巖崇文堂記云雲中在遼金為陪京學即遼國子監宏敞靖深冠他所又曰梳裏樓在大同府城西北隅相傳遼蕭太后居此遺字尚存大同縣方山禪房山俱補記纂淵海曰周大同川地戰國趙置雲中縣漢為雁門郡平城地遼置大同縣孫體元大同縣志曰方山在城北五十里山有拓拔魏二陵及方山宫改基禪房山在城西南六十里上有寺塔創自遼雲中縣紇真山單于臺髙栁城參合陂俱補李吉甫元和郡縣志曰紇真山在縣東三十里北語紇真漢言三十里其山夏積霜雪又曰單于臺在縣西北四十里漢武帝元封元年勒兵十八萬騎出長城塞登單于臺即此也通典曰雲中縣有故髙栁城參合陂長青縣本白登臺地懷仁縣金龍山海子俱補記纂淵海曰金龍山在縣西南又曰海子在縣東其西北有泉深不可測本白登臺地水經注曰服虔曰白登臺去平城七里如淳曰平城旁之髙城若邱陵矣今平城東十七里有臺即白登臺也臺南對岡阜即白登山也孫畼之述畫云漢髙祖被圍七日陳平使能畫作美女送與冒頓閼氏恐冒頓勝漢其寵必衰説冒頓解圍於此矣𢎞州博寧軍下刺史桑乾河白道泉火井鷲峰寺補楊伯通墓補王山甫附孫世芳宣府鎮志曰桑乾河在和州今順聖城西南二十里源出馬邑縣洪濤山下與金龍池水合流東西入盧溝河太平寰宇記曰白道泉郡國志云白道髙坂有土穴出泉即古曲謂之飲馬長城窟又曰火山在雲中縣西五里水經注云西溪水道源火山山有火井南北七十步廣減尺許深不見底炎勢上升常若微雷發響以草㸑之則煙騰火發其山以火從地出亦名熒臺山西通志曰鷲峰寺在大同府城東一百五十里舊𢎞州龍樹山之陽內有塔一座髙一百尺遼夀昌四年建乾統三年修宣府鎮志曰𢎞州有遼尚書左丞楊伯通墓元好問中州集曰王元節𢎞州人祖山甫遼户部侍郎順聖縣秋林亭崖木亭俱補宣府鎮志曰秋林亭在順聖西城溜雲山下盛暑山石滴水成冰可消煩渴遼人建亭焉又曰崖木亭在順聖西盤崖洞口峭壁千仞架獨木為橋經久不朽遼人建亭其側德州下刺史金河水白道坂太平寰宇記曰金河水郡國志云雲中郡有紫河鎮界內有金河水其泥色紫故曰金河又曰隂山道冀州圖經云雲中周回六十里北去隂山八十里南去通漢長城百里即白道州也南北逺處三百里近處百里東西五百里地至良沃沙土色黑省功多獲每至七月乃熱白道川當原陽鎮北欲至山上當路有千餘步地土白如石灰色遙去百里即見之即是隂山路也從此以西及紫河以東當隂山北者唯此道通方軌自外道皆小而失次者多豐州天德軍節度使九十九泉青塜邉貫道附張欽大同志曰官山在府城西北五百餘里古豐州境山上有九十九泉流為黑河明一統志曰王昭君墓在古豐州西六十里地多白草此塜獨青故名青塜中州集曰邊元勳豐州人祖貫道遼日狀元振武縣黑砂磧補張鵬翮漢北日記曰距青塜十里有振武城廢址河水齧沙出碑曰唐振武軍節度使墓志亦漢字棄置河干明一統志曰振武縣北七十里有黑砂磧雲內州開逺軍下節度使本中受降城地居延州補拂雲堆李陵臺補鸊鵜泉補大同志曰東受降城府城西北五百餘里中受降城去東受降城一百餘里本秦漢九原縣地唐貞觀初立雲中都督府後置橫塞軍遼置雲中州西受降城去中受降城一百餘里古豐州西北八十里三受降城皆唐朔方總管張仁願所築許爾忠朔州志曰居延川在州北廢雲內州一名居延澤蘇武嘗困于此旁有居延城輿地廣記曰中受降城有拂雲堆祠西受降城開元初為河所圯十年總管張説于城東别置新城北三百里有鸊鵜泉山西通志曰李陵臺在大同府城西北五里古雲內州臺髙二丈餘唐志雲中都護府有燕然山山有李陵臺蓋陵不得歸登此以望漢其近有拂雲堆堆上有祠天德軍天德山補牟那山明一統志曰天德山在朔州北漢李陵自居延行至天德山遼太祖平黨項遂破天德掠吏民以東皆此地大同志曰牟那山在朔州城北三百里隋大同城舊墟在此山近有鉗耳觜城及秦長城奉聖州武定軍上節度本唐新州兩河會溫泉龍門山涿鹿山上花園下花園補通鑑地理通釋石晉十六州考曰新州唐志領縣四永興礬山龍門懷安輿地唐記唐末置後唐同光二年升威塞軍節度通鑑威塞軍節度李存矩在同光前劉必紹保安州州志曰燕尾河在州東南三十里桑乾與洋河合流如燕尾然南流入盧溝橋下一名兩河會見遼志明一統志曰溫泉在州城南十五里其水常溫至冬不氷保安州志曰龍門山在州西北三十里明一統志曰涿鹿山在州城西南九十里一名獨鹿山涿水出焉黃帝破蚩尤于涿鹿即此又曰上花園在州城西四十里相傳遼蕭后種花之所下花園在州城西三十里亦蕭后置遺址尚存鶚案唐新州遼改奉聖州今升德興府元改保安州明初廢永樂中復置保安州礬山縣桑乾河明一統志曰桑乾河在州城西南四十里一名漯水自渾源州流至州境與溫河洋河合流東南入宛平縣界為盧溝河龍門縣歇馬臺補宣府鎮志曰歇馬臺龍門所東五十里境外遼蕭后歇馬處遺迹尚存望雲縣景宗於此建潛邸鴛鴦泊補宣府鎮志曰御莊在雲州堡契丹耶律賢因父遇害淪落民間居處於此逮穆宗受害國人訪賢立為國主作宫室于舊居之地號曰御莊又曰鴛鴦泊在雲州堡西北一百餘里境外周圍八十里其水停積不流自遼金以來為飛放之所歸化州雄武軍上刺史唐升武州愛陽川炭山斷雲嶺西望山補通鑑地理通釋石晉十六州考曰武州輿地廣記唐末置唐志領文德一縣後唐長興元年改毅州明一統志曰愛陽河在炭山西北二十里本放牧之地深可尺餘下有頑氷黑色者數尺水上有浮草性涼尤宜牧馬其地又生黃花其大如錢發于土上人馬蹂踐明日復生如故又曰炭山在宣府城西一百二十里遼人謂之陘頭承天后輔政日納涼于此又山之東三十里别建涼殿乃遼主宗真納涼地宣府鎮志曰斷雲嶺在歸化州即今之沙嶺鎮城西北二十里上有隂雲籠伏如阻斷然又曰西望山在宣府城北三十五里上有遼國西望山舍利碑可汗州清平軍下刺史媯州古城補媯泉溫泉阪泉磨笄山喬山厯山應夢山補東羊房西羊房補通鑑地理通釋石晉十六州考曰媯州媯川郡北齊立北燕州後周曰燕州唐武德七年以幽州懷戎置北燕州貞觀八年更名治懷戎本潘縣宣府鎮志曰媯泉在故懷來縣西一百一十里相傳為遼蕭后所築明一統志曰媯泉在故懷來縣西一百一十里書云釐降二女於媯汭按傳溈水在河東縣出厯山入河此恐非是宣府鎮志曰溫泉在于汗州今隆慶城西北三十里佛峪山中太平寰宇記曰羮頡山黃帝祠有泉湛而不流即古阪泉也今在媯州城東二百步史記云軒轅與炎帝戰于阪泉之野通典曰鳴雞山本名磨笄山趙襄子滅代其姊磨笄自殺因為名代人憐之為立祠有羣雞鳴于祠上故名鳴雞山太平寰宇記曰磨笄山在懷戎縣東北七十里又曰橋山有祠黃帝葬此山海經云大荒內有軒轅臺射者不敢西向畏軒轅故也梁湘東王臨終詩云寂然千載後誰畏軒轅臺又曰厯山後魏風土記云潘城西北三里有厯山形似覆釡其下有舜祠瞽瞍祠宣府鎮志曰應夢山在隆慶州城北二十里遼蕭后嘗應夢建寺于其巔因名又曰東羊房隆慶州城北十里西羊房隆慶州城西北十五里皆蕭后養羊之所懷來縣團焦亭雪興亭碧桃亭養鵝池俱補宣府鎮志曰團焦亭在懷來蕭后遊息之所又曰雪興亭蕭后每冬遊此亦在懷來又曰碧桃亭去雪興亭里許亦蕭后所置廢久惟遺扁石刻尚存又曰養鵝池去懷來城二十里水四時不竭相傳遼蕭后所鑿鶚案明一統志及宣府鎮志所載蕭后皆承天太后也興宗奉太后嘗納涼於炭山故西京諸處遺迹為多儒州縉陽軍中刺史南溪河沽河宋王峪統幕補通鑑地理通釋石晉十六州考曰儒州輿地廣記唐末置九域志領晉德一縣廣記晉山縣朝野雜記晉山縣距燕京百八十里明一統志曰溪河源自永寧縣界團山流經州南合沽河四至懷來入桑乾河又曰沽河源自州城東北雙營西南流入溪河宣府鎮志曰宋王峪在儒州劉武周號宋金剛為宋王疑以此名峪薑南蓉塘詩話曰統幕之地在隆慶州西南八十里相傳遼主遊幸嘗張大幕於此因名今訛為土木正統十四年王師敗績于土木大駕北狩即此地鶚案歸化州元明時為宣府鎮媯州明為隆慶州儒州明為隆慶州永寧縣地縉山縣縉陽縣縉陽觀俱補謝庭桂隆慶州志曰縉陽山在永寧縣城北十三里一名龍安山又曰縉陽觀在縉陽山遼時所建今山頭仙壇溪邉釣迹猶存蔚州忠順軍上節度川曰漚夷馬頭山補代王城補金河十寺補漢文帝廟補天池廟附通鑑地理通釋石晉十六州考曰蔚州後魏置懷荒禦夷二鎮及靈丘郡後周置蔚州隋屬雁門上谷二郡雁門之靈丘上谷之飛狐唐武德六年置貞觀五年破突厥復故地天寶曰安邊郡至德曰興唐郡領靈邱飛狐興唐三縣太平寰宇記曰嘔夷水一名􅋤水出靈邱縣西北髙是山周禮曰并州其川嘔夷謂此也亦曰瓠􅕧河上槽狹下流濶形如瓠􅕧故名劉生和蔚州志曰馬頭山在城東南三十里一名大名山上有竒石形如馬頭山西通志曰代王城在蔚州東二十里漢文帝封代時居此西北四里有薄家莊即其母薄太后所居也又曰金河十寺在蔚州東南八十里五臺山下河中碎石如金故名金河寺俱遼統和間建蔚州志曰漢文帝廟在蔚州南關遼穆宗建石碣存焉元和郡縣志曰天池在靜樂縣北燕京山上周廽八里陽旱不竭隂霖不溢故老言嘗有人乘車風飄墮池有人獲車淪於桑乾泉水後魏孝文帝以金珠穿魚七頭放此池後亦于桑乾泉得之隋焬帝嘗于池南置宫每夜風雨吹破宫竟不成今池側有祠謂之天池祠玉海曰嘉祐元年蕭扈來賀正言陽武寨天池廟侵北界詔館伴使王淶持圖道本末陳師道後山叢談曰潘美為并帥代之北都山有天池焉嵗遣通判祭之其後憚逺而罷久之契丹遣祭焉又易其屋記至熙寧中始有其地凡數嵗兩使往來率不能辨而與之鶚案天池廟屬宋憲州境以其後入遼故附於此靈仙縣倒剌山補元和郡縣志曰倒剌山在縣東七十里亦號雪山俗傳靈仙所居與五臺山略等鶚案本唐興唐縣晉改靈仙殆以倒剌山得名耳飛狐縣飛狐口補太平寰宇記曰隋仁夀元年改廣昌為飛狐縣因縣北飛狐口為名又云飛狐道自縣北入媯州懷戎縣界即古飛狐口也漢書酈食其説漢王曰杜白馬之津塞飛狐之口此言皆一方之限也又晉中興書云建興中劉琨自代出飛狐口奔於安次謂此道也靈丘縣太白山補隘門山補開皇長城補趙武靈王墓補元和郡縣志曰白山在縣南十里山有鍾乳穴其深不測仰望穴中鍾乳如懸穗焉又曰隘門山亦曰隘口在縣東南北五十里壁立直上層崖刺天有古道極險後魏明元帝置義倉之所又曰開皇長城西自繁峙縣經縣北七十里東入飛狐縣界輿地廣記曰靈丘縣有趙武靈王墓因以為名應州彰國軍上節度後唐明宗州人也天成元年升彰國軍節度興唐軍寰州隸焉北龍首山南雁門雁門水補金鳯城補佛宫寺補通鑑地理通釋石晉十六州考曰應州續通典故屬大同軍節度輿地廣記唐末置領金城渾源二縣又曰寰州職方考後唐明宗置輿地廣記唐末置領寰清一縣大同志曰龍首山在應州城北山之城跨雲中雁門山在應州城南山之北與龍首相望水經注曰雁門之水出於雁門之山雁出其間在髙栁北東南流經髙栁縣故城北舊代郡治册府元龜曰後唐明宗以咸通八年九月生于代北之金鳯城大同府志曰金鳯城在應州城東北天王祠前後唐明宗生此中有金鳯井記纂淵海曰金鳳井在州治相傳李克用生時金鳳自井中飛出鶚案明宗生應州見遼史潘自牧以為晉王克用恐非談遷棗林雜爼曰應州治西佛宫寺遼清寧二年田和尚奉敕立有釋迦塔髙三百六十尺圍半之六簷角上下皆巨木為之層如閣閣玲瓏宏敞渾源縣渾源川恆山補溫泉補郭子章郡縣釋名曰唐置渾源縣因八水合而混流故名八水崞川水􅋤水黑龍池神溪水李峪水乳泉水凌雲口水磁窯口水是也明一統志曰恆山在渾源州南二十里即北嶽也水經謂之元嶽其山髙侵霄漢舜北巡守至于恆山即此王濬初恆嶽志曰恆山北嶽也括地志曰有五别名蘭臺府列女宫華陽臺紫臺太乙宫釋家謂之青峯埵道家謂之總元洞天金城福地又曰太乙洞天應劬風俗通曰恆常也萬物伏北方而有常也山胍發崑崙其東北一支自積石而北入丐奴東為隂山南入雲中境西折而東為寧武之天池代之雁門句注又東為覆宿夏屋茹越書崖突起於渾源之南為恆山潛丘劄記曰舜典十有一月朔巡守至于北嶽傳曰北嶽恆山禹貢太行恆山疏曰恆山在上曲陽西北周禮職方氏正北曰并州山鎮曰恆山注曰恆山在上曲陽則舜當日朝覲北諸侯于今曲陽大茂山之下非山經所稱今渾源之北嶽水經所稱之元嶽厯厯可知鶚案沈括夢溪筆談云北嶽常受大茂山半屬契丹以大茂山分脊為界嶽祠舊在山下石晉之後稍遷近裏謂之神棚則北嶽自在上曲陽遼史故無渾源之祀也王濬初渾源州志曰溫泉在州東南一百里其水若湯浴之能愈疾朔州順義軍下節度馬邑城統萬城元姬山白樓俱補通鑑地理通釋石晉十六州考曰朔州馬邑郡魏武帝置新興郡晉改晉昌後魏置懷朔鎮及懷朔州隋為馬邑郡領鄯陽馬邑二縣太平寰宇記曰馬邑城即今州城是也搜神記曰昔秦人築于武周塞內以備邊城將成而崩者數矣忽有馬馳走周旋反覆父老異之因依迹以築城城乃不崩遂名馬邑元混一輿地要覽曰統萬城赫連勃勃於無定河北黑水之南築朔州志曰元姬山州北三十里後魏道武侍姬李姓善姬卒葬此山故名又曰白樓在右城內東北後魏納秦姚興女為后建此樓以望故國飾以鉛粉因名鄯陽縣句注山補元和郡縣志曰句注山在縣東八十里朔州志曰句注塞趙襄子以其妹為代王夫人欲并代約代王遇于此馬邑縣雁門關補記纂淵海曰雁門關在馬邑縣東南七十里武州宣威軍下刺史輿地廣記曰毅州本武州唐末置後唐長興元年改曰毅州東勝州武興軍下刺史君子津補記纂淵海曰君子津在古東勝州界漢時有大賈齎金行至此死津長為埋之後其子至悉金付之因名河濵縣河濵關補明一統志曰在府城西五百餘里隋榆林縣地唐析置此縣屬勝州縣東北有河濵關後廢遼復置屬東勝州志第十三厯象志中閏考太康三年閏十二月宋閏來年正月異能改齋漫録曰神宗元豐元年嵗在戊午閏正月時知州薛向繳大遼國所印厯日稱閏月乃在十二月與本朝不同迄送司天監重定時議者以兩朝賀正之禮為疑而臺章以為正朔為大賀正為小兩朝之閏不同即不過本朝之使先期而賀正於彼彼國之使後期而賀正於此料彼不肯改以就此則本朝豈可改而就彼乎其後本朝竟不曾改志第十四厯象志下朔考冬至附重熙四年十一月朔宋辛巳十二月朔宋辛亥江鄰幾雜志曰己亥厯日十一月大盡契丹厯此月小十二月十四夜才昏月蝕遼使言竊謂為己望鶚案前己亥宋之咸平二年遼之統和十七年時未通使也後己亥宋宣和元年遼之天慶九年此時金伐遼使命阻絶矣此己亥應作乙亥宋仁宗景祐二年葉夢得石林燕語曰蘇子容過省賦厯者天地之大紀為本場魁既登第遂留意厯學元豐中使契丹會冬至契丹厯先一日趨使者入賀北人不禁天文術數之學往往皆精其實契丹厯為正也然勢不可從子容乃為泛論厯學援據詳博北人莫能測不能遽折歸奏神宗大喜即問二厯孰是蘇以實言太史皆坐罰金元祐初遂命子容重修渾義張邦基墨莊漫録曰蘇子容丞相博學無所不通熙寧十年為大遼生辰國信使適遇冬至本朝厯先一日北朝厯後一日北人問公孰是公曰厯家算術小異遲速不同謂如亥時節氣當交則猶是今夕若踰數刻即屬子時為明日矣厯家布算容有遲速或先或後故有一日之異然各從本朝之厯可也北人深以為然遂各以其日為節慶賀使還奏之上曰朕思之此最難處卿之所對極中事理志第十五百官志一十二宫職名總目余靖武溪集曰遼人十宫院使者自安巴堅而下每主嗣位即立宫置使領臣寮每嵗所獻生口及打虜外國所得之物盡𨽻宫使每宫皆有户口錢帛以供其主私費猶中國之內藏也十宫院使在上將軍之下節度使之上志第十六百官志二北面軍官余靖武溪集曰契丹司録事司如中國之府司左右司候司掌刑獄遼人於燕京置元帥府統軍馬軍步軍司三遼東有渤海西有奚南有燕北據其窟穴四姓雜居舊不通婚謀臣韓紹芳獻議乃許婚焉衣服飲食言語各從其俗凡四姓相犯皆用漢法本類自相犯者用本國法故别立契丹司以掌其獄志第十七上百官志三南面朝官五代史曰契丹滅晉其母舒嚕遣人齎書及安巴堅明殿書賜德光明殿若中國陵寢下宫之制其國君死葬則於墓側起屋謂之明殿置官屬職司四時奉表起居如事生置明殿學士一人掌答書詔每國有大慶弔學士以先君之命為書以報國君其書常曰報兒皇帝宋敏求春明退朝録曰契丹有乾文閣志第十七百官志四上京鹽鐵使司東京户部使司中京度支使司南京三司使司西京計司余靖武溪集曰遼人司會之官雖於燕京置三司使唯掌燕薊涿易恆順等州錢布耳又於平州置錢帛司營灤等州屬焉中京置度支使宜霸等州隸焉東京置户部使遼西川錦等州屬焉上京置鹽鐵使饒澤等州𨽻焉山後置轉運使應蔚等州𨽻焉置使雖殊其實各分方域掌其出納也隨駕賜豫則樞密主之宴勞則宣徽使主之佐吏補文獻通考曰契丹內外官多倣中國者其下佐吏則有敞史穆昆薩納噶達嚕噶圗嚕鶚案百官志額爾竒木院有敞史約尼九帳大詳衮司有敞史其下三職史未載也志第十八禮志一吉儀柴册儀王易燕北録曰清寧四年戊戌嵗十月二十三日遼主一行起離鞾甸往西北二百七十餘里地名永興甸行柴册之禮于十一月一日先到小禁圍內宿泊於二日先於契丹宫內選擇九人與遼主身材一般大小者各賜遼主所著衣服一套令結束九人假作遼主不許别人覺知於當夜子時與遼主共十人相離出小禁圍入大禁圍內分投各一帳每帳只有蠟燭一條椅子一隻並無一人於三日辰時每帳前有契丹官僚一員各自入帳列何骨臘漢語提認天子也若提認得遼主者宣賜牛羊駝馬各一千當日宋國大王遼主親弟於第八帳內提認得遼主番儀須得言道我不是的皇帝其宋國大王道言道你的是皇帝如此往來畨語三遍遼主方始言道是便是出帳來著箱內番儀衣服畢次第行禮先望日四拜又拜七祖殿次拜木葉山神次拜金神次拜册太后次拜赤娘子次拜七祖眷屬次上紫籠受册次入黑龍殿受賀當日行禮罷與太后太叔出大禁圍郤入小禁圍內與近上畨漢臣僚夜宴至三更退四日歇泊至五日卻來鞾甸受南朝禮物小禁圍在大禁圍東北內氊帳二十三座大禁圍圍無一面長一百十一步內有氊帳十座黑氊兵幕七座大小禁圍外有契丹兵甲一萬人各執槍刀旗鼓弓箭等旗上錯成番書順字漢語正軍字七祖者太祖太宗世宗穆宗景宗聖宗興宗也赤娘子者畨語謂之掠胡奧偌傳是隂山七騎所得潢河中流下一婦人因生其族類其形木雕彩裝常時于木葉山廟內安置每一新主行柴册禮時取來作儀注第三日送歸本廟七祖眷屬俱是木人著紅錦衣亦于木葉山廟內取到柴龍之制髙三十二尺用帶皮榆柴疊成上安黑漆木壇三層壇安御帳當日遼主坐其中下有契丹臣僚二百餘人鶚案王易所記柴册儀與史志不同存以備考志第二十禮志四賔儀宋使賀生辰正旦歐陽修居士集皇帝賀契丹皇帝正旦書曰正月一日伯大宋皇帝致書於侄大契丹聖文神武睿孝皇帝闕下玉厯正時布王春而兹始寶鄰敦契講信聘以交修方履新陽益綏多福其於祝詠罔罄敷言今差朝散大夫守太常少卿上騎都尉渤海縣開國男食邑三百户賜紫金魚袋吳中復供備庫使銀青崇祿大夫檢校太子賔客兼御史大夫騎都尉廣平縣開國男食邑三百户宋孟孫充正旦國信使副有少禮物具諸别幅専奉書陳賀不宣謹白皇帝賀契丹太皇太后正旦書曰正月一日姪大宋皇帝謹致書於嬸大契丹仁慈聖善欽孝廣德安靜正淳懿和寬厚崇覺儀元太皇太后闕下嵗律更新春陽暢逹因履端之叶吉敦永好以申歡載惟慈懿之和方集夀康之祉更希善攝用副遐悰今差朝散大夫守太常少卿直昭文館護軍廣陵縣開國子食邑五百户賜紫金魚袋吕景初洛苑使兼閣門通事舍人銀青崇祿大夫檢校太子賔客兼御史大夫騎都尉清河郡開國侯食邑一千七百户張利一充正旦國信使副有少禮物具諸别幅専奉書使賀不宣謹白王安石臨川集皇帝問候大遼皇帝書曰嘉生備舍華嵗幾終惟素講於鄰歡想具膺於時福彌加葆衛永御吉康皇帝賀大遼皇太后生辰書曰玉燭告和方御閉藏之候椒庭集慶載鄰誕育之辰具飭使車肅將禮幣式修舊好申祝永年契丹國志曰宋朝賀契丹生辰禮物契丹生日南宋遺金酒食茶器三十七件衣五襲金玉帶二條烏皮白皮鞾二緉紅牙笙笛觱篥拍板鞍勒馬二匹纓復鞭副之金花銀器三十件錦綺透背雜色紗綾縠絹二千匹雜綵二千匹法酒三十壺的乳茶十斤嶽麓茶五斤鹽蜜果三十罐乾果三十籠正旦則遺以金花銀器白銀器各十件雜色綾羅紗縠絹二千匹雜彩二千匹宋朝皇帝生辰北朝所獻刻絲花羅御樣透背御衣七襲或五襲七件紫背貂鼠翻披或銀鼠鵝項鴨頭衲子塗金銀裝箱金籠水精帶銀匣副之錦緣帛皺皮鞾金玦京皂白熟皮鞾鞋細錦透背清平內裝御樣合線樓機綾共三百匹塗金銀龍鳳鞍勒紅羅匣金錦繡方韉一具白楮皮黑銀鞍勒氊韉二具緑褐楮皮鞍勒海豹皮韉白楮皮黑褁筯鞭一條紅羅金銀線繡雲龍紅銀器仗一幅黃樺皮纒楮皮弓一紅錦袋皂雕翎羱角骲頭箭十法漬法麴麵麴酒二十壺蜜曬山果十束櫺碗蜜漬山果十束櫺匹列山梨柿四束櫺榛栗松子郁李黑郁李子麵棗楞梨索梨二十霜麵杬麋梨粆十碗蕪萸白鹽十碗青鹽十箱牛羊野豬魚鹿臘二十二箱御馬六匹散馬二百匹正旦御衣三襲鞍勒馬二匹散馬一百匹國母又致御衣綴珠貂裘細錦刻絲透背合線御綾羅紗縠御樣果實雜粆臘肉凡百品水精鞍勒新羅酒青鹽國主或致戎器賔鐵刀鷙禽曰海東青之類承天節又遣庖人持本國異味前一日就禁中造食以進御云髙麗使入見儀契丹國志曰髙麗國進貢物件金器二百兩金抱肚一條五十兩金沙鑼五十兩金鞍轡馬一匹五十兩紫花綿紬一百匹白綿紬五百匹細布一千匹粗布五千匹銅器一千斤法漬酒醋共一百瓶腦先茶十斤藤造器物五十事成形人參不定數無灰木刀欛十個細紙墨不定數目橫進物件粳米五百石糯米五百石織定五彩御衣不定數契丹每次回賜物件犀玉腰帶二條細衣二襲金塗鞍轡馬二匹素鞍轡馬五匹散馬十匹弓箭器仗二副細綿綺綾羅二百匹衣著絹一千匹羊二百口酒果子不定數並命刺史以上官充使一行六十人直送入本國契丹賜奉使物件金塗銀帶二條衣二襲綿綺三十匹色絹一百匹鞍轡馬二匹散馬五匹弓箭器仗一副酒果不定數上節從人白銀帶一條絹二十匹馬一匹下節從人衣一襲絹十匹紫綾大衫一領西夏國進奉使朝見儀契丹國志曰西夏國貢進物件細馬二十匹粗馬二百匹駝馬百頭綿綺三百匹織成綿被褥五合蓯蓉甘石石井鹽各一千斤沙狐皮一千張兔鶻五隻犬子十隻本國不論年數惟以八節貢獻契丹回賜除羊外餘並與髙麗同帷玉帶改為金帶勞賜人使亦同志第二十二禮志六嘉儀下立春儀賜幡勝韓琦安陽集使契丹謝春槃幡勝狀云緹律回春青陽戒節鏤勝俯遵於俗尚雕槃榮錫於時珍上荷恩私至深銘刻日月蝕補燕北録曰契丹如日月蝕各備酒饌相賀國主次日亦有宴會如日蝕即盡望而唾之仍背日坐志第二十三樂志國樂文獻通考曰契丹有諢子部百人夜以五十人番直四鼓將盡歌于帳前號曰聒帳每謁拜木葉山即射栁枝諢子唱畨歌前導彈胡瑟和之己事而罷大樂調雅樂有七音大樂亦有七聲謂之七旦沈德符野獲編曰自北劇興名男為正末女曰旦兒相傳入於南劇雖稍有更易而旦之名不改竟不曉何義今觀遼史樂志大樂有七聲謂之七旦凡一音管一調如中宫越調大食中宫之屬此外又有四旦二十八調不用黍律以琵琶叶之按此即今九宫譜之始所謂旦乃司樂之總名以故金元相傳遂命歌妓領之因以作雜劇流傳至今旦皆以娼女充之無則以優之少者假扮漸逺而失其真耳大樂聲各調之中度曲協音其聲凡十野獲編曰今按樂者必先學笛曲如五凡工尺上一之屬世以為俗工俚習不知其來舊矣宋樂書云黃鍾用合字大吕太蔟用四字夾鍾姑洗用一字夷則南吕用工字無射應鍾用凡字中吕用上字蕤賔用勾字林鍾用尺字黃鍾清用六字大吕夾鍾清用五字又有隂陽及半隂半陽之分而遼史大樂聲各調之中庭曲協音其聲凡十曰五凡工尺上一四六勾合近十二雅律於律吕各闕其一以為猶雅音之不及商也可見宋遼此調已謂之祖曲宴宋國使樂次張舜民畫墁録曰契丹待南使樂列三百餘人舞者更無回旋止于頓挫伸縮手足而已角抵以倒地為負兩人相持終日欲倒而不可得又物如小額通蔽其乳脫若裭露之則兩手覆面而走深以為恥也志第二十五儀衛志二國服臣僚戴氊冠䩞鞢帶契丹國志曰番戴氊冠上以金冠為飾或加珠玉翠毛蓋漢魏時遼人步搖冠之遺象也孟元老東京夢華録曰正旦大朝會大遼大使頂金冠後簷尖長如大蓮葉服紫窄袍今蹀躞副使服褁金帶如漢帶沈括夢溪筆談曰帶衣所垂蹀躞蓋欲佩帶弓劍帉帨算囊刀礪之屬契丹國志曰丈夫或緑中單緑花窄袍𫀆單多紅緑色貴者被貂服裘以紫黑色為貴青色為次又有銀鼠尤潔白賤者被貂毛羊鼠沙狐裘弓以皮為絃箭削樺為簳韀勒輕快便于馳走以貂鼠或鵝頂鴨頭為捍腰徐吕皮補程大昌演繁露曰今使北者其禮例中所得有韋而紅光滑可鑒問其名則徐吕皮也問何以名之則曰徐氏吕氏二氏實工為之也此説信否殊未可知豫案燕北雜記曰契丹興宗嘗禁國人服金玉犀帶及黑色薩哩皮并紅虎皮靴及道宗即位以為靴帶也者用之可以華國遂弛其禁冉許服用此即靴帶之制矣及問徐吕皮所自出則曰黑色薩哩皮謂回紇野馬皮也用以為靴騎而越水水不透裏故可貴也紅虎皮者回紇獐皮也揉以磠砂須其軟熟用以為靴也本此而言則知徐吕皮者即薩哩聲之轉也然薩哩之色貴黑而徐吕皮之色紅恐是野馬難得而磠砂熟韋可以常致故染而紅之以當獐皮為欲髙其名品遂借薩哩以為名呼也兔鶻帶補契丹國志曰契丹重骨咄犀犀不大萬株犀無一不曾作帶紋如象牙帶黃色止是作刀把已為無價天祚以此作兔鶻中國謂之腰條皮插垂頭者婦人服補鶚案金史輿服志曰婦人服襜裙多以黑紫上遍繡金紫花周身六襞積上衣謂之團衫用黑紫或皂及紺掖縫兩旁復為雙襞積前拂地後曵地尺餘帶色用前雙垂至下齊年老者以皂紗籠髻如巾狀散綴玉鈿於上謂之玉逍遙此皆遼服也金亦襲之志第二十六儀衛志三符印傳國寶李林甫唐六典曰符寶郎掌天子八璽其一曰神寶二曰受命寶其神寶方六寸髙四尺六分厚一寸七分蟠龍紐文與傳國璽同傳國璽秦皇以藍田玉刻之李斯篆文方四寸面文曰受命于天既夀永昌紐盤五龍二寶厯代相傳以為神器别有六寶一曰皇帝行璽二曰皇帝之璽三曰皇帝信璽四曰天子行璽五曰天子之璽六曰天子信璽此六璽因文為名並白玉螭虎紐厯代傳受或亡失則補之續通典曰秦兼六國稱皇帝購取藍田之玉玉工孫夀刻之分四寸李斯為大篆書之形製如龍魚鳳鳥之狀希世之至寶也秦世子嬰以璽降漢漢世世傳寶之王莽之篡求璽於元后后投之于階一角微缺莽誅歸之更始更始敗歸之盆子及熊耳之敗盆子以璽降光武漢末黃巾亂投璽于井孫堅入洛見井有五色氣取得之以歸袁術術散荆州刺史徐璆得之詣許以進獻帝魏受漢禪得之以傳于晉洛陽之陷劉聰得之劉曜為石勒所禽璽歸于鄴石氏之亂冉閔得之閔敗晉將戴施入鄴得之送江東傳之宋齊梁臺城之破矦景得之景敗其將矦子鑒以璽走為追兵所迫投于棲霞寺井中僧永抒得而匿之陳永定二年永弟子普知以璽上陳文帝隋平陳始得秦真傳國璽煬帝江都之禍宇文化及得之化及敗璽歸竇建德建德敗其妻曺氏以璽獻于唐唐禪梁楊涉送寶于大梁莊宗滅梁得之同光末內難作寶為火灼文字訛缺明宗得之清泰敗以寶隨身自焚而死寶遂亡其神璽者方六寸厚一寸七分髙四寸六分蟠龍隱起文與傳國璽同但玉色不及形制髙大耳不知何代製造東晉孝武十九年雍州刺史郗恢得之慕容永送於金陵傳之宋齊梁臺城之破侯景得之景敗侍中趙思齊攜走江北獻之齊文宣帝宇文滅齊得之宇文亡入隋隋文帝改號傳國璽仍以秦璽後出得于亡陳以北朝所傳神璽為第一秦璽次之隋亡竇建德妻與傳國璽俱獻長安唐末不知所在鄭文寶傳國璽譜曰唐明宗崩璽歸清泰晉髙祖擁戎馬入洛河橋不守清泰積薪纍日盡驅六宫珍玩一旦偕焚於摘星樓秦璽煨燼其亦明矣按陷蕃記北兵入梁圍晉末主奉上璽綬遼主怪玉璽制用疏朴不工又非真紐疑將有隱易者晉人具以實對文寶淳化中司計陜右督軍芻于塞下有乾州永夀縣主簿趙應良者北燕人自謂少年事遼為丞相髙公堂後官嘗從公至燕子城登重閣閲晉舊物得觀璽綬與陷蕃記略同五代會要曰傳國璽自秦始皇後厯代傳受至唐末帝自燔之際以寶隨身焚焉晉髙帝受命特製寶一座文曰皇帝神寶開運末北人齎以入蕃孔平仲珩璜新論曰石晉再作受命寶文曰受天明命惟德永昌契丹取之李心傳建炎以來朝野雜記曰秦璽者李斯之魚蟲篆也其圍四寸至漢謂之傳國璽子嬰所封元后所投王憲所得赤眉所上皆是物也董卓之亂失之吳書謂孫堅得之洛陽甄官井中復為袁術所奪徐璆得而上之殆不然也若然則魏氏何不寶用而自刻璽乎厥後厯世猶用其名永嘉之亂投于劉石永和之世復歸江左者晉璽也魏氏有國刻傳國璽如秦之文但秦璽讀自右魏璽讀自左耳晉有天下又自刻璽其文曰受命于天皇帝夀昌本書輿服志乃以為所傳秦璽誤實甚矣此璽更劉聰石勒逮石祇死其臣蔣幹求援于謝尚乃以璽送江南王彪之辨之亦云非秦璽也太元之末得自西燕更涉六朝至于隋代者慕容燕璽也晉孝武太元十九年西燕王永求援于郗恢併獻玉璽一紐方濶六寸髙四寸六分文如秦璽自是厯秦宋齊梁皆寶之矦景既死北齊辛術得之廣陵獻之髙氏後厯周隋皆誤指為秦璽後平江南知其非是乃更謂之神璽焉劉裕北伐得之關中厯晉暨陳復為隋有者姚秦璽也晉義熙十三年劉裕入關得傳國璽之文與秦同但隱起而不深刻隋滅陳指此為真璽遂以宇文所傳神璽為非是識者又謂古璽深刻以印泥後人隱起以印紙則隱起者非秦璽姚氏取其文作之耳開運之亂沒于耶律女真獲之以為大寶者石晉璽也唐太宗貞觀十六年刻受命璽文曰皇帝景命有德者昌後歸朱全忠及從珂自焚璽亦隨失德光入汴重貴以璽上之云先帝所刻蓋指敬瑭也蓋在唐時皆誤以為秦璽而秦璽之亡則久矣鶚案秦璽之説非一璽已焚于後唐遼所得者乃晉璽耳史稱興宗重熙七年以有傳國璽者為正統賦試進士豈當時亦未之深考耶金印三晉出帝所上其文未詳周必大省齋文稿題五代應順年堂檢臨本曰右後唐宰臣劉昫兼判三司堂檢其內批用御前新鑄之印豫從洪景盧待制借本臨之按應順元年三月戊辰愍帝遜于衛必以印寶自隨四月壬申從珂入洛乙亥即位殆倉卒鑄此印耶乙酉大赦改元清泰時愍帝已殂璽應來歸後十餘年晉出帝奉玉璽金印歸契丹契丹謂璽非工與前史所傳異命求真璽出帝曰從珂自焚玉璽不知所在疑焚之事載晉家人傳所謂金印亦新鑄之類耳符契銀牌木刻子牌補燕北録曰銀牌有十三道上是番書朕字用金鍍鈒成見在內侍左承宣宋璘處收掌用黑漆匣盛每日於遼主前呈奉一遍或有緊急事宜用此牌帶在項下于南北大王處抽發兵馬餘事即不用張舜民使遼録曰銀牌形如方響刻畨書冝速二字使者執牌馳馬日行數百里所至如國主親到需索更易無敢違者燕北録曰長牌七十二道上是畨書敕走馬字用金鍍鈒成見在南司內收掌每遇下五京等處取索物色及進南朝野味鹿茸果子以此牌信帶在腰間走馬又木刻子牌約有一十二道上是畨書急字左面刻作七刻取其本國厯七世也右面刻作一刻旁是畨書永字其字用金鍍銀葉陷成長一尺二寸已來每遇生女真逹靼國取要物色抽發兵馬即用此牌信帶在腰間左邊走馬其二國驗以為信志第二十八食貨志上賦稅之制宣府鎮志曰契丹統和十八年詔北地節候頗晚冝從後唐舊制大小麥豌六月十日起徴至九月納足正稅匹帛錢鞋地𣙜麴錢等六月二十日起徴至十月納足中州集曰遼人掠中原人及得奚渤海諸國生口分賜近貴或有功者大至一二州少亦數百皆為奴婢輸租為宜且納課給其主謂之三稅户又見金史宴傳范鎮東齋紀事曰契丹有馮見善者豫接伴勸酒見善曰勸酒當以其量若不以量如徭役而不户等髙下也以此知契丹徭役亦以户等中國可以量户等役人耶志第二十九食貨志下鼓鑄之法洪遵泉志曰契丹國天贊錢五代史四夷附録曰契丹主安巴堅年曰天贊按此錢徑九分重三銖六參文曰天贊通寶應厯錢董逌曰文曰應厯重寶趙至忠北廷雜記曰穆宗改元應厯董逌錢譜曰統和元寶宋太平興國八年耶律隆緒鑄太平元寶宋天禧五年耶律隆緒鑄泉志曰北廷雜志聖宗卒少主宗真立改元景福一年又改重熙按此錢徑九分重三銖文曰重熙通寶陳昉契丹須知曰契丹主洪基改元清寧按此錢徑九分重三銖文曰清寧通寶泉譜曰咸雍通寶宋治平二年耶律洪基鑄泉志曰徐競髙麗圖經契丹咸雍十年改太康至十年改元大安按此錢有二品並徑九分重二銖四參以太康通寶太康元寶為文鶚案董逌錢譜太康通寶作太康同寶未知孰是李季興東北諸蕃樞要曰契丹主天祐年號大安按此錢徑八分重二銖八參文曰大安元寶李季興東北諸蕃樞要曰契丹主天祐年號夀昌按此錢徑九分重二銖四參文曰夀昌元寶鶚案道宗年號夀隆泉志云夀昌正閏考亦云遼道宗年號夀昌見東都事略范成大攬轡録又有盛昌六年未詳何據北遼通書曰天祚即位夀昌七年改為乾統按此錢徑寸重三銖二參文曰乾統元寶李季興東北諸蕃樞要曰契丹主天祚年號天慶按此錢徑九分重二銖四參文曰天慶元寶考之北廷雜記曰景宗朝置鑄錢院年額五百貫則契丹鑄錢舊矣泉志李孝美曰此錢徑三分文曰千秋萬嵗今甚易得蓋每嵗遼使入貢人多博易得耳董逌曰遼國錢蓋近世所為志第三十刑法志上鐵骨朵之數或五或七燕北録曰鐵瓜畨呼髮覩以熟鐵打作八片虛合或用栁木作柄約長三尺兩邉鐵裏打數不過七下沙袋者穆宗時制燕北録曰沙袋畨呼郭離以牛皮夾縫如鞋底內盛沙半升柄以木作胎亦用牛皮裹約長二尺打數不過五百遼主太后寢帳內事不論大小若傳播出外捉獲者其元傳播人處死接聲傳播人決沙袋五百契丹盜衣服錢帛諸物等捉獲賊或纍貨估價錢每五百貫文決沙袋一百纍至二百五十文決沙袋五百配徒五年若更有錢時十貫文打骨䤪一下至骨䤪五下更有錢時處死犯竊盜者初刺右臂再刺左三刺頸之右四刺左至于五則處死能改齋漫録曰契丹之法民為盜者一犯文其腕為賊字再犯文其臂三犯文其肘四犯文其肩五犯則斬不須案籍而辜不可掩武圭燕北雜記曰正月十三日放契丹做賊三日如盜及十貫以上依法行遣松漠紀聞曰金國治盜甚嚴每捕獲論罪外皆十倍責償唯正月十六日則縱偷一日以為戲寶貨車馬為人所竊皆不加刑是日人皆嚴備遇偷至則笑遣之既無所獲雖畚钁微物亦携去婦人至顯入人家伺主者出接客則縱其婢妾盜飲器他日知其主名或偷者自言大則具茶食以贖謂羊酒肴饌之類次則携壺小飲或打糕取之亦有先與室女私約至期而竊去女願留則聼之自契丹以來皆然燕亦如此遼史拾遺卷十五
