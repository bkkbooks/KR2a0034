body:
  text: 遼史拾遺卷二十三錢塘厲鶚撰國語解第四十六太祖紀耶律氏蕭氏文昌雜録曰余嘗見樞密都承旨張誠一説昔年使北遼因問耶律蕭姓所起使人云昔天皇王問大臣云自古帝王英武為誰耶其大臣對曰莫如漢高祖又問將相勳德孰為優對以蕭何天皇王遂姓耶律氏譯云劉也其后亦錫姓蕭氏歐陽少師作五代史乃曰天皇王安巴堅以其所居橫帳地名為姓錫里譯者謂耶律昔蕭翰為契丹大族其號阿巴本無姓氏李嵩為製姓名曰蕭翰於是姓蕭二者未知孰是契丹國志曰契丹都部族本無姓氏惟各以所居地名呼之婚嫁不拘地里至安巴堅變家為國始以王族號為橫帳仍以所居之地名曰錫里著姓錫里者上京東二百里地復賜后族姓曰蕭氏番法王族惟與后族通婚更不限以尊卑其王族后族二部落之家若不奉北主之命皆不得與諸部之人通婚若諸部族彼此自相婚姻不拘此限故北番惟耶律蕭氏二姓也奚霫劉昫舊唐書曰霫胸奴之别種也居于潢水北亦鮮卑之故地其國在京師東北五千里東接靺鞨西至突厥南至契丹北與烏羅渾接地周二千里四靣有山環繞其境人多善射獵好以赤皮為衣緣婦人貴銅釧衣襟上下懸小銅鈴風俗略與契丹同有都倫紇斤部落四萬户勝兵萬餘人君基太一神夢溪筆談曰十神太一一曰太一次曰五福三曰天一太一四曰地太一五曰君基太一六曰臣基太一七曰民基太一八曰大遊太一九曰九氣太一十曰十神太一唯太一最尊更無别名止謂之太一三年一遊後人以其别無名遂對大遊而謂之小遊太一此出於後人誤加之京師東西太一宫正殿祠五福而太一乃在廊廡甚為失序熙寧中營中太一宫下太史考定神位時豫領太史預其議論令前殿祠五福而太一别為後殿各全其尊深為得體然君基臣基民基避唐明帝諱改為棊至今仍襲舊名未曽改正玉海曰天寶三載十月十六日術士蘇嘉慶上言請于京城置九宫壇壇一成三尺四陛其上依位置小壇髙尺五東南曰招搖正東曰軒轅東北曰太隂正南曰天一中央曰天符正北曰太一西南曰攝提正西曰咸池西北曰青龍五數為中戴九履一左三右七二四為上六八為下符於遁甲此九宫定位也每嵗祭以四孟位隨嵗改謂之行棊自乾元後止依本位遂不飛易又曰黃帝九宫經隋志一卷又三卷行棊經三卷鄭元注房氏行棊法一卷章俊卿山堂考索曰漢立太一祠即甘泉泰畤也唐謂之太清紫極宫宋謂之太一宫顧炎武曰知録曰史記天官書中宫天極星其星明者為太一常居封禪書亳人繆忌奏祠太一方曰天神貴者太一太一佐曰五帝此太一祠之所自起易乾鑿度曰太一取其數以行九宫鄭元注曰太一者北辰名也下行八卦之宫每四乃還于中央中央者地神之所居故謂之九宫天數以陽出以陰入陽起于子陰起于午是以太一下行九宫從坎宫始自此而坤宫又自此而震宫既又自此而巽宫所行者過半矣還息于中央之宫既又自此而乾宫自此而兌宫自此而艮宫自此而離宫行則周矣上遊息于太一之星而反紫宫行起於坎宫終於離宫宋朝尤重太一之祠以太一飛在九宫每四十餘年而一徙所臨之地則兵役不興水旱不作在太平興國中太宗立祠于東南郊而祀之則謂之東太一宫在天聖中仁宗立祠于西南郊而祀之則謂之西太一宫在熙寧中神宗建集福宫而祀之則謂之中太一宮鶚案君基太一神沈括以為避唐諱改為棊然漢時已有行棊飛棊之説又似不因避諱而改矣鄭氏太一下行九宫之説即所云行棊也太宗紀林牙江鄰幾雜志曰冀州城南張耳墓在送客亭契丹使林牙者猶翰林學士不知張耳何代人也問知州王仲平告之大使耶律防謝曰契丹家翰林學士名目而已世宗穆宗紀葉格戲錢希白南部新書曰李郃為賀牧與妓人葉茂蓮江行因撰骰子選謂之葉子咸通以來天下尚之歸田録曰葉子格者自唐中世以後有之唐人藏書皆作卷軸其後有葉子其制似今䇿子凡文字有備檢用者卷軸難數卷舒故以葉子寫之如吳彩鸞唐韻李郃彩選之類是也骰子格本備檢用故亦以葉子寫之因以為名爾唐世士人宴聚盛行葉子格五代國初猶然焦竑國史經籍志曰遍金葉子格一卷新定遍金葉子格一卷擊蒙小葉子格一卷李後主妃周氏小葉子例一卷天祚紀頭魚宴演繁露曰燕北雜録載契丹興宗重熙年間衣制儀衛打圍射鹿釣魚事于景祐五年十月撰進不書撰人姓名而著其所從聞曰昔鄉人武圭在遼十餘年以善歌𨽻帳下故能習遼事詳悉凡其所録皆圭語也達魯河釣牛魚遼地盛禮意慕中國賞花鈎魚然非釣也鈎也此之所紀于道宗為清寧四年其甲子則戊戍正月也達魯河東與海接嵗正月方凍至四月而泮其鈎是魚也遼主與其母皆設次氷上先使人於河上下十里間以毛網截魚令不得散逸又從而驅之使集遼主帳其牀前預開氷竅四名為水眼中眼透水旁三眼環之不透苐斫減令薄而已薄者所以候魚而透者將以施鈎也魚雖水中之物若久閉於氷遇可出水之處亦必伸首吐氣故透水一眼必可以致魚而薄不透水者將以伺視也魚之將至伺者以告遼主即遂於斫透眼中用繩鈎擲之無不中者既中遂縱繩令去久魚倦即曵繩出之謂之得頭魚頭魚既得遂相與出氷帳于别帳作樂上壽周必大二老堂雜志曰贊寧物類相感志引博物志云東海有牛魚其形似牛剝其皮懸之潮水至則毛起退則毛伏今東牟有海牛島其牛無角足似龜長丈餘尾若鮎云鶚案王易燕北録云牛魚即鱘之大者程大昌又以為牛魚似牛形蓋祖贊寧之説其實非也營衛志鶚案遼史目録本紀後志首營衛次兵衛次地理次歷象次百官次禮次樂次儀衛次食貨次刑罰表首世表次皇子次公主次皇族次外戚次遊幸次部族次屬國以下列傳今國語解帝紀下即次以禮樂志以及百官營衛地理儀衛兵衛食貨刑法表次世表于皇子之下列傳中又分諸功臣傳先後錯雜無倫與目録逈殊今採陳士元諸史譯語有可補正者附著于卷伊囉斡鶚案此條史誤在岱拉哈下岱拉哈鶚案此條史誤在彀烏寧下伊囉斡前嘉們鶚案此條史誤在學順德哩本下沽依鶚案此條史誤在農古下農古鶚案此條史誤在沽依上阿敦鶚案此條史誤在沽依下阿果諸史譯語曰阿果者華言寬大也阿果一作阿思又作阿厮鶚案此條史作阿果寬大誤作實大學順德哩本鶚案此條史誤作得失得本托輝諸史譯語曰奚托輝部門名托輝太祖滅奚因其門名置為托輝部鶚案此條本在營衛志奚王部史更載于地理志誤矣兵衛志舒新軍案舒新舊作屬珊諸史譯語曰應天皇后從太祖征討所俘人户有技藝者置之帳下為屬珊蓋比珊瑚之寶云鶚案史文所俘人户有下缺四字今補全又屬珊軍本在兵衛志史更移之地理志誤矣禮樂志鶚案史禮志下次樂志國語解合為一宜依史分别勘箭夢溪筆談曰大駕鹵簿中有勘箭如古之勘契也其壯謂之雄牡箭其牝謂之闢仗箭熙寧中罷之扎拉巴燕北雜記曰二月一日番中蕭姓者請耶律姓者于本家筵席番中呼此節為扎拉巴六月十八日耶律姓却請蕭姓者亦名扎拉巴卓帳宣和畫譜曰胡瓌有平逺番部卓歇圖二毳幕卓歇圖一儀衛志果下馬後漢書東夷傳曰濊貊屬樂浪有果下馬高三尺乘之可於果樹下行徐堅初學記曰濊國出果下馬漢時獻之高三尺世表蠕蠕魏收魏書列傳曰蠕蠕東胡之苗裔也姓郁久閭氏始神元之末掠騎有得一奴髮始齊眉忘本姓名其王字之曰木骨閭木骨閭者首禿也木骨閭與郁久閭聲相近故後子孫因以為字木骨閭既壯免奴為騎卒穆帝時坐後期當斬亡匿廣漠溪谷間收合逋逃得百餘人依純突鄰部木骨閭死子車鹿會雄建始有部衆自號柔然世祖以其無知狀類于蟲故改其號為蠕蠕諸功臣傳鶚案史無功臣傳之目國語解功臣二字無據當作列傳龍錫金佩諸史譯語曰太祖從兄達噶濟以本帳下蛇鳴命知蛇語者珊蘇庫解之知蛇謂穴旁有金達噶濟掘之乃得金以為帶名龍錫金鶚案史文穴旁下缺八字今補全榾柮犀周密雲煙過眼録曰伯幾云骨柮犀乃蛇角也其性至毒而能解毒葉森于延祐庚申得骨柮犀刀靶二來看其花紋如今市中所賣糖糕或有白點以手摸之作岩桂香若摩之無香者偽物也劉郁西使記曰骨篤犀大蛇之角也解諸毒慎懋官華夷鳥獸考曰骨咄犀蛇角也其性至毒而能解毒蓋以毒攻毒也故曰蟲毒犀唐書有古都國必其所産今人訛為骨柮耳堂印劉攽漢官儀曰傳采堂印又曰金印紫綬堂帖夢溪筆談曰唐中書指揮事謂之堂帖子曽見唐人堂帖宰相簽格如今之堂劄子也遼史拾遺卷二十三
