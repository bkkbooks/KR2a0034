body:
  text: 遼史拾遺卷二錢塘厲鶚撰本紀第三太宗上太宗孝武惠文皇帝諱德光字德謹小字耀庫濟唐天復二年生神光異常釋念常佛祖通載曰遼主德光名耀庫濟姓劉氏安巴堅第二子誕于大部落東牙帳生時黑雲覆帳火光照耀有聲如雷及長雄傑有大志精騎射契丹國志曰帝嘗從太祖至西樓有赤光紫氣蓋其上左右異之天顯元年七月太祖崩皇后攝軍國事資治通鑑曰天成元年八月丁亥契丹舒嚕后使少子安圖少君守東丹與長子托雲奉契丹主之喪將其衆發扶餘城庚子幽州言契丹冦邉命齊州防禦使安審通將兵禦之冬十月補資治通鑑曰天成元年冬十月庚子幽州奏契丹盧龍莭度使盧文進來奔初文進為契丹守平州帝即位遣閒使說之以易代之後無復嫌怨文進所部皆華人思歸乃殺契丹戌平州者帥其衆十餘萬車帳八千乘來奔馬令南唐書曰唐明宗即位盧文進自平州率衆數萬歸唐明宗以為義成軍莭度使居嵗餘徙鎮威勝加同平章事入為上將軍出鎮昭義徙安逺晋髙祖與契丹約為父子文進懼不能自安天福元年冬送欵於烈祖烈祖以文進為天雄統軍節度使文進身長七尺狀貌偉然自其奔契丹也數引契丹攻掠幽薊虜其人民教契丹以中國織絍工作無不備契丹由此益强同光中契丹數以輕騎出入塞上攻掠幽趙人無寧嵗唐兵屯涿州嵗時饋運自瓦橋關至幽州嚴斥堠常苦抄奪為唐患者十餘年皆文進為之也初文進攻新州不克夜走墜塹一躍而出明日視之乃郡之黑龍潭也絶岸數丈深不可測又嘗有大蛇徑至座間引首及膝文進取食飼之而去由是自負反復南北終無挫衄焉錢希白南部新書曰盧文進陷契丹中嘗於無定河見人脛骨一條大如柱長可七尺明年秋治祖陵畢冊府元龜曰唐明宗天成二年幽州奏契丹王差人持書求碑石欲為其父表其葬所冬十一月壬戌人皇王貝率郡臣請於后曰皇子大元帥勳望中外攸屬宜承大統后從之是日即皇帝位資治通鑑曰契丹舒嚕后愛中子德光欲立之至西樓命與托雲俱乘馬立帳前謂諸酋長曰二子吾皆愛之莫知所立汝曹擇可立者執其轡諸酋長知其意爭執德光轡歡躍願事元帥太子后曰衆之所欲吾安敢違遂立之為天皇王天皇王性孝謹母病不食亦不食侍於母前應對或不稱㫖母揚眉視之輒懼而趨避非復召不敢見也五代㑹要曰天成二年十一月又遣使美棱等二十餘人朝貢兼申和好之意明宗命飛勝指揮使安念德齎錦綺綾羅及金花銀器寶裝酒器等賜之又賜其母舒嚕氏繡被一張并寶裝瓔珞三年春三月乙丑獵松山唐義武軍節度使王都遣人以定州來歸唐主出師討之使來乞援命奚圖哩塔拉往救之册府元龜曰王都為定州節度臨戎數年惟以慘虐為務周元豹見之曰形若鯉魚難免刀几資治通鑑曰初義武軍節度使兼中書令王都鎮易定十餘年自除刺史以下官租賦皆贍本軍及安重誨用事稍以法裁制帝亦以都篡父位惡之時契丹數犯塞朝廷多屯兵於幽易問大將往來都隂為之備浸成猜阻都恐朝廷移之它鎮腹心和昭訓勸都為自全之計都乃求昏於盧龍節度使趙德鈞又知成德節度王建立與安重誨有隙遣使結為兄弟隂與之謀復河北事故欲復如唐河北諸鎮世襲不輸朝廷貢賦不受朝廷徴發建立陽許而密奏之都又以蠟書遺青徐潞益梓五帥離間之又遣人說北面副招討使王晏球晏球不從乃以金遺晏球帳下使圖之天成三年春二月癸巳晏球以都反狀聞詔宣徽使張延朗與北面諸將議討之夏四月丙申塔拉敗唐將王晏球於定州唐兵大集塔拉請益師辛丑命特哩衮尼嚕古都統扎拉赴之資治通鑑曰天成三年夏四月庚子詔削奪王都官爵壬寅以王晏球為北面招討使權知定州行州事以橫海節度使安審通為副招討使以鄭州防禦使張䖍釗為都監發諸道兵討定州是日晏球發兵攻定州拔其北關城都以重賂求救於契丹托諾五月托諾以萬騎突入定州晏球退保曲陽都與托諾就攻之晏球與戰於嘉山下大破之契丹以二千騎奔還定州辛酉晏球聞契丹發兵救定州將大軍趣望都遣張延朗分兵進保新樂延朗遂之真定留趙州刺史朱建豐將兵修新樂城契丹已自他道入定州與王都夜襲新樂破之殺建豐乙丑王晏球張延朗㑹於行唐丙寅至曲陽王都乘勝悉其衆與契丹五千騎合萬餘人邀晏球於曲陽晏球集諸將令之曰王都輕而驕可一戰擒也今日諸君報國之時也悉去弓矢以短兵擊之回顧者斬於是騎兵先進奮撾揮劍直衝其陳大破之僵尸蔽野契丹死者過半餘衆北走都與托諾得數騎僅免盧龍節度使趙德鈞邀擊契丹北走殆無孑遺秋七月壬子王都奏唐兵破定州塔拉死之尼嚕古扎拉等數十人被執資治通鑑曰秋七月壬戌契丹復遣其大特哩衮將兵七千騎救定州王晏球逆戰於唐河北大破之甲子追至易州時久雨水漲契丹為唐所俘斬及陷溺死者不可勝數冊府元龜曰天成三年八月鎮州趙德鈞馳驛上言今月二日於府西契丹敗黨數千生擒首領特哩衮等五十餘人接殺皆盡契丹強盛僅三十年雄據北部諸蕃竄伏屢為邊患漢兵憚之是役也曲陽之敗已失千騎唐河之陳兵號七千潰散之後官軍襲殺人不暇食秋雨繼降溝渠泛溢泥濘莫進人饑馬乏雜投村落所在村人持白挺擊之德鈞生兵接於要路惟竒峯嶺北有棄馬潜遁脫者數十餘無噍類閏八月補資治通鑑曰閏月戊申趙德鈞獻契丹俘特哩衮等諸將皆請誅之帝曰此曹皆彼中驍將殺之則彼絶望不若存之以紓邊患乃赦特哩衮其餘酋長悉置之親衛餘六百人悉斬之契丹遣穆爾濟蘇等入貢初盧文進來降契丹以蕃漢都提舉使張希崇代之為盧龍節度使守平州遣親將三百騎監之希崇本書生為幽州牙將沒於契丹性和易契丹稍親信之因與其部曲謀南歸部曲泣曰歸固寢食所不忘也然彼衆我寡奈何希崇曰吾誘其將殺之兵必潰此去國主帳千餘里比其知而徴兵吾屬去逺矣衆曰善乃先為穽實以石灰明日召契丹將飲醉并殺從者投諸穽中其營在城北發兵攻之契丹衆皆潰去希崇悉舉所部二萬餘口來奔詔以為汝州刺史冊府元龜曰天成三年閏八月契丹平州刺史張希崇殺其契丹首領以一城居人歸國命中使齎茶藥接之四年春正月二月資治通鑑曰天成四年春正月王都托諾欲突圍走不得出二月癸丑定州都指揮使馬讓能開門納官軍都舉族自焚擒托諾及契丹二千人托諾至大梁斬於市五代史曰王晏球屯軍望都與王都及契丹戰大敗之曲陽都及托諾得數騎遁去閉城不復出初莊宗軍中闌得一男子愛之使冒姓名李繼陶養于宫中以為子明宗即位安重誨以乞段徊徊亦惡而逐之都使人求得之至是紿其衆曰此莊宗太子也被以天子之服使巡城上以示晏球軍軍士識者曰此繼陶也共詬之都居城中甲兵少惟以契丹二千人守城共呼托諾為王屈身事之諸將有欲降者都伺察嚴密殺戮無虛日以故堅守經年天成四年二月城破都與家屬皆自焚死夏四月五月資治通鑑曰夏四月契丹冦雲州五月契丹冦雲州兩月之間再冦雲州者契丹主耶律德光將西徙也五年冬十一月戊寅東丹奏人皇王浮海適唐馬端臨文獻通考曰安巴堅卒長子東丹王托雲當立其母舒嚕愛德光德光智勇素服諸部共希㫖請立德光托雲不得立長興元年自扶餘泛海奔唐契丹時安巴堅時侵滅諸國稱雄北方及救王都為王晏球所敗喪其萬騎又失哈瑪爾等皆名將而舒嚕德光思念托雲由是卑辭厚幣數遣使聘中國因求歸哈瑪爾䇿棱等唐輒斬其使而不報當此之時中國之威幾振距幽州七百里有渝關東臨海北有兔耳覆舟山山皆斗絶並海東北有路狹僅通車其旁地可耕植唐時置東西狹西渌疇采磚長楊黃花紫䝉白狼等戌以扼契丹於此戍兵常自耕食惟衣絮嵗給幽州久之皆有田宅養子孫以堅守為己利自唐末幽薊戍兵廢散契丹因得出陷平營而幽薊之人嵗苦冦鈔自涿州至幽州百里人迹斷絶轉餉常以兵護送契丹多伏兵鹽溝以擊奪之莊宗之末趙德鈞鎮幽州於鹽溝置良鄉縣又於幽州東五十里築城皆戌以兵及破哈瑪爾等又於其東置三河縣由是幽薊之人始得耕牧而轉餉可通德光乃西徙橫帳居納蘭泊出冦雲朔之間明宗患之以石敬瑭鎮河東總大同彰國振武威塞等軍禦之應順清泰之間調發饋餉逺近勞敝六年春三月夏五月秋九月冊府元龜曰後唐長興二年三月辛酉中書門下奏東丹王托雲逺泛滄波來歸皇化既服冠帶難無姓名兼特哩衮等以力助王都罪同托諾爰從必死並獲冉生每預入朝各宜授氏庶使族編姓譜世荷聖恩克符前代之規永慰逺人之望自托雲已下請别賜姓名仍准本朝蕃官入朝例安排敕㫖付中書門下商量聞奏敕㫖托雲宜賜姓東丹名慕華仍授光祿大夫檢校太保安東都護兼御史大夫上柱國渤海郡開國公食邑一千五百户充懷化軍節度瑞慎等州觀察處置押蕃落等使其從慕華歸國部曲哈濟宜賜姓罕名支塔瑪噶宜賜姓穆名順義薩喇宜賜姓羅名實德頁穆宜賜姓易名師德誥里宜賜姓蓋名來賔仍授哈濟等五人歸化歸德小將軍中郎將先助托諾擒獲特哩衮官蕃名哈瑪爾宜賜姓狄名懷惠相公官蕃名達哩宜賜姓列名知恩仍並授銀青階檢校散騎常侍錫里官蕃名䇿棱宜賜姓原名知感福郎宜賜姓服名懷造奚王副使扎實結宜賜姓乞名懷有三人並授銀青階檢校太子賔客又曰長興二年五月癸亥青州上言有百姓過海北樵採附得東丹王堂兄京尹知整書問慕華行止欲修貢也閏五月青州進呈東丹國首領耶律伊濟書二封資治通鑑曰長興二年秋九月己亥更賜東丹慕華姓名曰李贊華七年春三月夏五月秋七月五代㑹要曰長興三年三月契丹遣使人德勒賔進馬三十匹求䇿稜歸國故也五月遣䇿古錫里隨其使歸七月遣使都督祿進馬三十匹資治通鑑曰初契丹錫里䇿稜與特哩衮皆為趙德鈞所擒契丹屢遣使請之上謀於群臣德鈞等皆曰契丹所以數年不犯邊數求和者以此輩在南故也縱之則邊患復生上以問冀州刺史揚檀對曰䇿稜契丹之驍將嚮助王都謀危社稷幸而擒之陛下免其死為賜已多契丹失之如喪手足彼在朝廷數年知中國虛實若得歸為患必深彼才出塞則南面發矢矣恐悔之無及上乃止五月己亥契丹使者德勒賔辭歸國上曰朕志在安邊不可不少副其求乃遣䇿古錫里與之俱歸契丹以不得䇿稜自是數冦雲州及振武冬十一月薛居正五代史曰長興三年冬十一月雲州奏契丹主在黑榆林南納蘭泊治造攻城之具是後石敬瑭鎮河東因契丹近在雲應遂資其兵力以取中國而燕雲十六州之地遂皆為北方引弓之民資治通鑑曰長興三年冬十一月蔚州刺史張彥超本沙陀人嘗為帝養子與石敬瑭有隙聞敬瑭為河東總管舉城附於契丹契丹以為大同軍節度使九年春正月冊府元龜曰唐閔帝應順元年春正月乙亥契丹使都督穆蘭來朝獻馬四百駝十先是遣供奉官西方璟入契丹復命故有是獻秋九月資治通鑑曰唐廢帝清泰元年秋九月己未雲州奏契丹入冦北面招討使石敬瑭奏自將兵屯百井以備契丹辛酉敬瑭奏振武節度使楊檀擊契丹於境上郤之檀後避明宗廟諱賜名光逺陳思小字録曰楊光逺字德明小字阿檀沙陀部人也十年夏五月六月資治通鑑曰清泰二年夏五月丙申契丹冦新州及振武六月契丹冦應州王仁裕玉堂間話曰乙未嵗契丹據河朔晉師拒於澶淵天下騷然疲於戰伐翰林學士王仁裕奉使馮翊路由於鄭過僕射陂見州民及軍營婦女填咽於道路皆執錯彩小旗子搖於陂中不知其數詢其居人皆曰鄭人比家夢李衛公云請多造旗幡置於陂中我見集得無數兵為中原翦除戎冦所乏者旌旗耳是以家别獻此幡幟初未之信以為妖言纍旬月之間擊敗契丹及使回過其陂使僕者下馬訪於草際存者尚多十一年秋七月丙申唐河東節度使石敬瑭為其主所討遣趙瑩因西南路招討盧不姑求救上白太后曰李從珂殺君自立神人共怒宜行天討時趙德鈞亦遣使至河東復遣桑維翰來告急遂許興師資治通鑑曰清泰三年三月辛卯以石敬瑭為天平節度使以馬軍指揮使河陽節度使宋審䖍為河東節度使甲午以建雄節度使張敬達為西北蕃漢馬步都部署趣敬瑭之鄆州敬瑭疑懼謀於將佐曰吾之冉來河東也主上面許終身不代除今忽有是命得非如今年千春節與公主所言乎我不興亂朝廷發之安能束手死於道路乎今且發表稱疾以觀其意若其寬我我當事之若加兵於我我則改圖耳掌書記洛陽桑維翰曰主上初即位明公入朝主上豈不知蛟龍不可縱之深淵邪然卒以河東復授公此乃天意假公以制器明宗遺愛在人主上以庶孽代之群情不附公明宗之愛壻今主上以反逆見待此非首謝可免但力為自全之計契丹素與明公約為兄弟今部落近在雲應公誠能推心屈節事之萬一有急朝呼夕至何患無成敬瑭意遂决戊戌昭義節度使皇甫立奏敬瑭反壬寅制削奪敬瑭官爵乙巳以張敬達兼太原四面排陳使河陽節度使張彥琪為馬步軍都指揮使以保義節度使相里金為步軍都指揮使以右監門上將軍武廷翰為壕寨使丙午以張敬達為太原四面兵馬都部署以義軍節度使楊光逺為副部署丁未又以張敬達知太原行府事以前彰武節度使髙行周為太原四面招撫排陳使張敬達將兵三萬營於晉安鄉契丹國志曰天顯十一年夏五月唐以石敬瑭為天平節度使敬瑭拒命謀叛唐發兵討之秋七月唐殺石敬瑭子弟四人敬瑭令掌書記桑維翰草表稱臣於契丹且請以父事之約事捷之日割盧龍一道及雁門關以北諸州為獻契丹大喜復書許俟仲秋傾國赴援冊府元龜曰桑維翰自後唐末帝清泰三年為太原掌書記時髙祖將起義頗慮孤壘無成憂不遑處維翰揚言曰蝮蛇在手壯士解腕今日朝廷待以匪人無復手免之理但竭力自完萬一不濟契丹族帳在雲應朝呼夕至何患無成髙祖釋然自是民請搆蕃軍者多矣然關防重叠去者多獲朝廷又以契丹性多疑必不以髙祖單詞容易應副髙祖使有達契丹者報曰仲秋吾傾寨奉援且牢守偹朝廷知之攻城頗急城中知之慮難支久乃令小僕何福懇告蕃首時八月末也蕃首曰北侯漸涼别無顧慮爾名曰福戰捷之繇數日出軍與何福俱來壬寅契丹至及髙祖建號制授禮部侍郎知樞密院事尋改中書侍郎平章事九月丁酉入雁門戊戌次欣州祀天地己亥次太原庚子遣使諭敬瑭曰朕興師逺來當即與卿破賊㑹唐將髙行周符彥卿以兵來拒遂勒兵陳於太原及戰佯為之郤唐將張敬達楊光逺又陳於西未成列以兵薄之而行周彥卿為伏兵所斷首尾不相救敬達光逺大敗棄仗如山斬首數萬級敬達走保晉安寨資治通鑑曰九月契丹主將五萬騎號三十萬自揚武谷而南旌旗不絶五十餘里辛丑契丹至晉陽陳於汾北之虎北口與唐騎將髙行周符彥卿合戰敬瑭遣劉知逺出兵助之張敬達楊光逺安審琦以步兵陳於城西北山下契丹遣輕騎三千不被甲直犯其陳唐兵見其羸爭逐之至汾曲契丹涉水而去唐兵循岸而進契丹伏兵自東北起衝唐兵斷而為二步兵在北者多為契丹所殺騎兵在南者引歸晉安寨契丹縱兵乘之唐兵大敗步兵死者近萬人騎兵獨全敬達等收餘衆保晉安是夕敬瑭出北門見契丹主契丹主執敬瑭手恨相見之晚敬瑭問曰皇帝逺來士馬疲倦遽與唐戰而大勝何也契丹主曰始吾自北來謂唐必斷雁門諸路伏兵險要則吾不可得進矣使人偵視皆無之吾是以長驅深入知大事必濟也兵既相接我氣方鋭彼氣方沮若不乘此急擊之曠日持久則勝負未可知矣此吾所以亟戰而勝不可以勞逸常理論也敬瑭甚歎伏癸卯圍晉安冊府元龜曰九月契丹軍至張敬達大敗晉髙祖與蕃衆期迫一夕而圍合自晉安營南門之外長百餘里濶五十里布以氊帳用毛索懸之銅鈴而部伍多畜犬以備警急營中嘗有夜遁者出則犬吠鈴動跬步不能行焉自是敬達與麾下雜部曲五萬人馬萬匹無繇四奔但見穹廬如岡阜相屬諸軍相顧色如死灰契丹國志曰九月敬瑭引契丹兵圍晉安唐潞王大懼下詔親征至懷州問䇿於群臣吏部侍郎龍敏請立李贊華為契丹主令天雄盧龍二鎮分兵送之自幽州趨西樓朝廷露檄言之契丹必有內顧之憂然後選募精鋭以擊之此亦解圍之一䇿也潞王深以為然而執政恐其無成議竟不決潞王憂沮日夕酣飲悲歌群臣或勸其北行則曰卿勿言石郎使我心膽墮地初圍晉安分遣精兵守其要害以絶援兵之路而李從珂遣趙延夀以兵二萬屯團柏谷范延光以兵二萬屯遼州幽州趙德鈞以所部兵萬餘由上黨趨延夀軍合勢進擊知此有備皆逗留不進資治通鑑曰初趙德鈞隂蓄異志欲因亂取中原自請救晋安寨唐主命自飛狐踵契丹後鈔其部落德鈞請將契丹銀鞍直三千騎由土門路西入帝許之趙州刺史北面行營都指揮使劉在明先將兵戍易州德鈞過易州命在明以其衆自隨在明幽州人也德鈞至鎮州以董溫琪領招討副使邀與偕行又表兵少須合澤潞兵乃自吳兒谷趣潞州癸酉至亂柳時范延光受詔將步兵二萬屯遼州德鈞又請與魏博軍合延光知德鈞合諸軍志趣難測表稱魏博兵已入賊境無容南行數百里與德鈞合乃止十一月以趙德鈞為諸道行營都統依前東北面行營招討使以宣武節度使同平章事李周副之辛卯以劉延朗為河東道南面行營招討副使趙延夀遇趙德鈞於西湯歐史作西唐薛史作西唐店以兵屬德鈞德鈞志在併范延光軍逗留不進詔書屢趣之德鈞乃引兵北屯圑柏谷口丁卯召敬瑭至行在所賜坐上從容語之曰吾三千里舉兵而來一戰而勝殆天意也觀汝雄偉𢎞大宜受茲南土世為我藩輔遂命有司設壇晉陽偹禮冊命十一月丁酉冊敬瑭為大晉皇帝資治通鑑曰十一月丁酉契丹主作冊書命敬瑭為大晉皇帝自解衣冠授之築壇于柳林是日即皇帝位割幽薊瀛莫涿檀順新媯儒武雲應寰朔蔚十六州以與契丹仍許嵗輸帛三十萬匹己亥制改長興七年為天福元年此清泰元年也而以為唐明宗長興七年以潞王為篡也閏月資治通鑑曰閏月趙延夀獻契丹主所賜詔及甲馬弓劒詐云德鈞遣使致書于契丹主為唐結好說令引兵歸國其實别為密書厚以金帛賂契丹主云若立已為帝請即以見兵南平洛陽與契丹為兄弟之國仍許石氏常鎮河東契丹主自以深入敵境晋安未下德鈞兵尚强范延光在其東又恐山北諸州邀其歸路欲許德鈞之請帝聞之大懼亟使桑維翰見契丹主說之曰大國舉義兵以救孤危一戰而唐兵瓦解退守一柵食盡力窮趙北平父子不忠不信畏大國之强且素蓄異志按兵觀變非以死殉國之人何足可畏而信其誕妄之辭貪毫末之利棄垂成之功乎且使晉得天下將竭中國之財以奉大國豈此小利之比乎契丹主曰爾見捕鼠者乎不偹之猶或齧傷其手况大敵乎對曰今大國已扼其㗋安能齧人乎契丹主曰吾非有渝前約也伹兵家權謀不得不爾對曰皇帝以信義救人之急四海之人俱屬耳目奈何二三其命使大義不終臣竊為皇帝不取也跪於帳前自旦至暮涕泣爭之契丹主乃從之指帳前石謂德鈞使者曰我已許石郎此石爛可改矣甲子楊光逺安審琦殺敬達以降資治通鑑曰晉安寨被圍數月髙行周符彥卿數引騎兵出戰衆寡不敵皆無功芻糧俱竭削柿淘糞以飼馬馬相啖尾鬛皆秃死則將士分食之援兵竟不至張敬達性剛時謂之張生鐡楊光逺安審琦勸敬達降於契丹敬達曰吾受明宗及今上厚恩為元帥而敗軍其罪已大况降敵乎援兵旦暮至且當俟之必若力盡勢窮則諸君斬吾首携之出降自求多福未為晚也光逺目審琦欲殺敬達審琦未忍髙行周知光逺欲圖敬達常引壯騎尾而衛之敬達不知其故謂人曰行周每踵余後何意也行周乃不敢隨之諸將每旦集於招討使營甲子髙行周符彥卿未至光逺乘其無備斬張敬達首帥諸將上表降於契丹契丹主素聞諸將名皆慰勞賜以裘帽因戲之曰汝輩亦大惡漢不用鹽醋啖戰馬萬匹光逺等大慚契丹主嘉張敬達之忠命收葬而祭之謂其下及晉諸將曰汝曹為人臣當效敬達也庚午僕射蕭庫克克齊奏趙德鈞等諸援兵將遁詔夜發兵追擊德鈞等軍皆投戈棄甲自相蹂踐擠於川谷者不可勝紀仍命皇太子馳輕騎據險要追及步兵萬餘悉降之辛未兵度團柏谷以酒肴祀天地俄追及德鈞父子乃率衆降次潞州召諸將議皆請班師從之資治通鑑曰帝以晉安既降與契丹主將引兵而南欲留一子守河東咨於契丹主契丹主令帝盡出諸子自擇之帝兄子重貴父敬儒早卒帝養以為子貌類帝而短小契丹主指之曰此大目者可也乃以重貴為北京留守太原尹河東節度使契丹以其將髙模翰為前鋒與降卒偕進丁卯至圑柏谷與唐兵戰趙德鈞趙延壽先遁符彥饒張彥琦劉延朗劉在明繼之士卒大潰相騰踐死者萬計壬申趙德鈞趙延夀南奔潞州唐敗兵稍稍從之其將時賽帥輕騎東遷漁陽帝先遣昭義節度使髙行周還具食至城下見德鈞父子在城上行周曰僕與大王鄉曲敢不忠告城中無斗粟可守不若速迎車駕甲戌帝與契丹主至潞州德鈞父子迎謁於髙河契丹主慰諭之父子拜帝於馬首進曰别後安否王亦不與之言以其欲爭為帝恨之也契丹主問德鈞曰汝在幽州所置銀鞍契丹直何在德鈞指示之契丹主命盡殺之於西郊凡三千人遂鎖德鈞延夀送歸其國壬申特哩衮斡林牙德勒賔來獻俘晉帝辭歸上與宴飲酒酣執手約為父子以白貂裘一廄馬二十戰馬千二百餞之命德勒賔將五千騎送入洛臨别謂之曰朕留此候亂定乃還耳冊府元龜曰晉髙祖即位於晉陽改號天福元年車駕將入洛閏十一月甲戌契丹主舉酒言於帝曰余逺來赴義大事已成皇帝頃赴京都今已令大詳衮勒兵相送至於河梁要過河者即多少任意余亦且在此州俟京雒已定便當北轅執手相泣久不能别脫白貂裘以衣帝贈馬二十匹戰馬一千二百匹仍誡曰子子孫孫無相忘焉洛中紀異曰契丹主德光嘗晝寢夢一神人花冠美姿容輜軿甚盛自天而下衣白衣佩金帶執金骨朵有異獸十二隨其後內一黑色兔入德光懷而失之神人語德光曰石郎使人喚汝汝須去覺告其母忽之不以為異後復夢即前神人也衣冠儀貌宛然如故曰石郎已使人來喚汝既覺而驚復以告母母曰可命筮之乃召巫者筮言太祖從西樓來言中國將立天皇要爾為助爾須去未浹旬唐石敬瑭反於河東為後唐張敬達所敗亟遣趙瑩持表重賂許割燕雲求兵為援契丹帝曰我非為石郎興師乃奉天帝敕使也率兵十萬直至太原唐師遂衄立石敬瑭為晉帝後至幽州城中見大悲菩薩佛相驚告其母曰此即向來神人冠冕如故但服色不同耳因立祠木葉山名菩薩堂德光生於癸卯年黑兔入懷此其兆也辛巳晉帝至河陽李從珂窮蹙召人皇王倍同死不從遣人殺之乃舉族自焚王禹稱五代史闕文曰晉髙祖引契丹圍晉安寨降楊光逺清泰帝至自覃懷京師父老迎帝於上東門外帝垂泣不止父老奏曰臣等伏聞前唐時中國有難帝王多幸蜀以圖進取陛下何不且入西川帝曰本朝兩川節度皆用文臣所以元宗僖宗避冦幸蜀今孟氏已稱尊矣吾何歸乎因慟哭入內舉族自焚洛中紀異曰先是甲子歌至清泰三年丙申嵗云數在五樓前又云但看八九月兵至口干原後大軍於大原南五樓村前大戰至九月晉祖勾契丹至於城下王師敗績至十一月北主遣蕃軍送晉祖歸洛陽即兵至口干原之應也資治通鑑曰己丑唐主命河陽節度使萇從簡與趙州刺史劉在明守河陽南城遂斷浮梁歸洛陽遣宦者秦繼旻皇城使李彥紳殺昭信節度使李贊華於其第己卯帝至河陽萇從簡迎降舟楫已具唐王雖斷河浮梁而萇從簡具舟楫以濟晉兵彰聖軍執劉在明以降帝釋之使復其所唐主命馬軍都指揮使宋審䖍步軍都指揮使符彥饒河陽節度使張彥琪宣徽南院使劉延朗將千餘騎至白馬陂行戰地白司馬陂也在洛陽北史逸司字有五十餘騎奔於北軍諸將謂審䖍曰何地不可戰誰肯立於此乃還庚辰唐主又與四將議復向河陽而將校皆已飛狀迎帝帝慮唐主西奔遣契丹千騎扼澠池辛巳唐主與曹太后劉皇后雍王重美及宋審琦等携傳國寶登元武樓自焚皇后積薪欲燒宫室重美諌曰新天子至必不露居它日重勞民力死而遺怨將安用之乃止王淑妃謂太后曰事急矣宜且避匿以俟姑夫太后曰吾子孫婦女一朝至此何忍獨生妹自勉之淑妃乃與許王從益匿於毬場獲免是日晚帝入洛陽止於舊第唐兵皆解甲待罪帝慰而釋之帝命劉知逺部署京城知逺分漢軍使還營館契丹於天宫寺城中肅然無敢犯者十二月資治通鑑曰十二月辛酉朔帝如河陽餞大詳衮及契丹兵歸國癸已詔贈李贊華燕王遣使送其喪歸國十二年春正月丙辰次堆子口唐大同軍節度判官吳巒閉城拒命遣崔廷勳圍其城庚申上親征至城下諭之巒降資治通鑑曰天福二年春二月戊子契丹主自上黨過雲州天同節度使沙彥珣出迎契丹主留之不使還鎮節度判官吳巒在城中衆推巒領州事閉城不受契丹之命契丹攻之不克應州馬軍都指揮使金城郭崇威亦耻臣契丹挺身南歸契丹主過新州命威塞軍節度使翟璋斂犒軍錢十萬緍契丹主勞翟璋曰當為汝除代令汝南歸己亥璋表乞徴詣闕既而契丹遣璋將兵討叛奚有功留不遣璋鬱鬱而卒五代史曰吳巒字寶州鄆州盧縣人少舉明經不中清泰中為大同沙彥珣節度判官晉髙祖起太原召契丹為援契丹過雲州彥珣出城迎謁為契丹所虜城中推巒主州事巒即閉門拒守契丹以兵圍之髙祖入立以雲州入於契丹而巒猶守城不下契丹圍之凡七月髙祖義巒所為乃以書告契丹使解兵去髙祖召巒以為武寧軍節度副使諫議大夫復州防禦使鶚案巒後在出帝時大臣以巒前守雲中不下遣巒代王令溫守貝州契丹攻貝州城破投井死遼史諭降之事非實戊寅朝於皇太后進珍玩為夀資治通鑑曰趙德鈞見述律太后悉以所齎寶貨并籍其田宅獻之太后問曰汝近者何為往太原德鈞曰奉唐王之命太后指天曰汝從吾兒求為天子何妄語邪又自指其心曰此不可欺也又曰吾兒將行吾戒之云趙大王若引兵北向渝關須引歸太原不可救也汝欲為天子何不先擊退吾兒徐圖之亦未晚汝為人臣既負其主不能擊敵又欲乘亂邀利所為如此何面目復求生乎德鈞俯首不能對又問器玩在此田宅何在德鈞曰在幽州太后曰幽州今屬誰曰屬太后太后曰然則又何獻焉德鈞益慚自是鬱鬱不多食踰年而卒張礪與延夀俱入契丹契丹主復以為翰林學士二月夏四月六月五代史曰天福二年春二月丁酉契丹使皇太子嘉哩來夏四月丁亥趙瑩使於契丹辛卯契丹使宫苑使李可興來冊府元龜曰天福二年六月契丹使額爾欽進馬二百匹人參貂鼠皮走馬木碗等物八月庚寅晉及太原劉知逺南唐李忭各遣使來貢資治通鑑曰天福二年五月吳徐知誥用宋齊邱䇿欲結契丹以取中國遣使以美女珍玩泛海修好契丹主亦遣使報之遼史拾遺卷二終
