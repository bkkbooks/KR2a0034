body:
  text: 遼史拾遺卷六錢塘厲鶚撰本紀第八景宗景宗孝成康靖皇帝諱賢字賢寧小字眀扆契丹國志曰景宗諱眀計火神淀弒逆之時舍音害世宗并及于后復求帝殺之帝時九歲御厨尚食劉嘉哩以氊束之藏于積薪中由是得免及即位嬰風疾多不視朝保寧元年夏五月壬寅漢遣李匡弼劉繼文李元素等來賀十國春秋曰北漢天㑹十三年五月遣李匡弼李元素等如遼賀天清節按遼史有劉繼文然繼文尚留契丹今不從太平治迹統類曰開寶二年太祖親征河東契丹兩道率衆來援一道攻石嶺關為何繼筠所破一道攻定州為韓重贇擊敗之是秋涿州刺史許周瓊來降上以周瓊為涿州刺史於是豐州刺史王仲晏上言契丹日利月利等一十六族歸欵上以其大酋領羅莽四人為懷化將軍魯斯八人為懷化郎將餘八十五人為歸德司戈二年春正月十國春秋曰天㑹十四年春正月契丹歸漢使臣十六人韓知璠歸國言漢庶事多梗而無輔臣政事令趙髙勳亦言晉陽為父子國盡拘其使無謂也遂有是命冬十一月陳均九朝編年備要曰開寶三年冬十一月契丹六萬騎寇定州命田欽祚領兵禦之戰蒲城敵騎小却乘勝至遂城敵圍之數日欽祚度城中糧少整兵開南門突圍一角出是夕至保塞軍中不亡一矢北邉傳言三千打六萬六年春三月宋遣使請和遼以涿州刺史耶律昌為侍中與宋議和孫逢吉職官分紀曰契丹于開寶七年涿州刺史耶律琮以書遺雄州孫全興願講好于朝廷八年遣欵附使克實克舒蘇奉書來聘自是乃通使矣太平治迹統類曰開寶七年耶律琮以書遺知雄州孫全興曰琮受君命交于境外言則非宜事有利於國家専之亦可南北兩地古今所同曷嘗不世載歡盟時通贄幣往者晉氏後主政出多門惑彼强臣忘我大義干戈以之日用生靈于是罹災今兹兩朝本無纎隙若或交馳一介之使顯布二君之心用息疲民重修舊好長為與國不亦休哉琮以甚微敢干斯義逺希通晤洞垂鑒詳太祖命全興以書答焉七年春三月太平治迹統類曰開寶八年閏三月契丹遣欵附使克實克舒蘇奉書來聘稱契丹國上命閣門副使郝崇信至境上迓之及至館于都亭驛太祖召見賜以襲衣金帶銷金烏羅帽烏皮靴器幣二百銀勒鞍馬其僕從衣服器幣有差宴于內殿仍召至便殿觀諸班騎射令其一使者與衛士馳射毛毬截栁枝及歸國召見賜器幣衣服十國春秋曰北漢廣運二年春三月遼與宋求成遣使來告命漢通好于宋無妄興師潘自牧記纂淵海曰開寶七年契丹願講好使命始通我朝遣郝崇信吕端為使此報聘也復遣宋準郝文度為契丹國信使夏六月十國春秋曰夏六月遼主册漢帝為大漢英武皇帝賜御衣玉帶鞍馬等物八年夏六月秋七月契丹國志曰夏六月彗出桞長三四丈晨見東方西南指厯輿鬼距室壁凡十一舍八十三日乃滅秋七月朔日食本紀第九景宗二九年夏四月契丹國志曰夏四月宋葬太祖于永昌陵遼遣鴻臚少卿耶律敞等往宋助葬宋太宗尋遣起居舍人辛仲甫使遼右贊善大夫穆波副之時宋將用兵伐北漢北漢實倚遼為援仲甫遲留境上未敢進宋朝詔趣行既至帝問曰聞中國有党進者真驍將如進之比幾人仲甫對曰名將甚多如進鷹犬之材何可勝數帝頗欲留之仲甫曰信以成命義不可留有死而已帝知其秉節不可奪厚禮遣還十年查嗣璉人海記曰歸義寺創于遼內有石幢記作駢語末書㑹同九祀龍集敦牂元月二十一日謹記又記云大遼保寧十年都亭嗣侯太原王公為皇妣自㑹同九年捨資就奉福寺文殊殿前又建法幢于灝村之墳京東之墓云云建幢女弟子張氏長男攝祁州司馬慈次男留守押衙前都亭驛使次男攝寰州長史恕長女成郎婦次女李郎婦次女陳郎婦未嫁女吉年孫男三年銀青崇祿大夫檢校工部尚書兼御史大夫上柱國鄭承嗣表弟閣門使崇祿大夫檢校兵部尚書兼御史大夫上柱國郭陟次表弟將仕郎前守昌平縣主簿郭升鐫字者尹奉威也乾亨元年春三月丁酉耶律沙等與宋戰于白馬嶺不利兾王迪里及圖魯卜部莭度使圖敏黃皮室詳衮唐古皆死之十國春秋曰三月丁酉耶律沙等與宋將郭進遇于白馬嶺時契丹兵阻大澗沙與諸將欲待後軍至而戰兾王迪里監軍扎實等以為急擊之便沙不能奪迪里等以先鋒渡澗未半為宋人所擊兵潰迪里及其子斡實琿之子迪里圗魯卜部莭度使圖敏黃皮室詳衮唐古等五將俱沒士卒死傷甚衆㑹南院大王色珍兵至萬矢齊發敵軍始退夏五月己卯宋兵至河東漢與戰不利劉繼文盧俊來同奔六月劉繼元降宋漢亡王應麟玉海曰太平興國四年正月庚寅命宣徽南院使潘美等進師二月二日詔親征二十九日次德清軍三月庚辰朔次真定四月壬戌克岢嵐乙丑克隆州己巳克嵐州繼元外援不至餉道絶王師四合庚子上次太原駐蹕汾水東二十三日幸城四面按行營壘閲視攻具翌日夜漏未盡幸城西督諸軍發機石攻城二十七日命馬仁瑀慕容福超白重貴李繼升等分道攻城帝自草詔賜繼元五月壬戌幸城南上曰翌日上午當食于城中癸未諸將急攻城欲壞帝恐屠城麾衆少退是夜繼元納欵甲申幸城北張樂宴從臣于城臺受降續資治通鑑長編曰太平興國四年五月壬午上幸太原城南謂諸將曰翌日重午當食于城中遂自草詔賜北漢主夜漏下一刻城上有蒼白雲如人牀癸未幸城南督諸將急攻士奮怒爭乘城不可遏上恐屠其城因麾衆少退城中人猶欲固守左僕射馬峯以病卧家舁入見北漢主流涕以興亡諭之遂納欵繼元妻峯女也夜漏下十刻北漢主遣客省使李勳上表納欵上喜即命通事舍人薛文寶齎詔入城撫諭夜漏未盡幸城北宴從臣于城臺受其降十國春秋曰劉繼文世祖嫡孫也為人魁梧有氣局沉毅寡言厯官侍御親軍使天㑹時契丹來問罪輒拘係行人數輩睿宗乃命繼文往賀因請命亦被留不發未幾遼主怒解盡歸使者十六人厚禮以遣而繼文與焉時英武帝嗣位三年也遼主仍移書令以繼文同平章事繼文歸秉國政左右害其寵多譛毁之已而出為代州刺史國亡復奔契丹封彭城郡王終于其國九朝編年備要曰自劉旻僣號厯四主凡二十九年至是年亡東都事略曰繼元之未敗也太宗先命郭進斷契丹之援于石嶺關進至契丹果來援進擊走之繼元猶以蠟彈帛書求救于契丹進得之以狥城下及降太宗宥其罪授右衛上將軍封彭城郡公賜第京師宋主來侵丁卯北院大王實逹爾統軍使蕭托果伊實薩哈擊之戰于沙河失利己已宗主圍南京丁丑詔諭耶律沙及實逹爾托果等軍中事宜秋七月癸未沙等及宋兵戰于髙梁河少却休格色珍橫擊大敗之宋主僅以身免至涿州竊乘驢車遁去玉海曰太平興國四年既下并州上欲乘勝取范陽殿前都虞侯崔翰曰乘破竹之勢時不可失六月甲寅發京東河北軍儲赴北面行營庚申上北征丁卯上躬率兵攻東易州遼刺史劉寧以州降留兵千人守之戊辰涿州降以萬人戍守庚午駐蹕幽州城南契丹不敢居城中有萬餘衆屯城北上率兵乘之斬千餘級餘黨遁壬申命諸將攻城旬有五日以士卒疲且食盡七月甲申班師九朝編年備要曰太平興國四年詔征契丹六月發鎮州易州涿州未降上至幽州敗契丹于城北秋七月上至自幽州東都事略曰曹翰從征幽州所部攻城之東南隅卒掘土得蟹以獻翰謂諸將曰蟹水物而陸居失所也且多足敵救將至不可進拔之象其班師乎已而果然王鞏聞見近録曰太宗皇帝自并州乘勝直趨幽燕有錫里郎君裕悅者請得五千騎以嘗王師不成退處未晚從之乃騎持一幟由間道邀我歸路周環往來晝夜不絶帝疑救兵大至宵歸定州王師多沒至今號其竒兵曰裕悅軍契丹國志曰秋七月宋太宗至幽州攻城踰句不下士卒疲頓轉輸回逺遂退師先是宋師自并幸幽乘其無備帝方獵急歸牙帳議棄幽薊以兵守松亭北岸口而已時耶律遜寧號裕悅呼為錫里郎君北朝親近無職事者呼之請兵十萬至幽州並西山薄幽陵入夜持兩炬朝舉兩旗選精騎三萬從他道自宋軍南席卷而北遼兵先守幽州者皆脆弱見宋師之盛望風而遁又為宋師所遏進退無計反為堅守至是裕悅救至宋遂退師王銍默記曰神宗與滕元發語及遼事曰太宗自燕京城下軍潰敵追之僅得脫凡行在服御寶器盡為所奪從行宫嬪盡陷沒股上中兩箭嵗嵗必發竟以前創之故棄天下九月己卯燕王韓匡嗣為都統南府宰相耶律沙為監軍特哩衮休格南院大王色珍權奚王穆濟等各率所部兵南伐仍命大同軍節度使善補領山西兵分道以進九朝編年備要曰太平興國四年九月契丹寇鎮州趙延進等敗之初上以陳圖賜諸將俾分為八陳至是敵騎坌至延進亟乘髙望之東西亘野不見其尾崔翰等方按圖布陳相去百步延進㑹翰等曰今敵騎若此而我師星布其勢懸絶若合而擊之可以決勝李繼隆亦曰兵貴通變安可預料于是分為二陳前後相副大破之捷書聞手詔嘉奬四年秋九月庚子幸雲州甲辰獵于祥古山帝不豫壬子次焦山崩于行在年三十五宣府鎮志曰乾亨四年契丹以山後諸州給兵民力凋敝田榖多躪于兵乃詔復今年租又敕諸州有逃户莊田許蕃漢人承佃供給租稅五周年內歸業者三分交還二分十周年內還一半十五周年內三分還一分詐認者罪之契丹國志曰帝性仁懦雅好音律喜醫術針灸之輩授以節鉞使相者三十餘人自幼疾沉疴連年四時遊獵間循故典體􅉵不能跨馬令節大朝㑹欎欎無歡或不視朝者有之耽于酒色早暮不少休燕燕皇后以女主臨朝國事一决于其手大誅罰大征討畨漢諸臣甚衆共議皇后裁決報知于帝而已易定幽薊間兩大戰烽火軍書旁午國內惶惶帝嬰疾不能親駕基業衰焉遼史拾遺卷六
