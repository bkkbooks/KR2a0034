body:
  text: 遼史拾遺卷十八錢塘厲鶚撰表第八屬國表渤海文獻通考曰渤海本粟末靺鞨附髙麗者姓大氏俗謂王曰可毒失對面呼聖王牋表呼基下梁開平元年王大諲譔遣王子來貢方物天成元年遣使入貢進兒口女口先是契丹耶律安巴堅兵力雄盛東北諸蕃多臣屬之以渤海土地相接常有吞併之志是嵗率諸蕃部攻渤海扶餘城下之後改扶餘城為東丹府命其子托雲留兵鎮之松漠紀聞曰渤海國去燕京女真所部皆千五百里以石累城足東並海其王舊以大為姓右姓曰髙楊張竇烏李不過數種部曲奴婢無姓者皆從其主婦人皆妬悍大氏與他姓相結為十姊妹迭譏察其夫不容側室及他游聞則必謀寘毒死其所愛一夫有所犯而妻不之覺者九人則羣聚而詬之爭以嫉忌相誇故契丹女真諸國皆有女倡而其良人皆有小婦侍婢唯渤海無之男子多智謀饒勇出他國右至有三人渤海當一虎之語契丹安巴堅滅其主大諲譔徙其名帳千餘戸于燕給以田疇捐其賦入往來貿易闗市皆不征有戰則用為前驅契丹國志曰渤海螃蟹紅色大如椀螯巨而厚其跪如中國蟹螯鮀魚之屬皆有也回鶻王溥唐㑹要曰貞元五年迴紇使李義進請因咸安公主下降改紇字為鶻字葢欲誇國俗俊健如鶻也五代㑹要曰回鶻本牙在天徳西北娑陵水上距長安六千九百里唐天寳中安禄山犯闕有助國之功累朝尚主自㑹昌初其國為黠戛斯所侵部族擾亂及移帳至天徳振武閒又為石雄劉沔所襲破之復為幽州節度使張仲武所攻餘衆部曲奔歸於吐蕃吐蕃處之甘州其後時通中國世以中國為舅朝廷毎賜書詔亦甞以甥稱之松漠紀聞曰回鶻自唐末浸㣲甘涼𤓰沙舊皆有族帳後悉羈縻于西夏唯居四郡外地者頗自為國有君長其人卷髪深目眉修而濃自眼睫而下多虯髯土多瑟瑟珠玉帛有兜羅緜毛㲲狨錦注絲熟綾斜褐藥有腽肭臍碙砂香乳香安息篤耨善造賔鐵刀劍烏金銀器多為商賈于燕載以橐駝過夏地夏人率十而指一必得其最上品者賈人苦之後以物美惡雜貯毛連中毛連以羊毛緝之單其中所頭為袋以毛繩或線封有甚麄者有間以雜色毛者則輕細然所征亦不貲其來浸熟始厚賂税吏宻識其中下品者俾指之尤能别珍寳蕃漢為市者非其人為儈則不能售價奉釋氏最盛共為一堂塑佛像其中毎齋必刲羊或酒酣以指染血塗佛口或捧其足而吮之謂為親敬誦經則衣袈裟作西竺語燕人或俾之祈禱多驗婦人類男子白晳著青衣如中國道服然以薄青紗羃首而見其面契丹國志曰回鶻豆髙二尺許直榦有葉無傍枝角長二尺毎角止兩豆一根才六七角色黄味如栗党項冊府元龜曰党項其種有巖昌白銀狠東接臨洮西拒葉護南北數千里處山谷間毎姓别為部落大者五千餘騎小者千餘騎五代史曰党項西羌之遺種其國在禹貢析支之地東至松州西接葉護南界春桑北鄰吐渾有地三千餘里無城邑而有室屋以毛罽覆之其人喜竊盜而多壽往往至百五六十嵗其大姓有細封氏費聴氏析氏野利氏拓拔氏為最强波斯國唐㑹要曰波斯國在京師西萬五千里俗事天地日月水火諸神西域諸故事火祅者皆諸波斯受法焉以六月一日為嵗首地多名馬又多駿犬今所謂波斯犬也冊府元龜曰波斯國其先有波斯匿王者子孫以王父字為氏因為國號濊貊國冊府元龜曰濊貊國南與辰韓北與髙句麗沃沮接東窮大海朝鮮之東皆其地也大食國冊府元龜曰大食國在南海中其國男夫黒色多鬚鼻長而大似婆羅門婦人白晳亦有文字出駝馬驢騾羖羊等其馬大于諸國兵刃勁利其俗勇于戰鬬合事天神而土多沙石不堪耕種惟食鳥獸等肉日本國文獻通考曰倭在帶方郡東南大海中大較在㑹稽東治之東與朱崖儋耳相近更號日本言國近日所出以為名宋雍熈元年本國僧奝然與其徒五人浮海而至獻銅器十餘事并本國職貢今年代紀各一卷奝然書曰國中有五經及佛經白居易文集七十卷並得自中國土宜五穀而少麥交易用銅錢文曰乾文大寳畜有水牛驢羊多羣象産絲蠺多織絹薄緻可愛樂有中國髙麗二部四時寒暑大類中國國之東境接海島夷人所居身面皆有毛東奥州産黄金西别島出白銀以為貢賦國王以王為姓傳襲至今王六十四世文武寮吏皆世官新羅國契丹國志曰新羅國在髙麗東本漢時樂浪地其言語名物有似中國人名國為邦弓為弧賊為㓂行酒為行觴相呼皆為徒文字甲兵同于中國人選壯健者悉入軍毎月旦相賀王設宴㑹班賚羣官大事則聚官詳議定之田甚良沃水陸兼種服色尚素婦人辮髪繞頭以雜綵及珠為飾婚嫁唯酒食而已輕重隨貧富文獻通考曰新羅其先本辰韓種也辰韓始有六國稍分為十二新羅其一也初曰斯盧或曰斯羅其國在百濟東南五百餘里亦在髙麗東南兼有漢時樂浪郡之地東濱大海其人雜有華夏髙麗百濟之屬兼有沃沮不耐韓濊之地後唐同光元年王金朴英遣使朝貢吐蕃冊府元龜曰吐蕃在長安之西八千里本漢西羌地也後魏神瑞初南涼秃髪樊尼率衆西奔濟黄河逾積石於羌中建國開地千里以秃髪為國號語訛謂之吐蕃其後子孫蕃昌又侵伐不息土宇漸廣唐髙宗時吐蕃盡收羊同党項及諸羌之地東與涼松茂巂等州相接南至婆羅門西又攻䧟龜兹疎勒四鎮北抵突厥地方萬餘里自漢魏以來西戎之盛未之有也五代史曰吐蕃國地君世部族名號物俗見于唐著矣至五代時吐蕃已㣲弱囘鶻党項諸羌夷分侵其地而不有其人民值中國衰亂不能無有惟甘涼𤓰沙四川常自通于中國甘州為回鶻牙而涼𤓰沙三州將吏猶稱唐官數來請命沙陀突厥冊府元龜曰沙陀突厥在甘州習俗左老右壯溷雜男女畧與吐蕃同其悍捷便弓馬勝之靺鞨五代史曰黑水靺鞨本號勿吉其國東至海南界髙麗西接突厥北鄰室韋葢肅慎氏之地也其衆分為數十部而黑水靺鞨最䖏其北尤勁悍無文字之記其兵尤尚弧矢鐵驪通典曰鐵勒之先匈奴之苗裔也種類衆多自西海之東依據山谷往往不絶並有君長屬東西兩突厥隨水草流移人性凶忍善于騎射貪婪尤甚以㓂抄為生近西邉者頗為藝植多牛羊而少馬突厥國有東西征討皆資其用以制北荒十六國慕容垂時北塞後魏末河西並云有勅勒部鐵勒葢言訛也鶚案金史云鐵勒者古部族之號奚有其地號稱鐵勒州又書作鐵驪州奚有五世族世與遼人為昏因附姓述律氏中吐谷渾㑹海菁華曰吐谷渾本遼東鮮卑也西晉時首帥徒何涉歸有二子長曰吐谷渾少曰若洛廆代統郡落别為慕容氏渾庶長廆正嫡父在時分七百户與渾渾與廆二部俱牧馬馬鬭相傷渾擁馬西行乃附隂山屬永嘉之亂始度隴西止于抱罕而後子孫據有甘松之南洮水之西南極于白蘭在益州西北有青海周迴千餘里海中有小山毎冬冰合後以良牝馬置此山至來冬收之馬有孕所生得駒號曰龍種時稱青海驄焉至其孫葉延以禮云公孫之子得以王父字為氏吾祖始自昌黎先宅于此今以吐谷渾為氏尊祖之義也吐渾五代㑹要曰吐渾本吐谷渾也唐咸通中酋長有赫連鐸者從太原節度使康承訓平徐方有功朝廷授振武節度使復盜據雲中後唐太祖逐之乃歸幽州李厈濤其部旌散居蔚州界立為酋長有白承福者同光初代為都督依中山地石門為柵莊宗賜其額為寧朔奉化两府以都督為節度使仍賜承福姓李名紹魯至晉髙祖天福元年髙祖以契丹助立之功割雁門以北及幽州之地以賂之繇是吐渾部族皆𨽻于契丹其後復為鎮州節度使安重榮所誘乃背契丹率車帳羊馬取五䑓路歸國契丹大怒以朝廷招納叛亡遣使責讓六年正月晉髙祖命供奉官張澄率兵二千捜索并鎮忻代四州山谷吐渾還其舊地突厥胡嶠陷北記曰契丹西則突厥回紇西北至嫗厥律其人長大髦頭地苦寒水出大魚契丹仰食又多黑白黄貂䑕皮諸國皆仰之其人最勇鄰國不敢侵又其西轄戛又其北單子突厥皆與嫗厥律略同冊府元龜曰突厥者葢匈奴之别種居金山之陽金山形似兜鍪其俗謂兜鍪為突厥因以為號沙州燉煌王曹夀沙州回鶻曹順五代史曰沙州梁開平中有節度使張奉自號金山白衣天子至唐莊宗時回鶻來朝沙州留後曹義金亦遣使附回鶻以來莊宗拜義金為歸義軍節度使𤓰沙等州觀察䖏置等使文獻通考曰沙州留後曹義金卒子元忠嗣宋興國五年元忠卒咸平四年封子延禄為譙郡王五年延禄為從子宗夀所害宗夀權知留後表求旌節乃授宗夀節度使子賢順為衙内都指揮使大中祥符末宗夀卒授賢順本軍節度鶚案曹氏父子遼史去宗賢二字避廟諱也于闐國五代史曰于闐國去京師萬里外其國西南近蔥嶺與婆羅門為鄰國而相去猶三千里南接吐蕃西北至疎勒二千餘里晉天福三年于闐國王李聖天遣使者馬繼榮來貢紅鹽鬰金氂牛尾牛㲲等晉遣供奉官張匡鄴假鴻臚卿彰武軍節度判官髙居誨為判官冊聖天為大寳于闐國王是嵗冬十二月匡鄴等自靈州行二嵗至于闐至七年冬乃還而居誨頗記其往復所見山川諸國而不能道聖天世次也居誨記曰自靈州過黄河行三十里始涉沙入党項界曰細腰沙神樹沙三公沙宿月支都督帳自此沙行四百餘里至黑堡沙遂登沙嶺沙嶺党項牙也其酋曰捻崖天子渡白亭河至涼州自涼州西行五百里至甘州甘州回鶻牙也其南山百餘里漢小月支之故地也有别族號鹿角山沙陀云朱耶氏之遺族也自甘州西始涉磧磧無水載水以行甘州人教晉使者作馬蹄木澀木澀四竅馬蹄亦鑿四竅而綴之駝蹄則包以氂牛皮乃可行西北五百里至肅州渡金河西百里出天門闗又西百里出玉門闗經吐蕃界吐蕃男子冠中國㡌婦人辮髪戴瑟瑟珠云珠之好者一珠易一良馬西至𤓰州沙州二州多中國人聞晉使者來其刺史曹元忠等郊迎問使者天子起居𤓰州南十里鳴沙山山冬夏殷殷有聲如雷云禹貢流沙也又東南十里三危山云三苗之所竄也其西渡都鄉河曰陽闗沙州西曰仲雲其牙帳居胡盧磧云仲雲者小月支之遺種也其人勇而好戰𤓰沙之人皆憚之胡盧磧漢明帝時征匈奴屯田于胡盧葢其地也地無水而常寒多雪毎天暖雪消乃得水匡鄴等西行入仲雲界至大屯城仲雲遣宰相四人都督三十七人候晉使者匡鄴等以詔書慰諭之皆東向拜自仲雲界西始涉鹻磧無水掘地得濕沙人置之胷以止渴又西渡䧟河伐檉置水中乃渡不然則䧟又西至紺州紺州于闐所置也在沙州西南去京師九千五百里矣又行二日至安軍州遂至于闐聖天衣冠如中國其殿皆東向曰天冊殿有樓曰七鳯樓以蒲桃為酒又有紫酒青酒不知其所釀而味尤美其食粳沃以蜜粟沃以酪其衣布帛有園圃花木俗喜鬼神而好佛聖天居處常以紫衣僧五人列侍其年號同慶二十九年其國東南曰銀州盧州湄州其南千三百里曰至州云漢張騫所窮河源出于闐而山多玉者此也其河源所出至于闐分為三東曰白玉河西曰緑玉河又西曰烏玉河三河皆有玉而色異毎嵗秋水涸國王撈玉于河然後國人得撈玉髙昌國王明清揮塵前録曰太平興國六年詔遣供奉官王徳延殿前承㫖白勲使髙昌雍熙元年四月延徳等叙其行程來上云初自夏州厯玉亭鎮次厯黄羊平其地平而産黄羊度沙磧無水行人皆載水凡二日次都囉囉族漢人過者遺以財貨謂之打當次厯茅家喎子族臨黄河以羊皮為囊吹氣實之浮于水或以囊駝牽木栰而渡次厯茅女王子開道族行入六窠沙沙深三尺馬不能行行者皆乗橐駝不育五穀沙中生草名登相收之以食次厯樓子山無居人行沙磧中以日為占旦則背日暮則向日日下則止又行朢月亦如之次厯臥羊梁劾時族地有都督山唐回鶻之地次厯太子大蟲族接契丹界人衣尚錦緜器用金銀馬乳釀酒飲之亦醉次厯屋地目族盖達爾罕裕悦王之子次至逹爾罕裕悦王子族此九族逹靼尤尊者次厯伊喇王子族有合羅州唐回鶻公主所居之地城基尚在有湯泉池傳曰契丹舊為回鶻牧羊達靼舊為回鶻牧牛回鶻徙甘州契丹逹靼遂各爭長攻戰次厯何墩族經馬鬉山望鄉嶺嶺上石庵有李陵題字處次厯格囉美源西方百川所㑹極望無際鷗鷺鳬雁之類甚衆次至托邉城亦名李僕城城中首領號通天大王次厯小石川次厯伊州州將陳氏其先自唐開元二年領州凡數十世唐時詔勅尚在地有野蠶生苦參上可為綿帛有羊尾大而不能走尾重者三斤小者一斤肉如熊白而甚美又有礪石剖之得賓鐵謂之喫鐵石又有胡桐樹經雨即生胡桐律次厯益都次厯納職城在大患鬼魅磧之東南望玉門闗甚近地無水草載糧以行凡三日至思谷曰避風驛本俗試出詔押御風風乃息凡八日至澤田寺髙昌聞使至遣人來迎次厯寳莊又厯六鍾乃至髙昌即西川也其地南距于闐西南距大食波斯西距西天步露沙雪山葱嶺皆數千里地無雨雪而極熱毎盛暑人皆穿地為穴以處飛鳥羣萃河濱或飛起即為日氣所鑠墜而傷翼屋室覆以白堊開寳二年雨及五寸即廬舎多壞有水出金嶺道之周繞國城以溉田園作水磑地產五穀惟無蕎麥貴人食馬餘食牛及鳬雁樂多箜篌出貂䑕白㲲繡文花蘂布俗多騎射婦人戴油㡌謂之蘇幕遮用開元七年厯以三月九日為寒食餘二社冬至亦然以銀或鍮為筒貯水激以相射或以水交潑為戯謂之壓陽氣去病好游賞行者必抱樂器佛寺五十餘區皆唐朝所賜額寺中有大藏經唐韻玉篇經音等居民春月多游羣聚遨樂于其間遊者馬上持弓矢射諸物謂之禳灾有勅書樓藏唐太宗明皇御札詔勅緘鎖甚謹後有摩尼寺波斯僧各持其法佛經所謂外道者也統有南突厥北突厥大衆熨小衆熨様磨割禄黠戛司末蠻格哆族預龍族之名甚衆國中無貧民絶食者共振之人多夀考率百餘嵗絶無夭死時四月獅子王避暑于北廷以其舅阿多于越守國先遣人致意于延徳曰我王舅也使者拜我乎延徳曰持朝命而來禮不當拜阿多裕悦後數日始出相見然其禮頗恭獅子王邀延徳至其北廷厯交河州凡六日至金嶺口寳貨所出又兩日至漢家寨又五日上金嶺温嶺即多雨雪上有龍王刻石記云小雪山也嶺上有積雪行人皆服毛罽度嶺一日至北廷憇髙臺寺其王烹羊馬以具饍尤豐潔地多馬王及太后太子各養馬牧放于平川中彌亘數百里以毛色分别為羣莫知其數北廷川廣長數千里鷹鷂鵰鶻之所生多美草下生花砂䑕大如䨲鷙禽捕食之至七日見其王及王子侍者皆東向拜受賜傍有持磬者擊以節拜王聞磬聲乃拜既而王之兒女親屬皆出羅拜以受賜遂張樂飲宴為優戯至暮明日汎舟于池中池四面作鼓樂又明日遊佛寺曰應運泰寧之寺貞觀十四年造北廷北山中出碙砂山中常有烟氣湧起而無雲霧且又光燄若炬照見禽䑕皆赤采碙砂者著木底鞵若皮為底者即焦下有穴生青泥出穴外即變為砂石土人取以治皮城中多樓臺草木人白晳端正性工巧善治金銀銅錢為器及攻玉善馬直絹一疋其駑馬充食者纔直一文貧者皆食肉西抵安西即唐之西境七月令延徳先還其國其王九月始至亦聞有契丹使來脣缺以銀葉蔽之謂其王曰聞漢遣使入達靼而道出王境誘王窺邊宜早送至達靼無使久留因曰髙昌本漢土漢使來覘視封域將有異圖王當察之延徳偵知其語因謂王曰契丹數不順中國今乃反間我欲殺之王固勸乃止自六年五月離京師七年四月至髙昌所厯以詔賜諸番君長襲衣金帶繒帛八年春與其謝恩使凡百餘人復循舊路而還雍熙元年四月至京師延徳初至達靼之境頗見晉末陷契丹者之子孫咸相率遮迎獻飲食問其鄉里親戚意甚悽感留旬日不得去延徳之自叙云契丹國志曰髙昌都交河漢車師前王庭也四面多大山晉以其地為髙昌郡地石磧氣候温暖厥土良沃麥一嵗再熟宜蠶有草名羊刺其上生蜜味甚佳引水溉田出赤鹽甚美俗事天神兼信佛法其官有八長史五將軍又有侍郎校郎主簿從事階位相次契丹時一年一次朝貢進獻大珠乳香斜合里皮褐里絲等亦有互市其國王親與北主評價湯垕畫鑒曰髙昌國畫用金銀箔子及朱墨㸃㸃如雨銷灑在紙上畫翎毛如中國花草亦佳嗢熱以下補松漠紀聞曰嗢熱者國最小不知其始所居後為契丹徙置黄龍府南百餘里曰賓州州近混同江即古之粟末河黑水也部落雜處以其族類之長為千戸統之契丹女真貴游子弟及富家兒月夕被酒則相率携尊馳馬戯飲其地婦女聞其至多聚觀之閒令坐與之酒則飲亦有起舞謳歌以侑觴者飲食皆以木器好寘蠱他人欲其不騐者云三彈指于器上則有毒自解亦間有遇毒而斃者族多李姓韃靼建炎以來朝野雜記曰韃靼之先與女真同種葢皆靺鞨之後也其國在元魏齊周之時稱勿吉至隋稱靺鞨也直長安東北六千里東瀕海離為數十部部有黑水白山等名白山本臣髙麗唐滅髙麗其遺人迸入渤海惟黑水完强及渤海盛皆役屬之後為奚契丹所攻部族分散其居混同江之上者曰女真乃黑水遺種也其居隂山者自號為韃靼唐末五代常通中國太祖太宗朝各再入貢皆道靈武而來及繼遷叛命遂絶不通因為契丹所服役韃靼之人皆勇悍善戰其近漢地者謂之熟韃靼尚能種秋穄以平底瓦釜煮而食之其逺者謂之生韃靼止以射獵為生無器甲矢用骨鏃而已葢以地不産鐵也契丹雖通其和市而鐵禁甚嚴及金人得河東廢鐵錢由是秦晉鐵錢皆歸韃靼韃靼得之遂大作軍器而國以益强方金人盛時韃靼嵗時入貢金人置河東招討使以統𨽻之衛王既立韃靼特穆津始自稱青吉斯皇帝遼境四至附契丹國志曰東南至新羅國西以鴨緑江東八里黄土嶺為界至保州一十一里次東南至五節度熟女真部族共一萬餘戸皆雜處山谷尤精弋獵有屋居舍門皆于山牆下闢之耕鑿與渤海人同無出租賦或遇北主征伐各量差下戸充兵馬回各逐使歸本處所産人參白附子南星茯苓松子豬苓白皮等物並係契丹樞宻院所轄差契丹或渤海人充節度管押其地南北七百餘里東西四百里西北至東京五百餘里又次東南至生女真國不屬契丹所管其地東西八百餘里南北一千餘里居民雜處山林耕牧屋宇與熟女真五節度同然無君長首領統押精于騎射今古以來無盜賊詞訟之事任意遷徙多者百家少者三兩家而已不與契丹爭戰或居民等相率以金帛布黄蠟天南星人參白附子松子蜜等諸物入貢北蕃或只令于邊上買賣訖郤歸本國契丹商賈人等就入其國買賣亦無所礙契丹亦不以為防禦西至東京二百餘里東北至女真國西南至熟女真國界東至新羅國界東北不知其極居民屋宇耕鑿言語衣裝與熟女真國並同亦無君長所管精于騎射前後屢與契丹為邊患契丹亦設防備南北二千餘里沿邊創築城堡般運粮草差撥兵甲屯守征討三十年來深為患耳南界西南至東京六百里又東北至烏舎國阿里瑪國布古魯特等國毎國各一萬餘戸西南至生女真國界衣裝耕種屋宇言語與女真人異契丹樞宻院差契丹或渤海人充逐國節度使管押然不出征賦兵馬毎年惟貢進大馬蛤珠青䑕皮貂䑕皮膠魚皮蜜蠟之物與北蕃人往來買賣西至上京四千餘里正界北至鐵離國南至阿里瑪等國界居民言語衣裝屋宇耕養稍通阿里瑪等國無君長皆雜處山林不屬契丹管押亦不與契丹爭戰惟以大馬蛤珠鷹鶻青䑕貂䑕等皮膠魚皮等物與契丹交易西南至上京五千餘里次東北至靺鞨國東北與鐵離國為界無君長統押㣲有耕種春夏居屋宇中秋冬則穿地為洞深可數丈居之以避其寒不與契丹爭戰惟以細鷹鶻鹿細白布青䑕皮大馬膠魚皮等與契丹交易西南至上京四千餘里西北至䝉古國無君長所管亦無耕種以弋獵為業不常其居毎四季出行惟逐水草所食惟肉酪而已不與契丹爭戰惟以牛羊駞馬皮毳之物與契丹交易南至上京四千餘里又次北至伊濟國無君長首領管押凡事並與䝉古國同甲寅嵗曾率衆入契丹國為盜聖宗命駙馬都尉蕭從欲統兵大破其國爾後不復為盜惟以牛羊駞馬皮毳之物與契丹為交易東南至上京五千餘里又次西北至博和哩國又次北近西至韃靼國各無君長毎部族多者三二百家少者五七十家以部族内最富豪者為首領不常厥居逐水草以弋獵為業其婦人皆精于騎射常與契丹爭戰前後契丹主命親近為西北路兵馬都統率番部兵馬十餘萬防討自契丹建國以來唯此二國為害如暫安靜以牛羊駞馬皮毳為交易東南至上京六千餘里西近北至生吐蕃國又西至党項突厥等國皆不為契丹國害亦不進貢往來葢以熟吐渾突厥党項等部族所隔東南至雲州三千里遼史拾遺卷十八
