body:
  text: 遼史拾遺正史類提要臣等謹案遼史拾遺二十四卷國朝厲鶚撰鶚字太鴻錢唐人康熙庚子舉人是書拾遼史之遺有注有補均摘録舊文為綱而㕘考他書條列於下凡有異同悉分析考證綴以按語國語解先後次第與目録有不合者亦悉為釐正又補輯遼境四至及風俗物産諸條於後其中如劉守光自為節度使唐書及五代史列傳載之最詳乃獨取資治通鑑一條李嗣源之救幽州不引契丹國志亦僅引通鑑王都破唐兵五代史與諸書互有同異而不加考辨金克中京大金國志敘次最悉乃獨取松漠紀聞數言保大以後遼事載於宋史紀傳者最多皆略而不取似此之類皆頗有所遺又蘭亭石刻之類蔓延鋪敘與史事毫無所關亦未免嗜博愛竒傷於泛濫然元脩三史莫繁冗於宋莫疎略于遼又遼時書禁最嚴不得傳布於境外故一朝圖籍澌滅無徴鶚采摭羣書至三百餘種均以旁見側出之文㕘考而求其端緒年月事迹一一鈎稽其補唐中和諸人之傳及禮志之補幡勝樂志之補䀨帳輿服志之補金冠穿袍食貨志之補賦税名目皆採輯散佚足備考證鶚樊榭詩集中自稱所注遼史比于裴松之之三國史注亦不誣也至于卷末國語解對音舛誤名義多乖由作史者昧於翻譯故因仍故牘致失其真鶚雖釐正其次第而索倫舊語既非所知故舊史駁文未能考定今三史國語悉蒙欽定一洗前代之訛足以昭示萬古鶚所附贅存而不論可矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b0b47ff58bf73e0cf17c79d6d67025a0287b168fe15723380e1ce374204711e2
