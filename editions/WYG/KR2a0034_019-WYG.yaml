body:
  text: 遼史拾遺卷十九錢塘厲鶚撰列傳第一后妃陳大任遼史后妃傳鶚案金史党懷英傳曰承安二年召為翰林學士承㫖泰和元年增修遼史詔分紀志列傳致仕後章宗詔直學士陳大任繼成遼史云太祖淳欽皇后舒嚕氏契丹國志曰后任智用權立中子徳光在其國稱太后左右有桀黠者后輒謂曰為我達語于先帝至墓所即殺之前後所殺以百數最後平州人趙思温當往思温不行太后曰汝事先帝親近何為不行對曰親近莫如后后行臣即繼之太后曰我非不欲從先帝于地下顧諸子幼弱國家無主不得往耳乃斷一腕置墓中思温亦得免胡嶠陷北記曰世宗烏雲及舒嚕后戰于沙河舒嚕兵敗而北烏雲追至獨樹渡遂囚舒嚕于撲馬山太宗靖安皇后蕭氏契丹國志曰太宗南入大梁舒嚕后專秉國事后無所預弟蕭翰性殘忍后毎戒其多殺世宗妃甄氏契丹國志曰甄后廟碑翰林學士李昞撰景宗睿知皇后蕭氏東都事略曰隆緒自稱天輔皇帝尊母燕燕為皇太后燕燕姓蕭氏宰相思温之女有機謀善馭左右大臣多得其死力先是蕃民毆漢人死者償以牛馬漢人則斬之仍以其親屬為奴婢燕燕一以漢法論毎戎馬南入親被甲督戰及通和亦出其謀然天性殘忍多殺戮與耶律隆運通遣人縊殺其妻又幸醫工特哩衮有私議其醜者輒殺之隆緒畏莫敢言既卒諡曰宣獻年五十七契丹國志曰自南北通和後契丹多在中京武功殿聖宗居之文化殿太后居之好華儀而性無檢束毎宴集有不拜不拱手者惟后願固盟好而年齒漸衰宰相耶律隆運專權有辟陽侯之幸寵榮終始朝臣莫及焉其後歸政于帝未踰月而崩鶚案睿知史稱賢后隆運辟陽之幸其説近誣聖宗仁聖皇后蕭氏東都事畧曰齊天皇后平州節度使蕭烏延之女耶律隆運之甥有容色隆緒寵愛異之事其姑燕燕甚謹燕燕亦以隆運故深愛之契丹國志曰齊天后事承天太后尤謹承天上仙齊天預政權勢日甚置宫闈司補官屬出教令生辰曰順天節后善琵琶工燕文顯李文福元妃言其事聖宗不之信又為卷書投聖宗寢帳中聖宗得之曰此必元妃所為也命焚之鶚案李文福東都事略作李有福聖宗欽哀皇后蕭氏契丹國志曰后姊秦國夫人早年嫠居后見長沙王名謝嘉努沈偉美姿容為殺其妃而以秦國妻之妹晉國夫人喜戸部侍郎耿元吉貎美后從晉國之請亦為殺其妻以晉國妻之太后幽于慶州數年帝聴講報恩經感悟迎囘太后聖宗芳儀李氏補王銍黙記曰趙至忠虞部自契丹歸朝仕遼為翰林學士著北廷雜記言聖宗芳儀李氏江南李景女初嫁供奉官孫某為武彊都監妻女皆為聖宗所獲封芳儀生公主一人晁補之為北都教官因覽此書而悲之與顔復長道作芳儀曲云金陵宫殿春霏㣲江春花發鷓鴣飛風流國主家千口十五吹簫粉黛稀滿堂詩酒皆詞客拭汗爭看平叔白後庭一曲時事新揮淚臨江悲故國令公獻籍朝未央敕書築第優降王魏俘曽不輸織室供奉一官奔武彊秦淮潮水鍾山樹塞北江南易懷土雙燕清秋夢柏梁吹落天涯猶並羽相隨未是斷腸悲黄河應有郤還時寧知翻手明朝事咫尺千山不可期蒼黄三鼓滹沱岸良人白馬今誰見國亡家破一身存薄命如雲信流轉芳儀加我名字新教歌遣舞不由人采珠拾翠衣裳好深紅暗盡驚飛塵隂山射虎邊風急嘈雜琵琶酒闌泣無言數徧天河星只有南箕近鄉邑當年千指渡江來千指不知身獨哀中原骨肉盡零落黄鵠寄意何當囬生男自有四方志女子那知出門事君不見李君椎髻泣窮邊丈夫漂泊猶堪憐余嘗游廬山見李主有國時修真風觀皆宫人施財刋姓氏于碑有太寧公主永嘉公主二人皆景女不知芳儀者孰是也鶚案史公主表聖宗十三女賽格封金鄉公主李氏生當即是芳儀道宗宣懿皇后蕭氏王鼎焚椒録曰懿徳皇后蕭氏為北面官南院樞宻使惠之少女母耶律氏夢月墜懷已復東升光輝照爛不可仰視漸升中天忽為天狗所食驚寤而后生時重熙九年五月己未也母以語惠惠曰此女必大貴而不得令終且五日生女古人所忌命已定矣將復奈何后幼能誦詩旁及經子及長姿容端麗為蕭氏稱首皆以觀音目之因小字觀音二十二年今上在青宫進封燕趙國王慕后賢淑聘納為妃后婉順善承上意復能歌詩而彈箏琵琶尤為當時第一由是愛幸遂傾後宫及上即位以清寧元年十二月戊子冊為皇后后方出閤升坐扇開簾卷忽有白練一段自空吹至后褥位前上有三十六三字后問此何也左右曰此天書命哈屯領三十六宫也后大喜二年八月上獵秋山后率妃嬪從行在所至伏虎林命后賦詩后應聲曰威風萬里壓南邦東去能翻鴨緑江靈怪大千俱破膽那教猛虎不投降上大喜出示羣臣曰皇后可謂女中才子次日上親御弓矢射獵有虎突林而出上曰朕射得此虎可謂不媿后詩一發而殪羣臣皆呼萬嵗是嵗十一月羣臣上皇帝尊號曰天祐皇帝后曰懿徳皇后三年秋上作君臣同志華夷同風詩后應制屬和曰虞廷開盛軌王㑹合竒琛到處承天意皆同捧日心文章通鹿蠡聲教薄雞林大㝢看交泰應知無古今明年后生皇子濬皇太叔重元妃入賀毎顧影自憐流目送媚后語之曰貴家婦宜以莊臨下何必如此妃銜之歸罵重元曰汝是聖宗兒豈和斯不若使教坊奴得以哈屯加我汝若有志當除此帳笞撻此婢于是重元父子合定叛謀于九年七月駕幸灤水聚兵作逆須臾軍潰父子伏誅而討平此亂則知北樞宻事趙王耶律伊遜與有功焉尋進南院樞宻使威權震灼傾動一時唯后家不肎相下伊遜毎為怏怏及咸雍初皇子濬冊為皇太子益復蓄奸為圖后計矣后常慕唐徐賢妃行事毎于當御之夕進諌得失國俗君臣尚獵故有四時巴納上既擅聖藻而尤長弓馬往往以國服先驅所乗馬號飛電瞬息百里常馳入深林邃谷扈從求之不得乃上疏諫曰妾聞穆王逺駕周徳用衰太康佚豫夏社幾屋此游畋之往戒帝王之龜鑑也頃見駕幸秋山不閑六御特以單騎從禽深入不測此雖威神所届萬靈自為擁衛倘有絶羣之獸果如東方所言則溝中之豕必敗簡子之駕矣妾雖愚闇竊為社稷憂之惟陛下尊老氏馳騁之戒用漢文吉行之㫖不以其言為牝雞之晨而納之上雖嘉納心頗厭逺故咸雍之末遂稀幸御后因作詞曰回心院被之管絃以寓望幸之意埽深殿閉乆金鋪暗游絲絡網塵作堆積嵗青苔厚堦面埽深殿待君宴拂象牀憑夢借高唐敲壞半邊知妾臥恰當天處少輝光拂象牀待君王換香枕一半無雲錦為是秋來轉展多更有雙雙淚痕滲換香枕待君寢鋪翠被羞殺鴛鴦對猶憶當時呌合歡而今獨覆相思塊鋪翠被待君睡裝繡帳金鈎未敢上解郤四角夜光珠不教照見愁模様裝繡帳待君貺叠錦裀重重空自陳只願身當出玉體不願伊當薄命人叠錦裀待君臨展瑤席花笑三韓碧笑妾新鋪玉一牀從來婦歡不終夕展瑤席待君息剔銀燈須知一様明偏是君來生彩暈對妾故作青熒熒剔銀燈待君臨爇熏爐能將孤悶蘇若道妾身多穢賤自霑御香香徹膚爇熏爐待君娱張鳴箏恰恰語嬌鶯一從彈作房中曲常和窗前風雨聲張鳴箏待君聴時諸伶無能奏演此曲者獨伶官趙惟一能之而宫婢單登故重元家婢亦善箏及琵琶毎與惟一爭能怨后不知己后乃召登對彈四旦二十八調皆不及后單媿恥拜服于時上甞召登彈箏后諌曰此叛家婢女中獨無豫讓乎安得輕近御前因遣直外别院登深怨嫉之而登妹清子嫁為教坊朱頂鶴妻方為耶律伊遜所暱登毎向清子誣后與惟一淫通伊遜俱知之欲乗此害后以為不足證實更命他人作十香淫詞用為誣案云青絲七尺長挽出内家裝不知眠枕上倍覺緑雲香紅綃一幅强輕闌白玉光試開胸探取尤比顫酥香芙蓉失新艷蓮花落故妝兩般緫堪比可似粉腮香蝤蠐那足並長須學鳳凰昨宵歡臂上應惹領邊香和羮好滋味送語出宫商定知郎口内含有煖甘香非闗兼酒氣不是口脂芳郤疑花解語風送過來香既摘上林蘂還親御苑桑歸來便携手􅊏􅊏春筍香鳳鞾抛合縫羅韈卸輕霜誰將煖白玉雕出軟鉤香解帶色已戰觸手心愈忙那識羅帬内消魂别有香咳唾千花釀肌膚百和裝元非噉沈水生得滿身香伊遜隂屬清子使登乞后手書登時雖外直常得見后后善書登紿后曰此宋國多爾吉所作更得御書便稱二絶后讀而喜之即為手書一紙紙尾復書已所作懷古詩一絶云宫中只數趙家妝敗雨殘雲誤漢王惟有知情一片月會窺飛燕入昭陽登得后手書持出與清子云老婢淫案已得况主汗性忌早晩見其白練挂粉脰也伊遜已得書遂搆詞命登與朱頂鶴赴北院陳首伶官趙惟一私侍懿徳皇后有十香淫詞為證伊遜乃宻奏上曰太康元年十月二十三日據外直别院宫婢單登及教坊朱頂鶴陳首本坊伶官趙惟一向要結本坊入内承直高長命以彈箏琵琶得召入内沐上恩寵乃輒干冐禁典謀侍懿徳皇后御前忽于咸雍六年九月駕幸木葉山惟一公稱有懿徳皇后㫖召入彈箏于時皇后以御製回心院曲十首付惟一入調自辰至酉調成皇后向簾下目之遂隔簾與惟一對彈及昏命燭傳命惟一去官服著緑巾金抺額窄袖紫羅衫珠帶烏鞾皇后亦著紫金百鳳衫杏黄金縷帬上戴百寳花髻下穿紅鳳花鞾召惟一更入内帳對彈琵琶命酒對飲或飲或彈至院鼓三下勅内侍出帳登時當直不復聞帳内彈飲但聞笑聲院鼓四下后喚登掲帳曰惟一醉不起可為我呌醒登呌惟一百通始為醒狀乃起拜辭后賜金帛一篋謝恩而出其後駕還雖時召見不敢入帳后深懷思因作十香詞賜惟一惟一持出誇示同官朱頂鶴朱頂鶴遂手奪其詞使婦清子問登登懼事發連坐乗暇泣諫后怒痛笞遂斥外直但朱頂鶴與登共悉此事使含忍不言一朝敗壞安免株坐故敢首陳乞為轉奏以正刑誅臣惟皇上以至徳統天化及無外寡妻匹婦莫不刑于今宫帳深宻忽有異言其有闗治化良非渺小故不忍隠諱輒據詞并手書十香詞一紙宻奏以聞上覽奏大怒即召后對詰后痛哭轉辨曰妾托體國家已造婦人之極况誕育儲貳近且生孫兒女滿前豈忍更作淫奔失行之人乎上出十香詞曰此非汝作手書更復何辭后曰此宋國多爾吉所作妾即從單登得而書賜之耳且國家無親蠶事妾作那得有親桑語上曰詩正不妨以無為有如詞中合縫鞾亦非汝所著為宋國服耶上怒甚因以鐵骨朶擊后后幾至殞即下其事使參知政事張孝傑與伊遜窮治之伊遜乃繫械惟一長命等訊鞫加以釘灼盪錯等刑皆為誣服獄成將奏樞宻使蕭惟信馳語伊遜孝傑曰懿徳賢明端重化行宫帳且誕育儲君為國大本此天下母也而可以叛家仇婢一語動搖之乎公等身為大臣方當照燭奸宄洗雪寃誣烹滅此輩以報國家以正國體奈何欣然以為得其情也公等幸更為思之不聽遂具獄上之上猶未決指後懷古一詩曰此是皇后罵飛燕也如何更作十香詞孝傑進曰此正皇后懷趙惟一耳上曰何以見之孝傑進曰宫中只數趙家妝惟有知情一片月是二句中包含趙惟一三字也上意遂決即日族誅惟一并斬長命勅后自盡時皇太子及齊國諸公主咸被髪流涕乞代母死上曰朕親臨天下臣妾億兆而不能防閑一婦更何施面目靦然南面乎后更乞面見汗一言而死不許后乃望帝所而拜作絶命詞曰嗟薄祜兮多幸羌作儷兮皇家承昊穹兮下覆近日月兮分華托後鉤兮凝位忽前星兮啓曜雖釁纍兮黄牀庶無罪兮宗廟欲貫魚兮上進乗陽徳兮天飛豈禍生兮無朕䝉穢惡兮宫闈將剖心兮自陳冀迴照兮白日寧庶女兮多慙遏飛霜兮下繫顧子女兮哀頓對左右兮摧傷共西曜兮將墜忽吾去兮椒房呼天地兮慘悴恨今古兮安極知吾生兮必死又焉愛兮旦夕遂閉宫以白練自經上怒猶未解命裸后屍以葦席裹還其家春秋三十有六正符白練之語聞者莫不寃之皇太子投地大呌曰殺吾母者耶律伊遜也他日不門誅此賊不為人子伊遜遂謀害太子無虚日矣嗟嗟自古國家之禍未甞不起于纎㣲也鼎觀懿徳之變固皆成于伊遜然其始也由于伶官得入宫帳其次則叛家之婢使得近左右此禍之所由生也第伊遜凶慘無匹固無論而孝傑以儒業起家必明于大義者使如惟信直言毅然諍之后必不死后不死則太子可保無恙而上亦何慙于少恩骨肉哉乃亦昧心同聲自保禄位使母后儲君與諸老成一旦皆死于非辜此史冊所書未有之禍也二人者可謂罪通于天者乎然懿徳所以取禍者有三焉曰好音樂與能詩善書耳假令不作回心院曲則十香詞安得誣出后手乎至于懷古一詩天實為之而月食飛練先命之矣天祚皇后蕭氏契丹國志曰山金司之禍后并被擒尼瑪哈納為次室其後耶律伊都雲中起兵烏舍誅伊都并及于后烏舎回至燕山請罪于尼瑪哈曰蕭氏忍死以從兄者將有待于今日也今見事無成恐或不利于兄且兄横行天下萬夫莫當此人帷幄之間可以寸刃害兄于不測矣以愛兄故已擅殺之尼瑪哈起而謝之既而泣下天祚元妃蕭氏張滙金節要曰尼瑪哈之妻乃遼主天祚元妃鶚案天祚皇后元妃史俱云從西狩以疾亡而二書所説不同如此豈陳大任以金人修遼史故諱之耶列傳第二宗室義宗貝五代㑹要曰長興元年東丹王托雲率蕃官四十餘人馬百匹自登州汎海内附明宗賜姓東丹名慕華授光禄大夫檢校太保安東都護兼御史大夫上柱國渤海郡開國公食邑一千五百户充懷化軍節度瑞慎等州觀察使二年九月復賜姓李名賛華五代史曰契丹好飲人血托雲左右姬妾多刺其臂吮之其小過輒挑目刲灼不勝其毒然性喜賓客好飲酒工畫頗知書其自契丹歸中國載書數千卷樞宻使趙延壽每假其異書醫經皆中國所無者又曰唐莊宗遇弑後後宫皆散走朱守殷入宫選得三十餘人虢國夫人夏氏以甞幸于莊宗守殷不敢留明宗立悉放莊宗時宫人還其家獨夏氏無所歸乃以河陽節度使夏魯竒同姓也因以歸之復嫁契丹李賛華册府元龜曰安巴堅長子東丹王托雲歸國明宗賜姓李名賛華出鎮滑州在鎮多行不法頃之入覲乞留闕下明宗許之復遣就第問所欲賛華附奏曰臣願為許州節度使明宗欲從之樞宻使范延光以為不可乃止明宗促令歸滑賛華謂使者曰若須令赴舊地當自裁爾使者以聞明宗不悦召而證之賛華曰臣不言自裁曽言乞削髪為僧使者引統軍李從㫤為證賛華以手畫空曰使者之言如水上畫字何可據耶明宗優容之清異録曰契丹東丹王托雲買巧石數峰目為空青府堯山堂外紀曰東丹王有文才博古今其帆海奔唐載書數千卷習舉子業每通名刺云鄉貢進士黄居難字樂地以擬白居易字樂天也張齊賢洛陽縉紳舊聞記曰晉朝太子少師李公肅受命䕶東丹王䘮柩歸北遣回賜名馬百餘匹别賜駞馬百餘頭衣服器皿稱是宣和畫譜曰李賛華好畫多寫貴人酋長至于袖弓挾彈牽黄臂蒼服用皆縵胡之纓鞍勒率皆瑰竒不作中國衣冠亦安于所習者也然議者以為馬尚豐肥筆乏壯氣其確論歟今御府所藏十有五雙騎圖一獵騎圖一雪騎圖一番騎圖六人騎圖二千角鹿圖一吉首並驅圖一射騎圖一女真獵騎圖一江少虞皇朝類苑曰祕閣有東丹王千角鹿圖東丹王歸中國賜姓李名賛華亦能為五言詩其子托雲亦善丹青千角鹿出北方所畫誠妙筆也周宻志雅堂雜鈔曰王介石有東丹王賛華所畫番部行程圖遼東志曰顯陵在醫巫閭山塟遼東丹人皇王托雲世宗以人皇王愛醫巫閭山水竒秀因塟焉山形掩抱六重于中作影殿制度宏麗遼史拾遺卷十九
