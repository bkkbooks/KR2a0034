body:
  text: 遼史拾遺卷十七錢塘厲鶚撰表第一世表開皇末别部四千餘戸違突厥來降册府元龜曰開皇四年五月契丹王美佛赫遣使請降拜大將軍契丹地路振九國志曰契丹代居遼澤之中潢水南岸南距榆闗一千一百里榆闗南距幽州七百里開元二年盡忠從父弟舎琿率部落歸唐四年與奚長李大酺偕來詔復置松漠府以舎琿為都督封松漠郡王册府元龜曰開元四年八月契丹李舎琿奚李大酺各以所部來降制曰混一六合紀綱四海開物所以苞舉華夷列爵所以範圍中外契丹松漠州都督李舎琿奚李大酺等並材雄劒騎家襲簮組翻飛涿鹿之郊髙視無閭之地徃屬詿惑遂爾携離海表為虞在苞桑之厚戒彚征順命乃連茹而同歸柔懷有章寵渥期在俾侯利建宜膺胙土之榮上將師貞仍允齋壇之拜舎琿可封松漠郡王食邑三千戸行左金吾衛大將軍大酺可封饒樂郡王食邑三千户行右金吾衛大將軍並員外置餘如故五年以楊氏為永樂公主下嫁舎琿冊府元龜曰開元五年八月詔曰故東平王外孫正議大夫復州司馬楊元嗣第七女譽叶才明體光柔順葭莩懿戚敦睦有倫舜華靡顔徳容兼茂屬賢王慕義于以賜親納女問名兹焉迨吉宜昇外館之寵俾耀邉城之地可封永樂公主出降契丹松漠郡王李舎琿婚之夜遣諸親髙品及兩蕃太守領觀花燭開元十年裕允入朝以慕容氏為燕郡公主下嫁裕允冊府元龜曰開元十年契丹松漠郡王裕允入朝請婚帝令慕容嘉賓女封燕郡公主以妻之實古托允之弟國人共立之開元十三年冬朝于行在從封禪泰山改封廣化郡王以陳氏為東光公主下嫁實古冊府元龜曰開元十三年契丹立李盡忠弟實古為主其冬車駕東巡實古詣行在所改封廣化郡王封皇從外甥女陳氏為東光公主以妻之制曰李邵固輸忠保塞乃誠奉國屬升中于天無逺而不届華裔靡隔等數有加宣錫休名俾承慶澤達呼哩氏阿庸于奚王以通于唐朝貢嵗至劉昫舊唐書曰天寳十二年契丹降附迄于貞元常間嵗來修藩禮貞元十四年與奚衆同㓂我振武大掠人畜而去九年十年復遣使來朝大首領悔落拽河已下各授官放還十一年大首領伊蘇等二十五人來朝自後至元和長慶寳厯太和開成時遣使來朝貢李懷秀唐賜姓名契丹名逹年扎里本八部大帥天寳四年降唐拜松漠都督冊府元龜曰天寳四載封外甥女獨孤氏為靜樂公主降松漠都督崇順王李懷節九月契丹首領殺公主舉部以叛鶚案懷秀懷節名不同未知孰是且羅以唐封恭仁王代松漠都督遂稱契丹王冊府元龜曰天寳五載四月封契丹王楷雒為恭仁王仍授松漠府都督契丹王欽徳實埒之族也先是為哈陶津汗光啟中抄掠奚室韋諸部皆服役之數與劉仁恭相攻晩年政衰八部大人法常三嵗代徳哷勒部耶律安巴堅建旗鼓自為一部不肯受代自號為王盡有契丹國約尼氏遂亡蘇逢吉漢髙祖實録曰契丹夲姓逹呼哩氏後分八族一曰逹爾扎邸二曰伊斯琿邸三曰舎琿四曰諾爾威邸五曰頗摩六曰訥古濟邸七曰濟勒勤八曰實邸管縣四十一縣有令八族之長皆號大人稱刺史常推一人為王建旗鼓以禀之毎三年第其名以相代賈緯備史曰後唐武皇㑹安巴堅故雲州城結以兄弟之好時列兵相去五里使人持盃徃來以展酬酢之禮安巴堅喜謂武皇曰我蕃中首領舊法三年則罷若他日見公復相禮否武皇曰我受朝命鎮太原亦有遷移之制但不受代則可何憂罷乎安巴堅由此用其教不受諸族之代唐莊宗列傳曰咸通末契丹王曰實埒疆土稍大累來朝貢光啟中其王曰欽徳乗中原多故北邉無備遂蠶食諸部達靼奚室韋之屬咸被驅役及欽徳政衰安巴堅族盛自稱國王表第二皇子表徳祖六子哷克字綏蘭第二與弟特爾格安圖等反太祖念其同氣不忍加刑杖而釋之神冊二年南奔資治通鑑曰契丹主之弟薩喇阿巴即埒克號北大王謀亂于其國契丹王數之曰汝與吾如手足而汝興此心我若殺汝則與汝何異乃囚之期年而釋之薩喇阿巴帥其衆奔晉晉王厚遇之養為假子仕為刺史胡栁之戰以其妻子奔梁同光元年唐帝滅梁詔敬翔李振首佐朱温共傾唐祚契丹薩喇阿巴叛兄棄母負恩背國宜與趙巖等並族誅于市太宗五子雅斯哈第二景宗封齊王保寧四年病疽薨續資治通鑑長編曰契丹供奉官李信來歸言國中事云景宗后蕭有姊二人長適齊王王死自稱齊妃領兵三萬屯西鄙驢駒兒河嘗閲馬見蕃奴逹蘭阿布姿貎甚美因召侍帳中蕭氏聞之縶逹蘭阿布以沙囊四百而離之踰年齊妃請于蕭氏願以為夫蕭氏許之使西得達靼盡降之因謀帥其衆奔庫爾哲國結兵以篡蕭氏蕭氏知之遂奪其兵命領幽州景宗四子隆慶字燕隠小字普賢努第二契丹國志曰皇太弟隆慶生而岐嶷幼與羣兒戯為行伍戰陣之法指揮意氣無敢違者景宗竒之曰此吾家生馬駒也隆祐小字果勒齊一字和爾沁第三統和中伐宋留守京師契丹國志曰齊國王隆祐性沈毅美姿容自少慕道後為東京留守别置道院延接道流誦經宣醮用素饌薦獻藥師努第四早卒塟王子院續資治通鑑長編曰契丹供奉官李信云景宗四子長名隆緒即遼主次名賛封梁王次名果勒齊封吳王次哲格八月而夭表第三公主表太祖女濟古爾下嫁淳欽皇后弟蕭舒嚕幼為奥姑契丹故俗凡婚燕之禮推女子之可尊敬者坐于奥謂之奥姑未封而卒契丹國志曰舒嚕姓蕭氏乃太祖皇后兄也蕃部人世為首領少壮武有膽略部人憚之從太祖平奚有功授統軍使盧文進自新州來奔太祖嵗入燕塞舒嚕以兵從又從圍周徳威于幽州城幾克㑹救至退師改授奚王府監軍東路兵馬都統軍于庫哩尚奥姑公主景宗四女淑格第四無封號與駙馬都尉盧俊不諧表請離婚改適蕭實納十國春秋曰盧俊尚北漢公主為駙馬都尉廣運三年宋師壓境俊詣遼乞師有功白馬嶺之役遼相耶律沙將趨太原㑹俊以國亡出奔言太原已䧟遂勒兵還俊至遼署同政事門下平章事明年遼景宗以公主淑格下嫁俊復拜駙馬都尉久之與淑格不恊詔離之改適蕭實納遂出俊為興國軍節度使終于其國聖宗十四女巴格第九封同昌縣主進封公主下嫁劉三嘏儒林公議曰契丹有幽薊雁門以北亦開選舉以收士人幽州劉氏兄弟其名曰二元三嘏四端五常六符皆在被遇三嘏四端復尚主慶厯中三嘏携嬖妾偕一子投廣信軍自言主兇狠必欲殺其妾與子故歸朝廷頗詢其國中機事復為詩以自陳云雖慙涔勺赴滄溟仰訴丹衷不為名寅分星辰將降禍兌方疆寓即交兵春秋大義惟觀釁王者雄師但有征救取燕民歸舊主免于北國嵗稱兄朝廷以誓約既久納之生釁遼又移文逐郡躡知三嘏未還求索峻切期于必得不然則舉兵隳好矣朝廷乃遣還三嘏復由西山路入定州境所至以金賂村民求宿食勢亦窘廹定師遣人捜索拘送比三嘏至幽州其妻已先在矣乃殺其妾與子械送三嘏以其晜弟皆方委任遂貸三嘏死使人監錮之鶚案劉六符傳云三嘏與公主不諧奔宋歸殺之當以史為正天祚六女文妃生一女額哩音為金人所執張滙金節要曰二太子即斡里雅布之妻約尼公主乃遼主天祚之女鶚案金史曰宗望即斡里雅布襲遼主于隂山青塜之間直至遼主營時遼主徃應州其嬪御諸女皆在見敵兵奄至驚駭欲奔命騎下執之有頃後軍至遼太叔和勒温妃國王納哩次妃遼漢夫人并其子秦王許王女古雲額哩音大阿雅小阿雅趙王妃額爾琿招討逹魯詳衮魯沁節度博廸齊格爾皆降太祖嘉宗望功以遼蜀國公主額哩音賜之表第四皇族表魏國王察克系出景宗孝成康靖皇帝契丹國志曰宗懿番名察克濟即察克聖宗皇帝太弟隆慶之子也少有氣局幹畧過人聖宗推愛諸姪每誡之曰汝勿以材能陵物勿以富貴驕人惟忠惟孝保身保家始封中山王厯龍化州饒建宜平州節度使改封晉王薨秦晉國王淳稱帝系出興宗神聖孝章皇帝三朝北盟㑹編曰秦晉國王淳興宗之孫道宗之弟于天祚為從叔初道宗囚其子濬欲立淳為儲貳不果已而立天祚淳守燕十二年得人心號燕王又謂九大王又謂覃湘大王表第五外戚表大同元年太宗自汴將還留外戚小漢為汴州節度使賜姓名曰蕭翰契丹國志曰蕭翰契丹之大族其號阿巴翰之妹本無姓氏契丹呼翰為國舅及將以為節度使李崧為制姓名曰蕭翰于是始姓蕭北府宰相阿古濟冊府元龜曰莊宗同光初滄州奏偵契丹國舅色哩頁送羊馬于幽州申和好二年八月幽州進契丹國舅薩喇宴書鶚案後唐同光初為遼太祖天賛初是時淳欽皇后弟蕭阿古濟為北府宰相畧地燕趙所云色哩頁疑即阿古濟本傳云字薩巴表第六游幸表太宗天顯九年五月射栁穆宗應厯六年九月擊鞠鶚案金史禮志曰射栁擊毬之戯亦遼俗也金因尚之凡重五日拜天禮畢挿栁毬場為兩行當射者以尊卑序各以帕識其枝去地約一作凡數寸削其皮而白之先以一人馳馬前導後馳馬以無羽横鏃箭射之既斷栁又以手接而馳去者為上斷而不能接去者次之或斷其青處及中而不能斷與不能中者為負毎射必伐鼓以助其氣已而擊毬各乗所常習馬持鞠杖杖長數尺其端如偃月分其衆為兩隊各爭擊一毬先于毬場南立雙桓置板下開一孔為門而加網為囊能奪得鞠擊入網囊者為勝或曰兩端對立二門互相排擊各以出門為勝毬狀小如拳以輕韌木枵其中而朱之皆所以習驍捷也既畢賜宴嵗以為常聖宗統和十一年正月幸延芳淀徐昌祚燕山叢録曰漷縣西有延芳淀大數頃中饒荷芰水鳥羣集其中遼時毎季春必來弋獵打鼓驚天鵝飛起縱海東青擒之得一頭鵝左右皆呼萬嵗海東青大僅如􅍎既縱直上青㝠幾不可見俟天鵝至半空􅘒自上而下以爪攫其首天鵝驚鳴相持殞地興宗重熙十一年十二月幸延壽寺飯僧松漠紀聞曰燕京蘭若相望大者三十有六然皆律院自南僧至始立四禪寺曰大覺招提竹林瑞像延壽院主有質坊二十八所僧職有正副判録或呼司空道宗清寧十年九月幸七金山三學寺耶律楚材湛然居士集曰三學寺改名圓明請予為功徳主因作疏曰粤三學之巨刹冠四海之名藍今改僧而舍尼遂從禪而革律邀印公為粥飯頭請湛然作功徳主張翥蜕菴集游城南三學寺詩曰城南多佛刹結構自遼金旁舍遺民在殘碑好事㝷雨苔塵壁暗風葉石幢深一飯蒲團了蕭蕭鐘磬音鶚案興宗紀重熙十一年十二月以宣獻皇后忌辰上與皇太后素服飯僧于延壽憫忠三學三寺則寺在南京城南無疑但七金山不可考耳又案兵衛志云聖宗統和二十三年城七金山建大定府號中京則七金山在中京豈另有三學寺耶抑二事並書耶咸雍三年獵于赤山張舜民使遼録曰北地鵰巢中生獵犬極難得今駕前有二隻其性頗異毎獵而獲十倍常犬北馬有割去肝者遂無病能行其法飲以酒醉于腋間破之取去少肉然亦十䘮八九鶚案舜民使遼在道宗時故此條屬焉表第七部族表太祖元年黒車子室韋八部降杜佑通典曰室韋有五部後魏末通焉并在靺鞨之北路出栁城諸部不相總一所謂南室韋北室韋鉢室韋深末怛室韋大室韋竝無君長人衆貧弱突厥沙鉢畧可汗常以吐屯潘垤統領之葢契丹之類也南室韋在契丹北三千里土地卑濕至夏則移向西北貸勃欠對二山多草木饒禽獸又多蚊蚋人皆巢居以避其患衣服與契丹同寝則屈木為室以籧篨覆上移則載行以豬皮為席編木藉之氣候多寒田牧甚薄無羊少馬多豬牛造酒食噉言語與靺鞨同婚姻二家相許婿輒盜婦去然後送牛馬為聘婦人不再嫁以為死人妻難以共居部落共為一大棚人死則置屍其上居䘮三年自南室韋北行十一日至北室韋氣候最寒冬則入山居穴中牛畜多凍死俗皆捕貂為業冠以狐貉衣以魚皮又北行千里至鉢室韋依胡布山而住用樺皮葢屋從鉢室韋西四日行至深末怛室韋因水為號冬月穴居以避太隂之氣又西北數千里至大室韋逕路險阻言語不通尤多貂及青䑕後魏武定隋開皇大業中並遣使朝獻大唐所聞有九部焉屢有朝貢所謂嶺西室韋北室韋黄頭室韋大如者室韋小如者室韋納婆葛室韋達未室韋駱駝室韋並在栁城郡之東北近者三千五百里逺者六千八百里胡嶠䧟北記曰黒車子善作車帳其人知孝義地貧無所産云契丹之先常役回紇後背之走黒車子始學作車帳又曰一曰室韋二曰黄頭室韋三曰獸室韋其地多銅鐵金銀其人工巧銅鐵諸器皆精好善織毛錦地尤寒馬溺至地成冰堆冊府元龜曰南室韋在契丹北三千里分為二十五部毎部有餘莫弗瞞咄猶酋長也北室韋在南室韋北行十一日其國分為九部落繞吐紇山而居其部落渠帥號乞引莫賀咄每部有莫何弗三人以貳之鉢室韋在北室韋北千里依胡布山而住人衆多於北室韋不知為幾部落大室韋在北室韋西北數千里契丹國志曰室韋國室或為失契丹之類其在南者為契丹在北者號為室韋路出和龍北千餘里入契丹國與契丹同夏則城居冬逐水草有南室韋北室韋其俗丈夫皆披髮婦人皆盤髮衣服與契丹同乗牛車以籧篨為屋如氊車狀度水則束薪為筏或有以皮為舟者馬則織草為韉結繩為轡氣候多寒田牧甚薄惟射獵麞鹿為務食肉衣皮鑿冰没水中而網取魚鼈地多積雪惧䧟坑穿騎木而行太祖併諸蕃三十六國室韋在其中聖宗統和十五年罷奚五部嵗貢麕鹿通典曰庫莫奚者其先東部鮮卑宇文之别種也初為慕容皝所破遺落者竄匿松漠之間其俗甚不潔而好為㓂抄後魏之初頻為㓂盜及突厥興而臣屬之後稍漸強盛分為五部一曰蘇克二曰美佛赫三曰楚庫勒四曰穆昆五曰實徳哩饒樂水北即鮮卑故地毎部置森濟一人為帥隨逐水草頗同突厥有阿爾威氏五部中為盛諸部皆歸之其俗死者以葦箔褁屍懸之樹上其後款附至隋代號曰奚部落五代㑹要曰奚本匃奴别種即東胡之地人物風俗與突厥同有五部一曰阿爾威部管縣六二曰綽班部管縣四三曰安扎部管縣六四曰尼勒堅部管縣四五曰哈齊濟部管縣三每部有刺史每縣有令酋長號奚王唐制兼饒樂府都督居隂凉州東去營州五百里南去幽州九百里幽州置饒樂府長史一人監之後徙居琵琶川在幽州東北數百里出古北口地宜羊馬羊則純黒馬則前蹄堅善走以馳獵為務逐獸髙山自下而上其勢若飛語與契丹小異㸑以平底瓦鼎煮穄為粥既餁以寒水解之而食每春借民之荒田種穄秋熟來穫畢則窖于山下人莫知其處自天祐初契丹兵力漸盛室韋奚霫皆受制焉故奚之部族為契丹代守境上暨後酷虐其首領庫春怨之以别部内附徙于媯州依北山而居漸有數千帳故有東西奚之號庫春卒其子薩喇代立後唐莊宗破幽州賜薩喇姓李名紹威至晉天福元年髙祖以契丹有助立之功割雁門以北及幽州之地賂之繇是奚之部族復𨽻于契丹開運三年十二月契丹犯闕其王伊喇以所部兵屯于洛陽及徳光死隨衆北遁文獻通考曰紹威卒子伊喇立初紹威娶契丹女錫里哲伯埒之姨為妻後哲伯埒叛亡入西奚紹威納之晉髙祖入立割幽州燕門以入于契丹是時紹威與哲伯埒皆已死徳光已立晉北歸伊喇迎謁馬前徳光曰非爾罪也負我者伊喇與哲伯埒爾乃發其墓粉其骨而颺之自去諸徙媯州自别為西奚而東奚在琵琶川者亦為契丹所并不復能自見云開泰元年哈斯罕大王和勒希來朝松漠紀聞曰黄頭女真者皆山居號哈斯罕女真哈斯罕河西亦有之有八館在黄河東今皆屬金人與金粟城五花城隔河相近三城八館舊屬契丹今屬夏人金人約以兵取闗中以三城八館報之後背約再取八館而三城在河西屢爭不得其一城忘其名其人戇朴勇騺不能别死生金人毎出戰皆被以重札令前驅謂之硬軍疑即黄頭室韋也金國謂之黄頭生女真髭髮皆黄目睛多緑亦黄而白多因避契丹諱遂稱黄頭女直遼史拾遺卷十七
