body:
  text: 遼史拾遺卷十三錢塘厲鶚撰志第二營衛志中四時各有行在之所謂之巴納王易燕北録曰春巴納多於長春州東北三十里就濼甸住坐夏巴納多於永安山住坐秋巴納無定止冬巴納多在邊甸住坐所謂巴納者國主所至游幸處張舜民使遼録曰北人打圍一嵗各有處所正月釣魚海上於冰底釣大魚二月三月放鶻號海東青打雁四月五月打麋鹿六月七月於凉淀坐夏八月九月打虎豹之類自此直至嵗終如南人趂時畊種也程大昌演繁露曰契丹主逹魯河釣牛魚以其得否占嵗好惡王易燕北録云牛魚觜長鱗硬頭有脆骨重百斤即南方鱏魚也鱏鱘本同本草既有鱘魚又别有牛魚云生東海頭如牛則牛魚别是一種非鱘魚也馮道使契丹詩云曾叨臘月牛頭賜史謂契丹真以牛頭賜之非也契丹主率以臘月打圍因敲冰釣魚則臘月牛頭者正本草所著東海之魚其頭如牛者也非真牛頭也李燾續資治通鑑長編曰大中祥符六年晁迥使還言始至長泊泊多野鵝鴨契丹主領帳下騎擊扁鼓繞泊驚鵝鴨飛起乃縱海東青擊之或親射焉北人皆佩金玉錐號殺鵝鴨錐每初獲即㧞毛挿之以鼓為坐遂縱飲最以此為樂又好以銅及石為槌以擊兎每秋則衣褐裘呼鹿射之夏月以布易帳氊藉草圍掑雙陸或深澗張焉志第四兵衛志上兵制余靖武溪集遼人之掌兵者燕中有元帥府雜掌蕃漢兵太弟總判之其外有北王府南王府分掌契丹兵在雲州歸化州之北二王皆坐在樞密下帯平章事之上舊例皆賜御服節度使参於旗鼓之南伊實王府亦掌契丹兵然稍卑矣其有居雁門之北似是契丹别族其坐在將軍之上又有奚王府掌奚兵在中京之南與㽞守相見則用客禮大抵遼人以元帥府守山前故有官府又有統軍掌契丹渤海之兵馬軍步軍司掌漢兵以乙室王府守山後又有雲應蔚朔奉聖等五節度營兵逐州又置鄉兵其西南路招討掌河西邊事西北路招討掌韃靼等邊事其東北則有逹林相公遼人呼逹字如吞字入聲林音近領掌黒水等邊事正東則有珠展相公掌女真邊事遼語珠展即女貞也皆守邊者也國中隨部族大小各有節度使不屬州縣遼人從行之兵取宗室中最親信者為行宫都部署以主之其兵皆取於南北王府十宫院人充之亦有大内㸃檢副㸃檢之官以備宿衛北王府兵刺左臂南王府兵刺右臂十宫人呼實逹爾如官奴婢之屬也巡警者呼伊喇逐部分各有首領及判官等渤海亦有宿衛者又有左右等五北室北音牌亦音節北之北契丹謂金剛為北室取其堅利之名也漢人亦有控鶴等六軍鶚案北室即皮室御帳親軍也儒林公議曰契丹毎興兵擾塞則傳一矢為信諸國皆震懼奔㑹無後期者毎戰必銜枚無諠傳指顧令統帥之下各有部隊晝則望旗幟遇夜則或鳴鉦或吹角或為禽鳥之聲各隨部隊撤巻而去至明不遺一騎軍令至峻常以什伍相分一人趨敵則什伍俱前緩急不相赴援則盡誅之故其人能死戰契丹國志曰契丹主投下兵謂之大帳有皮室兵約三萬人騎皆精甲為其𤓰牙國母舒嚕氏投下謂之舒新有屬二萬是先契丹主安巴堅牙將半已老矣毎南来時量分借得三五千騎舒嚕常㽞數百兵為部族根本其諸大首領太子偉永康南北王裕恱滿逹烏雅等大者千餘次者數百人皆私甲也别族有奚霫勝兵亦千餘人少馬多又有渤海首領大錫里高模漢兵歩騎萬餘人復有近界韃靼伊竒哩室韋女真党項亦被脇屬毎部不過千數騎其三部落吐渾沙陀洎幽州管内雁門以北千餘軍州部落漢兵合二萬餘衆此是石晋割賂契丹之地番漢諸族其數可見矣呉曾能改齋漫錄曰司馬文正公云契丹之法有簡要可尚者將戰則選兵為三等騎射最精者給十分衣甲處於陣後其次給五分衣甲處於中間其下者不給衣甲處於前行故未嘗敎閲而民皆習於騎射武珪燕北雜記曰契丹行軍不擇日用艾和馬糞於白羊琵琶骨下炙之炙破便出行炙不破便不出番兵每遇午日不逢兵亦須排陣向西大喊十聲言午是番家大王之曰蘇頌魏公集曰契丹馬羣動以千數每羣牧者才三二人而已縱其逐水草不復覊馽有役則旋驅䇿而用終日馳驟而力不困乏彼諺云一分餵十分騎番漢人户亦以牧養多少為高下視馬之形皆不中法相蹄毛俱不剪剔云馬遂性則滋生益繁此養馬法也志第七地理志一上京道上京臨潢府涞流河程大昌北邊備對曰契丹在潢水之南黄龍之北鮮卑故地或云亦鮮卑别種起南北朝至唐末國益大及安巴堅併小族稱帝援立石晋又得所割雁門以北幽州節度管内十六州盖其地東北有盧龍塞西北有居庸闗中國恃此以為界限自十六州既割之後山險皆為敵有而河北盡在平地無險可以拒守矣許亢宗奉使行程錄曰第三十六程至格根貝勒寨自北而南莫知逺近界隔甚明乃契丹昔與女真兩國交界也八十里直至涞流河行終日之内山無一寸木地不産泉人携水以行豈天以此限兩國也涞流河濶二十餘歩以船渡長㤗縣郭願誠附元好問遺山文集費縣令郭明府墓碑曰公諱嶠字子崇族郭氏世家臨潢之長㤗曾大父英潛徳勿曜大父願誠遼日進士擢第由左班殿直仕至侍御史周廣順中胡嶠記五代史曰蕭翰聞徳光死北歸有同州郃陽令胡嶠為翰掌書記隨入契丹而翰妻争妬告翰謀反見殺嶠無所依居契丹七年當周廣順二年亡歸中國清異錄曰胡嶠飛龍磵飲茶詩曰沾牙舊姓餘甘氏破睡當封不夜侯嶠宿學雄材未達為耶律徳光所虜後間道復歸冊府元龜曰周太祖廣順二年以契丹虞部員外郎胡嶠為汝州魯山縣令以其歸化故也蔣一葵堯山堂外紀曰胡嶠詩缾裏數枝婪尾春時人罔喻其意桑維翰曰唐末文人有謂芍藥為婪尾春者婪尾酒乃最後之盃芍藥殿春亦得是名宋大中祥符九年薛映記續資治通鑑長編曰大中祥符九年九月己酉命樞密直學士工部侍郎薛映為契丹國主生辰使祖州天成軍上節度西樓天皇帝廟趙志忠雜記曰太祖自號天皇王於所居大部置樓謂之西樓今謂之上京又於其南木葉山置樓謂之南樓又於其東千里置樓謂之東樓又於其北三百里置樓謂之北樓太祖四季常游獵於四樓之間金節要曰劉豫既廢逹蘭逼其北行發之上京給夫子廟以居之上京地居燕山東北一千七百里乃五代史所載契丹安巴堅西樓是也契丹國志曰西樓有蒲瀕水叢生葉如栁長不盈尋尺可以作箭不矯揉而堅左氏所謂董澤之蒲是也富鄭公行程記曰自中京正北八十里至臨都又四十里至官窑館又七十里至松山館又云祖州有祖山山中有安巴堅廟所服鞾尚在長四五尺許懷州奉陵軍上節度太宗崩塟西山曰懐陵胡嶠䧟北記曰自上京東去四十里至真珠寨始食菜明日東行地勢漸高西望平地松林鬱然數十里遂入平川多草木始食西􅆶云契丹破回紇得此種以牛糞覆棚而種大如中國冬􅆶而味甘又東行至褭潭始有栁而水草豐羙有息鷄草尤羙而本大馬食不過十本而飽自褭潭入大山行十餘日而出過一大林長二三里皆蕪荑枝葉有芒刺如箭羽其地皆無草烏雲卓帳於此㑹諸部人塟徳光自此西南行日六十里行七日至大山門兩高山相去一里而長松豐草珍禽野卉有屋宇碑石曰陵所也烏雲入祭諸部大人唯執祭噐者得入入而門闔明日開門曰抛盞禮畢問其禮祕不肯言慶州元寧軍上節度黒山夜来山補射龍廟補跳兎補張舜民使遼錄曰契丹黒山如中國之岱宗云人死魂皆歸此山每嵗五京進人馬紙各萬餘事祭山而焚之其禮甚嚴非祭不敢進山燕北雜記曰冬至日殺白羊白馬白雁出生血和酒望黒山奠神言契丹死魂為黒山神管係夢溪筆談曰昔人文章用事多言黒山黑山在大幕之北今謂之姚家族有城在其西南謂之慶州予奉使嘗帳宿其下山長數十里土石皆紫黒似今之滋石有水出其下所謂黒水也遼人言黒水原下委高水曽逆流予臨視之無此理亦常流耳山在水之東大抵北方水多黒色故有盧龍郡北人謂水為龍盧龍即黒水也黒水之西有連山謂之夜来山極高峻契丹墳墓皆在山之東南麓近西有遠祖射龍廟在山之上有龍舌蔵於廟中其形如劔山西别是一族尤為勁悍唯啖生肉血不火食遼人謂之山西族北與黒水南與達靼接境又曰契丹北境有跳兎形皆兎也但前足纔寸許後足㡬一尺行則用後足跳一躍數尺止則蹷然仆地生於契丹慶州之地大幕中予使遼日捕得數兎持歸盖爾雅所謂蹷兎也亦曰蛩蛩巨驉也永州永昌軍觀察潢河土河冬巴納木葉山契丹始祖廟宋綬上契丹書曰綬等始至木葉山山在中京東㣲北自中京過小河唱呌山道北奚王避暑莊有亭臺由古北口至中京北皆奚境本與契丹等後為契丹所併所在分奚契丹漢人渤海雜處之奚有六節度都省統領言語風俗與契丹不同善耕種歩射入山采獵其行如飛凡六十里至羖䍽河館過惠州城二重至低小外城無人居内城有瓦屋倉廪人多漢服七十里至榆林館館前有小河屈曲北流自此入山少人居七十里至敖拉烏蘇蕃語謂山為敖拉水為烏蘇七十里至香子山館前倚土山臨小河其東北三十里即長泊也涉沙磧過白馬淀九十里至水泊館渡土河亦云撞撞水聚沙成墩少人煙多林木其河邊平處國主曽於此過冬凡八十里至張司空館七十里至木葉館離中京皆無館舎但宿穹帳至木葉山三十里許始有居人瓦屋及僧舍又厯荆榛荒草復渡土河木葉山本安巴堅塟處又云祭天之所東向設氊屋署曰省方殿廡皆以毡藉地後有二大帳次北又設氊屋署曰慶壽殿去山尚遠國主帳在氊屋西北望之不見嘗出三豹甚馴馬上附人而坐獵則以捕獸蕃俗喜罩魚設氊廬於河水之上密掩其門鑿冰為竅舉火照之魚盡来凑即垂竿罕有失者迴至張司空館聞國主在河上罩魚以魚来饋彭汝礪鄱陽集曰廣平甸為遼地險阻至此廣大而平易云初至遼主行在其門以蘆箔為藩垣上不去其花以為飾謂之羊箔門作山棚以木為牌左曰紫府洞右曰桃源緫謂之蓬萊宫殿曰省方殿其左金冠紫􅂁而立者數百人問之多逹官其右青紫而立者數十人山棚之前作花檻有桃杏楊栁之類前為丹墀自丹墀十步謂之龍墀殿皆設青花氊其階高二三尺濶三尋縱殺其半由階而登謂之御座契丹國志曰契丹之始也年代不可得而詳本其風物地有二水曰北雅里穆稜復名逹布遜穆稜者是其一也其源出自中京西馬盂山東北流華言所謂土河是也曰尼嚕古穆稜復名孟古穆稜者又其一也源出饒州西南平地松林直東流華言所謂潢河是也至木葉山合流為一古昔相傳有男子乗白馬浮土河而下復有一婦人乗小車駕灰色之牛浮潢河而下遇於木葉山顧合流之水與為夫婦此其始祖也是生八子各居分地號八部一日逹爾扎部二曰伊斯琿部三曰舎琿部四曰諾爾威部五曰頗摩部六曰訥古濟部七曰濟勒勤部八曰實衮部立位像於木葉山後人祭之必刑白馬殺灰牛用其始来之物也又曰上京臨潢府乃大部落之地離永州數十里即行海岸府挹滄溟與天同碧窮極目力不知所際鶚案營衛志云冬巴納曰廣平淀在永州東南三十里亦名白馬淀即潢河土河二水合流處也明一統志曰木葉山在遼東廣寧中屯衛東三十里儀坤州啟聖軍節度麝香河補胡嶠䧟北記曰至儀坤州渡麝香河自幽州至此無里􅇋其所向不知為南北福州胡嶠䧟北記曰蕭翰得罪被鎻嶠與部曲東之福州翰所治也契丹多憐嶠教其逃歸志第八地理志二東京道東京遼陽府鐡鳯城補遼河渾河沙河蒲河清河浿水手山明王山横河契丹國志曰東京本渤海王所都之地在唐時為黒水靺鞨二種依附高麗者黒水部與高麗接勝兵數千多驍武古肅慎氏地也與靺鞨相鄰最為强國所居多依山水地卑涇築土如堤鑿穴以居其國西北與契丹接太祖興始擊之立其子東丹王鎮其地後曰東京劉效祖四鎮三關志曰神冊四年契丹主安巴堅併渤海盡有遼東置東平郡修復故城鑄鐡鳯鎮之因號鳯城天顯三年陞為南京復立中書省號大遼又改為東京遼陽府許亢宗奉使行程錄曰第二十四程至梁魚務有河名曰遼河南北千餘里東西二百里遼河居其中隋唐征高麗路經由此明一統志曰遼河源出塞外自三萬衛西北入境南流經鐡嶺瀋陽都司之西境又南至海州衛西南入海行一千三百五十里按唐書太宗征高麗至遼澤泥淖二百餘里人馬不可度布土作橋既濟撤之以堅士卒之心即此薛廷寵全遼志曰遼河城西北一百里源出靺鞨北建州城東諸山經塗山至洪州傍崖頭牛家莊出梁房口入於海又曰太子河一名東梁河又名大梁水源出幹羅山西流五百里至遼陽城東北五里許折而西南流入渾河合為小口㑹遼河入於海顧祖禹方輿記要曰司馬懿斬公孫淵父子於梁水之上即此或曰太子河即衍水燕太子丹匿於衍水中後人因以名河林本裕遼載曰渾河在遼陽城南十里明志云一名小遼水按漢書及水經注俱云高句驪縣有遼山小遼水所出明一統志曰沙河源出復州衛東得利嬴城山經流本衛城南合麻河西流入海又曰蒲河源出輝山西流經瀋陽衛界入於渾河又曰清河源出盖州衛分水嶺西南流經城南名州南河又西流合泥河入於海文獻通考曰漢以盧館為燕王朝鮮與燕界於浿水浿旁拜反全遼志曰首山在遼陽城西南十五里晋司馬懿圍公孫淵於襄平有星從首山墜城東南即此一作手山方輿紀要曰山連海州衛界頂有平石泉出其中挹之不竭唐貞觀十八年征高麗度遼水軍於馬首山即此山矣或謂之駐蹕山全遼志曰華表山在城東六十里因丁令威化鶴得名俗呼為横山明一統志曰明山在復州衛東一十里元志有明王山在遼東三十里謂高句驪王之子曰東明塟其上以地考之疑即此山也紫䝉縣韓𤦺安陽集紫蒙遇風詩曰草白岡長暮驛賖朔風終日起平沙寒鞭易促鄣泥躍冷䄂難勝便靣遮迴嶺巻回雲族破遠天吹入雁行斜土囊㣲乞緘餘怒㽞送歸程任擺花辰州奉國軍節度本高麗盖牟城渤海改為葢州又改辰州東山白狠山補全遼志曰盖州衛在遼陽城南二百四十里元混一輿地要覧曰盖州本唐地後屬契丹有東山白狼山興州中興軍節度挹婁城補方輿記要曰挹婁城鐡嶺衛南六十五里本挹婁地渤海置興州遼廢尋復置興州中興軍鐡州建武軍刺史安市城方輿紀要曰在盖州衛東北七十里漢安市縣屬遼東郡後漢及晋因之高麗亦曰安市城唐貞觀十九年征高麗攻安市城不克引還咸亨三年高麗餘衆復叛遣將高侃擊之敗之於安市城渤海改置鐡州領四縣遼仍為鐡州海州南海軍節度卑沙城全遼志曰海州衛在遼陽城南一百二十里唐置澄州遼為海州南海軍方輿紀要曰今海州衛城高麗所築亦曰卑沙城叠石為城幅員九里或譌為卑奢城自登莱海道趨高麗之平壤必先出此隋大業十年来䕶兒出海道至卑奢城敗高麗兵將趨平壤高麗懼而請降唐貞觀十八年伐高麗張亮帥舟師自東莱渡海襲卑沙城其城四靣懸絶唯西門可上唐兵攻㧞之揔章初李世勣復得其地後没於渤海置南京南海府兼置沃州領沃沮鷲巖龍山濵海昇平靈泉六縣遼改置臨溟縣為海州治淥州鴨淥軍節度本高麗故國唐書高麗傳曰有馬訾水出靺鞨之白山色若鴨頭號鴨淥水厯國内城西與鹽難水合又西南至安市入於海顯州奉先軍上節度毉巫閭山十三山許亢宗奉使行程錄曰第二十二程至顯州出榆關已東行南瀕海而北限大山盡皆粗惡不毛至此山忽峭㧞摩空蒼翠萬仭全類江左乃毉巫閭山也成周之時幽州以毉巫閭山作鎮其遠如此契丹托雲塟於此山離州七里别建乾州以奉陵寢明一統志曰毉巫閭山在廣寧衛西五里舜封十有二山以此山為幽州之鎮其山掩抱六重故又名六山山上有桃花洞其中可容五六人又有聖水盆三其水自懸崖下瀉雖冬不冰又有仙人巖飛瀑巖山下有北鎮廟廟内有吕公巖方輿紀要曰周禮職方幽州山曰醫無閭即此亦謂之北鎮隋開皇十四年詔以醫無閭為北鎮是也高士竒扈從東巡日錄曰四月壬寅路出十三山下五代史胡嶠北行記曰東行過一山名十三山云去幽燕西南二千里遼史燕王淳討武朝彦至乾州十三山皆此地也䇿騎山嶺見十三峰互相起伏峯勢巉巖中無尺樹絶類研山山頂有池池下有洞居人往往避兵於此乾州廣徳軍上節度巫閭守捉城補全遼志曰廣寧衛在遼陽城西二百三十里本漢遼東之無慮縣西部都尉治所晋屬平州唐置巫閭守捉城渤海為顯徳府地遼置乾州廣徳軍開義縣遼東志曰開義廢縣在義州城南四十里遼置瀋州昭徳軍中節度東牟山補全遼志曰瀋陽中衛在遼陽城北一百二十里遼為瀋州昭徳軍方輿紀要曰東牟山在衛西二十里唐高宗平高麗渤海大氏以衆保挹婁之東牟山唐史山東直營州二千里武后時大祚榮築城於此居之其國南至新羅以泥河為界東窮海西契丹盖即此山矣遼州始平軍下節度白雲山補遼載曰蛇山狼山黒山巾子山按遼史在遼州始平軍即今廣寧縣地今考在界内扈從東巡日錄曰廣寧縣羊腸河遼史𨽻始平軍源出白雲山遼濵縣方輿紀要曰遼濵城在瀋陽中衛西北百八十里高麗之遼東城也唐太宗克之改曰遼州時亦謂之新城以别於遼東故城也唐史貞觀十八年伐高麗江夏王道宗將兵數千至新城二十年復伐高麗命李世勣將青州兵自新城道入永徽三年高麗侵契丹松漠都督李庫克將兵禦之大敗高麗於新城儀鳯二年徒安東都䕶於新城以統高麗百濟之地此唐所名之新城也後為拂湼國城渤海置東平府督伊蒙陀黒北五州契丹安巴堅攻渤海先克東平五州皆下復置遼州於此并置遼濵縣為州治銀州富國軍下刺史方輿紀要曰鐡嶺衛秦漢時遼東地渤海置富州契丹更名銀州同州鎮安軍下節度新羅山補許亢宗奉使行程錄曰第二十九程至同州州地平壤東望大山遼人云此新羅山内深遠無路可行其間出人參白附深處與高麗接界賔州懷化軍節度置刺史於鴨子混同二水之間長白山補許亢宗奉使行程錄曰第三十五程至呼勒希巴勒寨寨枕混同江濵其源来自廣漠之北遠不可究自此南流五百里接高麗鴨渌江入海江靣濶可半里許契丹國志曰長白山在冷山東南千餘里盖白衣觀音所居其山禽獸皆白人不敢入恐穢其色以致蛇虺之害黒水發源於此舊云粟末河太宗破晋改為混同江其俗刳大木為舟長可八尺形如梭曰梭船上施一槳止以捕魚至渡車則方舟或三舟遼載曰混同江一名鴨子河一名粟末江一名宋瓦江一名松花江在開原北一千五百里源出長白山按遼史聖宗太平四年改鴨子河為混同江其名始於此方輿紀要曰長白山在㑹寧南六十里其山横亘千里高二百里巔有潭周八十里淵深莫測南流為鴨淥江北流為混同江東流為阿雅勒古河楊賔栁邊紀畧曰混同江發源長白山北流而東黒龍江元史作石藺河發源塞北南流而東雖入海處合而為一而其源則截然兩處且兩江之水以手掬之皆白色惟遠望則如栁汁耳金志松漠紀聞稱掬之則色㣲黒金史世紀稱混同江亦號黒龍江皆誤龍州黄龍府烏爾古城補許亢宗奉使行程錄曰第三十三程自黄龍府六千里至托色貝勒寨府為契丹東寨當契丹强盛時擒獲異國人則遷徙㪚處於此南有渤海北有鐡離吐渾東南有高麗靺鞨東有女真室韋北有烏舍西北有契丹回紇党項西南有奚故此地雜諸國俗凡聚㑹處諸國人語言不通則各為漢語令通事者然後能辨之方輿紀要曰烏爾古城在黄龍府境女真叛遼侵黄龍府趣烏爾古城敗遼兵或云達嚕噶城也懿州寧昌軍節度羊腸河大斧山俱補元混一輿地要覧曰懿州有羊腸河大斧山遼東志曰廢懿州在廣寧城北二百二十里遼置蘓州安復軍節度本高麗南蘓興宗置州方輿紀要曰南蘇城今金州衛治晋永和初燕王皝遣慕容恪攻高句驪㧞南蘓隆安二年燕慕容盛以髙句驪王安事燕禮慢自將兵襲之㧞新城南蘇二城開境七百餘里隋大業七年伐髙麗分遣叚文振出南蘇道唐貞觀二十一年李世勣伐髙麗渡遼水厯南蘇等城敗其兵而還又乾封二年薛仁貴破髙麗兵㧞其南蘇等城顯慶中置南蘇州於此尋没於渤海遼置蘇州兼置来蘓縣為州治宋建隆初女真自其國之蘇州汎海至登州賣馬故道猶存宣和初復由此道遣馬政等通金謀攻遼復州懷徳軍節度駱駝山補屏風山補全遼志曰復州在遼陽城南四百二十里晋隋以前同海州唐置州五代歸契丹為遷民縣屬黄龍府後又置復州懷徳軍方輿紀要曰駱駝山在復州衛西三十里又西二十里海中有屏風山寧江州混同軍觀察冷山補羅和城補松漠紀間曰寧江州去冷山百七十里地苦寒多草木如桃李之類皆成園至八月則倒置地中封土數尺覆其枝幹季春出之厚培其根否則凍死每春冰始泮遼主必至其地鑿冰釣魚放弋為樂女真率来獻方物若鼦䑕之屬各以所産量輕重而打愽後多强取女真始怨暨阿古逹起兵首破此州馴致亡國栁邊紀略曰冷山余於必勒哈必喇北望相去約數十里見其積素凝寒髙出衆山之山土人呼為白山以其無冬夏雪白也松漠紀聞冷山去燕山三千里去金所都二百餘里去寧江州百七十里方輿紀要曰寧江城東北有羅和城宋政和四年女真初取羅和城㑹諸部兵於来流水乃䧟寧江州進敗遼兵於混同江即此志第九地理志三中京道中京大定府軒車泊補瑇瑁山補熊山補奚君宅補北蕃地理志曰中京大定府東為營州界青山嶺百七十里西山後儒州界東南至建州三百三十里西南至幽州九百里其泊曰軒車南為中京北為上京契丹國志曰中京之地奚國王牙帳所居奚本曰庫莫奚其先東部人宇文之别種也竄居松漠之閒俗甚不潔而善射獵好為㓂抄其後種類漸多分為五部毎部一千人為其帥隨逐水草中京東過小河唱呌山道北有奚王避暑莊有亭臺由古北口至中京北皆奚境奚本與契丹等後為契丹所併所在分奚契丹漢人渤海雜處之奚有六節度都省統領言語風俗與契丹不同善耕種歩射入山採獵其行如飛又曰奚地居上東燕三京之中土肥人曠西臨馬盂山六十里其山南北一千里東西八千里連亘燕京西北遂以其地建京號曰中京續資治通鑑長編曰大中祥符元年李摶等使契丹所居曰中京在幽州東北城壘卑小鮮居人夾道多蔽以壖垣宫中有武功殿國主居之文化殿國母居之又有東掖西掖門元混一輿地要覧曰大寧路遼為中京有瑇瑁山熊山蘇轍欒城集奚君宅在中京南詩曰奚君五畆宅封户一成田故壘開都邑遺民雜漢佃不知臣僕賤漫喜殺生權燕俗嗟猶在婚姻未許連長安縣本漢賔縣顧炎武京東考古錄曰漢書遼西郡賔從縣莽曰勉武今本亦有作賔徒者後漢書遼東屬國賔徒故屬遼西通鑑晋趙王倫貶呉王晏為賔徒縣王秦苻堅封慕容垂為賔徒侯並取此為名晋書載記作賔都侯都之與徒以音相近而轉尤為明證而遼史則云中京大定府長安縣本漢賔從縣地勸農縣本漢賔從縣地此承漢志傳冩之訛而未考後漢晋二書也恩州懷徳軍下刺史饅頭山補北蕃地理志曰恩州在中京北六十里馬盂山在西六十里西北饅頭山三十里山北至儀坤州八十里東北至髙州百二十里西南至上京二百二十五里惠州惠和軍中刺史彭汝礪鄱陽集惠州詩曰城壘四五尺閭閻千百家朝塵疑作雨暮雪欲飛花舊寺僧何在空堂鬼自邪三更愁不寐相笑是皇華蘇轍欒城集惠州詩曰孤城千室閉重闉蒼莽平川絶四鄰漢使塵来空極目沙塲雪重欲無春羞歸應有李都尉念舊可憐徐舎人㑹逐單于渭橋下歡呼齊拜屬車塵自注云傳聞南朝逃叛多在其間髙州觀察松漠府故壘補北蕃地理志曰髙州在中京北百四十里東至新州百三十里南至建州二百三十里北自潢水石橋至州百五十里西北至饒州六十里乃唐松漠府故壘新州武安故州也利州中觀察琵琶川補北蕃地理志曰利州在中京東南百五十里東北至建州百有十里西至潤州六十里南自小凌河路至平州五十里琵琶川奚所徙居在州東北數十里古北口北也北安州興化軍上刺史墨㪷軍補㑹仙石補北蕃地理志曰北安州在中京西南二百五十里其墨㪷嶺亦名度雲嶺在徳勝嶺北百二十里唐置墨㪷軍使禦扞奚界有牛山有㑹仙石河曰灤城曰栁在州西北五十里西南至古北口二百八十里南至幽州二百五十里宋王曽上契丹事王沂公上契丹事曰出燕京北門遇古長城延芳淀四十里至孫侯館改為望京館稍移故處望黍谷山五龍池過温餘河大夏城坡坡西北即凉淀避暑之地五十里至順州東北遇白嶼河北望銀冶山又有黄螺盤牛闌山七十里至檀州自此漸入山五十里至金溝館將至館川原平曠謂之金溝淀國主嘗於此過冬自此入山詰曲登渉無復里堠但以馬行記日景而約其里數過朝鯉河亦名七渡河九十里至古北口兩旁峻崖中有路僅容車􅁤口北有舖彀弓連繩本范陽防捍奚契丹之所最為隘束然幽州東趨營平州路甚平坦自頃犯邊多自斯出又度徳勝嶺盤道數層俗名思鄉嶺八十里至新館過鵰窠嶺徧搶嶺四十里至卧如来館葢山中有卧佛像故也過烏灤河東有灤州因河為名又過墨斗嶺亦名度雲嶺長二十里許又過芹菜嶺七十里至栁河館河在館傍西北有鐡冶多渤海人所居就河漉沙石鍊得成鐡渤海俗每嵗時聚㑹作樂先命善歌舞者數輩前行士女相隨更相唱和回旋宛轉號曰踏鎚所居屋皆就山墻開門過松髙嶺甚峻險七十里至打造部落館雖有畨户百餘編荆為籬鍜鐡為軍噐東南五十里至牛山館八十里至鹿兒峽館過蝦蟆嶺九十里至鐡漿館過石子嶺自此漸出山七十里至富谷館居民多造車者云渤海人正東望馬雲山山多禽獸林木國主多於此打圍八十里至通天館二十里至中京大定府城垣卑小方圓纔四里許門但重屋無築闍之制南門曰朱夏門内通歩廊多坊門又有市樓四曰天方大衢通闤望闕次至大同館其門正北曰陽徳閶闔城西内西南隅岡上有寺城南有園圃宴射之所自過古北口居人草庵板屋耕種但無桑柘所種皆從壠上盖虞吹沙所壅山中長松欝然深谷中多燒炭為業時見畜牧牛馬橐駝尤多青羊黄豕亦有挈車帳逐水草射獵食止麋粥麨糒鶚案遼史載沂公此文不全故補之彭汝礪鄱陽集宿金駒館詩曰絶域三千里窮村四五家寒深無去雁日暮有棲鴉霧擁雲垂野霜連月在沙夜長無復寐寂寞聴悲笳又古北口五十里至望雲嶺南北使者各置酒三盞乃行有詩曰人臣思國似思親忠孝從来不可分更與諸君聊秣馬請登髙處望堯雲蘇頌魏公集過新館詩曰引弓風俗可傷嗟滿目清溪與白沙封域雖長編户少隔山才見兩三家彭汝礪過墨斗嶺聞鳥聲似子規而其形非是有詩曰有鳥羽毛非子規向人如道不如歸使軺不用君多勸未到歸心已似飛蘇頌摘星嶺詩曰昨日􅂊離摸斗東今朝又過摘星峰自注摸斗摘星二嶺名瘦軀坐困千騎馬自注一行二百餘里遠目平㸔萬嶺松絶塞阻長踰百舍畏途經厯盡三冬出山漸識還家路騶御人人喜動容過度雲嶺詩曰磴道青㝠外攀躋劇箭飛朔風増凛洌寒日減清暉使者手持節征人淚濕衣此時仁傑意心向白雲歸王稱東都事畧曰劉敞奉使契丹博聞强記素知山川道路契丹自古北口至栁河迴曲千餘里敞問曰自松亭至栁河其徑不數日可至中京何不道彼而道此契丹不虞敞知相顧驚媿曰誠如公言自通好以来置驛如此不敢易也王洙宋元史質曰閻詢字議道鳯翔天興人嘗使契丹頗知北方疆理時契丹在鞾淀迓者王惠𨗳詢由松亭往詢曰此松亭路也胡不徑蔥嶺而迂枉若是豈非夸大國地廣以相欺也惠不能對髙士竒松亭行記曰喜峯口古松亭山也竒峯削下腰有洞髙二丈餘深倍之遼史為松亭關𨽻中京㽞守司開㤗中置澤州俘蔚州民立寨居之鶚案葱嶺在西域與松亭在東北相去絶遠且一松亭也敞以為近詢以為迂未詳何故疑詢所言為虚蘇頌過打造部落詩曰奚人居落噉重林背倚蒼崖靣曲潯澗水逢春猶積凍山雲無雨亦常隂田塍開墾隨髙下樵路攀援極險深漢節經過人競㸔忻忻如有慕華心發牛山詩曰山坂縈紆道阻長數程行處尚相羊晨裝方指南髙卧館南一峯甚髙彼人謂之南髙山宿館還趨北斗傍既乏遠謀慙肉食空將衰髩冐寒霜郤尋十載曽行地風物依然土境荒劉敞公是先生集鐡漿館詩曰稍出盧龍塞回㸔萬壑青曠原開谷口别道入松亭此館以南屬奚山深溪險以北屬契丹稍平衍漸近磧矣别一道自松亭闗入幽州甚徑易遼常秘不欲漢使知野馬寒隨草奚車夕戴星忽悲田子㤗寂寞向千齡奚人以車帳為生晝夜移徙蘇頌富谷館書事詩曰迢迢歸路指榆津日日西風起塞塵沙底暗冰頻踠馬道路冰凍多在沙底彼人謂之暗氷行馬艱險百狀嶺頭危徑罕逢人客心牢落偏多感天意融怡漸發春珍重詩翁饒藻思剪裁風物見長新過土河詩曰長呌山旁一水源北流迢遞勢傾奔秋来注雨瀰郊野冬後層冰度輻轅中京北一山最髙土人謂之長呌山此河過山之東才可漸車又北流百餘里則奔注瀰漫至冬冰厚數尺可過車馬而冰底細流涓涓不絶白草悠悠千嶂路青煙裊裊數家村終朝䟦渉無休歇遥指郵亭日已昏奚山路詩曰行盡奚山路更賖路傍時見百餘家出奚山路入中京界道傍店舍頗多人物亦衆風煙不改盧龍界唐盧龍節度兼押契丹使塵土猶兼瀚海沙朱板刻旗村肆食食邸門挂木刻朱旗青氊通幰貴家車貴族之家車屋多以青氊覆之皇㤙百嵗加荒憬物俗依稀欲慕華游中京鎮國寺詩曰塔廟奚山路乗軺偶共登青松如拱揖棟宇欲騫騰俗禮多依佛居人欲貴僧縱觀無限意紀述恨無能郭造卿永平府志曰遼中京殿曰延慶曰永安興中府漠栁城縣地慕容皝以栁城之北龍山之南福徳之地乃築龍城搆宫廟改栁城為龍城縣遂遷都號曰和龍宫松陘嶺補酈道元水經注曰燕慕容皝以栁城之北龍山之南福地也使陽裕築龍城改栁城為龍城縣十二年黒龍白龍見於龍山皝親觀龍去二百歩祭以大牢二龍交首嬉翔解角而去皝悦大赦號新宫曰和龍宫立龍翔祠於山上北蕃地理志曰興中府在中京東三百里北至潢水四百里契丹界西北松陘嶺奚界西南至建州六百里東至遼河三百里東北至白川州七十里東南至安東都䕶府二百七十里興中縣本漢栁城縣地鮮卑山補歐陽忞輿地廣志曰隋開皇間改龍城縣曰龍山十八年復改曰栁城隋圖經曰鮮卑山在栁城縣東南崔鴻十六國春秋曰慕容廆先代居遼左號曰東胡其後漸昌與匈奴争盛秦漢之際為匃奴所敗分保鮮卑山因復以山為號也宜州崇義軍上節度奉國寺補通呉軍壘補全遼志曰義州衛在遼陽城西四百二十里秦并六國置遼西郡為絫縣唐始建城五代淪於契丹改宜州崇義軍遼載曰奉國寺在義州城内殿髙七尺佛像稱是一名七佛寺剏於遼開㤗中永平府志曰遼中京宜州有江南水軍號通呉軍壘錦州臨海軍中節度大廣濟寺補許亢宗奉使行程錄曰第二十程至錦州自出榆闗東行路平如掌至此㣲有登陟經由十三山下歐陽文忠叙胡嶠所説十三山即此元混一輿地要覧曰離營州東行六十里至榆闗五百八十里至錦州遼載曰大廣濟寺在錦州城内唐末建有白塔十三層髙二百五十丈造於遼道宗清寧間後降舍利蔵之金髙璉有記嚴州保肅軍下刺史興城縣遼東志曰興城廢縣在寧遠州城南四十里川州長寧軍中節度北蕃地理志曰川州在中京東四百三十里地宜桑柘民知織絍東至黔州七十里東南至宜州百里西南至霸州七十里建州保静軍上節度噐仗山補北蕃地理志曰建州東北至霸州九十里南至榆州五十里西南至小凌河十里有器仗山在東南三十里永康縣本唐昌黎縣地京東考古錄曰案昌黎有五漢書遼西郡之縣其八曰昌黎渝水首受塞外南入海東部都尉治應劭曰今昌黎通鑑注昌黎漢交黎縣屬遼西郡後漢屬遼東屬國都尉魏齊王芳正始五年鮮卑内附復置遼東屬國立昌黎縣以居之後立昌黎郡晋書武帝紀大康二年慕容廆㓂昌黎二年安北將軍嚴詢敗慕容廆於昌黎成帝咸康二年慕容皝自昌黎東踐水而進凡三百餘里至厯林口是則渝水下流而當海口此一昌黎也晋書紀載慕容皝徙昌黎郡又云破宇文歸之衆徙其部人五萬餘落於昌黎又慕容盛之世有昌黎尹張順劉忠高雲以馮素弗為昌黎尹馮䟦之世有昌黎尹孫伯仁以史考之當去龍城不遠此又一昌黎也魏併栁城昌黎棘城於龍城而立昌黎為郡志云有堯祠榆頓城狼水而列傳如韓麒麟韓秀谷渾孫紹之倫皆昌黎人即燕之舊都龍城此又一昌黎也齊以後昌黎之名廢至唐太宗貞觀二年更崇州為北黎州治營州之東北廢陽師鎮八年復為崇州置昌黎縣後淪於奚遼史建州永康縣本唐昌黎縣地此又一昌黎也遼太祖以定州俘户置營州鄰海軍其縣一曰廣寧縣金世宗大定二十九年改為昌黎相沿以至於今在永平府城東南七十里此又一昌黎也郭造卿永平志辨昌黎有二而不知其有五今序而列之論古者可以無惑焉来州歸徳軍下節度三州山五脂山覺華島補海雲龍宫二寺補全遼志曰廣寧前屯衛在遼陽城西九百六十里唐置瑞州遼改来州置来賔縣𨽻中京大定府方輿紀要曰萬松山在衛西北十五里山多松因名山北相接曰五指山五峯秀㧞若五指然三山在衛西北三十里髙數千仭三峯竝秀遼志謂之三州山鶚案五指山史作五脂誤許亢宗奉使行程錄曰第十八程自来州八十里至海雲寺離来州三十里即行海東岸俯挹滄溟與天同碧窮極目力不知所際是寺去海半里許寺後有温泉池望海中有一大島樓殿窣堵波在上有龍宫寺方輿紀要曰覺華島在寧遠衛東南二十里上有海雲龍宫二寺遷州興善軍下刺史古長城補許亢宗奉使行程錄曰第十六程自遷州九十里至習州遷州東門外十數步即古長城所築遺址宛然北邊備對曰古来築長城以扞北邊者四世燕趙秦隋也秦制多承燕趙而隨氏不書因秦也史記燕城起於造陽而至襄平遼陽造陽者上谷地也襄平者遼東縣也遼陽者遼水之北也皆燕國邊鄙之地故其建築亦在此地也趙之城則自代地而西屬於髙闕代者雁門郡也髙闕者靈州北流河之西隂山之上游也趙武靈王國於雲代故其備邉之城但能並河而西以極乎趙境耳至秦已并六國天下為一西自上郡北地而東至遼東西悉為秦有故蒙恬之致役也西起臨洮則中國極西之地也北屬遼東則中國極東之地也自東迄西殆萬餘里無論燕趙之與岷蘭其在當時盖無一地而無長城也於是㑹合三制而要其所宿則秦城之長固周乎中國之北矣然審而求之則其城不皆秦築也秦但補築使足耳鶚案遷州之古長城以程氏㤗之之言考之殆燕築耳潤州海陽軍下刺史潤州補北蕃地理志曰潤州在盧龍塞東北接遼東驛取潤水為名在中京南五百五十里東至遼州四十里西至渝關四十里南至海三十里遼史拾遺巻十三
