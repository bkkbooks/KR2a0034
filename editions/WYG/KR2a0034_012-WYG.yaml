body:
  text: 遼史拾遺巻十二錢塘厲鶚撰本紀第二十九天祚皇帝三保大元年契丹國志曰春日有𤯝忽青黑無光其中洶洶而動若鎔金而湧日旁有青黑色正如水波周回而旋轉将暮而止金人自破上京終歳不出師然遼國防屯如故有東南路淵軍董小醜坐討平州賊逗留不進被誅本部隊長羅青漢董重孫等倡率淵軍作亂攻錦州月餘不能下賴都統耶律伊都援兵至淵軍始懼郭藥師等内變自殺賊魁羅青漢等數人就招安都統蕭幹奏選留二千人為四營擢郭藥師張令徽劉愛臣甄五臣各統将領餘六千人悉選燕雲平三路充禁軍或養濟實欲分其勢也伊都謂蕭幹曰前平兩營叛刼掠乾州已從招安今歳全軍復叛而攻錦州苟我軍不來城破則數萬居民被害所謂淵軍未能報怨於金人而屢怨叛於我家今若乗其解甲遣兵掩殺淨盡則永絶後患幹曰亦有忠義為一時脅從者豈可盡誅之二人議論不合交章並奏卒從蕭幹之議二年春正月乙亥金克中京進下澤州松漠紀聞曰大將伊都舊訛余覩姑以前軍十萬降遼天祚怒國人叛已命漢兒遇契丹則殺之初遼制契丹人殺漢兒人不加刑至是攄其宿憤見者必死國中駭亂皆莫為用女真乗勝入黄龍府五十餘州寖逼中京上出居庸關至鴛鴦濼聞伊都引金人羅索貝勒奄至蕭奉先曰伊都乃王子班之苖裔此來欲立甥晉王耳若為社稷計不惜一子明其罪誅之可不戰而伊都自廻矣上遂賜晉王死素服三日耶律薩巴等皆伏誅王素有人望諸軍聞其死無不流涕由是人心解體伊都引金人逼行宫上率衛兵五千餘騎幸雲中遺傳國璽於桑乾河二月庚寅朔日有食之既甲午知北院大王事耶律瑪格漢人行宫都部署蕭特黙並為都統太和宫使耶律布達副之将兵屯鴛鴦濼己亥金師敗奚王哈瑪爾於北安州遂降其城三月辛酉上聞金師将出嶺西遂趨白水濼乙丑羣牧使穆喇斡降金丙寅上至努克特倉聞金兵将至計不知所出乗輕騎入夾山汪藻録曰赫嚕自海上歸阿固逹得書意朝廷絶之乃命其弟固倫國相赫舍哩并尼瑪哈烏舎等悉度遼而西用降将伊都為前鋒宣和四年正月十四日䧟中京中京奚國也遂引兵至松亭關古北口屢敗契丹降奚部以有各不過闗之約止引兵由奚西過平地松林太子墳經白水州别遣精騎五百留松亭闗遮中京奔逸車來是歳天祚在燕聞報懼及即日出居庸闗就鴛鴦濼飛放實引避也尋聞伊都為前鋒蕭奉先謂天祚曰伊都宗支也豈欲遼亡哉不過欲立其甥晉王耳何惜一子伐其姦謀天祚惑之賜死晉王賢死非其罪聞者無不揮涕自此人心益擕三月十一日報伊都兵至天祚震驚人莫為用率衛士五千奔雲中應三局珍寶祖宗二百餘年所積及其㓜女悉為金人所掠道中衛兵稍引去能從者獨趙王梁王與三百餘騎為金追及由石窟寺遁去過雲中見留守蕭扎拉撫之曰敵至矣善守城取馬二千匹入天徳軍趨漁陽嶺入夾山金人至雲中蕭扎拉與都轉運使劉企常開門降金人留精騎二百為衛而急追天祚旬日不回城中推卒長韓執謙為都統遂出扎拉及衛兵閉門守遣人向燕王求救時燕王新立無兵第檄奉蔚二州應援而已金人回破城執執謙等殺之其餘不問於是雲中朔應等州皆沒三朝北盟㑹編曰赫嚕自海上歸阿固逹意朝廷絶之乃命其弟固倫國相赫舍哩并尼瑪哈烏舎悉師度遼而用降將伊都為前鋒正月十四日以勁騎一日一夜行三百里至其中都攻之自旦至日中遂陷焉始謂天祚在城中及破乃知天祚聞其來中夜已􅇡莫知所在而天祚遽至燕山矣又懼追襲與其子趙王梁王數百騎復從西北走鴛鴦泊女真既失天祚因遣追兵出平地松林而西將至鴛鴦泊適與天祚遇天祚大窘因倉皇從雲中府由石窟寺入天徳軍趨漁陽嶺又竄入夾山夾山者沙漠之北傳謂有泥淖六十里獨􅆻丹能逹他兵不能至也女真之君臣因駐兵鴛鴦泊欲經營之攻擊雲中府暨諸州以延時日也續夷堅志曰國兵初西來雲中先下後復納遼天祚國相怒其反復破城後被驅壮士至榆坡盡殺之中有氣絲不斷者亦枕藉積尸中得雨復甦候暮夜欲逃人定後忽見吏卒羣至呼死者姓名隨呼皆應獨不呼此人吏卒去此人匍匐起僅能至家求醫封藥瘡口漸合又數月平復年七十餘病終同時曹氏小童為軍士驅逐與羣兒亂走追及者皆以大棓擊殺之次第及曹忽二犬突出觸軍士仆地軍士怒逐犬入人家比出兒輩得散走逃空室中俄有執黄旗過者大呼曰國相軍令殺人者斬殘民皆得活曹氏兒後至節度張欽大同志曰夾山在朔州城北三百四十里遼主天祚避女真奔夾山即此初詔留宰相張琳李處温與秦晉國王淳守燕處温聞上入夾山數日命令不通即與弟處能子奭外假怨軍内結都統蕭幹謀立淳遂與諸大臣耶律逹實左企弓虞仲文曹勇義康公弼集蕃漢百官諸軍及父老數萬人詣淳府處温邀張琳至白其事琳曰攝政則可處温曰天意人心已定請立班耳處温等請淳受禮淳方出李奭持赭袍被之令百官拜舞山呼淳驚駭再三辭不獲已而從之以處温守太尉左企弓守司徒曹義勇知樞密院事虞仲文參知政事張琳守太師李處能直樞密院李奭為少府少監提舉翰林醫官李爽陳袐十餘人曾與大計並賜進士及第授官有差蕭幹為北樞密使駙馬都尉蕭幹知樞密事改淵軍為常勝軍於是大赦自稱天鍚皇帝改元建福降封天祚為湘隂王遂據有燕雲平及上京遼西六路天祚所有沙漠已北西南西北兩都招討府諸蕃部族而已汪藻録曰蕭幹者本奚人番名和哩布常統契丹渤海奚漢兒四色軍馬故號四軍大王三朝北盟㑹編曰秦晉國王淳號天鍚皇帝肆赦下詔諭國中曰自我烈祖肇創造之功至於太宗恢廓清之業故得奄有區夏全付子孫邇後纂承罔不祗肅傳二百祀之逾逺得億兆人之底寜蓋太平或弛於細防而内治多遺於外患以是邊鄙生兹冦仇漸為蔓草之難圖公肆長蛇之薦食敢來問鼎直欲爭衡敵壘尚遥王師自潰兵非不鋭事止失和故使乗輿越在草莽地隔不果相赴旬餘莫知所歸三邊蕩揺百姓震懾懼不相保謂将疇依咸云六合為家不可一日無主共戴眇質用登至尊皆出素衷尚慙否徳又念與其長天下之亂曷若復我家之功苟其宗社不移亦曰神靈所望勢不克避理當共知嗚呼朕以久處王藩厯更政教凡民疾苦與事便宜靡所不知亦曾熟慮自今以後革弊為先所期俾四海用寜不敢以萬乗為樂敢告逺邇余不食言契丹國志曰淳既即位僣號天鍚皇帝方議降赦燕中父老再告隨駕内庫都㸃檢劉彦良姦佞之人𨗳引天祚為一切失徳之國人呼為肉拄杖言其倚附而行也妻雲哥者本倡也日夕出入禁中以為諧謔夫婦共為國害請先誅而後降赦是日梟彦良夫婦之首於市人爭臠食之然後肆赦燕王廢天祚為湘隂王詔曰大道既隠不行揖遜之風皇天無私自有興廢之數事貴得效人難以為朕㓜保青宫長歸朱邸雖曰人情之久繫誰云神器之可求欲避周公之嫌未忘季札之節奈何一旦之無主致使四海之求君推戴四從謳歌百和不敢墮祖宗之業勉與攬帝王之權實懼纂圖之為難尚思復辟之可待近得羣臣之奏概陳前主之非所謂愎諫矜能比頑敗徳躁動靡常節平居無話言室家之杼軸盡空更恣淫費宗廟之衣冠見毁不輟常畋漢子之戮實無名伋妻之亂孰可忍加以權臣壅隔政事紏紛左右離心遐邇解體訖無悛悟以致播遷伊慼自貽大勢已去是謂辜四海之望安得冐一人之稱宜削徽名用昭否徳方朕心之牽愛尚不忍從奈羣議之大公正復見請勉循故事用降新封可降封為湘隂王嗚呼命不于常事非得已豈予小子敢専位號之尊蓋狗衆心以為社稷之計凡在聞聼體予至懷夏四月辛夘西南面招討使耶律佛徳降金雲内寜邊東勝等州皆降阿蘇為金兵所擒金已取西京沙漠以南部族皆降上遂遁於額蘇掄鶚案金史曰天輔六年棟摩羅索略定天徳雲内寜邊東勝等州獲阿蘇軍士問之曰爾為誰曰我破遼鬼也契丹國志曰夏四月燕王遣知宣徽南院事蕭托卜嘉樞密副承㫖王居元充告謝使詣宋至白溝等候宋徽宗降㫖以天祚見在夾山燕王安得擅立令雄州郤之人使遂回後宋命太師童貫為宣撫使以蔡攸副之勒兵十五萬巡邊下詔復燕雲故地貫遣張寶趙忠賫書徃諭燕王使内附淳得書斬其二使五月童貫再遣閤門宣賛馬擴持徽宗手詔撫諭燕王不從是時种師道總東路之衆屯白溝王稟将前軍楊帷中将左軍种師中将右軍王玶将後軍趙明楊志将選鋒軍辛興宗總西路之衆屯范村楊可世王淵将前軍焦安節将左軍劉光世兾景将右軍曲竒王育将後軍吳子厚劉安将選鋒軍並聼劉延慶節度以劉韐宇文黄中為參謀鄧琯為亷訪六月童貫至髙陽闗駐軍用知雄州和詵計降黄榜及旗述弔民伐罪之意燕王遣逹實林牙領一千五百餘騎屯涿州新城前軍統制楊可世趨蘭溝甸為林牙所掩被傷而退燕王遣蕭幹迎戰於范村興宗遣楊可弼救之仍自督戰乃郤凡駐白溝河十有二日乃退保雄州當燕王僭號之初漢軍多而番軍少蕭幹建議藉東西奚二千餘人及嶺外南北大王伊實王皮室莽伊拉司遼民得萬餘戸戸選一人為軍支贍家錢三十貫謂之瘦軍既而散處涿易間侵掠平民甚於盗賊主兵之官縱而不問後來常勝軍叛歸南朝首殺瘦軍以取悦人心六月淳死衆乃議立其妻蕭氏為皇太后主軍國事奉遺命迎立天祚次子秦王定為帝太后遂稱制改元徳興處温父子懼禍南通童貫欲挾蕭太后納土於宋北通於金欲為内外應以援立大功自陳蕭太后罵曰誤秦晉國王者皆汝父子悉數其過數十賜死臠其子奭而磔之籍其家得錢七萬緡金玉寶器稱是為宰相數月之間所取也三朝北盟㑹編曰初燕王耶律淳病卧於城南瑶池殿李奭父子與陳泌等隂使奚契丹諸貴人出宿侍疾燕王危篤處温托故歸私第欲閉契丹於門外然後乞王師為聲援契丹知之遂不果後介休縣進納人傅遵說隨郭藥師入燕被擒告説李處温父子常遣易州富戸趙履仁劉耀賫文字通童貫欲挾蕭后納土大宋履仁授朝散大夫劉耀均州團練使見充宣撫司凖偹差使蕭后引問處温父子等示其前後罪犯遂無以對處温賜以自盡子奭凌遲處斬籍其家貲朝廷撫定燕山府追封處温為廣陽郡王子奭保靜軍節度使以本宅為廟耶律淳死無嗣蕭幹立妃蕭氏權主軍國事號皇太后改建福元年為興徳元年天祚聞淳死下詔曰天命至大不可以力回神器至公未聞於智取古今定論厯數難移是以聖人戒於盗竊故秦晉國王耶律淳九族之内推為叔父之尊百官之中未有人臣之重趨朝不拜文印不名常降璽書别賜金劵日隆恩禮朕實推崇衆所共知無負於爾比因冦亂遂肆窺覦外徒有周公之儀内實稔子帯之惡不顧大義欲償初心任用小人謀危大寶僭稱帝號私授天官指斥乘輿偽造符寳輊發文字肆赦改元以屠沽商賈為翊戴之臣以佞媚狙詐處清密之任不踰累月便至臺階刑獄濫寃紀綱紊亂恣縱将士剽掠州城致我燕人陷於塗炭天方悔禍神不助姦視息偷存未及百日一身殄㓕絶嗣覆家人鬼所讐取笑天下而又輒申遺令擅建長秋妄委婦人専行偽命其逆臣處温父子同恣貪婪殺戮無辜助為不法衆心離㪚立致分崩狼狽荒迷容身無地罪誠難貸令在必行假其餘生庸示寛大據耶律淳大為不道棄義背恩獲戾祖宗朕不敢赦應所授官爵封號盡行削奪并妻蕭氏亦降為庶人仍改姓虺氏外據皇太叔并妃别無闗碍更不施行其封爵懿號一切仍舊嗚呼仰觀天意俯順輿情勉而行之朕亦不忍且仲尼作春秋亂臣賊子懼後之為臣子者可不慎歟東都事略曰童貫聞淳死恥兵敗思立功以報天子謂遼國既無主有間可乘復自莫州回雄州奏乞益兵王黼為太宰力主再興師之議為貫大發陜西将兵及鄜延路副總管劉延慶赴貫戲下期九月㑹於三闗貫與蔡攸謀再舉㑹女真已破雲中府叩居庸闗勢已盛改號大金國乃移文於貫詰問先約夾攻遼國何為背約不進兵貫恐懼遂定議大舉草木子曰遼主天祚親征阿固逹刀槍皆放光宋童貫出師約夾攻大遼無故忽失二認旗其後兵皆敗衂瑪克實以兵援為金人敗於鴻輝水擒其子托果并其屬阿敦及夏國援兵至亦為金所敗燕雲奉使録曰阿固逹親領兵甲數萬初欲趨中京道中聞契丹主聚兵於五國崖亟領兵襲之八月十二日戰於狗泊之地生擒契丹都統駙馬蕭䂓天祚引數騎遁去及夏國主引兵數萬襲天徳軍女真都元帥遣其偏将尼楚赫羅索貝勒統兵七千與夏人逆戰於阿磨下水夏人敗走是時秋霖積潦山水適至河暴漲人馬溺死者不知其數金人已再殺敗契丹又戰敗夏國兵驕氣鋭所至殺掠無辜其下大厭之因秋成遂來並邊阿固逹屯奉聖州之東尼瑪哈烏舍屯應州南尼楚赫羅索屯洪州之西牧馬休兵請議事於朝廷九月三朝北盟㑹編曰郭藥師者渤海鐵州人契丹以為裨将領常勝軍本謂之淵軍始遼人征伐女真為女真所敗多殺其父兄乃立是軍使之報怨然女真入則怨軍從之為亂退則復服初未嘗報怨也天祚與羣下謀殺怨軍除其患故郭藥師等反殺其首領而降都統蕭幹遂拜藥師金吾大將軍俾守涿州及九大王死蕭后攝政藥師見遼將亡遂首以涿州來降常勝軍實反覆之徒遼兵中號健鬬者也其下有四将號彪營每彪五百人常勝軍本二千人爾本朝收復之後增至二萬其後又增至五萬燕雲奉使録曰郭藥師初以武勇四軍薦授殿直從征女真積前後功擢守涿州忽報易州降宋藥師有意歸明時四軍蕭幹聞我軍壓境遂自燕來涿州藥師以為圖已乃與張令徽劉舜臣甄五臣龔詵趙瑄韓壁謀叛已决召蕭幹開宴欵密説其歸宋幹怒曰豈可背朝廷耶藥師念受薦恩不敢害幹幹領軍無多慮禍及遽啓鑰而去藥師急召所部諭曰天祚失國天下分崩宋天子以好生之徳弔民伐罪重兵已下易州此男子取金印如斗時也衆皆響應遂囚監軍蕭餘慶等遣團練使趙鶴壽等帥精兵八千鐡騎五百一州四縣人民奉表來降表曰臣生幽昩之鄉未被文明之化常思戴日何啻望雲邇者天祚皇帝委棄鑾輿越在草莽萬姓無依棲之地五都有板蕩之危雖宣宗嗣國旋致奄忽女后攝政尤難撫綏誠天命之有歸非人力之能致臣等縱屬多難莫生異心蓋所居父母之邦不可廢臣子之節今契丹自為戎首竊稔姦謀燔燒我里閭虔劉我士女報之以徳撫乃以讐以是思戴舜以同心耻助桀而為虐今將所管馬歩軍用申懇悃伏望皇帝特開天地之恩許入風雲之㑹實所願也非敢望焉宣和四年九月十日九朝編年備要曰宣和四年九月己夘郭藥師以涿州來降以其軍八千𨽻劉延慶為嚮𨗳癸未蕭后遣使納欵稱臣封有功封氏編年曰蕭后聞常勝軍降甚懼召蕃漢百官議曰易州髙鳯涿州郭藥師歸宋大金人馬已入奉聖州國歩艱難宗社將覆今與卿等議去就兩國孰可依者納欵臣屬亦無憾也或謂金人方强宜附之或謂遼宋百年信誓可依后曰二説皆是遂遣同中書門下平章事張言尚書都官員外郎張僅使金永昌宫使蕭容乾文閣待制韓昉使本朝皆奉表稱臣蕭后表曰遼國太后妾蕭氏言蓋聞溟海納汙繄衆流而畢㑹太陽舒照豈爝火以猶飛方天下之大同故聖人之有作拊心悼往飲泣陳辭伏念妾先世乗唐晉之季年割燕雲之外地暨逄聖運已受齊盟義篤一家誓傳百䙫孰謂天心改卜國歩多艱先王遇板蕩之餘勵興復之志始厯推戴奄致淪徂爰屬惸嫠俾續禴祀常欲引干戈而自衞與社稷而偕亡伏念生靈罹此塗炭與其陷執迷之咎曷若為奉上之勤伏遇皇帝陛下四海宅心兆人為命敷文徳以柔逺奮武烈以訓時必將拯救黎元混一區宇仰承嚴命敢稽歸欵之誠庶保餘生尤荷永綏之惠徳興元年九月十日曾敏行獨醒雜志曰契丹為金人攻撃窮蹙無計蕭后遣韓昉來見童貫蔡攸於軍中願除歳幣復結和親且言女真蠶食種類五六十國今若大遼不存則必為南朝憂唇亡齒寒不可不慮貫與攸叱出之昉大言於庭曰遼宋結好百年誓書俱存汝能欺國獨能欺天耶貫亦不以聞於朝遼已亡金人果背約冬十月三朝北盟㑹編曰宣和四年十月劉延慶議入燕之策郭藥師進曰契丹四軍以全師抗我燕山可擣虚而入宜選輕騎由固安渡盧水至安次徑赴燕城可得也乃命趙鶴壽等夜半渡河銜枚倍道至三家店駐軍次日藥師遣甄五臣領常勝軍五千人雜郊民奪迎春門以入大軍繼至陣於憫忠寺中興姓氏録叛逆傳曰童貫以大兵駐髙陽闗藥師囚􅃰州刺史蕭雲慶先遣團練使趙鶴壽奉表降於貫朝廷加藥師虔州觀察使令𨽻劉延慶軍為嚮𨗳藥師獻入燕之策延慶從之遣藥師選常勝軍及西兵五千騎同襲燕山藥師遣數隊雜鄉民奪迎春門入陣於憫忠寺前遣七将把諸門進兵抵宣和門外遣人諭蕭太后早降不從契丹領兵死戰藥師退走䨇門下馬歩戰又敗皆棄馬與楊可世墮城而下兵将死傷大半契丹四軍大王蕭幹牽藥師可世全装馬以示延慶軍恐而潰九朝編年備要曰藥師遣人諭蕭后降不從合戰至晚不解蕭幹亟來救或告藥師城外塵起必有救兵至諸將皆謂延慶遣兵來助登髙望之則燕王冡上立四軍旗矣四軍兵自南門入人皆死鬬藥師屢敗奔門不得出盡棄馬縋城而下還者數百騎而已封氏編年曰是時偏師雖入燕城大軍屯盧溝未動延慶聞燕城復失又琉璃河䕶糧将王淵亦陷於敵求自遁之計召諸將諭以糧餉不繼不即引還久恐生變次日燒營及輜重奔還師大潰十一月秦晉王淳妻蕭徳妃五表於金求立秦王不許以勁兵守居庸及金兵臨闗崖石自崩戍卒多壓死不戰而潰徳妃出古北口趨天徳軍十二月知金主撫定南京上遂由薩里闗出居四部族詳衮之家蔡絛北征紀實曰延慶既潰阿固逹以全師自居庸闗入四軍大王奉蕭后由松亭闗遁史愿亡遼録曰蕭后聞居庸失險夜半率契丹并老㓜出城聲言劄野寨迎敵其實避竄宰相左企弓以下拜辭於門下后諭曰國難至此我親統大軍盡死一戰為社稷計勝則再與卿等相見萬一失利則誓死於陣前卿等善全合境人民無事濫被殘害遂泣下后行五十里金游騎已逼城左企弓集議未定統軍副使蕭一信開啓夏門放入羅索貝勒軍登城續遣先被獲知宣徽北樞密院事韓秉傳㫖若即拜降不殺一人催促文武百僚耆老僧道出丹鳯門毬場内投降阿固逹戎服坐萬歳殿皆拜服罪蕭后行至松亭闗議所往逹實林牙欲歸天祚四軍大王蕭幹欲就奚王府立國於是契丹奚軍列陣相拒而分矣北征紀實曰金人久住鴛鴦泊往來白水以圖天祚既深入夾山勢不能出因攻取雲中諸州且休息往來山後視中國紛拿延慶既潰阿固逹始以金師自居庸闗入四軍大王者奉蕭后由松亭闗遁燕人備儀物迎之馬擴茅齋自叙曰女真得契丹故大臣皆言南朝自來畏怯又見劉延慶敗走左企弓上阿固逹詩曰君王莫聼捐燕議一寸山河一寸金故有敗盟之意自南使過盧溝河即焚橋梁大金國志曰十二月初六月國主入居庸闗晡時到燕蕭后聞居庸失守夜率蕭幹等出奔行至五十里國兵游騎已至城遼相左企弓虞仲文等迎降出丹鳯門毬場内投拜國主戎服坐萬歳殿皆拜伏待罪於下譯者曰我見城頭砲繩席解是無拒我意也並放罪陳士元灤志曰保大二年冬十二月金克遼燕京訪得平州人韓詢使持詔招諭平州曰朕親巡西土底定全燕號令所加城邑皆下爰嘉忠欵特示優恩一應在彼大小官員可皆充舊職諸囚禁配𨽻並從釋免時遼主尚在天徳雖開諭而民不從王明清揮塵後録曰宣和初徽宗有意征遼蔡元長鄭達夫不以為然童貫初不敢領略惟王黼蔡攸將順賛成之有諜者云天祚貌有亡國之相班列中或言陳堯臣者婺州人善丹青精人倫登科為盡學正黼聞之甚喜薦其人于上令銜命以視之擢水部員外郎假尚書以將使事堯臣即挾􅀞學生二員俱行盡以道中所厯形勢向背同繪天祚像以歸入對即云北主望之不似人君臣謹寫其容以進若以相法言之亡在旦夕幸速進兵兼弱攻昧此其時也并圖其山川險易以上上大喜即擢堯臣右司諫賜予鉅萬燕雲之役遂决三年春正月丁巳奚王和哩布僭號稱天復元年契丹國志曰遼軍從林牙挾蕭后以歸天祚於夾山時奚渤海軍從蕭幹留奚王府幹據府自立僭號為神聖皇帝國號大奚改元天興六月奚兵出盧龍嶺攻破景州殺守臣劉滋通判楊伯榮又敗常勝軍張令徽劉景仁於雁門鎮攻䧟薊州守臣髙公輔棄城走又㓂掠燕城其鋒鋭甚宋童貫自京師移文王妥中郭藥師切責之七月奚兵遇郭藥師戰於腰鋪大敗藥師乗勝追襲過盧龍嶺蕭幹為其部曲特爾格殺之傳首河間府安撫使詹度獻于朝宋徽宗御紫宸殿受賀宣和錄曰太傅王􅀈等表賀宣撫司奏奚賊四軍和哩布率衆出犯景薊大兵討伐八月十五日於峯山遇王師大㨗斬獲三十級生摛偽阿嚕太師俘執數千人十七日追至盧龍嶺招納二萬餘衆獲耶律徳光時尊號寳檢契丹金塗印數十輜重器甲牛馬生口不可勝計鶚案和哩布即回離保四軍大王蕭幹也四年夏五月金人既克燕驅燕之大家東徙以燕空城及涿易檀順景薊州與宋以塞盟左企弓康公弼曹勇義虞仲文皆東遷朱勝非秀水閑居錄曰金既破契丹至燕駐軍遂攻燕城四面登堞填濠掘城為纒道徙樓櫓反臨城中需索掠取人物俱盡乃還平燕錄曰金人謂阿固逹爽計寸金寸土裒取殆盡將燕城職官民户技術嬪嬙倡優黄冠瞿曇金帛子女等席卷而東或告燕人曰汝之東遷非金人意也南朝留常勝軍利汝田宅給之爾燕人皆怨説尼瑪哈不當與我全燕尼瑪哈欲止割涿易兩州阿固逹不允由雲中留白水北征紀實曰金人既得燕山子女加久住氣候已熱遂大病而城外諸寨日夜為燕之鄉兵刦撓因罵伊都曰汝勸我来此今外寨皆不安四面皆大兵居此網羅中如何歸乃大毁諸州及燕山城壁樓櫓要害皆平又盡括燕山金銀錢物民庶寺院一埽皆空以遼人舊大臣及儀仗車馬玉帛輜重盡由松亭關去金師復由居庸闗之鴛鴦泊扼天祚出路以絶契丹之望乃盡以空城付宋張滙金節要曰燕山之地易州西北乃金披闗昌平之西乃居庸闗順州之北乃古北口景州東北乃松亭闗平州之東乃渝闗凡此數闗一夫禦之可以當百朝廷之割地若得諸闗則燕山之境可保矣然闗内之地平營灤三州自後唐為契丹所䧟後改平州為遼興府以營灤二州𨽻之號為平州路至石晉之初耶律徳光又得燕山檀順景薊涿易諸郡建燕山為燕京以轄六郡號為燕京路而與平州自成兩路朝廷始議割地但云燕雲兩路而已初謂燕山之路盡得闗内之地殊不知闗内之平州與燕山異路也由是破遼之後金人復得平州路金既據平州則闗内之地蕃漢雜處欲無侵漁之患得乎致斡里雅布自平州入㓂此則當時議割燕雲不明地理之故也顧炎武京東考古錄曰宋史言朝廷與金約滅遼止求晉賂契丹故地而不思營平灤三州非晉賂乃劉仁恭獻契丹以求援者既而王黼悔欲併得之遣趙良嗣往請之再三金人不與此史家之誤通鑑周徳威為盧龍節度使恃勇不修邊偹遂失渝闗之險契丹毎芻牧于營平之間又案遼史太祖夭贊二年春正月丙申大元帥堯格克平州獲刺史趙思温裨將張崇二月如平州甲子以平州為盧龍軍置節度使遼之天贊二年乃後唐莊宗同光元年是營平二州契丹自以兵力取之於唐而不取之於劉仁恭又非賂以求援也若灤本平州之地遼太祖以浮户置灤州當劉仁恭時尚未有此州尤為無㩀此亦史家千年未正之誤遼史于灤州下云石晉割地在平州之境亦誤也翟耆年籀史曰宣和中師復幽燕獲耶律徳光所取古寳玉尊形製與黄目等􅉷然無少玷缺在廷莫知所用帝獨識為周之灌尊乃詔禮官圜丘祭天之器仿古盡用吉玉六月翰林學士李石更名安弼偕故三司使髙黨往燕山説宋王安中曰平州萬餘里張㲄有文武材可用為屏翰不然將為肘腋之患安中深然之令安弼與黨詣宋宋主詔帥臣王安中詹度厚加安撫與免三年常賦瑴聞之自謂得計秋七月金人屯來州棟摩聞平州附宋以二千騎問罪先入營州瑴以精兵萬騎擊敗之宋建平州為㤗寜軍以㲄為節度使以安弼黨為徽猷閣待制令宣撫司出銀絹數萬犒賞瑴喜逺迎金人諜知舉兵來襲瑴不得歸奔燕金人克三州始來索瑴王安中諱之索急斬一人貌類者去金人曰非瑴也以兵来取安中不得已殺瑴函其首送金亡遼錄曰張瑴之拒金人也外則送欵于大宋通好于蕭幹而緩急求援内則奉天祚􅀞像舉事白而後行許遣人奉迎以圖興復有燕人李安弼者乃翰林學士李石也髙黨者乃三司使髙履也二人者先嘗被擄後縁張瑴放歸恐金人来捕意欲大宋與金人變盟則後雖来取必不發乃見王安中共為遊説曰平州自古形勝之地地方萬餘里帯甲十餘萬張㲄文武全材足以禦金人制藥師幸招致之不然則復恐西迎天祚北合蕭幹並為我患燕山豈得安安中入其語深以為然勸朝廷納之有臣身任其責事闗軍國利害大計不敢不聞等語差官伴送李安弼等賫奏赴闕趙良嗣力爭以為不可恐必招女真之兵乞斬安弼以徇朝廷不從三朝北盟㑹編曰金人棟摩國王軍二千餘騎聞平州事作前来問罪先入營州張瑴發兵拒戰棟摩以軍少不敵不交鋒而退歸大書州門曰夏熱且去秋凉復来㲄遂聲言戰敗金人殺傷甚衆妄申宣撫司以大㨗聞宣撫司以銀絹告勅賞其軍又曰是日宣撫司賫銀絹數萬前去犒賞并朝廷遣李安弼及張瑴弟賫詔勅前去平州瑴聞之喜率官吏郊迎不意金人諜知之率千騎襲破瑴瑴挺身走不及入城遂閒道欲如京師其弟奔燕山以其母為金人所得携詔往投之而瑴之母妻已為金人所戮金人得詔勅由是大怒而憾我矣瑴至燕山郭藥師留之而易姓名曰趙秀才匿常勝軍中斡里雅布遂圍平州節副衛甫㕘謀仁彦張鈞棄城走領麾下數十人將帯官庫珠玉珍貨等走燕京四散蔵匿獨張郭固與軍人死守亡遼錄曰二太子攻破平州知張瑴為郭藥師所獲蔵常勝軍中差人移文索取即具申稟朝廷累奉道君皇帝詔不令發遣安中與藥師再三論奏若不與則無以塞責不得已而縊殺之以水銀漬其首函送平州八月金主阿固逹死楊循吉金小史曰金主旻豁逹有大度知人善任能與其下同甘苦初稱帝時國相前跪奏事泣止之曰今日皆諸君之力吾初貴未易改舊俗也諸帥皆感泣再拜初得燕京時遼宰相張琳上謁還其田宅而封左企弓等官又從索趙思温訊則解其縛而用之初從遼乞阿蘇遼不與因以起兵及得阿蘇不過杖而遣之而已旻初興無城郭星散而居呼曰皇帝寨國相寨太子莊後升皇帝寨曰㑹寧府建為上京城邑宫室無異于中原州縣廨宇制度極麄居民往來車馬雜沓自前扺後盡為出入之路畧無禁制毎春擊土牛父老士庶無長㓜皆聚觀于殿側儀衞䕶從止類中州守令在内庭或遇雨雪雖后妃亦去韈履而行焉本紀第三十天祚皇帝四五年春正月辛巳黨項小呼嚕遣人請臨其地戊子趨天徳過沙漠金兵忽至上徒步出走近侍進珠㡌郤之乗張仁貴馬得脱至天徳己丑遇雪無禦寒具珠展以貂裘㡌進途次絶糧术者進麨與棗欲憇珠展即跪坐倚之假寐珠展軰惟齧氷雪以濟饑過天徳至夜將宿民家紿曰偵騎其家知之乃叩馬首跪而大慟潛宿其家居數日嘉其忠遥授以節度使遂趨黨項以小呼嚕為西南面招討使摠知軍事仍賜其子及諸校爵賞有差二月至應州新城東六十里為金人完顔羅索等所獲八月癸夘至金丙午降封海濵王以疾終年五十有四在位二十四年金皇統元年二月改封豫王五年塟于廣寧府閭陽縣乾陵旁茅齋自叙曰天祚南走烏舎遣羅索貝勒以馬五百追至武州界天祚欲趨武州南投大朝為隨行僧所勸謂南弱必不敢隠留當為女真所索等辱耳莫若徑歸女真亦不失為王也天祚意决不進羅索追及乃下馬跪迎天祚請北面拜降天祚從之烏舎遣人䕶送歸國削封海濵王置諸東海隅踰年而死松漠紀聞曰中京被圍天祚跳至上京過燕遂投西夏夏人雖舅甥國畏女真之强不果納乃走小博囉復不納乃夜回欲之雲中未明遇諜者言羅索軍且至天祚大驚時從騎尚千餘有精金鑄佛長丈有六尺者他寳貨稱是皆委之而遁值天㣲雪車馬皆有轍跡為敵所及先遣近貴諭降未復羅索下馬跽於天祚前曰奴婢不佞乃以介胄犯皇帝天威死有餘罪因捧觴而進遂俘以還封海濵王處之東海上亡遼錄載天祚降書云遼降臣耶律延禧謹伏斧鉞躬詣大金國俯伏待罪臣聞人不患其勇患其為暴也伏念臣祖宗創二百年之基承天統位繼子傳孫郊祀上帝内外歡慶豈意㣲臣骨寒命薄無徳可褒不能當此夙夜皇駭罔知過咎冐犯忌諱若曉霜而遇烈日扁舟而遭怒濤衆惡競興譛辭烽起故兹慚徳激揚聖怒轉加兵師憂懼之極如坐桁楊葢聞軹道之放荷䝉矜恤况若新安之歎例受無辜念漢皇之仁恩誕敷濡澤誚項羽之過惡奚免終傷臣所懇者乞諧軹道之留免效新安之禍戰慄之至仰干聴聰昩死謹言契丹國志曰天祚削封海濵王送長白山東築室居之踰年而殂范仲熊北記曰天祚者姓耶律名延禧道宗洪基之孫昭懐太子濬之子也濬有罪被殺而立延禧乙夘嵗四月二十九日生身長六尺有餘善騎射道宗薨延禧嗣立辛巳嵗正月十三日即位號天祚皇帝延禧未即位也國人憐其父之寃頗歸心焉及即位拒諫餙非窮奢極侈盤于游畋信用䜛謟紀綱廢弛人情怨怒故金人乗其弊而攻之所向輙剋十年之間身離國亡可不哀哉許採䧟燕錄曰宣和入燕士大夫為買珠玉錦罽等物相髙低至數十倍一日金字牌來令置玫瑰一百斤嵗以為例此惟一僧善造僧曰往年天祚于春水秋山外以此擾民今又如此張端義貴耳集曰契丹有玉注碗毎國主生辰稱夀徽考在御嘗聞人使往来知有此注意甚慕之自恥中國反無此器遂遣人往于闐國求良玉果得一璞甚大使一玉人為中節往遼覘其大小長短如其制度而琢之因聖節北使在庭得見此注目睨之久歸國首問玉注安否北朝始知中國亦有此注女真滅遼首索此注及靖康金人犯闕亦索此注與遼注為對王宗沐宋元通鑑曰遼之興也吾不曰太祖而曰太宗遼之亡也吾不曰天祚而曰道宗何也太祖破室韋滅渤海地方五千里帯甲數十萬非不强也然其未能抗中國成帝業也太宗助晉滅唐盡有山前後十六州之地始都中原據有財賦人物衣冠之盛其他定國賦制百官以國制治契丹以漢制治漢人因俗而治事簡職専是宜其創業幾二百年有所守也道宗初政似有可觀者而晩年䜛巧競進賊殘骨肉諸部反側甲兵之用無寧嵗至于一嵗而飯僧三十六萬一日而祝髪三千故元祖曰遼以佛亡誰之咎哉而天祚特以昏淫而乗其弊耳有國者可不鑑之哉耶律逹實者世號為西遼松漠紀聞曰遼亡逹實林牙亦降後與尼瑪哈雙陸爭道尼瑪哈心欲殺之而口不言大實懼及既歸帳即棄其妻携五子宵遁詰旦尼瑪哈恠其日髙而不来使招之其妻曰昨夕以酒忤大人畏罪而竄詢其所之不以告尼瑪哈大怒以配部落之最賤者妻不肯屈强之極口嫚罵遂射殺之逹實深入沙子立天祚之子梁王為帝而相之女真遣故遼降将伊都帥兵經略屯田和勒端城城去上京三十里逹實游騎數十出入軍前都姑遣使打話遂退沙子者葢不毛之地皆平沙廣漠風起揚塵至不能辨色或平地頃刻廣髙數丈絶無水泉人多渇死逹實之走凡三晝夜始得度故女真不敢窮追遼御馬數十萬牧于磧外女真以絶逺未之取皆為逹實所得今梁王逹實皆亡遼餘黨猶居其地趙子砥燕雲錄曰沙子者在沙院之西北去金國四千里廣有羊馬人藉此為生五榖惟有糜子蕎麥一嵗一收地極寒而草茂冬月不彫雖枯不梗馬可卧柔如氊毯南接天徳雲内北連黨項國南闗口到此數程無水惟契丹有使命往還用皮毬盛水駞負之天祚有子趙王者見在金門御寨許王者廼元妃所生年八十九今在沙子天祚之弟逹實林牙已立為主稱天輔皇帝結集兵馬已及數十萬待時興舉鶚案二書所紀金與遼史不合史本紀載梁王雅里為耶律廸里所立非逹實也皇子表載天祚六子趙王從天祚至白水濼為金師所獲許王至青塚濼為金師所獲逹實宵遁入西域至竒爾愛滿百官冊立為天祚皇帝又安所得既獲之許王而立之乎沙子地名亦不見遼史此皆傳聞之誤耶律楚材湛然居士集曰逹實林牙遼之宗臣挈衆而亡不滿二十年克西域數十國幅員數千里傳數主凡百年頗尚文教西域至今思之廟號徳宗仁宗次子珠勒呼即位改元天禧在位三十四年時秋出獵奈曼王庫楚類以伏兵八千擒之而據其位遂襲遼衣冠尊珠勒呼為太上皇皇后為皇太后朝夕問起居以待終焉珠勒呼死遼絶元史太祖紀曰元年丙寅發兵復征奈曼迪延汗子庫楚類汗與托克托奔伊爾逹實河上三年戊辰冬冄征托克托及庫楚類汗時衛喇特部等遇我前鋒不戰而降因用為向導至伊爾逹實河討黙爾竒斯部滅之托克托中流矢死庫楚類奔契丹皇元聖武親征録曰戊辰冬冄征托克托及庫楚類汗時衛喇特部長呼圖克伯竒等遇我前鋒不戰而降用為鄉導至頁迪宻實河盡討黙爾竒斯部中流矢而死庫楚類汗僅以數人脱走奔契丹王珠爾汗己巳春輝和爾國王伊都呼聞上威名遂殺契丹王所置監國少監求議和元史太祖紀曰七年壬申春正月耶律瑠格聚衆於隆安自為都元帥遣使來附八年癸酉春耶律瑠格自立為遼王改元元統十年乙亥冬十一月耶律瑠格來朝以其子錫沙入侍十三年戊寅是年伐西夏夏主李遵頊出走西凉契丹禄格據髙麗江東城命哈津扎拉率師平之髙麗王暾遂降宋元通鑑曰故遼人耶律瑠格仕金為北邉千户䝉古兵起金人疑遼遺民有他志瑠格不自安遁至隆安聚衆至十餘萬自為都元帥遣使附于䝉古遂自立為遼王改元元統盡有遼東州郡遂都咸平元好問遺山文集曰車駕征契丹餘族是為西遼厯庫楚克國鄂爾多等城戰既合破之遂征蘇爾坦之錫黙實訥布哈爾拒印度扎木連破其軍二十餘萬元史太祖紀曰十四年己夘夏六月西域殺死者帝率師親征十八年癸未夏避暑帕爾滿川皇子卓沁察罕台諤格徳依及巴拉之兵來㑹遂定西域諸城十九年甲申是嵗帝至東印度國角端見班師鶚案庫楚類出奔元史不詳所終至耶律瑠格為遼人之苖裔西域諸國為契丹之餘族故備述其事以終遼紀焉遼史拾遺卷十二
