body:
  text: 遼史拾遺卷十六錢塘厲鶚撰補選舉志一科目契丹國志曰太祖龍興朔漠之區倥􅘓干戈未有科目數世後承平日久始有開闢限以三嵗有鄉府省三試故鄉中曰鄉薦府中曰府解省中曰及第有秀才未願赴者州縣必報刷遣之程文分兩科曰詩賦曰經義魁各分焉三嵗一試進士貢院以二寸紙書及第者姓名給之號喜帖明日舉案而出樂作及門擊鼓十二面以法雷震殿試臨期取㫖第一人特贈一官授奉直大夫翰林應奉文字第二人第三人止授從事郎餘並授從事郎聖宗時止以詞賦法律取士詞賦為正科法律為雜科若大任子之令不論文武並奏䕃而亦有員數林煃章易水志曰保寧九年進士易州魏璟統和二年魏上達五年魏元真鶚案史稱景宗保寧八年詔復南京禮部貢院聖宗統和六年詔開貢舉而保寧九年至統和五年十年之中易州已有進士三人又出一姓皆在未開貢舉之前豈景宗詔復貢院之後南京已詔科而未及他處耶惜不可考矣涿州志曰王吉甫涿州人天慶二年試律學第一除參軍李世弼金登科記曰天㑹四年始設科舉有詞賦有經義有同進士有同三傳有同學究凡五等詞賦之初以經傳子史内出題次又令逐年改一經亦許注内出題以詩書易禮春秋為次葢猶遼舊也元好問遺山文集曰遼以科舉為儒學之極致假貸剽竊牽合補綴視五季又下衰王圻續文獻通考曰遼道宗咸雍六年設賢良科詔應是科者先以所業十萬言進十年六月御永安殿䇿賢良天祚帝乾統二年閏五月䇿賢良鶚案王圻所引俱出遼史以其有闗選舉故載于編補經籍志同二世選續文獻通考曰遼太宗天顯二年詔選約尼氏九帳子弟可任官者穆宗應厯五年四月命郎君蕭哈里世為北府宰相景宗保寧時耶律思温為北院樞宻使兼北府宰相仍命世預其選聖宗統和九年詔沒于王事者官其子孫時耶律轄哩伐宋獲其將康保威以功詔世預節度使選宰相韓徳讓貴寵蕭達魯希㫖言徳讓宜賜國姓籍横帳由是世預太醫選子孫入官者衆興宗重熙十六年二月詔世選官擇有才能者用三貲選續文獻通考曰遼道宗大安四年四月立入粟補官法四學校續文獻通考曰遼太祖時置上京國子監設祭酒司業監丞主簿時南京立太學聖宗統和九年八月以南京太學生員寖廣特賜水磑莊一區道宗清寧五年詔設學養士頒五經及傳疏置博士助教各一員六年六月中京置國子監鶚案南京太學賜水磑莊一區遼史本紀係統和十三年九月事詔設學頒五經傳疏係清寧元年十二月事王圻所引年月誤矣宣府鎮志曰契丹初興惟尚武藝燕趙間學校俱仍唐舊間罹兵燹十存二三取用文士多由自奮興宗重熙五年始御元和殿以日射三十六熊賦幸燕詩試進士于廷著為令式至道宗乃詔設學飬士于是有西京學有奉聖歸化雲徳𢎞蔚媯儒八州學各建孔子廟頒賜五經諸家傳疏令博士助教教之屬縣附焉鶚案此但據西京諸州言之五京諸州俱有學也補經籍志鶚案諸簿録家所載遼人撰著大率多本遼史紀傳間有出于史外者不多得也予作補經籍志聊備其目而已傳于今者亦寥寥無幾矣經類耶律庶成蕭罕嘉努禮書遼朝雜禮已上出黄虞稷金陵黄氏書目龍龕手鑑四卷晁氏作三卷非沈括夢溪筆談曰幽州僧行均集佛書字為切韻訓詁凡十六萬字分四卷號龍龕手鑑燕僧智光為之序甚有詞辨契丹重熙二年禁契丹書集甚嚴傳入中國者法皆死熙寧中有人自契丹中得之入傳欽之家蒲傳正帥浙西取以鏤版其序末舊題重熙二年五月序蒲公削去之觀其字音韻次序皆有理法後人殆不以其為燕人也晁公武郡齋讀書志曰契丹僧行均撰凡二萬六千四百三十字注十六萬二千一百餘字僧智光為之序後題云統和十五年丁酉按紀年通譜耶律隆緒嘗改元統和丁酉至道三年也沈存中言末題重熈二年五月序蒲公削去之今本乃云統和非重熈字存中不見舊題妄記之耶錢曾讀書敏求記曰燕僧行均字廣濟俗姓于氏編龍龕手鑑以平上去入為次随部復用四聲列之計二萬六千四百三十餘字注一十六萬三千四百餘字統和十五年丁酉七月初一日癸亥燕臺憫忠寺沙門智光字法炬為之序燕臺憫忠寺沙門智光撰龍龕手鑑序曰夫聲明著論廼印度之宏規觀跡成書實支那之令躅印度則始標天語厥號梵文載彼貫線之花綴以多羅之葉開之以字縁字界分之以男聲女聲支那則創自軒轅制于沮誦代結繩于既往成書契以相沿辨之以㑹意象形審之以指事轉注泊乎史籀變古文為大篆程邈省複筆為𨽻書蔡邕刋定于石經束晳推詳于冡䇿九流競鶩若百谷之趋淵百氏遐分比衆星之拱極尋源極委悉著于埤蒼廣蒼叶律諧鐘咸究于韻圖韻母專門則字統説文開牖則方言廣雅文字之學于是乎昭矣矧復釋氏之教演于印度譯布支那轉梵為唐雖匪差于性相披教悟理而必正于名言言不正則性相之義差性相之義差則修斷之路阻矣故祇園髙士標的洪源學海先儒導引後進輝以寳燭啟以隨函闕顯于人名香嚴唯標于寺號流傳嵗久抄寫時訛寡聞則莫曉是非博古則徒懷惋歎不逢敏達孰為編修有行均上人字廣濟俗姓于氏派演青齊雲飛燕晉善于音韻閑于字書覩香嚴之不精寓金河而載緝九仞功績五變炎涼具辨宫商細分喉齒計二萬六千四百三十餘字注一十六萬三千一百七十餘字并闕一十八萬九千六百一十餘字沙門智光利非切玉分忝斷金辱彼告成見命序引推讓而寧容閣筆俛仰而强為抽毫矧以新闕擔簦立祛疑滯音徧于龍龕猶手持鸞鏡形容斯鑒妍醜是分故目之曰龍龕手鑑揔四卷以平上去入為次復用四聲列之又撰五音圖式附于後庶力省功倍垂益于無窮者矣時統和十五年丁酉七月一日癸亥序史類耶律儼皇朝實録七十卷蕭罕嘉努耶律庶成同撰約尼氏汗至重一熙以來事迹二十卷室昉統和實録二十卷蕭永祺遼紀四十卷志五卷傳四十卷已上出金陵黄氏書目契丹官儀契丹事迹契丹疆宇圖宋史藝文志二卷契丹實録契丹㑹要已上出尤袤遂初堂書目大遼登科記一卷大遼對境圖契丹地理圖宋史藝文志一卷已上出鄭樵通志藝文畧遼四京記陳振孫直齋書録解題曰亦無名氏曰東京中京上京燕京王鼎焚椒録一卷七賢傳金陵黄氏書目曰取遼世名流七人為之傳耶律吼其一也遼三臣行事耶律孟簡著出王圻續文獻通考鶚案孟簡大康中所編耶律赫嚕烏哲休格三人行事見文學傳子類王白百中歌耶律純耶律學士星命祕訣五卷已上出金陵黄氏書目珠勒呼針灸脈訣書一卷出連江陳第世善堂書目燕僧利正撰長慶人事軍律三卷出通志藝文畧内丹書聖崇統和七年于闐張文質進道宗御製華嚴經賛咸雍四年二月頒行回紇僧撰金佛梵覺經髙麗佛經大康十年命僧善智校讐頒行已上出續文獻通考僧非濁撰往生集二十卷出奉福寺尊勝陀羅尼石幢記集類道宗御製清寧集耶律良編出續文獻通考李氏應厯小集十卷通志藝文畧曰李澣晉末䧟契丹以遼應厯年號名集海蟾子詩一卷出通志藝文畧李澣丁年集十卷楊佶登瀛集五卷劉景集四十卷已上出宋史藝文志耶律隆先閬苑集蕭資忠西亭集蕭孝穆寳老集蕭栁嵗寒集蕭罕嘉努六義集十二卷耶律孟簡放懷詩一卷耶律良慶㑹集已上出續文獻通考遼史拾遺卷十六
