千夜入飛龍廐餵養為備常謂左右曰若女真必來吾有日行五百里馬若干又與宋朝為兄弟夏國為甥舅皆可以歸亦不失一生富貴所憂者軍民受禍耳識者聞之私相謂曰遼其亾矣自古人主豈有棄軍民而自謀身計者其能享國乎暨聞女真焚刦新州以歸即以謂威徳可加彼何能為復自縱肆是嵗女真阿固逹用鐵州楊樸䇿即皇帝位建元天輔國號金契丹國志曰楊樸者遼東鐵州人也本渤海大族登進士第累官校書郎髙永昌叛時降女真頗用事三朝北盟㑹編曰有楊樸者鐵州人少第進士累官至袐書郎説阿固逹曰匠者與人規矩不能使人巧師者人之模範不能使人必行大王創興師旅當變家為國圖霸天下謀萬乗之國非千乗不能比者諸部兵衆皆歸大王今力可㧞山填海而不能革故鼎新願大王册帝號封諸蕃傳檄響應千里而定東接海隅南連大宋西通西夏北安逺國之民建萬世之鎡基興帝王之社稷行之有疑禍如發矢大王如何阿固逹大悦烏竒邁等皆推尊楊樸之言上阿古逹尊號為皇帝國號大金以水名愛新遂以為國號愛新女真語金也以其水産金而名之故曰大金猶遼人以遼水名國也改元收國令韓企先訓字以王為姓以旻為名金太祖實録曰太祖先為完顔部人以遼天慶五年建國曰遼以鑌鐵為國號鑌鐵雖堅終有銷壞唯金一色最為珍寶自今本國可號大金鶚案金史太祖即帝位建元收國二年乃改明年元為天輔則楊樸之請當在收國元年遼史誤矣八年大金國志曰天慶八年春遼燕王淳將淵軍討金而金人適至淳遇于徽州未陳而潰退保長泊魚務于是金人大掠經新城懿濠衛五州皆降之夏五月契丹國志曰五月壬午朔日有食之秋女真陷東京黄龍府咸信蘇復辰海同銀通韓烏遂春泰靖等五十餘城内並邊二十餘州各有和糴倉依祖宗法毎嵗出陳易新許民自願假貸收息二分所有無慮三五十萬石累嵗舉兵未嘗支用至是女真悉取之據遼東長春兩路九年春三月丁未朔遣右額爾竒木蕭實訥埒等册金主為東懷國皇帝契丹國志曰天慶九年春有赤色大三四圍長二三丈索索如樹西方有火五團下行十餘丈不至地而㓕汪藻録曰楊朴既為女真建號因説曰自古英雄開國須受禪或求大國封册天慶八年八月阿固逹遂遣人契丹求封册其事有十徽號大聖大明一也國號大金二也玉輅三也衮冕四也玉刻御前之寶五也以兄弟通問六也生辰正旦遣使七也嵗輸銀絹二十五萬疋兩如南宋嵗賜之半八也割遼東長春路九月送還女真阿固齊趙三大王十也天祚付羣臣議蕭奉先等喜以為自此無患遂差靜江軍節度使蕭實訥埒翰林學士楊勉充册封使副歸州觀察使張孝偉太常少卿王甫充慶問使副衛尉少卿劉湜充管押禮物使將作少監楊立忠充讀册使備天子衮冕玉册金印車輅法駕之屬册女真阿固逹為東懷國皇帝册文曰朕對天地之閎休荷祖宗之丕業九州四海咸在統臨一日萬幾敢忘重任宵衣為事嗣服宅心眷惟肅慎之區實介扶餘之俗土濱巨浸材布中區雅有山川之名承其祖父之緒碧雲袤野固須挺于渠材皓雪飛箱疇不推于絶駕章封屢服誠意交孚載念遥芬宜膺多戬嗚呼義敦友睦地列豐腴惟信可以持人惟寛可以馴物戒只敬只式孚於休以大聖大明犯安巴堅號改為至聖至明而已餘悉從之秋七月金遣烏凌阿贊謨來責册文無兄事之語不言大金而云東懷乃小邦懷其徳之義及册文有渠材二字語渉輕侮若遥芬多戩等語皆非善意殊乖體式如依前書所定然後可從九月復遣實訥埒楊立忠先持册藁使金汪藻録曰十二月至金國阿固逹召楊朴髙慶裔髙隨等雜駁朴以儀物不全用天子制東懷國乃書稱小邦懷其徳之義及無䇿為兄之文如遥芬多戩皆非美意彤矢象輅亦諸侯事渠材二字意尤輕侮命實訥埒歸易其文契丹云兄友弟㳟出自周書言友睦則兄之意見矣楊朴等面折以為非是阿固逹大怒叱出副使欲腰斬之尼雅滿諸帥為解人笞百餘三月遣實訥埒楊立忠回云册文詈我我不能曉徽號國號玉輅御寶我自有之須稱我大金國皇帝兄即已能從我來秋至軍前不然我提兵取上京矣天祚惡聞女真事蕭奉先揣其意不以聞遷延久之聞上京破和議遂已後天祚雖復請和皆不報松漠紀聞曰女真乗勝入黄龍府五十餘州浸逼中京中京古白霤城天祚懼遣使立阿固逹為國王阿固逹留之遣人邀請十事欲册帝為兄弟國及尚主使數往反天祚不得已欲立之而他請益堅天祚怒囚其使不報鶚按汪藻録所載十事無尚主之文且天祚囚金使于事不實十年夏五月金主親攻上京克外郛留守托卜嘉率衆出降東都事畧曰先是建隆以來女真由遼東蘓州泛海至登州買馬故道猶存有髙藥師者以大舟泛海來具言女真攻遼國奪其地事知登州王師中以聞詔蔡京童貫遣人伺其實委師中選將校七人同高藥師過海見女真邏者不敢前復廻青州知青州崔直躬奏其事詔復委童貫措置已而遣武義大夫馬政與平海軍卒長呼延慶仍與髙藥師過海為邏者執縳送女真黏罕兀室詰問其由政以實對遂遣李善慶等同政等回明年善慶等至京師徽宗令蔡京童貫見之議事差歸朝官趙有開及馬政王師中之子瓌充使與李善慶等渡海聘之至登州有開死未往㑹河北諜者言遼國與女真修好于是罷遣使者止差呼延慶同善慶等歸宣和二年呼延慶至自女真持其書来云遼國修好不成請别遣人修好朝廷遂欲倚之復燕以歸朝官右文殿修撰趙良嗣充使忠訓郎王瓌副之由登州海道用故事買馬為名因與之約契丹若亡取燕雲舊地時女真已出師趨上京趙良嗣㑹阿古逹于青牛山徑攻上京破之良嗣遂與約同入燕京取燕雲地阿固逹曰燕京本漢地當與南朝遂議嵗賦如契丹舊數遣良嗣等回約來年同舉差錫喇赫嚕為使大徳古高隨為副持其國書來大金國志曰時金人出師三路攻遼之上京是夏趙良嗣等在青牛山追及國主遂從至上京觀其攻城不旋踵而破趙良嗣燕雲奉使録曰宣和二年春二月詔遣中奉大夫右文殿修撰趙良嗣假朝奉大夫由登州泛海使女真忠訓郎王瓌副之良嗣自咸州㑹于青牛山諭令㸔攻上京城破遂與阿固逹相見于龍岡約入上京㸔契丹大内居室相與上馬並轡由西偏門入並乗馬過五鑾宣政等殿遂置酒于延和樓良嗣有詩云建國舊碑邉月暗興王故地野風乾回頭笑向王公子騎馬隨軍上五鑾又令上京俘獲呉王妃作舞獻酒妃初已配呉王既而延禧私納之又與其下犯法故幽囚於上京汪藻録曰阿固逹留趙良嗣飲食數日及令吳王妃歌舞妃初配吳王天祚私納復與其下通囚于上京女真破上京得之女真謂良嗣曰此契丹兒婦也今作奴婢為使人歡契丹國志曰金人攻陷上京諸路祖州則太祖之天膳堂懷州則太宗之崇元殿慶州則望仙望聖神儀三殿并先破乾顯等州如凝神殿安元聖母殿木葉山之世祖殿諸陵并皇妃子弟影堂焚燒殆盡發掘金銀珠玉所司即以聞蕭奉先皆抑而不奏後天祚雖知問及陵寝事奉先對以初雖侵犯元宮刦掠諸物尚懼列聖威靈不敢毁壞靈柩已指揮有司修葺廵䕶奉先迎合誕漫類皆如此亡名氏宣和遺事曰宣和二年金國遣使同趙良嗣歸且言金主約女真兵自平地松林趨古北口宋朝兵自白溝河夾攻遼國若㓕後以燕京一帯歸南朝誓為兄弟之國又遣使詐作新羅人來朝其書畧曰大金皇帝謹致書于大宋皇帝闕下蓋縁素昩未致禮容酌以權宜交馳使傳趙良嗣等言燕京本是漢地若許復舊将自來與契丹銀絹轉交雖無國信諒不妄言若將來貴朝不為夾攻即不依得已許為定具形弊幅冀諒鄙悰汪藻録曰宣和二年九月十八日差令登州兵馬鈴轄武義大夫馬政報聘十一月末達來流河金帳前金以朝廷欲全還山前山後故地故意皆疑吝留南使十餘日始草國書差大使赫嚕副使大徳古與馬政等來回聘書中大畧云前日趙良嗣等回許燕京路州鎮書載若不夾攻難應已許今若更欲西京請就便計度收取若難果意為兾報示宣和二年三月十七日赫嚕達登州先是女真往來議論皆主以童貫以良嗣上京阿固逹之約欲便舉兵應之故選西兵宿將㑹京師又詔環慶鄜軍與河北禁軍更戍㑹方臘叛貫以西兵討賊朝廷罷更戍指揮赫嚕凡留三月餘八月二十日王黼議復國書止付赫嚕等還不遣使書曰逺勤専使薦示華緘且承契好之修深悉封疆之事惟夙敦于大信已備載于前書所有漢地事宜並如初議俟聞舉兵至西京的期以慿夾攻再遣呼延慶送歸遼史拾遺卷十一
