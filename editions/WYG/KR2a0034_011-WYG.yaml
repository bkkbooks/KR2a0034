body:
  text: 遼史拾遺卷十一錢塘厲鶚撰本紀第二十七天祚皇帝一天祚皇帝諱延禧字延寜小字阿果趙良嗣燕雲奉使録曰阿果天祚小字蔡絛鐵圍山叢談曰政和八年改十一月冬至朔旦為重和元年㑹左丞范致虚言犯北遼年號蓋遼先有重熈年時後主名禧其國中因避重熈凡稱重熈則為重和朝廷不樂是年三月遽改重和二年為宣和元年乾統元年二月朔改元春正月契丹國志曰春正月朔有流星燭地自西南入尾抵距星是夕有赤氣起東北方亘西方中出白氣二氣將散復有赤氣起在旁二年東國史略曰髙麗紀肅宗明孝王七年遼天祚帝乾統二年遣中書舍人孟初來賀生辰兵部員外郎金緣為舘伴初見其年少頗易之一日並轡出郊雪始霽初唱云馬啼踏雪乾雷動緣即對曰旗尾翻風烈火飛初愕然曰真天才也由是情好日篤相唱和及别解金帯贈之四年夏四月東國通鑑曰肅宗明孝王顒九年夏四月遼遣安逺軍節度使耶律嘉謨利州管内觀察使夏資睦來册王為忠勤奉國功臣開府儀同三司守太尉兼中書令上柱國髙麗國王食邑七千戸食實封七百戸賜車輅衣帯匹叚鞍馬弓箭等物泰州管内觀察使耶律傳鴻臚卿張織來册太子為順義軍節度朔武等州觀察處置等使特進檢校太尉兼侍中使持節朔州諸軍事行朔州刺史上柱國三韓國公食邑三千戸食實封五百戸賜車輅衣服匹叚鞍馬弓箭等物五月冬十一月丙辰高麗三韓國公王顒薨子俁遣使來告東國通鑑曰肅宗明孝王十年十月王薨太子俁即位遣中書舍人金緣如遼告哀緣至遼賜宴将奏樂緣曰臣來時本國羣臣皆服衰絰今至上國獲䝉賜宴臣子之情不忍聞樂遼主義而從之朝見時又乞除吉服舞蹈學士孟郎謂緣曰殿廷服色宜從吉但除舞蹈可也六年春正月卒丑遣知北院樞密使蕭塔喇台知南院樞密使事牛温舒使宋諷歸所侵夏地冬十月乙亥宋與夏通好遣劉正符曹穆來告契丹國志曰夏四月遼遣簽書樞密院蕭良詣宋言朝廷出兵侵夏國今大遼以帝妺嫁夏國主請還所侵地五月宋徽宗遣龍圖閣直學士林攄報聘見天祚跪上國書仰首曰夏人數冦邊朝廷興師問罪以北朝屢講和之使故務含容今踰年不進誓表不遣使賀天寜節又築席經嶺馬練川西堡侵冦不已北朝若不窮詰恐非所以踐勸和之意天祚出不意為愕然秋八月天祚以林攄來使失情遣使復往宋尋遣禮部侍郎劉正夫來報酬對敏博議皆如約趙彦衛雲麓漫抄曰宣政間林攄奉使契丹國中新為碧室云如中國之明堂伴使舉令曰白玉石天子坐碧室林對曰口耳王聖人坐明堂伴使云奉使不識字只有口耳壬却無口耳王林詞屈罵之幾辱命彼之大臣云所爭非國事豈可以細故成隙遂備牋奏上朝廷一時為之降黜東國通鑑曰春正月遼遣祭奠使耶律演左企弓來又遣弔慰使耶律忠劉企常來又遣劉鼎臣命王起復七年冬十月契丹國志曰冬十一月朔日食八年東國通鑑曰睿宗文孝王俁三年二月遼遣崇禄卿張掞來命王落起復清安軍節度使蕭良益州管内觀察使李仁洽來册王為守太尉兼中書令加食邑賜冠冕車輅衣帯匹叚鞍馬等物遼駐蹕寺沙門奉航石幢記曰師諱奉航俗姓李氏􅃰水新城縣渠村人㓜入緇門訪道尋師就至燕京在街駐蹕寺禮祥玉上人為親教焉清寜元年受具自後負笈遊方復歸本寺辦修殿宇大安五年涿州恵化寺請師為提㸃壽昌二年秋九月京北花嚴寺請為提㸃乾統八年四月遷化於駐蹕之本院門弟子志堅塟師於祖師塋側刻石為窣堵波述師實行焉九年冬十二月東國通鑑曰睿宗文孝王四年十二月遣都官郎中李國瓊如遼奏還女真九城十年契丹國志曰秋九月朔日食周煇清波别志政和和詵接伴遼使至邢臺遼使柴誼指呼左右令獵回頋詫曰南朝有樂事乎詵曰南朝所樂獵徳耳遼使為之羞恨天慶元年契丹國志曰天慶元年秋九月宋遣鄭允中童貫使遼貫至遼君臣相聚指笑曰南朝人才如此然天祚方縱肆貪得中國玉帛珍玩而貫所齎皆極珍奇至運兩浙髹藤之具火閣書櫃牀椅等往獻天祚所以遺貫者亦稱是貫使歸至盧溝河有燕人馬植者得罪於燕見貫陳㓕燕之策改姓李名良嗣薦於朝遂賜姓趙後天祚移檄索取貫諱不與復燕之議蓋始此岳珂桯史曰趙良嗣既來降頗自言能文間以詩篇進益簡眷遇至命兼官史局令續通鑑長編重和元年十二月丁未推修國朝㑹要帝系后妃吉禮三類賞良嗣實竄名參詳與轉一秩亦可占其非據矣余讀北遼遺事見良嗣與王瓌使女真随軍攻遼上京城破有詩曰建國舊碑邉月暗興王故地野風乾回頭笑向王公子騎馬隨軍上五鑾上京乃契丹所謂西樓者良嗣世仕其國身踐其朝貴為九卿一旦决去視宗國顛覆殊無禾黍之悲反吟咏以志喜其為人從可知也五鑾乃上京殿名二年冬十月辛亥高麗三韓國公王俁之母死來告即遣使致祭起復東國通鑑曰睿宗文孝王七年秋七月己巳王太后栁氏薨八月丙申遣殿中監李徳羽如遼告哀遼遣勅祭使永州管内觀察使耶律固太常少卿王侁勅弔使㤗州管内觀察使蕭辿來四月春正月如春州初女真起兵以赫舍哩部人阿蘓不從遣其部薩哈討之阿蘇弟達呼布來告詔諭使勿討不聼阿蘓來奔至是女真遣使來索不發秋七月女真復遣使取阿蘇不發阿固逹乃與弟尼瑪哈烏舎等謀以尼楚赫伊哷羅索棟摩等為帥集女真諸部兵擒遼障鷹官及攻寜江州東北路統軍司以聞時上在慶州射鹿聞之畧不介意遣海州刺史髙仙壽統渤海軍應援蕭托卜嘉遇女真戰於寜江東敗績東都事畧曰女真有俊禽曰海東青次曰玉𤓰駿俊異絶倫一飛千里非鷹鸇鵰鶚之比延禧縱馳失道荒於畋獵喜此二禽善捕天鵝命女真國人過海詣深山窮谷搜取以獻國人厭苦遂叛契丹國志曰女真服屬大遼二百餘年世襲節度使兄弟相傳周而復始至天祚朝賞刑僣濫禽色俱荒女真東北與五國為鄰五國之東接大海出名鷹自海東來者謂之海東青小而俊健能擒鵞鶩𤓰白者尤異遼人酷愛嵗嵗求之女真女真至五國戰鬬而後得之女真不勝其擾及天祚嗣位責貢尤苛又天使所至百般需索於部落稍不奉命則召酋長加杖甚者誅之諸部怨叛潛結阿固逹至是舉兵謀叛先是有𣙜場女真以北珠人參生金松實白附子蜜蠟麻白之類為市寜江州人抵其直且拘奪之州既陷殺之無遺類獲遼兵甲馬三千退保長白山之阿穆呼徐夢莘三朝北盟㑹編曰天祚嗣位立未久當中國崇寜之間漫用奢侈宫禁競尚北珠北珠者皆北中來𣙜場相貿易天祚知之始欲禁絶其下謂中國傾府庫以事無用之物此為利中國可以困恣聼之而天祚亦驕汰遂從而慕尚焉北珠美者大如彈子小者若梧子皆出遼東海汊中每八月望月如晝則必大熟乃以十月方採取珠蚌而北方沍寒九十月則堅氷厚已盈尺矣鑿氷没水而捕之人以為病焉又有天鵞能食蚌則珠蔵其嗉又有俊鶻號海東青者能擊天鵞人既以俊鶻而得天鵞則於其嗉得珠焉海東青出五國五國之東接大海自海東而來者謂之海東青小而俊健𤓰白者尤以為異必求之女真毎歳遣外鷹坊子弟趣女真發甲馬千餘人入五國界即海東巢穴取之與五國戰鬬而後得其後女真不勝其擾遼金紀事曰海東青出於女真東北鐵甸等五國遼主延禧酷愛之每歳大寒發使趣女真以海東青入貢發甲馬數百取之五國界巢穴中往往戰爭而得國人厭苦方輿紀要曰五國頭城在㑹寜府東北自此而東分為五國因名葉子竒草木子曰海東青鶻之至俊者也出於女真在遼國已極重因是起變而契丹以亡其物善擒天鵞飛放時旋風羊角而上直入雲際松漠紀聞曰初女真有戎器而無甲遼之近親有以衆叛間入其境上為女真一人見而擒之得甲冑五百女真賞其人為伊拉齊阿格彼云第三箇官人亦呼為相公既起師才有千餘騎用其五百甲攻破寜江州遼衆五萬禦之不勝復倍遣之亦折北遂益至二十萬女真以衆寡不敵謀降大帥尼瑪哈烏舍羅索等曰我殺遼人已多降必見勦不若以死拒之時勝兵至三千既連敗遼師器甲益備與戰復克契丹國志曰初女真之叛也率皆騎兵旗幟之外各有字號小木牌繫人馬上為號五十人為一隊前二十人全装重甲持槍或棍棒後三十人輕甲操弓矢毎遇敵必有一二人躍馬而出先觀陣之虚實或向其前後左右結陣而馳擊之百歩之外弓矢齊發無不中者勝則整陣而後追敗則聚而不散其分合出入應變若神人人皆自為戰所以勝也三朝北盟㑹編曰阿固逹自宴漁河歸疑遼見伐尼瑪哈曰迎風縱棹順坂走丸禍至速矣不如乗其無備先併鄰國聚衆為備以待其變於是併東􅀈西渤二海部族用尼瑪哈古新烏舍為謀主參與論議以尼楚赫移喇羅索棟摩等為將帥阿固逹有度量善謀尼雅滿善用兵好殺古實剛毅而强忍烏舍姦猾而有才自製女真法律文字成其一國人號為薩滿薩滿者女真語巫嫗也以其通變如神尼瑪哈之下皆莫能及天慶四年率兵叛遼㑹集各部全装軍二千餘騎首犯混同江之寧江州攻破之殺戮無噍類大敗渤海之衆獲甲馬二千又敗蕭嗣先於出河店又敗淶流河黄龍府咸州好草谷四路都統誅殺不可勝計丁壯即加斬截嬰孺貫槊上盤舞為樂所過赤地無餘十一月辛丑以西北路招討使耶律鄂爾多為行軍都統副㸃檢蕭伊實同知南院樞宻使事耶律章努副之十二月咸賔祥三州及鐵驪烏舍皆叛入女真伊實往援賔州南軍諸將錫林徳哷勒等往援咸州並為女真所敗契丹國志曰遼國舊例凡闗軍國大事漢人不預天祚自兩戰之敗意謂蕭奉先不知兵始欲改用將付以東征之事宰相張琳呉庸等碌碌儒生非經濟才統御無法遽奏曰前日之敗失於輕舉若用漢軍二十萬分路進討無不克者天祚謂其數多且差十萬即降宣劄副上京長春遼西諸路計人戸家業錢毎三百貫自備一軍限二十日各赴期㑹時富民有出一百軍二百軍家資遂竭琳等非將帥材器甲聼從自便人人就易槍刀氊甲充數弓弩鐵甲百無一二雜以畨軍分出四路北樞宻副使耶律鄂爾多來流河路都統衛尉卿蘇壽吉副之黄龍府耶律寜黄龍府路都統桂州觀察使耿欽副之復州節度使蕭湜曷咸州都統將作藍龔誼副之左祇侯郎君詳衮蕭呼嚕古草峪都統商州團練使張維協副之獨來流河一路遂深入女真軍馬初一戰稍却各退保寨栅是夕都統鄂爾多誤聽漢軍已遁即離遼奚之兵棄營而奔明早漢軍尚餘三萬衆遂推將作監武朝彦為都統再與女真合戰遂大敗餘三路聞之各退保本路防城數月間遂為女真攻陷丁壯斬戮無遺嬰孺貫之槊上盤舞為戲所過赤地無餘應遼東界内熟户女真亦為阿固逹吞併分揀强壯人馬充軍遂有鐵騎萬餘本紀第二十八天祚皇帝二五年秋七月契丹國志曰秋七月朔日食八月丙寅以圍場使鄂博為中軍都統耶律章嘉努為都監率畨漢兵十萬蕭奉先充御營都統諸行營都部署耶律章努為副以精兵二萬為先鋒餘分五部為正軍貴族子弟千人為硬軍扈從百司為䕶衛軍北出駱駝口以都㸃檢蕭呼塔噶為都統樞宻直學士柴誼為副將漢歩騎三萬南出寜江州自長春州分道而進發數月糧期必㓕女真契丹國志曰八月天祚下詔親征南出寜江路自長春州分道而進一夕軍中戈㦸有光馬皆嘶鳴咸以為不祥十二月乙巳耶律章嘉努叛戊申親戰於呼岱巴岡敗績盡亡其輜重汪藻録曰天慶五年春天祚下詔親征八月率蕃漢兵五十萬出長春路命蕭奉先為御營都統