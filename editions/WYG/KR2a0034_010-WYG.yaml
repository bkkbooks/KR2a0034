body:
  text: 遼史拾遺卷十錢塘厲鶚撰本紀第二十一道宗一道宗孝文帝諱洪基字納琳小字察喇侯延慶退齋閑雅録曰劉拱衛逺宣和初守祁州嘗接伴北使有李處能者北朝故相李集之子號李狀元家燕人之最以學著者處能謂逺云本朝道宗皇帝好文先人每荷異眷嘗於九日進菊花賦次日賜批答一絶句云昨日吟卿菊花賦碎剪金英作佳句至今襟袖有餘香零落秋風吹不去錢芳標蒓䰻詞話云遼主得其臣所獻黄菊賦題其後云云元張肎繼孟櫽括其詞寄蝶戀花曰昨日得卿黄菊賦細剪金英題作多情句冷落西風吹不去袖中猶有餘香度滄海塵生秋日暮玉砌雕闌落葉鳴疎雨江摠白頭心更苦素琴猶寫幽蘭譜繼孟手書於卷予嘗見之陶宗儀書史㑹要曰遼道宗喜作字秦越大長公主捨棠隂坊為大昊天寺帝為書碑及額今在燕京舊城晁以道嵩山集曰契丹主洪基以白金數百兩鑄兩佛像銘其背曰願後世生中國清寧元年夏五月東國通鑑曰文宗仁孝王九年夏五月契丹遣匡義軍節度使耶律革崇禄卿陳顗來册王為守太師加食邑五千户實封五百户仍賜車輅冠服圭劍等物又遣利州刺史蕭禄來册王太子為三韓國公冬十二月丙申宋遣歐陽修等來賀即位葉夣得石林燕語曰契丹既修兄弟之好仁宗初隆緒在位于仁宗為伯故明肅太后臨朝生辰正旦契丹皆遣使致書太后本朝亦遣報之猶弟婦通書於伯母無嫌也至和二年宗真卒洪基嗣位宗真妻臨朝則仁宗之弟婦也與隆緒時異衆議每遣使但致書洪基使專達禮意其報亦如之最為得體歐陽發文忠公事迹曰至和二年先公奉使契丹使其貴臣陳留郡王宗愿特哩衮大王宗熙北宰相蕭知足尚父中書令晉王蕭孝友來押宴曰此非常例以卿名重宗愿宗熙並契丹皇叔北宰相蕃官中最高者尚父中書令晉王是皇太后弟送伴使耶律元寧言自來不曽如此一併差近上親貴太臣押宴二年秋七月八月契丹國志曰秋七月彗出紫㣲垣歴七星其色白長丈餘八月朔日食三年春三月冬十月續資治通鑑長編曰嘉祐二年春三月乙未契丹遣林牙左監門衛上將軍耶律防樞密直學士給事中陳顗來求聖容戊戌右諫議大夫權御史中丞張昇為回謝契丹使單州防禦使劉永年副之初契丹主宗真送其像及隆緒畫像凡二軸求易真宗皇帝及上御容既許之㑹宗真死遂寢至是契丹遣使再求故命昇等諭令更持洪基畫像來即與之昇等至契丹果欲先得聖容昇拆之曰昔文成弟也弟先兄于禮為順今南朝乃伯父當先致恭契丹不能對以未如其請夜載巨石塞驛門衆皆恐永年擲去之由是世傳永年有神力秋九月庚子契丹遺樞密使左金吾衛上將軍蕭扈宣政殿學士禮部尚書吳湛來再求御容且言當致洪基像冬十月己酉翰林學士工部郎中知制誥史館修撰胡宿為回謝契丹使禮賔使李綬副之且許以御容約因賀正使置衣篋中交致焉四年春正月壬申朔遣使報哀于宋契丹國志曰太皇太后崩帝遣懷徳節度使蕭尚延詣宋告哀宋仁宗發哀于内東門幄殿百官進名奉慰輟視朝七日癸酉宋遣使奉宋主繪像來邵愽聞見後録曰嘉祐二年秋契丹求仁宗皇帝御容議者慮有厭勝之術帝曰吾待契丹厚必不然遣御史中丞張昇遺之契丹主盛儀衛親出迎一見驚肅再拜語其下曰真聖主也秋八月契丹國志曰秋八月朔日食五年春正月契丹國志曰春正月朔日食二月東國通鑑曰文宗仁孝王十三年春二月遣告奏使尚書工部員外郎崔奭珍如契丹六年春正月契丹國志曰春正月大星隕東南有聲如雷七年夏四月東國通鑑曰文宗仁孝王十五年契丹東京回禮使檢校工部尚書蕭色實來夏六月契丹國志曰六月朔日食四分魏坤倚晴閣雜抄曰燕京歸義寺遼刹也天王殿前一碑無撰人姓氏額題彌陀邑特建起院碑文稱寺肇自清寧七年買徐員外地遂為歸義寺備書寺基墻垣尋尺以及佛像經藏之數碑隂首書疏主懴悔師守司徒純慧大師賜紫沙門守臻本行僧録檢校司空精修大師賜紫沙門智清次載邑衆姓名開府儀同三司守太尉兼中書令豳國公劉二元開府儀同三司兼侍中開國公趙徽建雄軍節度使開國公劉需諫議馬子詮尚書張挺中舍李思缺秘書省校書郎劉文左班殿直韓允右班殿直王規燕遼國妃劉蕭氏遼國夫人鄭杜氏其餘邑首邑長邑正押司官印官副正副録収録錢物名號不一又數十人鶚按道宗加僧守志守司徒見于咸雍二年加圓釋法鈞二僧守司空見于咸雍六年觀此碑知加司徒司空者先有守臻智清名器之濫從可知矣本紀第二十二道宗二九年春三月辛未宋主禎殂邵愽聞見後録曰仁宗皇帝崩遣使訃于契丹燕境之人無逺近皆聚哭契丹主執使者手號慟曰四十二年不識兵革矣後山談叢曰仁宗崩訃于契丹𦵏而來祭以黄白羅為錢他亦稱是咸雍元年夏四月東國通鑑曰文宗仁孝王十九年夏四月契丹遣寧逺軍節度使耶律寕益州管内觀察使丁文通來加册王為守正保義四字功臣食邑三千户食實封三百户賜九旒冠九章服玉圭玉册象輅衣襨匹段弓箭鞍馬等物又遣利州管内觀察使耶律廸衛尉卿麻晏加册王太子為兼侍中加特進賜九旒冠九章服牙笏竹册革輅衣襨匹段鞍馬弓箭等物二年春三月壬午彗星見於西方契丹國志曰春三月彗見西方庚申晨見于室本大如月長七尺許壬午孛于畢如月至五日沒九朝編年備要曰治平三年契丹改號大遼三年夏六月辛亥宋以即位遣陳襄來報陳襄古靈文集使還咸熙館道中作詩曰土曠人稀使驛賖山中殊不䫫中華白沙有路鴛鴦泊芳草無情妯娌花氊館夜燈眠漢節石梁秋吹動邊笳歸來攬照㸔顔色斗覺霜毛兩髩加鶚按宋史藝文志陳襄國信語録一卷四年宇文懋昭大金國志曰太祖武元皇帝阿古逹生于遼咸雍四年戊申初在妊娠時骨重異常將生河水為沸野獸盡嘷及生若有光照其室部落咸異之本紀第二十三道宗三九年夏四月契丹國志曰夏四月朔日食十年春三月契丹國志曰春三月遼遣使蕭扈詣宋争河東地界國書大略言河東路㳂邉増修戍壘起鋪舎侵入彼界蔚應朔三州界内乞行毁撤别立界至等事宋神宗面諭以三州地界俟差官與北朝職官就地頭檢視定奪雄州外羅城今修已十三年即非創築又非近事北朝既不欲如此更不令接續修築白溝館驛亦俟差官檢視如有創盖樓宇箭忩等並令拆去屯戍兵級並令抽囬國書亦云倘事由夙昔固難狥情誠有侵踰何怯改正秋九月遼使蕭素冄詣宋議疆事宋遣劉忱吕大忠與之共議于代州遼指蔚應朔三州分水嶺土隴為界凡山皆有分水嶺相持不决六月戊辰親出題試進士元好問遺山文集顯武將軍吳君阡表云君諱璋字器玉姓吳氏石晉末有官獻州從少帝北行者又自遼陽遷㤗州其子孫遂為長春人六世祖匡嗣遼開府儀同三司同中書門下平章事陳國公五世祖昊咸雍十年劉霄牓登科蘓軾東坡題跋曰昔余與北使劉霄㑹食霄誦僕詩云痛飲從今有幾日西軒月色夜來新公豈不飲者耶癸辛雜識曰金人天㑹中皇子郎君破真定拘境内進士立試場禇承亮字茂先宣和中已擢第至此匿不出軍中知其才遂押付安國寺對䇿大抵以徽宗無道欽宗失信為問舉人承風㫖極行詆毁茂先詣主文劉侍中云君父之過豈臣子所宜言耶即揖而出劉為變色劉侍中名霄遼咸雍中狀元怨宋人海上之盟故發此問太康元年春三月冬十月陳振孫書録解題曰熙寧正旦國信録一卷天章閣待制竇卞熙寧八年使遼所記契丹國志曰春三月遼復遣蕭禧賫國書詣宋以劉忱等迂誕為言宋命沈括為報使詣遼靣議括尋於樞密院閲案牘得契丹頃嵗地界書指古長城為分界今所争乃黄嵬山相逺三十里其議遂決冬十月彗出軨東都事畧曰熙寧七年遼遣蕭禧來言代北對境有侵地請遣使同分畫神宗許之遣太常少卿劉忱為使秘書丞吕大忠為副已而大忠丁家難有詔起復忱出疆遼主又遣蕭禧來時劉忱吕大忠執不可與執政知不可奪乃罷忱許大忠終制於是王安石曰將欲取之必固與之以筆畫其地圖以天章閣待制韓縝奉使盡舉與之盖東西棄地五百餘里葉夣得石林詩話曰元豐初遼人來議地界韓丞相玉汝自樞密院都承㫖出分畫玉汝有愛妾劉氏將行劇飲通夕旦作樂府詞留别翌日神宗已密知忽中批步軍司遣兵為般家追送之玉汝初莫測所自乆之方知其自樂府發也劉貢父玉汝姻黨即作小詞寄之以戯云嫖姚不復顧家為誰謂東山乆不歸卷耳幸容攜婉孌皇華何啻有光輝韓元吉桐隂舊話曰契丹使每嵗至中國索食料多不時珍異之物州縣撓動莊敏公諱縝玉汝之使契丹入其境稍深則必索猪肉及胃臟之屬從者莫能曉盖燕北第産羊俗不畜猪驛司馳騎疲於奔命無日不加箠楚所以困之爾既回程與送伴者飲率盡醉然公翊日乗騎如故初不病酲也益取隨行大盃酌勸之伴者不能勝屢至委頓臨别痛飲達旦及叙違馬上幾不能相揖後聞契丹責伴者以失儀沙袋擊之至死二年書録解顯曰接送伴語録一卷集賢校理沈季長熙寧九年接送伴使耶律運所記三年宋史神宗紀熙寧十年以蘇頌為遼主生辰使張舜民畫墁録曰熙寧中蘇子容使遼姚麟為副曰盍載些小圑茶乎子容曰此乃供上之物疇敢與遼人未幾有貴公子使遼廣貯團茶自爾遼人非團茶不貴也常以二團易蕃羅一疋鶚按蔡寛夫詩史曰韓襄客者漢南女子為歌詩知名漢襄間孟浩然贈詩曰只為陽臺夣裏狂降來教作神仙客襄客閨怨詩曰連理枝前同設誓丁香樹下共論心先公熙寧中迓契丹使成堯錫見遺衣服刺此聨於褁肚上其下復刺丁香連理男女設誓之狀契丹重此句為佳製四年夏六月契丹國志曰夏六月朔日食東南有大星出如瓠𤓰聲如雷其光燭地本紀第二十四道宗四六年契丹國志曰秋七月彗出太㣲垣八年龎元英文昌雜録曰元英昨充元豐五年賀北國正旦國信使行至神水驛苦風眩昏亂不記省隨行小吏軰皆環坐以泣通一昔方稍安是年正旦接伴杜刑部鉉至深澤縣界中咯血幾不可救劉右司摯充賀同天節接伴㳂路病傷寒至滑州増劇然艾數百肩輿以歸後數月方安一嵗中奉使者皆得疾危甚殊可怪也契丹國志曰八月朔日食隂雲不見九年秋八月高麗王徽薨己巳以高麗王徽子三韓國公勲權知國事冬十二月辛夘髙麗王韓國公王勲薨東國通鑑曰王勲少有疾居廬哀毁疾益篤十月乙未薨于䘮次母命國原公運即位于宣政殿遣侍御史李資仁如遼告哀資仁至遼帝勅不許入京館詔問二君連逝必有他故合奏實情資仁奏國公夙有疾恙加以哀毁遂至大漸實無他故願留臣等特遣使到本國究問臣若誣罔當服重罪語甚切直帝出御城外氊殿引見慰諭十年春正月丙午復建南京奉福寺浮圖朱彛尊日下舊聞載遼奉福寺佛頂尊勝陀羅尼石幢記曰京師奉福寺懴悔主崇禄大夫檢校太尉純彗大師之息化也附靈塔之巽位樹佛頂尊勝陀羅尼幢廣丈有尺門弟子狀師實行以記為請大師諱非濁字貞照俗姓張氏其先范陽人重熙初禮故守太師兼侍中圓融國師為師居無何嬰腳疾乃遯遷盤山敷課于白繖蓋每宴坐誦持常有山神敬侍尋克痊八年冬有詔赴闕興宗皇帝賜以紫衣十八年勅授上京管内都僧録秩滿授燕京管内左街僧録屬鼎駕上仙驛徴赴闕今上以師受眷先朝乃恩加崇禄大夫檢校太保次年加檢校太傅太尉師搜訪闕章聿修睿典撰徃生集二十卷進呈上嘉歎乆之親為帙引尋龕次入藏清寧六年鑾輿幸燕回次花林師侍坐于殿靣受燕京管内懴悔主菩薩戒師明年設壇于本寺懴受之徒不可勝紀九年四月示疾告終于竹林寺即以其年五月移􅉎于昌平縣司空豳國公仰師高躅建立寺塔并營是幢庶陵􅊤有遷而音塵不冺清寧九年五月講僧真延撰并書周篔析津日記曰廣恩寺遼之奉福寺也在白雲觀西南地名栗園按遼史南京有栗園蕭韓家嘗典之疑即此地也高麗史世家曰宣宗元年夏四月遼遣勅祭使益州管内觀察使耶律信慰問使廣州管内觀察使耶律彦等甲戌祭文宗曰惟靈性極禮義之端體涵中和之粹王爵馭貴早襲青社之封本神則仁全賦東方之氣躬懷忠欵以力行述職貢而嵗至一匡致主朝廷頼其勲千里于蕃生民受其賜方當拱手以仰成何意上天之不遺聞訃悼懷輟朝增欷嗚呼嵗隂不留人生如寄一千年時運之逢五十載君臣之義遽藏夜􅊤之舟難秘東國之器宜遄遣於軺音俾徃申於奠禮魂兮有知歆此至意丁丑祭順宗曰惟靈辰象純精嶽瀆秀氣慶發世國才為王臣甫從英妙之年爰被寵嘉之命撫封日域述職天朝翊戴輸勤開庇底乂方茂稱藩之績遽纒陟岵之憂議以奪情俾其襲爵指軺騑之既駕聞驛訃之云來復嗟殱良益用震悼舟􅊤之不永乃人琹之遽亡言念忠圖想見風矩臨遣輪馭徃陳尊觴冥神有知諒我遐意大安元年冬十一月丙辰遣使册三韓國公王勲子運為高麗國王東國通鑑曰宣宗思孝王運二年冬十一月遼遣保静軍節度使蕭璋崇禄卿温嶠等來册王為特進檢校太師兼中書令上柱國食邑一萬户食實封一千户兼賜冠冕車馬圭印衣帯綵段等物二年夏六月秋七月契丹國志曰夏六月有星如𤓰出文昌秋七月朔日食隂雲不見戊寅高麗遣使謝封册東國通鑑曰宣宗思孝王三年五月遣知中樞院事李子威謝册命又遣尚書右丞韓瑩告奏時遼欲於鴨緑江將起𣙜場故請罷之本紀第二十五道宗五三年陸游老學菴筆記曰趙相挺之使遼方盛寒在殿上遼主忽顧挺之耳愕然急呼小閹指示之俄持一小玉盒子至盒中有藥色正黄塗挺之兩耳周匝而去其熱如火既出殿門主客者揖賀曰大使耳若用藥遲且拆裂缺落甚則全耳皆墮而無血扣其玉盒中藥為何物乃不肯言但云此藥市中亦有之價甚貴方匕直錢數千某軰早朝遇極寒即塗少許吏卒軰則别有藥以􅈢溺調塗之亦效鶚案趙挺之哲宗朝出使遼史失載宋史又無年月因附于此四年秋九月冬十一月東國通鑑曰宣宗思孝王五年九月遣太僕少卿金先錫如遼乞罷鴨緑江𣙜場冬十一月先錫還自遼回詔曰屢抗封章請停𣙜場諒惟細故詎俟繁辭適議便宜況末創置務從安帖以盡傾輸釋乃深疑體予至意五年春三月秋八月苕溪漁隠叢話曰蘇子由奉使契丹寄子瞻云誰將家集過幽都每被行人問大蘇莫把文章動蠻貊恐妨談笑卧江湖澠水燕談録云張芸叟奉使大遼宿幽州館中有題蘇子瞻老人行者聞范陽書肆亦刻子瞻詩數十篇謂之大蘇集陸嘉淑辛齊詩話曰蘇子由為賀遼生辰國信使在元祐四年八月子瞻有詩送之既至國人每問大蘇學士安否子由經􅃰州寄詩曰誰將家譜到燕都識底人人問大蘇莫把聲名動蠻貊恐妨他日卧江湖子瞻得詩次韵云氊毳年來亦甚都時聞鴂舌問三蘇那知老病渾無用欲向君王乞鑑湖聞曩時有刻石于使館者今無存矣蘇轍欒城集北使還論北邊政事劄子曰北朝皇帝年顔見今六十然舉止輕健飲㗖不衰在位既乆頗知利害與朝廷和好年深人人安居不樂戰闘加以其孫燕王㓜弱頃年契丹大臣誅殺其父常有求報之心故欲依倚漢人託附本朝為自固之計接伴耶律恭燕京三司使王經副留守邢希古中京度支使鄭顓之流皆言及和好咨嗟歎息以為自古所無有又稱道北朝皇帝所以館待南使之意極厚有接伴臣等都管一人未到帳下除翰林副使送伴副使王可離帳下不數日除三司副使皆言縁接伴南使之勞契丹國志曰春三月晝有流星出西北岳珂桯史曰承平時國家與遼歡盟文禁甚寛輅客者徃來率以談謔詩文相娛樂元祐間東坡實膺是選遼使素聞其名思以竒困之其國舊有一對曰三光日月星凡以數言者必犯其上一字於是徧國中無能屬者首以請于坡坡唯唯謂其介曰我能而君不能亦非所以全大國之體四詩風雅頌天生對也盍先以此復之介如言方共歎愕坡徐曰某亦有一對曰四徳元亨利使睢盱欲起辯坡曰而謂我忘其一雅謹閟而舌兩朝兄弟邦卿為外臣此同仁廟之諱也使出不意大駭服自愧弗及迄白溝徃返齚舌不敢復言他六年王暐道山清話曰元祐五年先公為契丹賀正使契丹主問范純仁今在朝否公曰純仁去年六月以觀文殿學士知頴昌府又問何故教出外先公云純仁病足不能拜暫令補外飬病爾又問吕公著如何外補先公曰公著去年卒于位初不曽外補乃咨嗟曰朝廷想見闕人先公曰見在召用舊人先是契丹主聞先公言純仁以足疾外補乃回顧近立之人㣲笑先公既北歸不敢以是載於語録嘗因便殿奏陳上㣲語曰通書說與純仁未幾先公捐館舎八年純仁再入相上首以此告之八年劉跂暇日記曰元祐七年遼賀正使耶律廸卒于滑州遼人倒縣其尸出滓穢口鼻中又以筆管刺皮膚出水以白礬塗尸令瘦但令支骨以歸九年冬十月甲子宋遣使告其母曹氏哀即遣使弔祭畫墁録曰元祐末宣仁聖烈太后上賔遼人遣使弔祭回至滑州使死刳其中央以頭内孔中植其足又取葉數百披搯徧體别造轂車方能行次年春予被差報謝入蕃見其轍路深尺餘此蕃國貴人禮也賤者則燔之以歸又曰元祐末宇文昌齡聘契丹皇城使張璪价焉張頺齡樞府難其行璪哀請故事死於境外朝廷恩數甚渥遼人棺銀装枝三百兩既行璪飲冷食生無忌昌齡戒之不納果病噤不納粥藥至十許日既而三病三愈竟復命登對進前上靣哂之退語近臣曰張璪生還奈何詣政事堂諸公大笑至其家婦孫睥睨阿翁剗地又郤來也老學菴筆記曰王聖美子韶元祐末以大蓬送北客至瀛賜宴罷有振武都頭卒不堪一行人須索忽操白刃入斫聖美其子冐死直前䕶救中三刀左肩幾斷虞候卒繼至傷者六人死者一人聖美腦及耳皆傷甚明日不能與遼使相見告以冐風得疾遼使戲之曰曽服花蘂石散否鶚按以上二事皆元祐末不知係何年聊附于此十年夏六月辛未宋遣使來謝弔祭郡齋讀書志曰張浮休使遼録二卷皇朝元祐甲戌春張舜民被命為回謝大遼弔祭使鄭介為副録其徃返地里及話言也舜民字芸叟自號浮休居士東都事畧曰舜民少慷慨善論事其使遼也見耶律延禧為皇太孫因著論以所喜者名茶古畫音樂美殊它日必有如張義潮挈十三州以歸當不四十年見之鶚按宋史宣仁太后以元祐八年九月崩遣使告哀于遼十二月遼人遣使來弔祭遼史不書使臣姓名宋史失書遣使報謝今据盡墁録及郡齋讀書志知為張舜民舜民自云次年春被差入蕃則甲戌為紹聖元年而晁氏以為元祐者悞是夏高麗國王運薨子昱遣使來告即遣使賻贈東國通鑑曰宣宗思孝王十一年五月壬寅王薨元子昱即位冬十二月遼勅祭使蕭遵烈副使梁祖述問慰使蕭裭起復使郭人文等來勅祭使詣魂堂祭宣宗慰問使傳詔於乾徳殿兼賜賻贈起復使亦於乾徳殿𫝊詔起復為驃騎大將軍檢校太尉兼中書令上柱國高麗國王食邑七千户食實封七百户本紀第二十六道宗六壽隆二年東國通鑑曰九月高麗右僕射參知政事樸寅亮卒寅亮文詞雅麗宋熙寧中與金覲使宋所著尺牘表狀及題咏宋人稱之至稱二公詩文號小華集遼嘗欲過鴨緑江為界寅亮修陳情表曰普天之下既莫非王土王臣尺地之餘何必曰我疆我理又曰歸汶陽之舊田撫綏敝邑回長沙之拙袖抃舞昌辰遼帝覽之寢其議卒諡文烈三年夏六月秋八月契丹國志曰夏六月朔日食秋八月彗星見西方又曰秋八月彗出氐斜指天井天市垣光芒三尺餘越三夕長丈餘埽尾星五年春三月契丹國志曰春三月帝命蕭徳崇等齎國書詣宋見宋哲宗跪言曰北朝皇帝告于南朝皇帝西夏早休得即甚好哲宗答曰西人累年犯順理須討伐何煩遣使徳崇等唯唯而退其國書畧云粤惟夏臺實乃藩輔累承尚主迭受封王近嵗以來連表馳奏稱南兵之大舉入西界以深圖懇求救援之師用濟攻伐之難理當依允事貴解和蓋遼之於宋情重祖孫夏之於遼義隆甥舅必欲兩全於保合豈知一失於綏存而且于彼慶歴元豐中曽有報聞皆為止退寜謂輙違先㫖仍事逺征儻蔽議以無從慮造端而有自宋國報書曰惟西夏之小邦乃本朝之藩鎮曲加封植俾獲安全雖於北嘗與婚姻之親而在南全居人子之分含容寢乆變詐多端爰自累嵗以來無復事上之禮賜以金繒而不已加之封爵而愈驕殺掠吏民圍犯城邑推原罪惡在所討除聊飭邊防稍修武備據守要害控扼奔衝輙于去嵗之冬復驅竭國之衆來攻近寨凡渉兩旬自取死傷數以萬計糧盡力屈衆潰宵歸更為詭誕之辭徃求援救之力狡獪之甚於此可知采聼之間固應洞曉必謂深加沮郤乃煩曲為勸和示以華緘將之聘幣禮雖形於厚意事實異於前聞􅃡料雅懷誠非得已顧於信誓殊不相闗惟昔興宗致書仁祖諭恊力蕩平之意深同謀外禦之情至欲全除使無噍類謂有稽於一舉誠無益於兩朝祖宗昭謀斯為善美子孫繼志其可弭忘今者詳味縟辭有所未喻輒違先㫖諒不在兹六年秋七月契丹國志曰秋七月熒惑犯房心冬十一月丙子召醫巫閭山僧志達設壇于内殿蘇轍欒城集北使還論北邊政事劄子曰北朝皇帝好佛法能自講其書每夏季輒令諸京僧徒及其羣臣執經親講所在修蓋寺院度僧甚衆因此僧徒縱恣放債營利侵奪小民民甚苦之洪皓松漠紀聞曰道宗末年阿古逹來朝以烏舍從與遼貴人䨇陸貴人投瓊不勝妄行馬阿古逹憤甚拔小佩刀欲剚之烏舍急以手握鞘阿古逹止得其柄杙撞其胷不死道宗怒侍臣以其強悍咸勸誅之道宗曰吾方示信以待逺人不可殺或以王衍縦石勒張守珪赦安禄山終致後害為言亦不聴卒至叛遼用烏實為謀主阿固達且死嘱其子固倫善待之十一月庚申宋遣使來謝帝不豫陸游家世舊聞曰楚公佃字農師使遼歸擕所得獾狸至京師先君言猶記其状如大鼠而極肥腯甚畏日偶為隙光所射輒死惟能糜肉一鼎之肉用此物一臠投鼎中當即糜然遼人亦不以此為貴但謂味珍耳楚公使遼時有小契丹執事甚謹亦能華言因食夾子以食不盡與之拜謝而不食問其故曰将以遺父母公喜更多與之且問識此何物也曰人言是石榴意其言食留也又遼人負戴隨行物不用兵夫但遇道上行者即驅従耳一日将就道忽遇一擔夫前訴曰某是燕京進士不能負擔公為言遣之楚公言南使過中京舊例有樂來迎則以束帛與之公以十一月二十日至中京遼人作樂受帛自若也明旦迓使輒止不行曰國忌行香公照案牘則國忌正二十日也因移文問之曰去年昨日作忌今年今日作忌何為不可葢利束帛故徙忌日耳又囘途送使聞其主喪而不能作哀也但以墨滅幞頭之光行數日既除服則佩服如常矣副使忘洗幞頭見者大笑公平生待物以誠因從容與語使之洗副使亟謝遼史拾遺卷十
