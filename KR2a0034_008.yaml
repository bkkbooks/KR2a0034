body:
  text: 遼史拾遺卷八錢塘厲鶚撰本紀第十五聖宗六二十八年夏五月丙午髙麗西京留守康兆弒其主誦擅立誦從兄詢詔諸道繕甲兵以備東征髙麗史曰獻哀王太后皇甫氏戴宗之女生穆宗穆宗即位册上尊號曰應天啓聖靜德王太后穆宗年已十八太后攝政居千秋殿號千秋太后與金致陽通而生子欲以其子嗣王位時顯宗為大良院君太后忌之强令出家寓居三角山神穴寺時稱神穴小君太后屢遣人謀害一日使內人遺以酒餅皆和毒藥內人到寺求見小君欲親勸食寺有僧輒匿小君於地穴中紿之曰小君出遊山中安知去處耶及內人還散之庭中鳥雀食而即斃凡忠臣義士尤所忌憚多以非罪陷之穆宗不能禁十二年正月千秋殿灾太后入長生殿後康兆殺致陽父子流太后親屬于海島又使人弒穆宗於是太后歸居黃州者二十一年顯宗二十年薨于崇德宫夀六十六葬幽陵東國通鑑曰穆宗母千秋太后皇甫氏逼大良院君詢為僧初洞州人金致陽太后外族性姦巧嘗詐祝髮出入千秋宫頗有醜聲成宗杖配逺地成宗薨召授闔門通事舍人不數年貴寵無比百官豫奪皆出其手親黨布列勢傾中外起第至三百餘間臺榭園池窮極美麗日夜與太后遊戲無所畏忌洞州立祠額曰星宿寺又于宫城西北隅立十王寺其圖像竒怪難狀潜懷異志以求隂助凡器皿皆銘其鐘銘曰當生東國之時同修善種後往西方之日共證菩提王嘗欲黜之恐傷母志不敢也至是太后生子是私致陽所生也與致陽謀為王後忌大良院君強令出家年十二初寓崇教寺有僧夢見大星隕于寺庭變為龍又變為人即大良院君也由是衆多竒之後寓居三角山神穴寺太后潜遣人謀害者屢矣寺有老僧穴地室中匿之而上置卧榻以防不測十二年春正月庚午王不豫召給事中蔡忠順入卧內辟左右語曰朕朝夕入地太祖之孫惟大良院君在卿與崔沆素懷忠義宜盡心匡扶使社稷不屬異姓忠順等議遣宣徽判官皇甫俞義郎將文演等往迎于神穴寺西北面巡檢使康兆舉兵來遂謀廢立先是王知金致陽謀變召太良院君又知殿中監李周禎附致陽權授西北面都巡檢副使即日發遣仍徴兆入衛兆聞命行至洞州龍泉驛內史主書魏從掌書記崔昌曽坐事被黜深怨朝廷常欲搆難二人俱謁兆紿曰主上疾篤命在頃刻太后與致陽謀奪社稷以公在外手握重兵恐或不從矯命徴召足下速還本道舉義兵保國全身時不可失兆然之以為王已薨朝廷悉被致陽詿誤便回本營太后忌兆來遣內臣守岊嶺使遏行人兆父患之為書納竹杖中令奴剃髮為僞詭言妙香山僧報兆云王已賔天姦凶用事可舉兵來以靖國難奴晝夜急走至兆所氣竭而斃兆探杖得書愈信王薨遂與副使吏部侍郎李鉉雲等領甲卒五千至平州始知王未薨喪氣垂頭良久諸將曰業已來矣不可止也于是兆决意廢立不知王已迎大良院君乃遣分司監察御史金應仁率兵往迎之二月己丑大良院君詢即位康兆廢王為讓國公遣兵誅致陽父子流其黨及太后親屬三十餘人于海島康兆弒前王于積城縣踰月火葬縣南陵曰恭陵諡宣靈廟號愍宗臣民莫不痛憤而新王未知也至契丹興師問罪乃知被弒改諡宣讓廟號穆宗夏六月契丹國志曰統和二十八年夏六月契丹遣使往宋告糴宋詔雄州出粟二萬石賤價賑之秋七月東國通鑑曰顯宗元文王元年秋七月契丹遣給事中梁炳大將軍耶律允來問前王之故冬十月丙午朔王詢遣使奉表乞罷師不許髙麗史曰顯宗元年秋八月丁未朔遣內史侍郎平章事陳頔直中臺尚書右丞尹餘如契丹九月遣左司員外郎金延保如契丹秋季問候左司郎中佐暹將作丞白日升如契丹東京修好冬十月癸丑契丹遣給事中髙正闔門引進使韓杞來告興師參知政事李禮均右僕射王同穎如契丹請和十一月丙子朔遣起居郎薑周載如契丹賀冬至契丹遣將軍蕭凝來告親征十一月乙酉大軍渡鴨緑江康兆拒戰敗之退保銅州丙戌兆復出右皮室詳衮耶律圖魯擒兆及副將李立追殺數十里獲所棄糧餉鎧仗東國通鑑曰十一月辛卯契丹主自將步騎四十萬號義軍天兵渡鴨緑江圍興化鎮巡檢使楊規鎮使鄭成副使李守和嬰城固守壬辰康兆等分軍出龜州北恧頓湯井曙星三道與契丹戰敗績契丹主獲通州城外收禾男女各賜錦衣授紙封一箭以兵三百餘人送興化鎮諭其將箭封書曰朕以前王誦服事朝廷其來久矣今逆臣康兆弒君立幼故親率精兵已臨國境汝等擒康兆送駕前即便回兵不然直入開京殺汝妻孥癸巳又敕曰朕以前王誦紹其祖服為我藩臣捍禦封陲忽被姦凶所害朕將精鋭來討罪人其餘脅從皆與原免况汝等受前王撫綏之惠知厯代順逆之由當體朕懷無貽後悔是日李守和等上表陳謝甲午契丹主以錦衣銀器等物賜鎮將有差仍敕曰省所上表奏具悉朕纂承五聖臨御萬邦忠良則必示旌褒凶逆則須行誅伐以康兆弒其故主挾彼幼君轉恣姦豪大示威福故親行誅伐以臨近境比頒綸㫖式示招懷遽覽封章未聞歸欵汝等必知逆順豈可助謀于逆黨不思雪憤于前王宜顧安危預分禍福乙未守和又回奏云臣等昨奉詔泥輒陳心石望賜泣辜之惠切祈解網之仁契丹主見表知其不降丁酉解圍以二十萬兵屯于麟州納喇丹更以二十萬兵進至通州移軍銅山下康兆引兵出通州城南分軍為三隔水而陳一營于州西據三水之㑹兆居其中一營于近州之山一附城而營兆以劔車排陳契丹兵至合攻之無不摧靡契丹兵屢退兆遂有輕敵之心與人彈棋契丹先鋒耶律文努率詳衮耶律圖魯擊破三水寨鎮主告契丹兵至兆不信曰如口中之食少則不可宜使多入再告急曰契丹兵已多入兆驚起曰信乎恍惚若見穆宗立於其後叱之曰汝奴休矣天伐詎可逃耶兆即脫鍪長跪曰死罪死罪言未訖契丹兵已縛兆裹以氊載之以去李鉉雲盧戬盧顗楊景李成佐等皆被執盧頲徐嵩盧楨皆死我軍大亂契丹兵乘勝追奔數十里斬首三萬餘級所棄糧餉鎧仗不可勝計于是契丹兵斬兆長驅而進左右竒軍將軍金訓金繼夫李元申寧漢伏兵于緩項嶺皆執短兵突出敗之契丹兵小却戊子銅霍貴寧等州皆降巴雅爾至努克特嶺遇敵兵戰敗之辛卯王詢遣使上表請朝許之禁軍士俘掠以政事舍人馬保佑為開京留守安州團練使旺布為副留守遣太子太師伊林將騎兵一千送保佑等赴京壬辰守將卓思正殺遼使者韓喜孫等十一人領兵出拒保佑等還遣伊林領兵擊之思正遂奔西京圍之五日不克駐驆城西髙麗禮部郎中渤海托實來降庚子遣巴雅爾文殊努等攻開京遇髙麗兵敗之王詢棄城遁去遂焚開京至清江還東國通鑑曰初王聞契丹兵至遣中郎將智蔡文將兵鎮和州以備東北及兆敗命蔡文移兵援西京蔡文即與軍容使崔曷進次剛德鎮甲寅契丹兵陷肅州盧顗為嚮𨗳與契丹人劉經賫檄至西京諭降副留守元宗奭與僚佐崔緯咸質揚澤文晏等修表欲降蔡文等聞之引兵至西京城門閉曷呼分臺御史曹子竒曰吾等奉王命倍道而來不納何也子竒具告顗經諭降之故遂開門蔡文入屯故宫南郭曷諷宗奭執顗等固守宗奭不從曷密與蔡文謀遣兵伏城北候顗等還掩殺之取其降表焚之時城中疑二蔡文出屯城南獨大將軍鄭忠節從之俄而東北界都巡檢使卓思政率兵而至與之合軍復入城王以三軍敗衄州郡陷沒上表請朝契丹主許之遂禁俘掠以馬保佑為開城留守旺布副之遣伊林將騎兵一千送保佑等乙卯契丹主又使韓杞以突騎二百至西京城北門呼曰皇帝昨遣劉經盧顗等賫詔曉諭奈何至今了無消息若不拒命留守官僚來聼我指諭思政聞杞語謀諸蔡文使麾下鄭仁等將驍騎突出擊斬杞等百餘人餘皆擒之無一人還者思政以蔡文為先鋒出與戰伊林保佑敗走於是人心稍安思政還入城蔡文與李元出屯慈惠寺契丹主復遣伊林擊之邏卒報契丹兵來屯安定驛其勢甚盛蔡文馳告思政丙辰遂與僧法言率兵九千迎擊於林原驛南斬首三千餘級法言死之翌日蔡文復出戰契丹兵敗走於是城中將士登城以望競出迎之至馬灘契丹兵回軍擊敗之契丹主次於城西佛寺思政懼紿將軍大道秀曰君自東門出吾自西門出前後夾攻蔑不勝矣遂以麾下兵夜遁道秀出東門始知見紿又力不可敵遂率所部降于契丹諸將皆潰城中洶懼己未統軍録事趙元隘守鎮將薑民瞻即將洪叶方休莫知所指乃共禱神祠筮得吉兆於是衆推趙元為兵馬使收散卒閉城固守辛未王南幸時智蔡文奔還奏西京敗軍狀羣臣議降薑邯贊獨曰今日之事罪在康兆非所恤也但衆寡不敵當避其鋒徐圖興復耳遂勸王南行蔡文請曰臣雖駑怯願在左右庶效犬馬之勞王曰昨李元崔曷奔還自請扈從今不復見為臣之義果如是乎今卿勞于外又欲捍衛深嘉乃忠仍賜酒食及銀裝鞍轡是夜王與后妃及吏部侍郎蔡忠順等禁軍五十餘人出京城二年春正月乙亥朔契丹主陷京城焚燒太廟宫闕民屋皆盡是日王次廣州失兩王后所在令蔡文往尋之至饒吞驛乃得奉還王喜為留三日乙酉契丹兵退髙麗史曰顯宗二年夏四月乙丑遣工部郎中王瞻如契丹謝班師十月乙丑遣都官郎中金崇義如契丹賀冬至十一月庚午遣刑部侍郎金殷傳如契丹賀生辰十二月契丹殺何拱辰又曰顯宗避契丹南幸何拱辰追謁于道奏曰契丹本以討賊為名今已得康兆若遣使請和彼必班師王筮得吉卦遂遣拱辰及髙英起奉表狀往契丹營拱辰行至曷化縣以表狀授郎將張旻副將丁恱先往契丹軍言曰國王固願來覲苐懼兵威又因內難出避江南遣陪臣拱辰等陳告事由拱辰等亦惶懼不敢前來請速收兵旻等未至契丹先鋒已至昌化拱辰等具陳前意契丹問國王安在答曰今向江南不知所在又問逺近答曰江南太逺不知幾萬里追兵乃還明年拱辰與英起至契丹營乞班師契丹主許之遂留拱辰等拱辰既被留內圖還國外示忠勤契丹主甚加寵遇與英起密謀奏曰本國今已喪亡臣等願領兵㸃檢而來契丹主許之尋聞王返國使英起居中京拱辰居燕京皆妻以良家女拱辰多市駿馬列置東路以為歸計人告其謀契丹主鞫之拱辰其以實對且曰臣於本國不敢有二心罪當萬死不願生事大朝契丹主義而原之諭令改節拱辰辭益厲不遜遂殺之爭取心肝食之開泰元年秋八月己未髙麗王詢遣田拱之奉表稱病不能朝詔復取六州地髙麗史曰顯宗三年夏四月契丹詔王親朝六月甲子遣刑部侍郎田拱之如契丹夏季問候且告王病不能親朝契丹主怒詔取興化通州龍州鐡州郭州龜州等六城九月己巳遣西頭供奉官文儒領如契丹來逺城冬十月庚午遣工部尚書參知政事張瑩禮部侍郎劉徴弼如契丹癸未契丹使太尉韓邠來十二月庚寅張瑩與契丹引進使李延𢎞來冬十二月契丹國志曰十二月朔日食司馬光涑水紀聞曰祥符中王沂公奉使契丹館伴邢祥頗肆談辨深自衒鬻且矜新賜鐡劵公曰鐡劵者蓋勳臣有功髙不賞之懼賜之以安反側耳何為輒及親賢祥大沮鶚按王曽奉使契丹遼宋兩史俱未載故不知確是何年因附于此曽有上契丹事一卷二年秋九月髙麗史曰顯宗四年春正月丁酉遣禮賔少卿張洎如契丹庚寅遣中樞院使蔡忠順如契丹三月戊申契丹使左監門衛大將軍耶律行平來責取興化等六城夏五月丁酉契丹來告改統和為開泰壬寅女真引契丹兵渡鴨緑江大將軍金承渭等擊却之秋七月戊申契丹使耶律行平復來索六城續資治通鑑長編曰大中祥符六年九月乙卯以翰林學士朝迥為契丹國主生辰使崇儀副使王希範副之龍圖閣侍制查道為正旦使供奉官闔門祗候蔚信副之三年夏六月契丹國志曰六月朔日食冬十月東國通鑑曰顯宗元文王五年冬十月契丹遣國舅詳衮蕭迪里來侵通州興化鎮將軍鄭仁勇别將周演擊敗之斬七百餘級溺江死者甚衆十二月釋文瑩玉壺清話曰祥符中契丹使至因言本國喜誦魏野詩但得上帙願求全部真宗始知其名將詔之死已數年搜其詩果得草堂集十卷賜之四年春正月壬寅東征髙麗史曰顯宗六年春正月契丹作橋于鴨緑江夾橋築東西城遣將攻破不克癸卯契丹兵圍興化鎮將軍髙積餘趙弋等擊却之甲辰又侵通州乙亥契丹侵龍州又曰夏四月契丹使將軍耶律行平來又索六州拘留不遣又曰九月甲寅契丹使監門將軍李松荗來索六城己未契丹來攻通州興化鎮大將軍鄭神勇别將周演散員任憶校尉楊春太醫丞孫簡太史丞康承穎等引兵出契丹軍後擊殺七百餘級神勇等死之丁卯契丹攻寧州城不克而退大將軍髙積餘將軍蘇忠元髙延迪散員金已别將光參等追擊死之契丹兵虜兵馬判官王佐録事盧元佐而去是嵗契丹取定逺興化二鎮城之五年髙麗史世家曰顯宗七年春正月庚戌契丹耶律世良蕭庫哩侵郭州我軍與戰死者數萬人獲輜重而歸甲寅契丹使十人到鴨緑江不納二月契丹王美延祥等七人來奔甲辰契丹曹恩髙和等六人來投夏五月契丹瑪爾保良旺布庫爾森等十三户來投乙丑契丹揚丹等三人來投六月戊寅契丹志甫等三人來投乙酉契丹張烈行色實塔舒爾王忠等三十户來投秋七月丁巳契丹由道髙宗等九人來投八月朱簡從道等八人來投九月契丹羅肯等五人來投辛未契丹奉春大誥里等十九人來投冬十一月契丹匡徹爾等十人來投十二月乙未契丹色佛埓等六人來投冬十二月丁酉宋遣張遜王承德來賀千齡節續資治通鑑長編曰大中祥符九年九月乙酉命樞密直學士工部侍郎薛映為契丹國主生辰使東染院使劉承宗副之夀春郡王友户部郎中直昭文館張士遜為正旦使供備庫使王承德副之鶚按遼史以張遜王承德來賀千齡節而失載薛映等誤六年夏五月東國通鑑曰顯宗元文王八年夏五月契丹蕭和卓圍興化鎮攻之九日不克將軍堅一洪光髙義出戰大敗之斬獲甚多六月契丹國志曰六月彗出北斗本紀第十六聖宗七七年春三月契丹國志曰春三月朔日食冬十二月蕭巴雅爾等與髙麗戰於茶陀二河遼軍失利天雲右皮室二軍沒溺者衆約尼帳詳衮阿克逹客省使卓庫渤海詳衮髙清明天雲軍詳衮哈里等皆死之東國通鑑曰顯宗元文王九年九月遣禮賔少卿元承如契丹請和戊戌契丹駙馬蕭遜寧帥兵來侵號十萬王以平章事薑邯贊為上元帥大將軍薑民瞻副之率兵二十萬八千三百屯寧州至興化鎮選騎兵一萬二千伏山谷中又以大繩貫牛皮塞城東大川以待之敵至决塞發伏大敗之遜寧引兵直趨京城民瞻追及于慈州來口山大敗之侍郎趙元又擊於馬灘斬獲萬餘級鶚按茶陀之戰東國通鑑月日與史異八年春正月東國通鑑曰顯宗元文王十年春正月庚申薑邯贊以契丹兵逼城遣兵馬判官金宗鉉領兵一萬倍道入衛京城東北面兵馬使亦遣兵三千三百入援辛酉蕭遜寧至新恩縣去京城百里王命收城外民户入內清野以待遜寧遣耶律好德賫書至通德門告以回軍潜遣候騎三百餘至金郊驛王遣兵一百乘夜掩殺之辛巳契丹回兵至漣渭州薑邯贊等掩擊斬五百餘級又曰二月己丑朔薑邯贊擊契丹兵于龜州大敗之時契丹兵過龜州邯贊等邀戰于東郊兩軍相持勝敗未决金宗鉉引兵赴之忽風雨南來旌旗北指我軍乘勢奮擊勇氣百倍契丹兵奔北我軍追擊之涉石川至於盤嶺僵尸蔽野俘獲人口馬駝甲胄兵仗不可勝數生還僅數十人契丹兵之敗未有如此時之甚契丹聞之大怒遣使責遜寧曰汝輕敵深入以至於此何面目見我乎朕當皮面然後戮之又曰八月契丹東京使工部少卿髙應夀來遣考功員外郎李仁澤如契丹東京東國史略曰契丹蕭遜寧來侵薑邯贊薑民瞻等前後戰于興化鎮及邑州大破之以薑邯贊檢校太尉門下侍郎天水縣開國男九年春二月東國通鑑曰顯宗元文王十一年春一月遣李作仁如契丹請稱藩納貢如故遂歸所留耶律行平等八月遣崔齊顔如契丹賀千齡節太平元年春二月三月東國通鑑曰顯宗元文王十二年春二月契丹遣御史大夫姚居信來聘三月契丹東京使散騎常侍張澄嶽來聘秋七月乙亥遣誥里取石晉所上玉璽于中京孔平仲珩璜新論曰仁宗朝有使遼者見遼主傳國璽詩云一時製美寶千載助興王中原既失守此寶歸北方子孫宜慎守世業當永曷二年春二月丁丑宋使薛貽廓來告宋主恆殂子禎嗣位遣都㸃檢耶律僧隱等充宋祭奠使副林牙蕭日新觀察馮延休充宋后弔慰使副戊寅遣金吾耶律錫林引進姚居信充宋主弔慰使副續資治通鑑長編曰乾興元年二月戊午上崩于延慶殿仁宗即皇帝位遣內殿承制闔門祗候薛貽矩告哀契丹契丹主聞真宗崩舉哀號慟因謂其宰相吕懋德曰與南朝約為兄弟垂二十年忽報登遐吾雖少兩嵗顧餘生幾何因復大慟又曰聞嗣皇尚少恐未知通好始末苟為臣下所間奈何及薛貽矩至具道朝廷之意契丹主喜謂其妻蕭氏曰汝可致書太宗皇太后使汝名傳中國乃設真宗靈御于范陽憫忠寺建道場百日下令國中諸犯真宗諱者悉易之遣殿前都㸃檢崇義節度使耶律僧隱翰林學士工部侍郎知制誥馬貽謀來祭奠右金吾衛上將軍耶律寧引進使姚居信來弔慰右金吾衛將軍蕭日新利州觀察使馮延休弔慰皇太后謝維新合璧事類後集曰真宗上仙遣薛貽廓使于是有告哀之名遣薛田使於是有遣留禮物之名遣任中行使於是有告登寶位之名遣劉鍇趙賀使於是有皇太后皇帝回謝禮物之名孰鶚按薛貽廓李燾作貽矩未知孰是夏四月東國通鑑曰顯宗元文王十三年夏四月契丹遣御史大夫蕭懷禮等來册王開府儀同三司守尚書上柱國高麗國王食邑一萬户食實封一千户仍賜車服儀物自是復行契丹年號秋八月續資治通鑑長編曰乾興元年八月壬寅以禮部郎中知制誥張師德為契丹妻蕭氏生辰國信使西京左藏庫副使趙忠輔副之東國通鑑曰契丹東京持禮使李克方來言自今春夏季問候使并差一次與賀千齡節正旦使同行秋冬季問候使并差一次與賀太后生辰使同行三年夏四月東國通鑑曰顯宗元文王十四年夏四月契丹遣左散騎常侍武白耶律克恭來册太子欽為輔國大將軍檢校太師守太保兼侍中高麗國公本紀第十七聖宗八五年春正月續資治通鑑長編曰天聖三年正月戊子契丹遣宣徽南院使朔方節度使蕭從順樞密直學士給事中韓紹方來賀長寧節冬十月辛未宋太后遣馮元宗史方來賀順天節續資治通鑑長編曰天聖三年九月庚辰朔以户部郎中知制誥夏竦為契丹生辰使內殿承制閣門祗候史方副之度支副使兵部郎中姜遵為正旦使內殿承制閣門祗候許懷信副之右正言直史館張規為契丹妻正旦使東頭供奉官閣門祗候趙應副之竦自言父承皓與契丹戰沒母喪未期義不可行改命工部郎中龍圖閣待制馮元宗契丹國志十月朔日食十二月續資治通鑑長編曰天聖三年十二月癸未契丹遣彰聖軍節度使蕭默色潘州觀察使鄭文囿來賀皇太后正旦乙亥宋使李維張綸來賀千齡節續資治通鑑長編曰維往使契丹主素服館勞加禮即席賦兩朝悠久詩下筆立成契丹主大喜六年春正月續資治通鑑長編曰天聖四年正月癸未契丹遣樞密副使彰武節度使蕭迪里歸義節度使康筠來賀長寧節冬十月乙丑宋遣韓翼田承說來賀順天節續資治通鑑長編曰天聖四年七月乙丑工部郎中龍圖閣待制韓億為契丹妻生辰使崇儀副使田承說副之詔億名犯北朝諱權改曰意承說皇太后之姻也庸而自專妄傳皇太后㫖于契丹曰南北歡好傳示子孫兩朝之臣勿相猜阻億初不知也契丹主命别置宴使其大臣來伴且問億曰太后有㫖大使宜知之何獨不言億對曰本朝每遣使太后必於簾前以此語戒之非欲達于北朝也契丹主聞之大喜舉手加額曰此兩朝生靈之福也鶚按宋以遼太祖諱改韓億名意遼史改曰翼猶以億字之半避嫌名爾七年春正月壬寅朔宋遣張保維孫繼業孔道輔馬崇至來賀續資治通鑑長編曰孔道輔使契丹契丹燕使者優人以文宣王為戲道輔艴然徑出契丹使主客者邀道輔還坐且令謝道輔正色曰中國與北朝通好以禮文相接今俳優之徒侮慢先聖而不之禁北朝之過也道輔何謝契丹君臣默然夏四月續資治通鑑長編曰天聖四年夏四月辛巳契丹遣林牙昭德節度使杜防政事舍人蕭藴賀乾元節記纂淵海曰天聖五年契丹遣蕭藴杜防來以程琳為館伴藴出坐位指曰中國使者至契丹坐位殿上今契丹使至中國不然請升之琳曰此真宗皇帝所定不可易防不能對曰令宰相議或曰此細事耳將許之琳曰後更有大者奈何遂止八年東國通鑑曰顯宗文元王十九年春二月遣禮部員外郎金哿如契丹東京契丹遣將軍耶律素等來聘冬十二月丁亥宋遣寇瑊康德來賀千齡節郡齊讀書志曰生辰國信語録一卷皇朝寇瑊與康德於天聖六年使契丹賀其主生辰往返語録并景德二年至天聖八年使副姓名及雜議于後九年秋八月己丑東京錫里軍詳衮大延琳囚留守駙馬都尉蕭孝先及南陽公主殺户部使韓紹勳副使王嘉四捷軍都指揮使蕭佛德延琳遂僣位號其國為興遼年為天慶東國通鑑曰顯宗文元王二十年九月契丹東京將軍大延琳遣大府丞高吉德告建國兼求援延琳渤海始祖大祚榮七代孫叛契丹國號奧遼建元天興十二月興遼國太師大延定引東北女真與契丹相攻遣使乞援王議諸輔臣侍中崔士威平章蔡忠順言兵者危事不可不慎彼之相攻安知非我利耶但可修城池謹烽燧以觀變耳王從之自此路梗與契丹不通十年秋八月丙午東京賊將楊詳世密送款夜開南門納遼軍擒延琳渤海平東國通鑑曰顯宗文元王二十一年秋九月興遼國郢州刺史孝匡祿來告急尋聞國亡遂留不歸遣金哿如契丹賀收復東京契丹遣千牛將軍羅漢努來詔曰近不差人往返為路梗今渤海偷主俱遭圍閉並以歸降宜遣陪臣速來赴國必無虞患十一年夏六月丁丑朔駐驆大福河之北己卯帝崩于行宫年六十一在位四十九年景福元年閏十月壬申上尊諡曰文武大孝宣皇帝廟號聖宗九朝編年備要曰隆緒自與朝廷通好嵗貢方物無巨細必親閲之守約甚固至是病劇召東平王蕭孝先使輔立其子宗真戒無失朝廷信誓契丹國志曰先是承天太后未歸政前帝已長立每事拱手或府庫中需一物必詰其所用賜及文武臣僚者允之不然不與帝既不預朝政縱心弋獵左右狎邪與帝為笑謔者太后知之重行杖責帝亦不免詬問御服御馬皆太后檢校焉或宫嬪讒帝太后信之必庭辱帝每承順略無怨辭好讀唐貞觀事要至太宗明皇實録則欽伏故御名連明皇諱一字又親以契丹字譯白居易諷諫集詔畨臣等讀之嘗云五百年來中國之英主逺則唐太宗次則後唐明宗近則今宋太祖太宗也或諸道進貢珍竒一無所取皆讓其弟親政後太后暴崩帝哀毁骨立哭必嘔血番漢羣臣上言山陵已畢宜改元帝曰改元吉禮也居喪行吉禮乃不孝子也羣臣曰古之帝王以日易月宜法古制帝曰吾契丹主也寧違古制不為不孝之人終制三年帝性英辨多謀神武冠絶遊獵時曽遇二虎方逸帝䇿馬馳之發矢連殪其二虎又曽一箭貫三鹿時幽州試舉人以一箭貫三鹿為賦題駙馬劉三嘏獻射二虎頌至于道釋二教皆洞其㫖律吕音聲特所精徹承平日久羣方無事縱酒作樂無有虛日與番漢臣下飲㑹皆連畫夕復盡去巾幘促席造膝而坐或自歌舞或命后妃以下彈琵琶送酒又喜吟詩出題詔宰相以下賦詩詩成進御一一讀之優者賜金帶又御製曲五百餘首幸諸臣私第為㑹時謂之迎駕盡歡而罷刑賞必信無有僣差撫柔諸番咸有恩信修睦宋朝人使餽送躬親檢校時黃河暴漲溺㑹同驛帝親擇夷坦地復創一驛每年信使入境先取宋朝登科記驗其等甲高低及第年月其賜賚物則密令人體探宋真宗上仙薛貽廓報哀入境幽州急遞先聞帝不俟貽廓至闕集番漢大臣舉哀后妃以下皆為沾涕因謂宰臣吕德懋曰吾與兄皇未結好前征伐各有勝負洎約為兄弟二十餘年兄皇升遐况與吾同月生年大兩嵗吾又得幾時也因又泣復曰吾聞侄帝聖年尚幼必不知兄皇分義恐為臣下所間與吾違拗矣後貽廓至闕逹宋聖意喜謂后曰吾觀侄帝來意必不失兄皇之誓復謂呂德懋曰晋髙祖承嗣聖爺爺之力深矣嗣聖太宗也爺爺翁呼也少主登位便背盟約皆臣下所惑今侄帝必敦篤悠久矣又謂后曰汝可先貽書與南朝太后偹述妯娌之分使人往來名傳南朝又詔燕京憫忠寺特置真宗御靈建資福道場百日而罷復詔沿邉州軍不得作樂後因御宴有教坊都知格守樂名格子眼轉充色長因取所譜宣讀帝欲更遷一官見本名正犯真宗諱因怒曰汝充御坊首領豈不知兄皇諱字遂以筆抹其宣而止燕京僧録亦犯真宗諱飭更名圓融尋下令國中應內外文武百僚僧道軍人百姓等犯真宗諱者悉令改之詔漢兒公事皆須體問南朝法度行事不得造次行事其欽重宋朝百餘事皆此類也末年染病渴疾多忌諱稱說死亡之人雖帝之父母尊號亦不得言之病亟乃驛召東平王蕭孝穆上京留守蕭孝先赴闕始以輔立之事面委之次以不得失宋朝之信誓而囑之又囑其子宗真曰皇后事我四十年以其無子故命汝為嗣我死汝子毋切毋殺之六月三日崩於上京東北三十里大斧河之行帳年六十一在位通太后臨朝凡四十九年葬上京西北二百里赤山廟號聖宗遼史拾遺卷八
