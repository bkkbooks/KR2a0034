body:
  text: 遼史拾遺卷四錢塘厲鶚撰本紀第五世宗一世宗孝和莊憲皇帝諱阮小字烏雲册府元龜曰永康王烏雲即東丹王之長子也後改名聿善丹青精音樂五代史曰德光死欒城烏雲與趙延壽及諸大將等俱入鎮州延壽自稱權知軍國事遣人求鎮州管鑰於烏雲烏雲不與延夀左右曰契丹大人聚而謀者訩訩必有變宜避之今中國之兵猶有萬人可以擊敵不然事必不成延壽猶豫不决烏雲妻延壽以為妹五月朔旦烏雲召延壽及張礪李嵩馮道等置酒酒數行烏雲謂延壽曰妹自上國來當一見之延壽欣然與烏雲俱入食頃烏雲出坐笑謂礪等曰燕王謀反鎖之矣諸君可無慮也又曰先帝汴州與我算子一莖許我知南朝軍國事昨聞寢疾無遺命燕王安得自擅耶礪等罷去烏雲召延壽廷立而詰之延壽不能對乃遣人監之而籍其家資烏雲宣德光遺制曰永康王大聖皇帝之嫡孫人皇王之長子可于中京即皇帝位中京契丹謂鎮州也遣使者告哀於諸鎮烏雲為人雋偉亦工畫能飲酒好禮士德光嘗賜以絹數千匹烏雲散之一夕而盡甲申次定州命天德實格嘉哩等護梓宫先赴上京資治通鑑曰契丹主烏雲以契丹主德光有子在國已以元子襲位又無舒嚕太后之命擅自立內不自安初契丹主安巴堅卒於勃海舒嚕太后殺酋長及諸將凡數百人契丹主德光復卒於境外酋長諸將懼死乃謀奉契丹主烏雲勒兵北歸契丹主以安國節度使滿達為中京留守以前武州刺史髙奉明為安國節度使晉文武官及士卒悉留於恆州獨以翰林學士徐台符李浣及後宫宦者教坊人自隨已已發真定契丹主喪至國舒嚕太后不哭曰待諸部一如故則葬汝矣太后聞帝即位遣太弟魯呼率兵拒之資治通鑑曰天福十二年漢主仍稱天福六月壬申契丹舒嚕太后聞契丹自立大怒發兵拒之契丹主以偉王為前鋒相遇於石橋初晉侍衛馬軍都指揮使李彥韜從晉主北遷𨽻舒嚕太后麾下太后以為排陳使彥韜迎降於偉王太后兵由是大敗契丹主幽太后於安巴堅墓胡嶠陷北記曰烏雲及舒嚕戰於石橋蓋沙阿之橋也南則姚家州北則宣化館至西樓五代史曰是嵗六月契丹國母徙晉帝於密州州去黃龍府西北一千五百里行過遼陽二百餘里而國母為永康王所囚永康王遣帝太后還止遼陽稍供給册府元龜曰馮道仕晉為相北敵入闕回先留與李嵩和凝文武百官等在常山閏七月二十九日敵中有僞詔追嵩令選朝士十人赴木葉山行事元帥嘉哩召道等至帳前以所欲諭之嵩偶先至見其㫖懼形於色嘉哩將與朝士齊遣之嵩乃不候道與凝先出既而相遇帳門外因與分手俱歸俄而李筠等縱火與敵交鬬鈹槊相及是日道若齊至與嘉哩相見稍躊躇則悉為俘矣論者以道在布衣有至行立公朝有重德其陰報昭感多此䫫也資治通鑑曰滿逹貪猾殘忍民間有珍貨美婦女必奪取之又捕村民誣以為盜披面抉目斷腕焚炙而殺之欲以威衆常以其具自隨左右懸人肝膽手足飲食起居於其間語笑自若出入或被黃衣用乘輿服御物曰兹事漢人以為不可吾國無忌也又以宰相員不足乃牒馮道判𢎞文館李嵩判史館和凝判集賢劉煦判中書其僣妄如此然契丹或犯法無所容貸故市肆不擾常恐漢人妄去謂門者曰漢有窺門者即斷其首以來滿達遣使督運於洺州洺州防禦使薛懷讓聞帝入大梁殺其使者舉州降帝遣郭從義將兵萬人㑹懷讓攻劉鐸於邢州不克鐸請兵於滿達滿逹遣其將楊安及前義武節度使李殷將干騎攻懷讓於洺州懷讓嬰城自守安等縱兵大掠於邢洺之境契丹所留兵不滿二千滿達令所司給萬四十人食收其餘以自入滿達常疑漢兵且以為無用稍稍廢省又損其食以飼北兵衆心怨憤聞帝入大梁皆有南歸之志前頴州防禦使何福進控鶴指揮使太原李榮潜結軍中壯士數十人謀攻契丹然畏契丹尚彊猶豫未發㑹楊衮楊安等軍出契丹留恆州者才八百人福進遂决計約以擊佛寺鐘聲為號辛巳契丹主烏雲遣騎至恆州召前威勝節度使兼中書令馮道樞密使李嵩左僕射和凝等㑹葬契丹主德光於木葉山道等未行食時鐘聲發漢兵奪契丹守門者兵擊契丹殺十餘人因突入府中李榮先據甲庫悉召漢兵及市人以鎧仗授之焚牙門與契丹戰榮召諸將并力護聖左廂都指揮使恩州團練使白再榮狐疑匿於别室軍吏以佩刀决幕引其臂再榮不得已而行諸將繼至烟火四起鼓譟震地滿達等大驚載寶貨家屬走保北城八月壬午朔契丹自北門入勢復振漢民死者二千餘人前磁州刺史李穀恐事不濟請馮道李嵩和凝至戰所慰勉士卒士卒見道等爭自奮㑹日暮有村民數千譟於城下欲奪契丹寶貨婦女契丹懼而北遁滿達劉晞崔廷勳皆奔定州與義武節度使邪律忠合忠即隆鄂特也太平御覽引周史曰徐台符仕晉為翰林學士中書舍人契丹之陷中原也台符從廬帳北至于薊門及戎人內潰乃竄身南歸初台符所乘馬好嘶鳴及自廬中回常露宿于草中馬騎連羣經其左右而台符馬若箝其口然及行至漢地即嘶鳴如故時人以為積善之所致也鶚按太宗滅晉自汴歸北從行者六人惟李浣事遼最久張礪旋卒馮道李嵩和凝留恆州徐台符隨烏雲至燕逃歸兹備其始末云又有趙瑩馮玉從北遷亦卒于契丹而瑩歸骨于汴天祿二年夏四月資治通鑑曰乾祐元年四月乙未契丹主如遼陽故晉主與太后馮后皆謁見有辰努者契丹主之妻兄也聞晉主有女未嫁詣晉主求之晉主辭以幼後數日契丹主使人馳取其女而去以賜辰努何薳春渚紀聞云晉出帝既遷黃龍府北主新立召與相見帝因以金碗魚盆為獻金碗半猶是磁云是唐明皇令道士葉法靜治化金藥成㸃磁碗試之者魚盆則一木素盆也方圓二尺中有木紋成二魚狀鱗鬛畢具長五寸許若貯水用則雙魚隱然湧起頃之遂成真魚覆水則宛然木紋之魚也至今句容人鑄銅為洗名雙魚者用其遺製也二年夏四月周篔析津日記曰京師仙露寺明一統志寰宇通志俱不載順天新舊志亦無之近菜市西居民掘地得石匣乃遼世宗天祿三年所瘞中藏舍利無有也匣如石槨而短小傍刻僧志願記具書布施金錢姓名記後有千人邑三字具列大遼皇帝皇后東明王夫人永寧大王燕主大王國舅相公宣徽令主李可與洛京留守侍中劉琋齊國夫人張氏男三司使道紀衙院馬九故太師侍中趙思溫男延照司徒李徹藥師努華喜寺行仙馬知讓邑頭尼定徽幼澄喜㜑舍利六百三十三粒欽送到舍利一百一十粒朱彛尊吉金貞石志載釋志願葬舍利佛牙石匣記略曰逹摩禪師逺涉流沙登雪嶺得釋迦舍利佛牙授與先師先師諱清珦閩川人自㑹同五載仲秋賫舍利佛牙到此於八年季春月蓂凋十一葉染疴而逝臨遷化時將舍利佛牙付仙露寺講維摩經比邱尼定徽建窣堵波尋具表奏聞大遼皇帝降宣頭一道錢三百貫以充資助於天祿三年嵗次己酉四月十三日安葬施主名具鐫于後四年春二月秋七月五代史曰乾祐二年二月徙晉帝太后於建州自遼陽東南行千二百里至建州節度使趙延暉避正寢以館之去建州數十里外得地五十餘頃帝遣從行者耕而食之明年三月太后寢疾無醫藥嘗仰天而泣南望㦸手罵杜重威李守貞等曰使死者無知則已若其有知不赦爾於地下八月疾亟謂帝曰我死焚其骨送范陽佛寺無使我為邊地鬼也遂卒帝與皇后宫人宦者東西班皆被髮徒跣扶舁其柩至賜地焚其骨穿地而葬焉資治通鑑曰漢乾祐三年春二月晉李太后詣契丹主請依漢人城寨之例給田自贍契丹主許之并晉主遷于建州建州南至燕京一千二百里未至安太妃卒于路遺令必焚我骨南向揚之庶幾魂魄歸逹於漢既至建州得田五十頃晉主令從者耕其中以給食頃之述律王遣騎取晉主寵姫趙氏聶氏而去述律王者契丹主德光之子也秋七月晉李太后在建州卧病無醫藥惟與晉主仰天號泣㦸手罵杜重威李守貞曰吾死不置汝戊午卒周顯德中有自契丹來者云晉主及馮后無恙其從者亡歸及物故過半矣冬十月自將南伐攻下安平內丘束鹿等城五代史曰烏雲卒萬騎攻邢州陷內丘契丹入冦常以馬嘶為候其來也馬不甚嘶鳴而矛㦸夜有光又月蝕敵衆皆懼以為凶雖破內邱而人馬傷死者大半五年春正月漢郭威弒其主自立國號周遣朱憲來告即遣使致良馬五代㑹要曰周廣順元年正月太祖令左千牛衛將軍朱憲往修和好烏雲亦遣使尼古察報命獻良馬四匹太祖復命尚書左丞田敏供奉官蔣光銜命往報聘四月田敏等回烏雲遣使碩羅獻碧玉金鍍銀裹鞍㘘并馬四十匹册府元龜曰晉趙瑩為中書令敵陷京城虜主遷少帝於北塞瑩與馮玉李彥韜俱從契丹永康王代立乃授瑩太子太保周廣順初遣尚書左丞田敏報命于契丹遇瑩幽州瑩得見華人悲悵不已謂田敏曰老身漂零寄命于此近聞室家喪逝弱子無恙䝉中朝皇帝倍加存恤東京舊第本屬公家亦聞優恩特給善價老夫至死無以報效於是南望稽首涕泗橫流夏五月壬戌朔太子太傅趙瑩薨輟朝一日命歸葬于汴五代史曰瑩從出帝北徙瑩事烏雲為太子太保瑩子易則易從當其徙而北也與易從俱而易則留事漢官至刑部郎中後瑩病將卒告于契丹願以尸還中國契丹許之及卒遣易從護具喪南歸太祖憐之贈瑩太傳葬于華隂漢劉崇自立於太原六月為周所攻遣使稱姪乞援且求封冊十國春秋曰乾祐四年春正月戊寅北漢世祖劉崇即位于晉陽是時遼將潘實納稱君命遺書皇子承鈞帝令承鈞復書言本朝淪亡紹襲帝位願循晉室故事求援北朝許之二月丁巳遣使通事舍人李𧦬使于遼乞兵為援三月甲戌至于遼遼主烏雲與帝約為父子之國使伊喇美棱來報聘五代史曰劉旻遣宰相鄭珙致書烏雲稱姪皇帝以叔父事之烏雲遣燕主舍音政事令高勳以册尊旻為大漢神武皇帝妻為皇后烏雲性豪雋漢使者至輒以酒肉困之珙素有疾烏雲強之飲一夕而以醉卒然烏雲聞旻自立頗幸中國多故乃遣其貴臣舍音髙勳以自愛黃騮九龍十二稻玉帶報聘王保衡晉陽見聞録曰鄭珙既逹北廷北主恩禮周厚北俗以酒池肉林為名雖不飲如韋曜輩者亦加灌注縱成疾無復信之珙魅岸善飲惟無量之逼宴罷載歸一夕腐脅於穹廬之氊堵間輿尸而復命秋七月八月十國春秋曰乾祐四年秋七月北漢翰林學士衛融等詣遼謝册禮且請兵册府元龜曰周廣順元年八月契丹遣幽州教使曹繼筠護送宰相趙瑩喪柩至其家先是開運末敵陷京城瑩與馮玉李彥韜俱遷於北塞未幾卒至是方歸其柩九年庚申朔自將南伐壬戌次歸化州察克反帝遇弒契丹國志曰天祿五年九月北漢主自團柏攻周帝欲引兵㑹之與酋長議於九十九泉諸部皆不欲南帝強之行至新州之火神淀燕王舍音及偉王之子大寧王烏蘇等率兵作亂弒帝遼史拾遺卷四
