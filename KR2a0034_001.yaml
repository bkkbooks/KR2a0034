body:
  text: 遼史拾遺卷一錢塘厲鶚撰本紀第一太祖上太祖大聖大明神烈天皇帝姓耶律氏諱億字安巴堅歐陽修歸田録曰契丹安巴堅開平中屢遣使聘梁梁亦遣人報聘今世傳李琪金門集有賜契丹詔乃為安巴堅當時書詔不應有誤而自五代以來見於他書者皆為阿保機又有趙志忠者本華人也自幼陷北為人明敏在北中舉進士至顯官既而脫身歸國能述北中君臣世次山川風物甚詳又云安巴堅其人實謂之阿保謹未知孰是趙志忠隂山雜録曰太祖諱億番名安巴堅太祖生而神志八部落主愛其雄勇遂退其主阿尼雅氏歸本部立太祖為王討黑車子室韋唐盧龍軍節度使劉仁恭發數萬兵遣養子趙霸來拒司馬光資治通鑑曰唐天復三年十一月盧龍節度使劉仁恭習知契丹情偽常選將練兵乘隙深入踰摘星嶺擊之每霜降仁恭輒遣人焚塞下野草契丹馬多飢死常以良馬賂仁恭買牧地契丹王安巴堅遣其妻兄阿巴將萬騎冦渝關仁恭遣其子守光戍平州守光偽與之和設幄犒饗于城外酒酣伏兵執之以入契丹以重賂請于仁恭然後歸之鶚案此事在討黑車子室韋前一年以其為契丹與劉氏交兵之始故附于此太祖以騎兵七萬會李克用于雲州後唐太祖紀年録曰太祖以安巴堅族黨稍盛召之天祐二年五月安巴堅領其部族三十萬至雲中東城帳中言事握手甚勸約為兄弟旬日而去留伊埓圖錫里首領珠卜美稜為質鶚案五代史及通鑑俱云安巴堅會李克用于雲中約共擊梁據遼史則克用借兵以報劉仁恭木瓜澗之役耳元年夏四月丁未朔唐梁王朱全忠廢其主尋弒之自立為帝國號梁遣使來告王欽若等册府元龜曰梁太祖建號契丹安巴堅遣使送名馬女口貂皮等求封册梁祖與之書曰朕今天下皆平惟有太原未服卿能長驅兵甲竟至新莊為我剪彼仇讐與爾便行封册王溥五代會要曰梁太祖開平元年契丹遣其首領𫀆笏美稜等來貢方物劉仁恭子守光囚其父自稱幽州盧龍軍節度使秋七月乙酉其兄平州刺史守竒率其衆數千人來降命置之平盧城資治通鑑曰盧龍節度使劉仁恭驕侈貪暴常慮幽州城不固築館于大安山曰此山四靣懸絶可以少制衆其棟宇壯麗擬于帝者選美女實其中與方士錬丹藥求不死悉斂境內錢瘞于山嶺令民間用堇泥為錢又禁江南茶商無得入境自采山中草木為茶鬻之仁恭有愛妾羅氏其子守恭通焉仁恭杖守光而斥之不以為子數李思安引兵入其境李思安朱全忠將所過焚蕩無餘夏四月己酉直抵幽州城下仁恭猶在大安山城中無備守光自外引兵入登城拒守又出兵與思安戰思安敗退守光遂自稱節度使令部將李小喜元行欽將兵攻大安山仁恭遣兵拒戰為小喜所敗虜仁恭以歸囚于别室仁恭將佐及左右凡守光素所惡者皆殺之鈕祜祿都指揮王思同帥部兵三千山後八軍巡檢使李承約帥部兵三千奔河東守光弟守竒奔契丹未幾亦奔河東二年春正月河東李克用卒子存朂襲遣使來弔薛居正五代史曰唐莊宗初嗣位遣使告哀于契丹賂以金繒求騎軍以救潞州契丹答其使曰我與先王為兄弟兒即吾兒也寧有父不救子耶許出師會潞平而止夏五月五代會要曰梁開平二年安巴堅遣使來貢良馬五月又遣使嘉哩貢馬十匹金花鞍轡貂鼠皮裘并男口一年十嵗名曰蘇女口一年十二嵗名曰丕勒其妻舒嚕氏貢朝霞錦前國王欽德并其大臣皆有貢獻三年春三月滄州節度使劉守文為弟守光所攻遣人來乞兵討之命皇弟錫里素額爾竒木蕭達魯以兵會守文于北淖口進至橫海運近淀一鼓破之守光潰去册府元龜曰後唐劉守文為滄州節度使唐天祐六年五月守文為其弟守光敗于薊州之雞蘇守文為弟所擒歸幽州初劉仁恭輦幽府積實營大安山以自固會汴人攻其城守光堅守之因自為幽帥囚仁恭于大安山别室守文素蓄姦謀志大才短利燕薊之土疆乃令子延祐質于汴自將兵討守光以迎父為名頻年出軍不利至是大以重賂誘契丹吐渾之衆合四萬衆屯薊州運滄景芻粟海船而下以給軍費及大戰守光之兵敗守文詐慈單馬立于陳場泣諭于衆曰勿殺吾弟為守光將元行欽識之見擒滄州失帥自潰守光復縶兄于别室援以叢棘滄州兵敗守光進攻滄州滄州賔佐孫鶴吕兖共推守文之子延祚為帥守光携守文于城下攻圍纍月城中乏食軍士食人百姓食堇土驢馬相遇食其鬃士人出入多為強者屠殺吕兖率城中飢羸丁口以麩麵飼之團為宰殺務旋烹以充軍食危酷之將逺古未聞延祚力窮以城降守光守光以其子繼威為滄州大將張邁進佐之秋閠八月補册府元龜曰開平三年閠八月鴻臚寺引進契丹安巴堅差首領赫嚕等進金鍍鐡甲金鍍銀甲及水晶玉裝鞍轡等物馬一百匹其安巴堅母妻各進雲霞錦一匹四年五代會要曰開平四年契丹遣使錫林美稜來貢五年秋八月甲子劉守光僣號幽州稱燕資治通鑑曰梁乾化元年八月甲子劉守光即皇帝位國號大燕改元應天受册之日契丹陷平州驚擾六年冬十月册府元龜曰乾化二年十月契丹蘇庫美稜等朝貢七年春正月晉王李存朂拔幽州擒劉守光資治通鑑曰乾化三年晉周德威進軍逼幽州燕主守光求援於契丹契丹以其無信竟不救十一月甲辰晉王自詣幽州辛酉單騎抵城下先是守光愛將李小喜多贊成守光之惡言聽計從權傾境內至是守光將出降小喜止之是夕小喜踰城詣晉軍且言城中力竭壬戌晉王督諸軍四靣攻城克之擒仁恭及其妻妾守光帥妻子遁去癸亥晉王入幽州十二月守光將奔滄州就劉守竒且迷失道至燕樂之境晝匿坑谷數日不食令妻祝氏乞食於田父張師造家師造怪婦人異狀詰知守光處並其三子擒之鶚案擒劉守光通鑑以為乾化三年十二月事在均王嗣位之後而遼史太祖紀以為七年正月事在均王嗣位之前五代史亦云乾化三年十二月晉人取幽州遼史誤也九年神册元年春二月葉隆禮契丹國志曰初契丹有部族之大者號達呼哩氏後分為八部八部之長號大人常推一人為王建旗鼓以統八部每三年則以次相代或其部有災疾而蓄牧衰則八部聚議立其次而代之彼代者以為元約如此不敢爭及安巴堅乃曰中國之主無代立者由是安巴堅益以威制諸部國不肯代其立九年諸部共責誚之安巴堅不得已傳其旗鼓而謂諸部曰吾立九年所得漢人多矣吾欲别自立一部治漢城可乎諸部將許之漢城在炭山東南灤河上有鹽鐡之利乃後漢滑鹽縣也其地可植五穀安巴堅率漢人耕種為治城郭邑屋廛市如幽州制漢人安之不復思歸安巴堅知衆可用用其妻舒嚕策使人告諸部大人曰我有鹽池之利諸部所食然諸部知食鹽之利而不知有主人可乎當來犒我諸部以為然共以牛酒會鹽池安巴堅伏兵其旁酒酣伏發盡殺諸部大人復用兵併為一國東北諸夷皆畏服之宋白續通典曰契丹居遼澤之中潢水南岸其地東南接海東際遼河西包冷陘北界松陘山東西三千里地多松柳澤多蒲葦安巴堅居漢城在檀州西北五百五十里城北有龍間山山北有炭山炭山西是契丹室韋二界相連之地其地灤河上河西有鹽泊之利則後魏滑鹽縣也鶚案遼史世表亦載此事而不詳契丹國志所載甚詳且係九年事故綴于此八月拔朔州擒節度使李嗣本勒石紀功于青冡南資治通鑑曰貞明二年秋八月契丹主安巴堅帥諸部兵三十萬號百萬自麟勝攻晉蔚州陷之虜鎮武節度使李嗣本鶚案遼史先拔朔州十二月下蔚新武媯儒五州通鑑誤二年春二月晉新州禆將盧文進殺節度使李存矩來降資治通鑑曰貞明三年春二月晉王之弟威塞軍防禦使存矩在新州驕惰不治侍婢預政晉王使募山北部落驍勇者及劉守光亡卒以益南討之軍又率其民出馬民或鬻十牛以易戰馬期會促迫邉人嗟怨存矩得五百騎自部送之以夀州刺史盧文進為禆將行者皆憚逺役存矩復不存恤甲午至祁溝關小校宫彥璋與士卒謀曰聞晉王與梁人確鬪騎兵死傷不少吾儕捐父母妻子為人客戰千里送死而使長復不矜恤奈何衆曰殺使長擁盧將軍遷新州據城自守其如我何因執兵大譟趨傳舍詰朝存矩寢未起就殺之文進不能制撫膺哭其尸曰奴婢既害郎君使我何靣目復見晉王因為衆所擁遷新州守將楊全章拒之又攻武州雁門以北都知防禦兵馬使李嗣肱擊敗之周德威亦遣兵追討文進帥其衆奔契丹馬令南唐書曰盧文進字大用范陽人也為劉守光騎將唐莊宗攻范陽文進先降拜蔚州刺史莊宗以屬其弟存矩存矩為新州團練使統山後八軍莊宗與劉鄩相拒于莘召存矩會兵擊鄩存矩募山後徑兵數千人課民出馬民以十牛易一馬山後之人皆怨而兵又不樂南行至祁溝聚而謀為亂文進有女少而美存矩求為側室文進以其大將不敢拒雖與心常歉之也因與亂軍殺存矩反攻新州不克攻武州又不克遂奔于契丹契丹使守平州三月辛亥攻幽州節度使周德威以幽并鎮定魏五州之兵拒于居庸關之西合戰于新東大破之資治通鑑曰初幽州北七百里有渝關注云渝關入營州界及平州石城縣界下有渝水通海自關東北循海有道道狹處才數尺旁皆亂山髙峻不可越北至進牛口舊置八防禦軍募土步兵守之田租皆供軍食不入于薊幽州嵗致繒纊以供戰士衣契丹至輒閉壁不戰俟其去選驍勇據隘邀之由是契丹不敢輕入冦及周德威為盧龍軍節度使恃勇不修邉備遂失渝關之險契丹每芻秼于營平之間續通典曰渝關城下有渝水入大海其關東臨水北有兔耳山覆舟山山皆斗峻山下循海岸東北行狹處才通一軌三靣皆海北連陸關西連亂山至進牛柵凡六口柵戍相接此天所以限南北者也夏四月壬午圍幽州不克資治通鑑曰周德威攻新州為契丹所敗奔歸契丹乘勝進圍幽州聲言有衆百萬氈車毳幕彌漫山澤盧文進教之攻城為地道晝夜四面俱進城中穴地然膏以邀之又為土山以臨城城中鎔銅以灑之日殺千計而攻之不止周德威遣間使詣晉王告急王方與梁相持河上欲分兵則兵少欲勿救恐失之謀於諸將獨李嗣源李存審閻寶勸王救之夏四月晉王命嗣源兵先進軍於淶水閻寶以鎮定之兵繼之秋八月李存朂遣李嗣源等救幽州赫嚕等以兵少而還資治通鑑曰梁貞明三年秋七月契丹圍幽州且二百日城中危困李嗣源閻寶李存審步騎七萬會于易州存審曰彼衆吾寡彼多騎吾多步若平原相遇彼以萬騎蹂吾陳吾無遺類矣嗣源曰彼無輜重吾行必載糧食自隨若平原相遇彼抄吾糧吾不戰自潰矣不若自山中潛行趣幽州與城中合勢若中道遇敵則據險拒之甲午自易州北行踰大房嶺循澗而東嗣源與養子從珂將三千騎為前鋒距幽州六十里與契丹遇契丹驚郤晉王翼而隨之契丹行山上晉兵行澗下每至谷口契丹輒邀之嗣源父子力戰乃得進至山口契丹以萬騎遮其前嗣源躍馬奮撾三入其陳斬契丹酋長一人後軍齊進契丹兵卻晉兵始得出李存審命步兵伐木為鹿角人持一枝止則成寨契丹騎環寨而過寨中發萬弩射之流矢蔽日契丹人馬死傷塞路將至幽州契丹列陳待之存審步兵陳於其後戒勿動先令羸兵曵柴然草而進煙塵蔽天契丹莫測其多少因鼓譟合戰存審乃趣後陳起乘之契丹大敗席卷其衆自北山去委棄車帳鎧仗羊馬滿野晉兵追之俘斬萬計辛丑嗣源等入幽州周德威握手流涕三年春正月丙申以皇弟安圖為大內特哩衮命攻雲州册府元龜曰李存璋為大同防禦使時契丹陷蔚州營於魚池安巴堅遣人馳木書求賂於存璋存璋斬其使者不報敵攻雲州存璋悉力拒戰城中舊有鐡車存璋鎔為兵器以授軍士敵遂退本紀第二太祖下四年冬十二月補王禕大事記續編曰貞明五年十二月契丹陷唐營州秦冉思洛中紀異曰盧文進投契丹説安巴堅徴諸路甲馬冦幽州設圍攻之莊宗召募救之契丹退以趙思溫為營州圍練使北面沿邉巡檢都指揮使未幾契丹圍營州踰年朝廷未暇救糧草俱盡兵刃亦無思溫欲自殺左右諌止安巴堅誓不殺乃南拜遙辭而投戈鶚案遼史天贊二年克平州獲趙思溫五年春正月乙丑始治契丹大字陶宗儀書史會要曰遼大祖耶律氏諱億字安巴堅多用漢人教以隸書之半增損之製契丹字數千以代刻木之約其字如朕也敇支走用焉急之類是也夏五月庚辰有龍見於伊喇山陽水上上射獲之藏其骨內府洪皓松漠紀聞曰安巴堅居西樓宿氊帳中晨起見黑龍長餘十丈蜿蜒其上引弓射之即騰空夭矯而逝墜於黃龍府之西相去已千五百里才長數尺其骸尚在金國內庫烏舍長子源嘗見之尾鬛支體皆全雙角己為人所截與豫所藏董羽畫出水龍相似蓋其背上鬛不作魚鬛也元好問續夷堅志曰遼祖神册五年三月黑龍見伊喇山陽水上遼祖馳往三日乃得至而龍尚不去遼祖射之而斃龍一角尾長而足短身長五尺舌長二寸有半命藏之內庫貞祐南渡尚在六年冬十月癸丑朔晉新州防禦使王郁以所部山北兵馬內附唐明宗實録曰莊宗未即位盧文進王郁相繼入遼皆驅率數州士女教其織絍工作中國所為契丹悉備所以強盛侵凌中國者以得文進郁之故也同光之世為患尤深文進在平州安帳率奚徑騎倐來忽往幽薊荆榛滿目寂無人煙十二月晉義武軍節度王處直養子都囚其父自稱留後歐陽修五代史曰義武軍節度使北平王王處直好巫而客有李應之者妖妄人也處直有疾應之以左道治之而愈處直益以為神使衣道士服以為行軍司馬政無大小咸取決焉初應之於陘邑闌得小兒劉雲郎養以為子初應直未有子乃以雲郎與處直而紿曰此兒生而有異處直養以為子更名曰都甚愛之應之由此益橫乃籍管內丁壯别立新軍自將之治第博陵坊四面開門皆用左道處直將吏知其必為患而莫能諌也是時幽州李匡儔假道中山以如京師處直伏甲城外以備不虞匡儔已去甲士入城圍應之第執而殺之因詣處直請殺都處直不與明日第功行賞因隂疏甲士姓名自隊長以上藏於别籍其後因事誅之凡二十年無一人免者而處直終為都所殺都為人狡佞多謀處直以為節度副使張文禮殺王鎔莊宗發兵討文禮處直與左右謀曰鎮定之蔽也文禮雖有罪然鎮亡定不獨存乃遣人請莊宗毋發兵莊宗取所獲文禮與梁蠟書示處直曰文禮負我師不可止處直有孽子郁奔晉晉王以女妻之以為新州防禦使處直見莊宗必討文禮益自疑乃隂與郁交通使郁北招契丹入塞以牽晉兵且許召郁為嗣都聞之不悅而定人皆言契丹不可召恐自貽患處直不聽郁自奔晉常恐處直不容因此大喜以為乘其隙可取之乃以厚賂誘契丹安巴堅安巴堅舉國入冦定人皆不欲契丹之舉小吏和昭訓勸都舉事都因執處直囚之西宅自為留後凡王氏子孫及處直將校殺戮殆盡處直憂憤而卒乙亥存朂至定州王都迎謁馬前存朂引兵趨望都遇我兵托諾五千騎圍之存朂力戰數四不解李嗣昭領三百騎來救我軍少却存朂乃得出大戰我軍不利引歸存朂至幽州遣二百騎躡我軍之後我軍反擊悉擒之資治通鑑曰梁龍德元年冬十一月晉王自將兵攻鎮州討張文禮契丹主既許盧文進出兵張文禮因盧文進求援于契丹王郁又説之曰鎮州美女如雲金帛如山天皇王速往則皆己物也不然為晉王所有矣契丹主以為然悉發所有之衆而南舒嚕后諌曰吾有西樓羊馬之富其樂不可勝窮也何必勞師逺出以乘危徼利乎吾聞晉王用兵天下莫敵設有危敗悔之何及契丹主不聽十二月辛未攻幽州李紹宏嬰城自守契丹長驅而南圍涿州旬日拔之擒刺史李自弼進攻定州王都告急于晉晉王自鎮州將親軍五千救之遣神武都指揮使王思同將兵戍狼山之南以拒之二年春正月甲午晉王至新城南候騎白契丹前鋒宿新樂涉沙河而南將士皆失色晉王乃自率鐡騎五千先進至新城北半出桑林契丹萬餘騎見之驚走契丹素憚晉不意晉至故驚走晉王分軍為二逐之行數十里獲契丹主之子時沙河橋狹氷薄契丹陷溺死者甚衆是夕晉王宿新樂契丹主軍帳在定州城下敗軍至契丹舉衆退保望都晉王至定州王都迎謁于馬前請以愛女妻王子繼岌戊戌晉王趣望都契丹逆戰晉王以親軍千騎先進遇奚酉托諾五千騎為其所圍晉王力戰出入數四自午至申不解李嗣昭聞之引三百騎橫擊之契丹退晉王乃得出因縱兵奮擊契丹大敗逐北至易州會大雪彌旬平地數尺契丹人馬無食死者相屬於道契丹主舉手指天謂盧文進曰天未令我至此乃北歸晉王引兵躡之隨其行止見其野宿之所布稿於地回環方正皆如編翦雖去無一枝亂者歎曰契丹用法嚴乃能如是中國不及也晉王至幽州使二百騎躡契丹之後騎恃勇追擊之悉為所擒惟兩騎自它道走免鶚案望都之敗通鑑以為明年正月事遼史系之神册六年十月必有誤天贊元年夏四月癸亥存朂圍鎮州張文禮求援命郎君迪里將軍康末怛往擊之大敗殺其將李嗣昭五月丁未張文禮卒其子處瑾遣人奉表來謝鶚案通鑑張文禮本劉仁恭牙將從其子守文鎮滄州守文詣幽州省其父文禮據州作亂滄人討之奔鎮州趙王王鎔養以為子更名德明趙王誅李𢎞規文禮因親軍之怨弒趙王文禮受晉王命為成德留後內不自安後遣使因盧文進求援於契丹又乞兵於梁晉王命趙故將苻習為成德留後閻寶史建瑭將兵助之攻鎮州拔趙州刺史王鋋降文禮驚懼而卒此龍德元年九月事也晉王敗契丹於望都二年正月事也二月閻寶圍鎮州為文禮子處瑾所敗晉王命李嗣昭代之夏四月張處瑾遣兵迎糧於九門嗣昭設伏擊之鎮兵發矢中腦卒九月李存審攻破鎮州誅處瑾事與遼史異蓋張文禮之死當在神册六年李嗣昭之死則在天贊元年此時契丹望都敗後方畏晉人不暇宜不能冉援張處瑾李嗣昭為鎮兵射死通鑑不言為契丹將所殺疑遼史所記為虛故不具載通鑑文而辨之如右三年春正月遣兵略地燕南資治通鑑曰同光二年春正月甲辰幽州奏契丹入冦至瓦橋以天平軍節度使李嗣源為北面行營都招討使陜州留後霍彥威副之宣徽使李紹宏為監軍將兵救幽州李存審奏契丹去復得新州五代會要曰後唐莊宗同光二年三月安巴堅率所部入冦新城隂山雜録曰梁滅安巴堅帥兵直抵涿州時幽州安次潞三河漁陽懷柔密雲等縣皆為所陷俘其民而歸置州縣以居之不改中國州縣之名資治通鑑曰夏四月庚申置威塞軍於新州契丹恃其強盛遣使就帝求幽州以處盧文進時東北諸夷皆役屬契丹惟渤海未服契丹主謀入冦恐渤海犄其後乃先舉兵擊渤海之遼東遣其將托諾及盧文進據幽平等州以擾燕地十一月庚申蔚州言契丹入冦五代會要曰十二月契丹入冦嵐州四年夏五月冬十月五代會要曰同光三年契丹入冦幽州為王師所敗俘其首領吹丹等五月遣使伊拉瑪等來貢方物册府元龜曰同光三年十月甲子差春州刺史來海金押國信賜契丹玉及回使美稜錫里等辭賜物有差天顯元年春正月五代會要曰同光四年正月安巴堅將復冦渤海國又遣美稜轄哩以下三十七人貢馬三十匹詐修和好夏四月唐養子李嗣源反郭存謙弒其主存朂嗣源遂即位六月丙午次慎州唐遣姚坤以國哀來告册府元龜曰明宗初篡位遣供奉官姚坤空函告哀至契丹西樓屬按巴堅在渤海又徑至慎州﨑嶇萬里既至謁見安巴堅延入穹廬安巴堅身長九尺被錦袍大帶垂後與妻對榻引見坤未致命安巴堅問曰聞爾河南河北各有一天子信乎坤曰河南天子今年四月一日雒城軍變今凶問至矣河北總管令公比為魏州軍亂先帝詔令除討既聞內難衆軍離心及京城無主上下堅册令公請主社稷今已順人望登帝位矣安巴堅曰漢國兒與我雖父子亦曽彼此讐擊俱有惡心與爾今天子彼此無惡足得歡好爾無復命我續將馬二萬騎至幽鎮已來與爾家天子面為盟約我要幽州令漢兒把捉更不復侵汝漢界資治通鑑曰天成元年秋七月帝遣供奉官姚坤告哀於契丹契丹主聞莊宗為亂兵所害慟哭曰吾楚德爾也吾方欲救之以渤海未下不果致吾兒及此契丹言楚德爾華言朋友也及謂坤曰今天子聞洛陽有急何不救對曰地逺不能及曰何故自立坤為言帝所以即位之由契丹主曰漢兒喜飾説母多談托雲侍側曰牽牛以蹊人之田而奪之牛可乎契丹主又曰聞吾兒專好聲色遊畋宜其及此我自聞之居家不飲酒散遣伶人解縱鷹犬若亦效吾兒所為行自亡矣又曰吾兒與我雖世舊然屢與我戰爭於今天子則無怨足以修好若與我大河之北吾不復南侵矣坤曰此非使臣之所得専也契丹主怒囚之旬餘復召之曰河北恐難得得鎮定幽州亦可也給紙等趣令為狀坤不可欲殺之韓延徽諌復囚之德光即位乃放歸秋七月甲戌次扶餘府上不豫是夕大星隕於幄前辛已平旦子城上見黃龍􅀈繞可長一里光耀奪目入於行宫有紫黑氣蔽天踰日乃散是日上崩年五十五册府元龜曰天成元年秋七月契丹國王遣美稜喇實庫濟進內宫一人馬二匹地衣真珠裝金釧金叉等又曰天成元年九月幽州趙德鈞奏先羌軍將陳繼威使契丹部內今使還得狀稱今年七月二十日至渤海界扶餘府契丹族帳在府城東南隅繼威既至求見不通竊問漢兒言契丹主安巴堅已得疾其月二十七日安巴堅身死八月三日隨安巴堅靈柩發離扶餘城十三日至烏州契丹主妻始受却當府所持書信二十七日至龍州契丹主妻令繼威歸本道仍遣魯庫美稜押馬三匹充答信同來繼威見契丹部族啇量來年正月葬安巴堅于木葉山下兼差近位阿斯默古內持信與先入蕃天使供奉官姚坤同來赴闕告哀兼同契丹部內取此月十九日一齊舉哀朝廷及當府前後所差人使繼威來時見處分候到西樓日即並放歸五代史曰冬十月辛丑契丹使阿斯默古內來告哀廢朝三日田况儒林公議曰契丹自安巴堅雄據燕北之地修其國有成法諸部遂漸為制常得中國所賜紈錦以其尤精緻者藉地使牧豎汙踐之親近者或問其故曰我國家他日富盛此等固當踐之其用意豈易量哉遼史拾遺卷一
