body:
  text: 遼史拾遺卷三錢塘厲鶚撰本紀第四太宗下㑹同元年秋七月戊辰遣中臺省右相耶律蘇哷特爾格使晉臨海軍節度使趙思温副之册晉帝為英武明義皇帝册府元龜曰晋高祖天福三年十月戊寅北朝命使以冊寳上帝徽號曰英武明義皇帝左右金吾六軍儀仗兵部法物太常鼓吹殿中省扇傘等並出城迎引至崇元殿前陳列帝受徽號畢御殿受百官賀秋九月庚戌邉臣奏晋遣守司空馮道左㪚騎常侍韋勲來上皇太后尊號左僕射劉昫右諌議大夫盧重上皇帝尊號遂遣監軍伊聶濟充接伴五代史曰天福三年秋八月戊寅馮道及左僕射劉昫為契丹册禮使辛丑歸伶官於契丹己未歸静鞭官劉守威金吾勘契官王殷司天雞呌學生殷暉于契丹十一月甲辰朔命南北宰相及伊勒希巴就館賜晋使馮道以下晏丙午上御開皇殿召見晋使壬子皇太后御開皇殿馮道韋勲册上尊號曰廣徳至仁昭烈崇簡應天皇太后甲子行再生柴册禮丙寅皇帝御宣政殿劉昫盧重册上尊號曰睿文神武法天啓運明徳章信至道廣敬昭孝嗣聖皇帝大赦改元㑹同資治通鑑曰天福三年秋七月辛酉帝上尊號於契丹主及太后戊寅以馮道為太后册禮使左僕射劉昫為契丹主册禮使備鹵簿儀仗車輅詣契丹行禮契丹主大悦帝事契丹甚謹奉表稱臣謂契丹主為父皇帝毎契丹使至帝於别殿拜受詔勅嵗輸金帛三十萬之外吉㓙慶弔嵗時贈遺玩好珍異相繼於道乃至應天太后元帥太子偉王南北二王韓延徽趙延夀等諸大臣皆有賂小不如意輙來責譲帝常卑辭謝之晋使至契丹契丹驕倨多不遜語使者還以聞朝野咸以為恥而帝事之曽無倦意以是終帝之世與契丹無隙然所輸金帛不過數縣租賦徃徃托以民困不能滿其數其後契丹主屡使止帝上表稱臣但令為書稱兒皇帝如家人禮薛居正五代史曰契丹遣使加徽號于晋晋亦獻徽號於契丹命宰相馮道充使及行將逹西楼契丹主欲自出迎道契丹羣僚奏天子無迎宰相禮乃止其名動殊俗也如此阮閲詩話總龜曰晋天福三年與遼和晋祖曰當遣輔相為使趙瑩桑維翰未言以遼雖通好而反覆難測咸懼於將命馮道與諸公中書食訖分聼堂吏前白道言北使事吏入變色手顫道索紙一副書云道去即遣冩敕屬吏泣下道遣人語妻子不復歸家舍都亭驛不數日即行晋祖餞之語以家國之故煩耆徳使逺自酌巵酒飲之契丹以道有重名欲留之命與其國相同列所賜皆相等遼賜臣下以象笏及臘月賜牛酒皆為殊禮道皆得之以詩謝云牛頭偏得賜象笏更容持王甚喜受賜悉市薪炭云北地寒老年不堪及還京師作詩五章以述使北之意其首章云去年今日奉皇華只為朝廷不為家殿上一杯天子泣門前雙節國人嗟龍荒冬住時時雪兎苑春歸處處花上下一行如骨肉幾人身死掩黄沙北中大寒賜襖貂襖羊皮貂衾各一每入謁悉披四襖夜宿館中并覆三衾詩曰朝披四襖專藏手夜葢三衾怕露頭孫光憲北夢𤨏言曰莊宗嫡夫人韓氏後為淑妃伊氏為徳妃契丹入中原䧟入北廷宰相馮道尊册契丹主帳殿宴席其國母后妃列坐同宴王嬙蔡姬之比也李昭玘樂静先生集記殘經曰南臺古刹有佛書数百卷多唐季五代時所書字畫精勁歴歴可喜有毘奈耶雜事一卷徳妃伊氏所造唐莊宗次妃初神閔敬皇后劉氏以㣲賤得立歸賜於佛性喜聚歛惟冩佛書饋賂僧尼而士卒不得衣食妃為此經豈非畏后所逼也後有印章曰燕國夫人伊氏盖未進封時所製也唐製太后皇后未嘗有印凡封令書即太后用宫官印皇后用内侍省印而夫人不聞有用印之禮是時兩宫交通藩鎮使者旁午於道而恬不知禁則夫人私自鑄亦不為僭矣按五代史稱徳妃與韓淑妃居太原晋高祖反時為契丹所虜不知是經從何至也三年閏月資治通鑑曰天福四年閏月壬申初義武節度使王處直子威避王都之難亡在契丹至是義武缺帥契丹主遣使來言請使威襲父土地如我朝之法帝辭以中國之法必自刺史團練防禦序遷乃至節度使請遣威至此漸加進用契丹主怒復遣使來言曰爾自節度使為天子亦有階級耶帝恐其滋蔓不已厚賂契丹且請以處直兄孫彰徳節度使廷𦙍為義武節度使以厭其意契丹怒稍釋九月册府元龜曰天福四年九月契丹使尼瑪哈來獻牛馬犬腊顛騱十駟冬十一月資治通鑑曰十一月戊子契丹遣其臣楊珠來使遂如呉越三年春正月資治通鑑曰初晋帝割雁門之北以賂喫丹由是吐谷渾皆屬契丹苦其貪虐思歸中國成徳節度使安重榮復誘之於是吐谷渾帥部落千餘帳自五臺來奔契丹大怒遣使譲帝以招納叛人帝遣供奉官張澄將兵二千索吐谷渾在并鎮忻代四州山谷者逐之使還故土鶚按吐谷渾奔晋通鑑係天福五年十二月事至逐歸故土係六年正月事遼史首尾差一年未知孰是夏四月庚子至燕備法駕入自拱辰門御元和殿行入閣禮宋敏求春明退朝録曰唐入御宣政設殿中細仗兵部旂旛等於廷朝官退皆賜食自開元後朔望宗廟上牙盤食明皇意欲避正殿遂御紫宸殿喚仗入閣門遂有入閣之名在唐時殊不為盛禮唐末常御殿更無仗遇朔望特設之趨朝者仍給廊下食所以鄭谷軰多形於詩詠歎羙而五代行之不絶五代史曰唐故事天子日御殿見羣臣曰常参朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見羣臣曰入閣宣政前殿也謂之衙衙有仗紫宸便殿也謂之閣其不御前殿而御紫宸也乃自正衙喚仗由閣門而入百官俟朝于衙者因随以入見故謂之入閣然衙朝也其禮尊閣燕見也其事殺自乾符以後因亂禮闕天子不能日見羣臣而見朔望故正衙常日廢仗而朔望入閣有仗其後習見遂以入閣為重至出御前殿猶謂之入閣五代之時羣臣五日一入見中興殿便殿也此入閣之遺而謂之起居朔望一出御文明殿前殿也反謂之入閣五代㑹要曰入閣儀司天進時刻牌閣門進班齊牌皇帝自内著袍衫穿鞾乗輦至常朝殿門駐輦受樞宻使以下起居訖引駕至正朝殿皇帝坐定卷簾殿上添香喝控鶴官拜次雞呌次閣門勘契次閤門承㫖喚仗次閤門使引金吾將軍南班拜訖分引至位對揖次細仗相次入朝次執文武班簿至位對揖次宰臣南班拜訖分引至位對揖次金吾將軍奏平安次文武百官入通事舍人揖殿靸靴入沙墀兩拜立定次引宰臣及百官金吾將軍合班立定閤門使喝拜搢笏舞蹈三拜奏聖躬萬福又引宰相班首一人至近前又兩拜舞蹈三拜引至位對揖通事舍人引宰臣於東西踏道下立次文武百官出次兩省官南班揖殿出次翰林學士南班揖殿出次執文武班簿南班揖殿出次金吾將軍南班揖殿出次細仗出次引宰臣香案前奏事訖宣徽使喝好去南班揖殿出次閣門使引待制官到位兩拜引近前奏事訖即歸位罄折宣徽使宣所奏知又兩拜舞蹈三拜舍人喝好去南班揖殿出次刑法奏事准上次監察御史南班揖殿出次閣門承㫖放仗次閤門使奏衙内無事次喝控鶴官門外祗候次下簾皇帝上輦歸内乙巳幸留守趙延夀别墅洛中紀異曰契丹主破團栢谷得趙延夀北歸情甚狎宻復用之秉政晋主患之潛使上表述趙父子事清㤗於上黨擁重兵窺玩神器清㤗亡國不忠不孝天下所知請勿用北主以示趙趙覧訖曰晋主不欲令皇帝用臣者欲負皇帝之厚恩也北主曰何也對曰臣在中原日掌樞機此軰方收外鎮常為臣之所制中原土地河山人民甲馬子女玉帛津梁要害内外帑藏舟車轉輸臣並知之恐皇帝用臣即為晋主之患也北主甚悦乃曰卿在中原日所為之事我不能知自卿事我以來即未有過乃火其書曰我誓不疑汝趙再拜復命兼鎮幽州後晋之滅皆趙賛而成之五代史曰天福五年夏四月契丹興化王來秋八月壬寅遣使南唐陸㳺南唐書曰昇元四年九月戊辰契丹使美棱魯庫來聘獻狐白裘九月庚午侍中崔窮古言晋主聞陛下數㳺獵意欲請節之上曰朕之畋獵非徒從樂所以練習武事也乃詔諭之孫世芳宣府鎮志曰㑹同三年契丹主次奉聖州大閲諸州軍時山後五州兵半𨽻營衛因閲騎兵於州南歩兵於州北賞勞有差自是諸兵從獵不休侍中崔窮古言晋主聞陛下数㳺獵意欲請節上曰朕之畋獵非徒從樂所以練習武事也乃詔諭之冬十一月册府元龜曰天福五年十一月契丹使錫里來聘致馬百匹及玉鞍狐裘等四年春二月己未晋遣楊彦詢來貢且言鎮州安重榮跋扈狀遂留不遣是月晋鎮州安重榮執遼使伊喇五代㑹要曰天福六年成徳軍節度使安重榮執契丹使伊喇等以輕騎掠幽州之南界高祖累遣中使齎詔開諭以契丹有助兵之功不欲負其宿約而重榮好險肆志竟誅伊喇等馳檄天下言契丹之罪惡資治通鑑曰成徳軍節度使安重榮恥臣契丹見契丹使者必箕踞慢罵使過其境或潛遣人殺之契丹以譲帝帝為之遜謝六月戊午重榮執契丹使伊喇遣騎掠幽州南境軍於博野上表計数千言大抵斥帝父事契丹竭中國以媚無厭之欲又以此意為書遺朝貴及移藩鎮云已勒兵必與契丹决戰帝以重榮方握强兵不能制甚患之夏四月秋八月九月五代史曰天福六年夏四月己未契丹使碩格來秋八月甲寅光禄卿張澄使於契丹册府元龜曰天福六年九月遣供奉官李延業以時果送于契丹資治通鑑曰九月乙亥帝以安重榮殺契丹使者恐其犯邉遣安國寕節度使楊彦詢使於契丹彦詢至其帳契丹責以使者死狀彦詢曰譬如人家有惡子父母所不能制將如之何契丹怒乃釋鶚案楊彦詢使契丹史在二月鑑在九月未知孰是十二月戊子晋遣使來告山南節度使安重進反詔以便宜討之戊申晋以敗安重榮來告遂遣楊彦詢歸五年春正月戊辰晋函安重榮首來獻資治通鑑曰天福六年十二月丁亥安重榮聞安重進舉兵反謀遂决大集境内軍民衆至數萬南向鄴都帝聞重榮反壬辰遣䕶聖等馬歩三十九指揮擊之以天平節度使杜重威為招討使安國節度使馬全節副之前永清節度使王清為馬歩都虞侯戊戌杜重威與安重榮遇於宗城西南重榮為偃月陣官軍擊之不動重威懼欲退指揮使王重𦙍曰兵家忌退鎮之精兵盡在中軍諸公分銳士擊其左右翼重𦙍為公以契丹直衝其中軍彼必狼狽重威從之鎮人陳稍却官軍從而乗之鎮人大潰斬首萬五千級重榮收餘衆走保宗城官軍進攻夜分拔之重榮以十餘騎走還鎮州嬰城自守㑹天寒鎮人戰及凍死者二萬餘人契丹聞重榮反乃聼楊彦詢還天福七年春正月丁巳鎮州牙將自西郭水碾門導官軍入城殺守陴民二萬人執安重榮斬之杜重威殺導者自以為功庚申重榮首至鄴都帝命漆之函送契丹五代史曰安從進反㐮陽重榮聞之乃亦舉兵是嵗鎮州大旱蝗重榮聚飢民數萬驅以向鄴聲言入覲行至宗城破家堤高祖遣杜重威逆之兵已交其將趙彦之與重榮有隙臨陣卷旗以奔晋軍其鎧甲鞍轡皆裴以銀晋軍不知其來降争殺而分之重榮聞彦之降晋大懼退入于輜重中其兵二萬皆潰去陶岳五代史補曰安重榮出鎮常懐不軌之計久矣但未發居無何廐中産朱鬉白馬有鴉生五色雛以為鳯乃欣然謂天命在己遂舉兵反指揮使令取宗嶺路以向闕時父老聞之徃徃竊議曰事不諧矣且王姓安氏鞍得背而稳何不取路貝州若由宗嶺是鞍及於鬉得無危乎未幾與王師先鋒遇一戰而敗閏月册府元龜曰天福七年閏三月遣殿直官馬延理内班王延斌送桃于契丹夏六月乙丑晋主敬瑭殂子重貴立戊辰晋遣使告哀輟朝七日庚午遣使往晋弔祭五代㑹要曰天福七年六月高祖崩少帝嗣立八月契丹遣隆鄂特來弔兼獻衣服鞍馬等至十月又遣使大卿以下二十六人來聘以高祖山陵有日致祭故也陸游南唐書曰昇元六年六月契丹使魯庫美棱來聘獻馬五駟秋七月庚寅晋遣金吾衛大將軍梁言判四方館事朱崇節來謝書稱孫不稱臣遣客省使喬榮譲之景延廣荅曰先帝則聖朝所立今主則我國自册為鄰為孫則可奉表稱臣則不可榮還具奏之上始有南伐之意資治通鑑曰初河陽牙將喬榮從趙延夀入契丹契丹以為回圖使凡外國與中國貿易者置回圖務猶今之回易場也徃來販易於晋置邸大梁及契丹與晋有隙景延廣説帝囚榮於獄悉取邸中之貨凡契丹之人販易在晋境者皆殺之奪其貨大臣皆言契丹有大功不可負戊子釋榮慰賜而歸之榮辭延廣延廣大言曰歸語爾主先帝為北朝所立故稱臣奉表今上乃中國所立所以降志於北朝者正以不敢忘先帝盟約故耳為鄰稱孫足矣無稱臣之理北朝皇帝勿信趙延夀誑誘輕侮中國中國士馬爾所目覩翁怒則來戰孫有十萬横磨劔足以相待他日為孫所敗取笑天下毋悔也榮自以為失貨財恐歸獲罪且欲為異時據驗乃曰公所言頗多懼有遺忘願記之紙墨延廣命吏書其語以授之榮具以白契丹契丹主大怒入㓂之志始决又曰帝之初即位也大臣議奉表稱臣告哀於契丹景延廣請致書稱孫而不稱臣李崧曰屈身以為社稷何恥之有陛下如此他日必躬擐甲胄與契丹戰於時悔無益矣延廣固争馮道依違其問帝卒從延廣議契丹大怒遣使來責譲且言何得不先承禀遽即帝位延廣復以不遜答之契丹盧龍節度使趙延夀欲自帝中國屡説契丹伐晋契丹主頗然之秋七月八月五代史曰秋七月甲辰契丹使通事來八月癸酉契丹使共客省使張九思來冬十月十一月十二月鄭麟趾高麗史曰太祖二十五年冬十月契丹遣使來歸槖駞五十匹王以契丹嘗與渤海連和忽生疑貳不顧舊好一朝殄滅此為無道之甚不足逺結為鄰絶其交䀻流其使三十人于海島繫槖駞萬夫橋下皆餓死五代史曰冬十月己未契丹使錫里來十一月契丹使大卿來己亥牛羊使董殷使于契丹十二月庚午契丹裕悦使凌古結來辛未又使伊哷濟來六年春正月三月夏四月冬十月陸游南唐書曰昇元七年春正月契丹使逹爾罕等二十七人來聘獻馬三百羊三萬五千五代史曰天福八年春正月契丹裕悦使烏都温來三月辛丑引進使太府卿孟承誨使於契丹夏四月庚午董殷使于契丹冬十月丙寅契丹使通事劉𦙍來十一月辛夘上京留守耶律逹年得晋諜知有二心十二月丁未如南京議伐晉命趙延夀趙延昭安圖嘉哩等由滄恒易定分道而進大軍繼之契丹國志曰會同六年十二月晋平盧軍節度使楊光逺遣騎告遼以晋境大饑乗此攻之一舉可取趙延夀亦勸之帝乃集兵五萬使延夀將之經營中國曰若得之當立汝為帝延夀信之為盡力宣府鎮志曰㑹同六年契丹主將有事於征伐徴山後諸州兵因下令曰兵行有傷禾稼損租賦者以軍法論又敇有司於每村定有力人户充村長於村人議有力人户出剰田苖補貧下不逮頃畆自願者據狀徴收七年春正月己夘趙延夀圍貝州其軍校邵珂開南門納遼兵太守呉巒投井死契丹國志曰貝州軍校邵珂性兇悖節度使王令温黜之珂怨望會令温入朝執政以呉巒權知州事遼帝親攻貝州巒悉力拒之燒其攻具殆盡珂令遼兵自南門入巒投井死己丑次元城授延夀魏博等州節度使封魏王率所部屯南樂丙申遣兵攻黎陽晋張彦澤來拒二月甲辰攻博州刺史周儒以城降晋平盧軍節度使楊光逺宻道遼師自馬家口濟河五代史曰開運元年春正月辛巳殿直王班使於契丹至于鄴都不得進而復丙申契丹㓂黎陽辛丑劉知逺及契丹戰於秀容敗之資治通鑑曰開運元年春正月庚辰帝遣使持書遺契丹契丹已屯鄴都不得通而返壬午以侍衛馬歩都指揮使景延廣為御營使前静難節度使李周為東京留守是日高行周以前軍先發時用兵方略號令皆出延廣宰相以下皆無所預延廣乗勢使氣凌侮諸將雖天子亦不能制乙酉帝發東京丁亥滑州奏契丹至黎陽戊子帝至澶州契丹主屯元城趙延壽屯南樂以延夀為魏博節度使封魏王此契丹主所命也契丹冦太原劉知逺與白承福合兵二萬擊之甲午以知逺為幽州道行營招討使杜威為副使馬全節為都虞候丙申遣右武衛上將軍張彦澤等將兵拒契丹於黎陽戊戌帝復遣譯者孟守忠致書於契丹求修舊好契丹主復書曰已成之勢不可改也辛丑太原奏破契丹偉王於秀容斬首三千級契丹自鴉鳴谷遁去天平節度副使知鄆州顔衎遣觀察判官竇儀奏博州刺史周儒以城降契丹又與楊光逺通使徃還自馬家口濟河擒左武衛將軍蔡行邁儀謂延廣曰敵若濟河與光逺合則河南危矣延廣然之儀州人也晋將景延廣命石贇守麻家口白再榮守馬家口未幾周儒引遼兵滿逹營于河東攻暉州北津以應光逺晋遣李守貞皇甫遇梁漢璋薛懐譲將兵萬人縁河水陸並進遼軍圍晋别將於戚城晋主自救之遼師解去李守貞等至馬家口滿達遣歩卒萬人築營壘騎兵萬人守于外餘兵屯河西渡未已晋兵薄之遼軍不利資治通鑑曰開運元年二月甲辰朔令前保義節度使石贇守麻家口前威勝節度使何重建守楊劉鎮䕶聖都指揮使白再榮守馬家口西京留守安彦威守河陽未幾周儒引契丹將滿逹自馬家口濟河營於南岸攻暉州北津以應楊光逺滿逹契丹主之從弟也乙已遣侍衛馬軍都指揮使義成節度使李守貞神武通軍皇甫遇陳州防禦使梁漢璋懐州刺史薛懐譲将兵萬人縁河水陸並進守貞河陽漢璋應州懐譲大原人也册府元龜曰晋少帝開運元年二月丙午先鋒指揮使石公覇遇敵数萬騎於戚城之北為敵所圍高行周符彦卿在城之東南方息於林下忽聞敵至駭愕督軍而進纔數千騎衆寡不敵行周遣人馳告景延廣請益師延廣遲留俟帝進止既而行周等為敵圍之數重三人大譟瞋目奮擊敵衆死傷甚多帝自御親兵援之前軍獲免戊申李守貞等兵至馬家渡敵歩卒萬人方築壘濬隍以騎軍散列其外舟楫數十猶渡兵未已我師薄之敵師退走遂攻其城四靣樹梯一鼔而上敵衆大敗乗馬赴河溺者數千西岸敵軍數萬鼓譟揚旗以脅我軍及見東岸俘執斬刈大半䧟没水中即大哭而去是日獲其將莫城義節樓使崔裕先鋒梁思榮契丹大首領新及兵馬都監常尊王令威吐渾將黨大地羽林使閻令省軍校張興王佐張令覇等首領七十八人部典節級五百人送於行在鶚案莫城義節樓使六字疑槧本冇誤資治通鑑曰二月辛亥定難節度使李彛殷將兵四萬自麟州濟河侵契丹之境壬子以彜殷為契丹西南招討使五代史曰開運元年二月癸丑北面行營都虞候馬全節及契丹戰於北平敗之三月癸酉朔趙延夀言晋諸軍㳂河置柵皆畏却不敢戰若率大兵直抵澶淵據其橋梁晋必可取是日晋軍駐澶淵其前軍高行周在戚城乃命延壽延昭以數萬騎出行周右上以精兵出其左戰至暮上復以勁騎突其中軍晋軍不能戰㑹有諜者言晋軍東靣数少沿河城柵不固乃急擊其東偏衆皆奔潰縱兵追及遂大敗之契丹國志曰三月遼帝偽棄元城去伏精騎於古頓丘城以俟晋軍與恒定之兵合而來擊大軍欲進追之㑹霖雨而止遼兵馬飢瘦趙延夀曰晋軍悉在河上畏我鋒鋭必不敢前不如即其城下四面攻之奪其浮梁則天下定矣遼帝從之親將兵十餘萬陣於澶州北城與晋高行周合戰自午至哺互有勝負遼帝以精兵當中軍而來晋帝亦出兵待之遼帝望見晋軍盛謂左右曰楊光逺言軍半已餒死今何其多也以精騎左右掠陣晋軍不動萬弩齊發飛矢蔽地遼軍稍卻兩軍死者不可勝数昏後各引去册府元龜曰時甲馬軍士千餘人在隄間治水塞使人亟召之旗旛之末出於堰埭敵以為偽遁伏兵起遂整軍而立良乆復戰李守貞在戰之後立馬於大塜之端去陣三百餘歩不敢寸進俄頃王師又退至塜下李守貞以数百騎短兵直進擊之敵稍退戰場之地人馬死者無算㫁箭殘鏃交横厚数寸既而昏暝敵擊鉦而去辛巳契丹主帳内小校竊徳光所乗馬南奔契丹傳木書收軍北去壬午留趙延昭守貞州徙所俘户於内地夏四月癸丑還次南京辛未如凉陘五月癸酉耶律巴爾岱奏破徳州擒刺史尹居藩及將士二十七人資治通鑑曰契丹主自澶州北分為兩軍一出滄徳一出深冀而歸所過焚掠方廣千里民物殆盡留趙延昭為貝州留後滿逹䧟徳州擒刺史尹居藩五代史曰三月己丑冀州刺史白從暉及契丹戰於衡水敗之夏四月契丹䧟徳州㳂河廵檢使梁進敗之取徳州己未馬全節及契丹戰於定豊敗之六月資治通鑑曰夏六月初高祖割北邉之地以賂契丹由是府州刺史折從逺亦北屬契丹欲盡徙河西之民以實遼東州人大恐從逺固保險拒之及帝與契丹絶遣使諭從遠使攻契丹從逺引兵深入㧞十餘寨戊午以從逺為府州團練使從逺雲州人也府州領府各一縣後唐以麟州東北河濵之地置九月五代史曰九月丙子契丹㓂遂城樂夀代州刺史白文珂及契丹戰於七里烽敗之資治通鑑曰九月丙子契丹㓂遂城樂夀深州刺史康彦進擊却之十二月癸夘南伐甲子次古北口閏月己巳朔閲諸道兵於温榆河己夘圍恒州下其九縣資治通鑑曰十二月乙未契丹復大舉入㓂盧龍節度使趙延夀引兵先進契丹前鋒至邢州順國節度使杜威遣使間道告急帝欲自將拒之㑹有疾命天平節度使張從恩鄴都留守馬全節䕶國節度使安審琦㑹諸道兵屯邢州武寕節度使趙在禮屯鄴都契丹主以大兵繼至建牙於元氏元氏縣屬恒州朝廷憚契丹之盛詔從恩等引兵稍却於是諸軍洶懼無復部伍委棄器甲所過焚掠不復能整玉堂閑話曰晋少主之代有婦人儀狀端嚴衣服鈆粉不下羙人而無腿足繇帶以下如截而齊餘皆具備其父載之於獨車自鄴南㳺浚都乞丐扵市日聚千人至於深坊曲巷華屋朱門無所不至時人嗟異皆擲而施之後京城獲北方間諜官司案之乃此婦為奸人之領袖所聼察甚多遂戮之八年春正月庚子分兵攻邢洺磁三州殺掠殆盡册府元龜曰契丹主耶律徳光晋少帝天福九年入㓂䧟貝博及畧諸縣邑所至皆撫寕之給以符牒賞以章服及戚城小戰不勝博州太衂青州阻絶遂大怒所俘百姓屠戮者不可勝紀擒獲軍士皆炮烙之五代史曰開運二年徳光復傾國入㓂南掠邢洺磁至於安陽河千里之内焚剽殆盡契丹見大桑木罵曰吾知紫披襖出自汝身吾豈容汝活耶束薪於木而焚之入鄴都境張從恩馬全節安審琦兵悉陳於相州安陽水之南皇甫遇與濮州刺史慕容彦超將兵千騎來覘遼軍至鄴都遇遼軍數萬且戰且却至榆林店遼軍繼至遇與彦超力戰百餘合遇馬斃歩戰審琦引騎兵踰水以救遼軍乃還册府元龜曰皇甫遇為滑州刺史開運三年契丹主率衆屯邯鄲遇與安審琦慕容彦超等禦之遇初渡漳河敵前鋒大至遇引退轉闘二十里至鄴南榆林店遇謂審琦曰彼衆我寡走無生路不如血戰遂自辰至未戰百餘合所傷甚衆遇所乘馬中鏑而死遇有紀綱杜知敏以馬授遇遇得馬復戰久之稍解顧杜知敏己為㓂獲遇謂彦超曰知敏蒼黄之中以馬授我義也安可使䧟於㓂中遂與彦超躍馬取知敏而還敵騎壯之俄而軍士復合遇不能解時審琦已至安陽河謂首將張從恩曰皇甫遇等未至必為敵騎所圍若不救則成擒矣從恩曰敵勢甚熾無以支吾將軍獨徃何益審琦曰成敗命也設若不濟則與之俱死假若失此二將將何靣目以見天子遂率鐵騎北渡赴之敵見塵起謂救軍并至乃引去遇彦超中數創得還時諸軍嘆曰此三人者真猛將也三月戊戌師㧞祁州殺其刺史沈斌册府元龜曰晋沈斌少帝開運中為祁州刺史契丹入㓂自鎮州廻以羸兵驅牛羊過共城下斌乃出州兵以擊之契丹以精騎剗其門邀之州遂䧟庚戌杜重威李守貞攻㤗州戊子趙延夀率前鋒薄泰城己未重威守貞引兵南遁追至陽城大敗之復以歩卒為方陣來拒與戰二十餘合壬戌復搏戰十餘里癸亥圍晉兵於白團衛村晋兵下鹿角為營是夕大風至曙命鐵鷂軍下馬㧞其鹿角奮短兵入擊順風縱火揚塵以助其勢晋軍大呼曰都招討何不用兵令士卒徒死諸將皆奮出戰張彦澤藥元福皇甫遇出兵大戰諸將繼至遼軍却數百歩風益甚晝晦如夜符彦卿以萬騎横擊遼軍率歩卒並進遼軍不利上乗奚車退十餘里晉兵追急獲一槖駞乘之乃歸晋兵退保定州册府元龜曰杜重威為鎮州節度使契丹主連年入㓂重威但閉壁自守部内城邑相繼破䧟未嘗以一士一騎救之毎敵騎数十驅漢人千萬過城下如入無人之境重威但登陴注目略無邀取之理開運元年秋加北靣行營招討使二年大軍下㤗州滿城契丹主自古北口廻軍追躡王師重威狼狽而旋至陽城為敵所困㑹大風猛烈軍情憤激符彦卿張彦澤諸將引軍四出敵衆大潰諸將欲追之重威曰逢賊得命更望襆子也遂收軍馳歸常山資治通鑑曰開運二年三月乙巳杜重威等諸軍㑹于定州庚戌諸軍攻契丹㤗州刺史晋廷謙舉州降甲寅取滿城獲契丹酋長穆蘭及其兵二千人乙卯取遂城趙延夀部曲有降者言契丹主還至虎北口聞晋取㤗州復擁衆南向約八萬餘騎計來夕當至宜速為備杜重威等懼丙辰退保㤗州戊午契丹至㤗州己未晋軍南行契丹踵之晋軍至陽城庚申契丹大至晋軍與戰逐北十餘里契丹踰白溝而去此南白溝也水經注所謂淇水北出為白溝者也壬戌晋軍結陣而南敵騎四合如山諸軍力戰拒之是日纔行十餘里人馬飢乏癸亥晋軍至白團衞村埋鹿角為行寨契丹圍之數重竒兵出寨後㫁糧道是夕東北風大起破屋折樹營中掘井方及水輙崩士卒取其泥帛絞而飲之人馬俱渴至曙風尤甚契丹主坐大奚車中令其衆曰晉軍止此耳當盡擒之然後南取大梁命鐵鷂四靣下馬㧞鹿角而入奮短兵以擊晋軍又順風縱火揚塵以助其勢軍士皆奮怒大呼曰都招討使何不用兵令士卒徒死諸將請出戰杜重威曰俟風稍緩徐觀可否馬歩都監李守貞曰彼衆我寡風沙之内莫測多少惟力鬬者勝此風乃助我也若俟風止吾屬無類矣即呼曰諸軍齊撃賊又謂重威曰令公善守禦守貞以中軍决死矣馬軍左廂都排陣使張彦澤馬軍右廂副排陣使藥元福馬歩左右廂都排陣使符彦卿及左廂都排陣使皇甫遇引精騎出西門擊之諸將繼至契丹卻數百歩彦卿等謂守貞曰且曵隊徃來乎直前奮擊以勝為度乎守貞曰事勢如此安可廻鞚亦長驅取勝耳彦卿等躍馬而去風勢益甚昏晦如夜彦卿等引萬餘騎横擊契丹呼聲動天地契丹大敗而走勢如崩山李守貞亦令歩兵盡㧞鹿角出鬬歩騎俱進逐北二十餘里鐵鷂既下馬不能復上皆委棄馬鎧仗蔽地契丹散卒至陽城東南水上稍復布列杜重威曰敵已破膽不宜更令成列遣精兵擊之皆渡水去契丹主乘奚車走十餘里追兵急獲一槖駞乘之而走諸將請急追之重威揚言曰逢賊幸不死更索衣嚢也李守貞曰兩日人馬渇甚今日得水飲之皆足重難以追㓂不若全軍而還乃退保定州契丹主至幽州散軍稍集以軍失利杖其酋長數百唯趙延夀得免册府元龜曰開運二年三月辛亥易州安審約奏狼山守把孫方簡掩殺得敵頭轄哩相公一千餘人奚車一兩内有轄哩妻及奴婢等甲寅杜重威收獲滿城獲契丹首領穆蘭相公及守城兵士一千九百六十四人秋八月契丹國志曰八月朔日食九年夏五月庚戌晋易州戍將孫方簡請内附資治通鑑曰定州西山二百里有狼山土人築堡於山上以避㓂堡中有佛舍尼孫深意居之以妖術惑衆中山人孫方簡及弟行友自言深意之侄不飲酒食肉事深意甚謹深意卒嗣行其術稱深意坐化嚴餙事之如生會晉與契丹絶好北邉賦役煩重㓂盗充斥方簡因帥郷里豪傑者據寺為寨以自保契丹入㓂方簡率衆邀擊之頗獲其甲兵牛馬軍資挈家徃依之者日益衆久之至千餘家遂為羣盗懼為吏所討乃歸欵朝廷朝廷亦資禦盗㓂署東北招收指揮使既而邀求不已朝廷小不如意則舉寨降於契丹請為郷導以入㓂時河北大飢盗賊蠭起天雄節度使杜重威遣元隨軍將劉廷翰市馬于邉方簡執之獻于契丹延翰逃歸六月壬戌至大梁言方簡欲乘中國凶飢引契丹入㓂宜為之備册府元龜曰孫方簡為定州節度先是州北二百里有狼山山上有堡邉人頼之以避㓂患中置佛舍有孫氏尼者主其事以香火之教聚其流俗遠近歸之徒衆甚盛人亦異之尼死其徒聲言其屍不壊嗣行其道舉俗不食葷茹其黨推之為主十一月戊子朔進圍鎮州丙申先遣候騎報晋兵至遣精騎斷河橋晋兵退保武强南院大王逹年将軍高模翰分兵由瀛州間道以進杜重威遣共將節度使梁漢璋率衆來拒與戰大敗之殺梁漢璋册府元龜曰梁漢璋為永清軍節度使天福八年詔領千騎戍冀州㝷以杜重威北討詔以漢璋充北靣軍馬都排陣使戍游口関與敵騎五千相遇於浮陽之北界苦戰竟日以衆寡不侔為流矢所中没於陣杜重威張彦澤引軍據中渡橋趙延夀以歩卒前擊高彦温以騎兵乘之追奔逐北殭尸數萬斬其將王清宋彦筠墮水死資治通鑑曰開運三年冬十一月己酉契丹主大舉入冦自易定趣恒州晋北靣行營都指揮使杜重威等至武强彰徳節度使張彦澤在恒州引兵㑹之重威等復趣恒州以彦澤為前鋒甲寅重威等至中渡橋契丹已據橋彦澤帥騎爭之契丹焚橋而退晋兵與契丹夾滹沱而軍始契丹見晋軍大至又争橋不勝恐晉軍急渡滹沱與恒州合勢擊之議引兵還及聞晋軍築壘為持久之計遂不去杜重威雖以貴戚為上將性懦怯偏禆皆節度使但日相承迎置酒作樂罕議軍事磁州刺史兼北靣轉運使李榖說重戚及李守貞曰今大軍去恒州咫尺烟火相望若多以三股木置水中積薪布土其上橋可立成宻約城中舉火相應夜募將士斫敵營而入表裏合勢敵必遁逃諸將皆以為然獨杜重威不可遣榖南至懐孟督軍糧契丹潛遣其將蕭翰將百騎並西山出晋後軍㫁晋糧道及歸路翰等獲晋民黥其靣曰奉敇不殺縱之南走運夫在道遇之皆棄車驚潰十二月壬戌奉國都指揮使王清言於重威曰今大軍去恒州五里守此何為營孤食盡勢將自潰請以歩卒五千為前鋒奪橋開道公率諸軍繼之得入恒州則無憂矣重威遣清與宋彦筠俱進清戰甚鋭契丹勢少却諸將請以大軍繼之重威不許彦筠為契丹所敗浮水抵岸得免清獨帥麾下陣於水北力戰互有殺傷屢請救於重威重威竟不遣一騎助之清謂其衆曰上將握兵坐視吾軰困急而不救此必有異志吾軰當以死報國耳衆感其言莫有退者至暮戰不息契丹以新軍繼之清及士卒盡死由是諸軍皆奪氣清洺人也册府元龜曰王清為奉國都虞候谿州刺史少帝開運二年從杜重威北征觧陽城之圍清苦戰為歩校之最加檢校司空及從杜重威收瀛州聞契丹大至重威率諸軍㳂滹水而下將保常山及至中渡橋敵已屯於北岸且扼歸路清知勢蹙請於重威曰軍出常山五里守株於此營孤食盡將如之何請以歩軍二千為其前鋒奪橋開路公可率諸軍繼之期入常山必矣重威可之遣宋彦筠俱行清一獲其橋敵為之小卻重威猶豫不進宻已貳於國矣彦筠尋退走清列陣北岸嚴戒部曲日暮酣戰不息敵以全軍繼至我無寸刃益之清與下俱没焉鶚案中渡橋五代史亦云宋彦筠退走通鑑以為浮水而免遼史云墮水死誤也陶岳五代史補云乾祐中宋彦筠為鄭州節度使足證彦筠之仕漢矣重威等退保中渡寨義武軍節度使李殷以城降遂進兵夾滹沱而營去中寒寨三里分兵圍之夜則列騎環守晝則出兵抄掠復命大内特哩衮耶律楚庫勒及趙延夀分兵圍守自將騎卒夜渡河出其後攻下欒城降騎數千分遣軍士據其要害下令軍中預備軍食三日不得舉烟火但獲晉人即黥靣而縱之諸饋運見者皆棄而走於是晉軍内外隔絶食盡勢窮十二月丙寅杜重威李守貞張彦澤等帥所部二十萬衆來降上擁數萬騎臨大阜立馬以受之授重威守太傅鄴都留守守貞天平節度使餘各領舊職資治通鑑曰甲子契丹遥以兵環晋營軍中食且盡杜重威與李守貞宋彦筠謀降契丹潛遣腹心詣契丹牙帳邀求重賞契丹主紿之曰趙延夀威望素淺恐不能帝中國汝果降當以汝為之重威喜遂定降計丙寅重威遣閤門使高勲齎降表詣契丹是日悉命軍士出陳於外軍士皆踴躍以為且戰重威親諭之曰食盡途窮當與汝曹共求生計因命釋甲軍士皆慟哭聲振原野重威守貞仍於衆中揚言主上失徳信任奸邪猜忌於已聞者無不切齒契丹主遣趙延夀衣赭袍至晋營撫慰軍士曰彼皆汝物也杜重威以下皆迎謁於馬前亦以赭袍衣重威以示晋軍其實皆戲之耳以重威為太傅守貞為司徒重威引契丹主至恒州城下諭順國節度使王周以己降之狀周亦出降戊辰契丹主入恒州遣兵襲代州刺史王暉以城降先是契丹屡攻易州刺史郭璘固守拒之契丹主毎過城下指而嘆曰吾能吞併天下而為此人所扼及杜重威既降契丹主遣通事舍人耿崇羙至易州誘諭其衆衆皆降璘不能制遂為崇羙所殺璘邢州人也義武軍節度使李殷安國留後方太皆降於契丹契丹主以孫方簡為義武節度使滿逹為安國留後以客省副使馬崇祚權知恒州事命御史大夫嘉哩監軍傅珠爾張彦澤持詔入汴諭晋帝母李氏以安其意且招桑維翰景延廣先来留騎兵千人守魏自率大軍而南壬申嘉哩等至汴晋帝重貴䘮服拜命與母李氏奉表請罪資治通鑑曰契丹主引兵自邢相而南遣張彦澤將二千騎先取大梁且撫安吏民以通事傅珠爾為都監癸酉未明彦澤自封丘門斬闗而入頓兵明徳門外城中大擾帝於宫中起火自擕劔驅後宫十餘人將赴火為親軍將薛超所持俄而彦澤自寛仁門傳契丹主與太后書撫慰之帝乃命滅火悉開宫城門帝坐苑中與后妃相聚而泣召翰林學士范質草降表自稱孫男臣重貴禍至神惑運盡天亡今與太后及妻馮氏舉族于郊野靣縛待罪次遣男鎮寕節度使延煦威信節度使延寳奉國寳一金印三出迎太后亦上表稱新婦李氏妾傅珠爾入宣契丹主命帝脱黄袍服素衫再拜受宣左右皆掩泣五代史曰范質為帝草降表曰孫男臣重貴言頃者唐運告終中原失馭数窮否極天缺地傾先人有田一成有衆一旅兵連禍結力屈勢孤翁皇帝捄患摧剛興利除害躬擐甲胄深入㓂場犯露䝉霜度雁門之險馳風擊電行中冀之誅黄鉞一麾天下大定勢凌宇宙義感神明功成不居遂興晋祚則翁皇帝有大造於石氏也旋屬天降鞠凶先君即世臣遵承遺㫖纂紹前基諒闇之初荒迷失次凡有軍國重事皆委將相大臣至於擅繼宗祧既非禀命輕發文字輙敢拒尊自啓釁端果貽赫怒禍至神惑運盡天亡十萬師徒望風束手億兆黎庶延頸歸心臣負義抱羞貪生忍恥自貽顛覆上累祖宗偷度朝昏苟存視息翁皇帝若惠顧疇昔稍霽電霆未賜靈誅不絶先祀則百口荷更生之徳一門衘無報之恩雖所願焉非敢望也臣與太后妻馮氏於郊野靣縛俟命皇太后降表云晋室皇太后新婦李氏妾言張彦澤傅珠爾等至伏䝉皇帝阿翁書安撫者伏念先皇帝頃在并汾適逢屯難危同累卵急若倒懸智勇俱窮朝夕不保皇帝阿翁發自冀北親抵河東跋履山川踰越險阻立平巨孽遂定中原救石氏之覆亡立晋朝之社稷不幸先帝厭代嗣子承祧不能繼好息民而反虧恩辜義兵戈屡動駟馬難追戚實自貽咎將誰執今穹昊震怒中外擕離上將牽羊六師觧甲妾舉宗負釁視景偷生惶惑之中撫問斯至明宣恩㫖曲示含容慰諭丁寕神爽飛越豈謂垂絶之命忽䝉更生之恩省罪撫躬九死未報今遣孫男延煦延寳奉表請罪陳謝以聞初重貴絶和好維翰数諌止之不從至是彦澤殺維翰紿言自經死詔收塟之復其田園第宅仍厚恤其家五代史曰自契丹與晋盟始成於維翰而終敗於延廣耶律徳光犯京師遣張彦澤遺太后書問此兩人在否可使先來而帝以維翰嘗議毋絶盟而已違之也不欲使維翰見徳光因諷彦澤圖之而彦澤亦利其貲産維翰貎狀既異素以威嚴自持晋之老將大臣見之無不屈服彦澤入京師左右勸維翰避禍維翰曰吾為大臣國家至此安所逃死耶安坐府中不動彦澤以兵入府問維翰何在維翰厲聲曰吾晋大臣自當死國安得無禮耶彦澤股栗不敢仰視退而謂人曰吾不知桑維翰何如人今日見之猶使人恐懼如此其可再見乎乃以帝命召維翰維翰行遇李崧立馬而語軍吏前白維翰請赴侍衛司獄維翰知不免顧崧曰相公當國使維翰獨死崧慙不能對是夜彦澤使人縊殺之以帛加頸告契丹曰維翰自縊徳光曰我本無心殺維翰維翰何必自裁徳光至京師使人騐其屍信為縊死乃以屍賜其家而貲財悉為彦澤所掠玉堂閑話曰魏公維翰尹開封一日嘗中夜於正寢獨坐忽大驚悸如有所見向空厲聲云汝焉敢此來如是者数四旬日憤懣不已雖齊體亦不敢有所發問未幾夢已整衣冠嚴車騎將有所詣就乘之次忽所乘馬亡去追㝷莫知所在既寤甚惡之不數日及難五代史補曰當維翰之縊也猶嗔目直視嘘其氣再三毎一嘘皆有火出其光赫然三嘘之外火盡滅就視安然矣通鑑考異曰薛史帝思維翰在相時累進謀畫謀與契丹和契丹主到則顯彰已過欲殺維翰以滅口因令張彦澤殺之按是時彦澤豈肯復從少帝之命今不取資治通鑑曰帝使召張彦澤欲與計事彦澤曰臣無靣目見陛下帝復召之彦澤笑不應宣徽使孟承誨素以佞巧有寵於帝至是帝召承誨欲與之謀承誨伏匿不至張彦澤捕而殺之彦澤縱兵大掠貧民乘之亦争入富室殺人取其貨二日方止都城為之一空彦澤所居山積自謂有功於契丹晝夜以酒樂自娯出入騎從常數百人其旗幟皆題赤心為主見者笑之軍士擒罪人至前彦澤不問所犯但瞋目豎三指即驅出㫁其腰領彦澤素與閤門使高勲不恊乘醉至其家殺其叔父及弟尸諸門首士民不寒而慄甲戌彦澤遷重貴及其母若妻於開封府署以控鶴指揮使李筠督兵五代史曰明日遷帝於開封府帝與太后皇后肩輿宫嬪宦者十餘人皆走從彦澤遣控鶴指揮使李筠以兵監守内外不通帝與太后所上徳光表章皆先示彦澤乃敢遣帝使取内庫帛数叚主者曰此非帝所有也不與又使求酒於李崧崧曰臣家有酒非敢惜慮陛下憂燥飲之有不測之虞所以不敢進帝姑烏氏公主私賂守門者得入與帝訣歸第自經死資治通鑑曰楚國夫人丁氏延煦之母也有羙色彦澤使人取之太后遲廻未與彦澤詬詈立載之去高行周符彦卿皆詣契丹降二人自澶州來降契丹主以陽城之戰為彦卿所敗詰之彦卿曰臣當日惟知為晋主竭力今日死生惟命契丹主笑而釋之己夘延煦延寳自牙帳還契丹主賜帝手詔且遣嘉哩謂帝曰孫勿憂必使汝有噉飯之所帝心稍安上表謝恩契丹以所獻傳國寳追琢非工又不與前史相應疑其非真以詔書詰帝使獻真者帝奏頃潞王從珂自焚舊傳國寳不知所在必與之俱燼此寳先帝所為羣臣備知臣今日焉敢匿寳乃止帝聞契丹主將渡河欲與太后於前途逢迎張彦澤先奏之契丹主不許五代史曰徳光渡河帝欲郊迎彦澤不聼遣白徳光徳光報曰天無二日豈有兩天子相見於道路耶乃止壬午次赤岡重貴舉族出封丘門槀索牽羊以待上不忍臨視改館封禪寺晋百官縞衣紗㡌俯伏待罪上曰其主負恩其臣何罪命領職如故鶚案通鑑曰有司欲使帝衘璧牽羊大臣輿襯迎於郊外先具儀注白契丹主契丹主不許参之遼史仍用牽羊之禮但未衘璧輿櫬耳至諸書所記嵗月不同當由傳聞之誤即授安叔千金吾衛上將軍叔千出班獨立上曰汝邢州之請朕所不忘乃加鎮國軍節度使盖在邢嘗宻請内附也五代史曰安叔千狀貎堂堂而不通文字所為鄙陋時人謂之安没字晋出帝時為左金吾上將軍契丹犯京師晋百官迎見耶律徳光于赤岡叔千出班北語徳光勞曰是安没字否汝在邢州已通誠欵吾今至此當與汝一喫飯處叔千再拜乃以為鎮國軍節度使將軍康祥執景延廣來獻詔以牙籌數其罪八縶送都道自殺五代史曰契丹至中渡延廣屯河陽聞杜重威降乃還徳光犯京師行至相州遣騎兵數千雜晋軍渡河趨洛以取延廣戒曰延廣南奔呉西奔蜀必追而取之而延廣顧慮其家未能引决敵騎奄至乃與從事閻丕馳騎見徳光於封丘并丕見鎖延廣曰丕臣從事以職相隨何罪而見鎻丕乃得釋徳光責延廣曰南北失懽皆因爾也召喬瑩瑩通鑑作榮質其前言延廣初不服瑩從衣領中出所藏書延廣乃服因以十事責延廣每服一事授一牙籌授至八籌延廣以面伏地不能仰視遂叱而鎻之將送之北行至陳橋止民家夜分延廣伺守者怠引手扼吭而死大同元年春正月丁亥朔備法駕入汴御崇元殿受百官賀契丹國志曰帝初入宫諸門皆用兵守衛磔犬於門以竿懸羊皮於庭為厭勝法謂晉羣臣曰自今不修甲兵不市戰馬輕賦省役天下太平矣帝改服中國衣冠百官皆如舊制吴任臣十國春秋曰開運四年春正月丁巳朔契丹主下制稱大遼㑹同十年大赦遣使冊楚王馬希範為尚父五代史補曰馬希範武穆之嫡子嗣位未幾大興土木有金華九龍等殿用丹砂塗其壁令既下東境山崩湧出丹砂委積於丘陵於是收而用之契丹南侵聞其事以為希範非常人遽使册為尚父鶚案遼史稱二月丁巳朔建國大遼大赦改元大同十國春秋所記誤戊子殺秦繼旻李彦紳及鄭州防禦使楊承勲以其弟承信為平盧軍節度使襲父爵初楊光逺在青州求内附其子承勲不聴殺其判官丘濤及弟承祚等自歸于晉故誅之資治通鑑曰契丹主入汴殺左金吾大將軍李彦紳宦者秦繼旻以其為唐潞王殺東丹王故也以其家財賜東丹王之子烏雲執鄭州防禦使楊承勲至大梁責以殺父叛契丹命左右臠食之冊府元龜曰東丹長子烏雲晉開運末從契丹主徳光入汴契丹主遂殺秦繼旻李彦紳于東市復東丹之讐也命烏雲弟留珪為滑州節度使以處東丹之舊地己丑以張彦澤擅徙重貴開封府殺桑維翰縱兵大掠不道斬於市晉人臠食之資治通鑑曰高勲訴張彦澤殺其家人於契丹主契丹主亦怒彦澤剽掠京城并傅珠爾鎻之以彦澤之罪宣王百官問應死否皆言應死百姓亦投牒争疏彦澤罪己丑斬彦澤珠爾于北市仍命髙勲監刑彦澤前所殺士大夫子孫皆絰杖號哭随而詬詈以杖朴之勲命斷腕出鎻剖其心以祭死者市人争破其腦取髓臠其肉而食之癸邜遣趙瑩馮玉李彦韜將三百騎送負義侯及其母李氏太妃安氏妻馮氏弟重睿子延煦延寳等于黄龍府安置資治通鑑曰天福十二年漢復以天福紀年春正月辛夘契丹以晉主為負義侯置於黄龍府契丹主使謂李太后曰聞重貴不用母命以至於此可求自便勿與偕行太后曰重貴事妾甚謹所失者違先君之志絶兩國之歡耳今幸蒙大恩全生保家母不隨子欲何以歸癸巳遷晋主及其家人於封禪寺遣大同節度使兼侍中崔廷勲以兵守之契丹主數遣使存問晉主每聞使至舉家憂恐時雨雪兼旬外無供億上下凍餒太后使謂寺僧曰吾嘗於此飯僧數萬今日獨無一人相念耶僧辭以契丹意難測不敢獻食晉主隂祈使者乃稍得食癸卯晉主與太后安太妃馮后及弟重睿子延煦延寳俱北遷後宫左右從者百餘人契丹遣三百騎援送之又遣晋中書令趙瑩樞宻使馮玉都指揮使李彦韜與之俱晉主在途供饋不繼或時與太后俱絶食舊臣無敢進謁者獨磁州刺史李榖迎謁于路相對泣下榖曰臣無狀負陛下因傾貲以献晉主至中渡橋見杜重威寨歎曰天乎我家何負為此賊所破慟哭而去周煇北轅録曰至東都未至城二三里車夫指一土岡云是名愁臺乃晉少帝北狩之路江萬里宣政雜録曰徽宗北狩經薊縣梁漁務有還鄉橋石少主命名至今呼之資治通鑑曰晉主既出塞契丹無復供給從官宫女皆自采木實草葉而食之至錦州契丹令晋主及后妃拜契丹主安巴堅墓晉主不勝屈辱泣曰薛超誤我馮后隂令左右求毒藥欲與晉主俱自殺不果五代史曰晉帝北行衛以騎兵三百所經州縣皆故晉將吏有所供饋不得通路旁父老争持羊酒以獻衛兵擁隔不使見帝皆涕泣而去自幽州行十餘日過平州出榆関行砂磧中饑不得食遣從官宫女採木實野蔬而食又行七八日至錦州遼人迫帝與太后拜安巴堅畵像帝不勝其辱泣而呼曰薛超誤我不令我死又行五六日過海北川至東丹王墓遣延煦拜之又行十餘日渡遼水至渤海國鐡州又行七八日過南海府遂至黄龍府册府元龜曰晉馮玉為右僕射平章事開運末張彦澤引契丹䧟京城軍士爭凑其第家財巨萬一夕罄空翼日至假葢而出猶繞指以謟彦澤且請引送玉璽於契丹主将利其復用少帝蒙塵終無一言勸之以死欲共偷生視息深為士大夫所恥王明清揮塵前録曰韓似夫與先子言頃使金國見金主所繫犀帶倒透中正透如圓鏡狀光彩絢目似夫注視乆之金主曰此石晉少帝歸獻耶律氏者唐世所寳日月帶也又命磁盆一枚示似夫云此亦石晉少帝所獻中有畵雙鯉存焉水滿則跳躍如玉覆之則無他矣二物誠絶代之珍也周宻齊東野語曰靖康之禍大率與開運之事同一時記載雜書極多而最無忌憚者莫若所謂南燼紀聞其説謂出帝之事歐公本之王淑私史淑本小吏其家為少帝所殺遁入契丹洎出帝黄龍之遭淑時為契丹諸司吏於是文移郡縣故致其饑寒以逞宿怨且述其幽辱之事書名幽懿録比之周幽衞懿然考之五代新舊史初無是説安知非托子虚以欺世哉資治通鑑曰癸丑契丹主以前燕京留守劉晞為西京留守永康王烏雲之弟留珪為義成節度使烏雲姊壻潘實納為横海節度使族人隆鄂特為鎮寕節度使趙延壽之子匡贊為䕶國節度使漢將張彦超為雄武節度使史佺為彰義節度使客省副使劉晏僧為忠武節度使前䕶國節度使侯益為鳯翔節度使權知鳯翔府事焦繼勲為保大節度使既而何重建附蜀秦州附蜀張彦超無所詣史匡威不受代史匡威據涇州以拒史佺契丹勢稍沮晉主之絶契丹也匡國節度使劉繼勲為宣徽北院使頗預其謀契丹主入汴繼勲入朝契丹主責之時馮道在殿上繼勲急指道曰馮道為首相與景延廣實為此謀臣位卑何敢發言契丹主曰此叟非多事者勿妄引之命鎻繼勲將送黄龍府晉昌節度使趙在禮入朝至洛陽謂人曰契丹主嘗言荘宗之亂由我所致此行良可憂契丹遣契丹將髙舍音奚王伊喇渤海將髙謨翰戍洛陽在禮入謁拜於庭下拽剌等皆踞坐受之乙夘在禮至鄭州聞繼勲被鎻大驚夜自經於馬櫪間契丹主聞在禮死乃釋繼勲繼勲憂憤而卒劉晞在契丹嘗為樞宻使同平章事至洛陽詬奚王曰趙在禮漢家大臣汝北方一酋長耳安得慢之如此立於庭下以挫之由是洛人稍安趙延夀請給上國兵廪食契丹主曰吾國無此法乃縱强騎四出以牧馬為名分畨剽掠謂之打草榖丁壮斃于鋒刃老弱委于溝壑自東西兩畿及鄭滑漕濮數百里間財畜殆盡契丹主謂判三司劉昫曰契丹兵三十萬既平晉國應有優賜速宜營辦時府庫空竭昫不知所出請括借都城士民錢帛自將相以下皆不免又分遣使者數十人詣諸州括借皆廹以嚴誅人不聊生其實無所頒給皆蓄之内庫欲輦歸其國於是内外怨憤始患苦契丹皆思逐之矣三月丁巳朔建國號大遼大赦改元大同資治通鑑曰契丹主召晉百官悉集於庭問曰吾國大方數萬里有君長二十七人今中國之俗異於吾國吾欲擇一人君之如何皆曰天無二日中外之心皆願推戴皇帝如是者再契丹主乃曰汝曹既欲君我今該所行何事為先對曰王者初有天下應大赦二月丁巳朔契丹主服通天冠絳紗袍登正殿設樂懸儀衞於庭百官朝賀下制稱大遼㑹同十年大赦仍云自今節度使刺史母得置牙兵市戰馬辛未河東節度使北平王劉知逺自立為帝國號漢資治通鑑曰初晉主與河東節度使中書令北平王劉知逺相猜忌雖以為北面行營都統徒尊以虚名而諸軍進止不得預聞知逺因之廣募士卒陽城之戰諸軍散卒歸之者數千人又得吐谷渾財畜由是河東富强冠諸鎮歩騎至五萬人晉主與契丹結怨知逺知其必危而未嘗論諌契丹屢深入知逺初無邀遮入援之志及聞契丹入汴知逺分兵守四境以防侵軼遣客將安陽王峻奉三表詣契丹一賀入汴二以太原蕃民雜居戍兵所聚未敢離鎮三以應有貢物值契丹將劉九一軍自土門西入屯於南川城中憂懼俟召還此軍道路始通可以入貢契丹主賜詔褒美及進書親加兒字於知逺姓名之上仍賜以木拐知逺又遣北都㽞守太原白文珂入獻竒繒名馬契丹主知知逺觀望不至及文珂還使謂知逺曰汝不事南朝又不事北朝意欲何所俟耶丙寅將佐勸知逺稱尊號以號令四方觀諸侯去就知逺不許聞晉主不還聲言欲出兵井陘迎歸晉陽丁邜命武節都指揮使榮澤史宏肇集諸軍於毬埸告以出軍之期軍皆曰今契丹䧟京城執天子天下無主主天下者非我王而誰宜先正位號然後出師行軍司馬潞城張彦澤等三上牋勸進知逺疑未决郭威與都押牙冠氏楊邠入説知逺曰今逺近之心不謀而同此天意也王不乗此際取之謙譲不居人心且移移則反受其咎矣知逺從之辛未劉知逺即皇帝位自言未忍改晉又惡開運之名仍更稱天福十二年壬申詔諸道為契丹括率錢帛者皆罷之其晉臣被脅為使者勿問遣詣行在自餘契丹所在誅之甲戌帝自將東迎晉主及太后至夀陽聞已過恒州乃㽞兵戍承天軍而還又曰建雄㽞後劉在明朝于契丹以節度副使駱從朗知州事漢帝遣使者張晏洪等如晉州諭以己即帝位從朗皆囚之大將藥可儔殺從朗推晏洪權㽞後庚辰遣使以聞契丹主遣右諌議大夫趙熙使晉州括率錢帛徴督甚急從朗既死民相帥共殺熈契丹主賜趙暉詔即以為保義㽞後暉斬契丹使者焚其詔遣支使河間趙矩奉表詣晋陽契丹遣其將髙謨翰攻暉不克又曰鎮寜節度使耶律隆鄂特性殘虐澶州人苦之賊帥王瓊帥其徒千餘人夜襲據南城北渡浮航縱兵大掠圍郎五於牙城契丹主聞之甚懼始遣天平節度使李守頁天雄節度使杜重威還鎮由是無乆㽞河南之意遣兵救澶州瓊退屯近郊遣弟超奉表求救癸未帝厚賜超遣還瓊兵敗為契丹所殺又曰契丹舒嚕太后遣使以其國中酒饌脯果賜契丹主賀平晉國契丹主與羣臣晏於永福殿每舉酒立而飲之曰太后所賜不敢坐飲又曰東方羣盗大起䧟宋亳宻三州契丹主謂左右曰我不知中國之人難制如此亟遣㤗寜節度使安審琦武寜節度使符彦卿等歸鎮仍以契丹兵送之三月丙戌朔以蕭翰為宣武軍節度使資治通鑑曰三月丙戌朔契丹主服赭𫀆坐崇元殿百官行入閤禮壬辰契丹主復召晋百官諭之曰天時向熱吾難乆㽞欲暫至上國省太后當㽞一親人於此為節度使百官請迎太后契丹主曰太后族大如古栢根不可移也契丹主欲盡以晉之百官自隨或曰舉國北遷恐揺人心不如稍稍遷之乃詔有職事者從行餘㽞大梁以汴州為宣武軍以蕭翰為節度使陶榖清異録曰耶律徳光入京師春日聞杜鵑聲問李崧曰此是何物崧曰杜鵑杜甫詩曰西川有杜鵑東川有杜鵑涪萬無杜鵑雲安有杜鵑洛京亦有之徳光曰許大一箇世界一箇飛禽任地㨂選要生處便生不生處亦無佛經中所謂觀自在也龍衮江南野史曰耶律徳光䧟梁宋遣二使來告其价言語通于中國嗣主問其故曰臣本范陽人厯世冠冕仕郡為從事後唐清㤗主失御晉太祖以太原敗投契丹通好結為父子事之為君臣晉主既因其兵入洛陽登極割幽州五城之地入蕃以奉朝貢故今臣事于契丹主守職為郎焉嗣主曰契丹為治何如對曰蕃不治漢漢不治蕃自古而然嗣主曰朝見何如對曰詔則呼漢兒曰蕃家既無翰墨何以徴賦對曰蕃地不産榖故無徴賦然臣仕其朝迨今方數嵗亦未嘗睹朝庭之事或傳徴兵率以箭為號毎一部落傳箭一雙曰以限多少白皮為約曰何為皮約曰築隘卷以皮藉之兵騎過而踐焉以糜壊為度徴多則以駱駝次以羊以兎為准曰卿主所以命孤者将奚為曰晉少主逆命背約既遣入蕃我主欲與君繼先君之好將冊君為中原之主矣嗣主曰孤守江南社稷系嗣與梁宋阻修若契丹不忘先好恵賜行人孤受賜多矣其他不敢拜命之辱蕃使聞之遂行陳霆唐餘紀傳曰保大五年春三月契丹㓕晉使來告㨗且請㑹盟于境上辭不赴遂請差官如長安修復唐帝諸陵契丹不許壬寅晉諸司僚吏嬪御官寺方技百工圖籍厯象古經銅人明堂刻漏太常樂譜諸宫縣鹵簿法物及鎧仗悉送上京資治通鑑曰壬寅契丹主發大梁晉文武諸司從者數千人諸軍吏卒又數千人宫女宦官數百人盡載府庫之實以行所留樂器儀仗而已夕宿赤岡契丹主見村落皆空命有司發榜數百通所在招撫百姓然竟不禁兵士剽畧鶚案遼史太宗以四月丙辰朔始發自汴州通鑑係之三月壬寅首尾凡差十四日誤矣磁州帥梁暉以相州降漢己酉命髙唐英討之資治通鑑曰契丹入汴縱其兵打草榖又多以其子弟及親信左右為節度刺史妄作威福掊克貨財民不堪命所在相聚為盗滏陽賊帥梁暉有衆數百送欵晉陽求效用漢帝許之磁州刺史李榖宻通表帝令暉襲相州暉偵知髙唐英未至相州積兵器無守備二月丁丑夜遣壮士踰城入啓闗納其衆殺契丹數百守将突圍走暉據州自稱留後表言其狀鶚案梁暉降漢二月事也契丹命討三月事也五代史曰徳光北歸自黎陽渡河行至湯隂登愁死岡謂其宣徽使髙勲曰我在上國以打圍食肉為樂自入中國心常不快若得復吾本土死亦無恨相州梁暉殺契丹守將閉城拒守徳光引兵攻破之城中男子無少長皆屠之婦女悉驅以北後漢以王繼𢎞鎮相州得髑髏數十萬枚為大塚葬之徳光至臨洺見其井邑荒殘矣謂晉人曰致中國至此皆燕王為罪首又顧張礪曰爾亦有力焉夏四月丙辰朔發自汴州以馮道李崧和凝李澣徐台符張礪等從行次赤岡夜有聲如雷起於御幄大星復隕於旗鼓前乙丑濟黎陽渡顧謂侍臣曰朕此行有三失縱兵掠芻粟一也括民私財二也不遽遣諸節度還鎮三也資治通鑑曰契丹主以船數十艘載晉鎧仗將自汴泝河歸其國命寜國都虞候榆次武行徳將士卒千餘人部送之至河隂行徳與將士謀曰今為契丹所制將逺去郷里人生㑹有死安能為異域之鬼乎契丹勢不能乆㽞中國不若共逐其黨堅守河陽以俟天命之所歸者而臣之豈非長䇿乎衆以為然行徳即以鎧仗授之相與殺契丹監軍使㑹契丹河陽節度使崔廷勲以兵送耿崇美之潞州行徳遂乗虚入據河陽衆推行徳為河陽都部署行徳遣行友奉蠟表問道詣晉陽契丹遣武定節度使方太詣洛陽廵檢至鄭州州有戍兵共迫太為鄭王梁嗣宻王朱乙逃禍為僧梁太祖兄存之子友倫封宻王乙葢梁亡之後避禍而為僧也嵩山賊帥張遇得之立以為天子取嵩岳神衮冕以衣之帥衆萬餘襲鄭州太擊走之太以契丹尚强恐事不濟説諭戍兵欲與俱西衆不從太自西門逃奔洛陽戍兵既失太反譛太於契丹云脅我為亂太遣子師明自訴於契丹契丹將滿逹殺之太無以自明㑹羣盗攻洛陽契丹㽞守劉晞棄城奔許州太乃入府行㽞守事與廵檢潘環擊羣盗却之張遇殺朱乙請降伊闕賊帥自稱天子誓衆於南郊壇將入洛陽太迎擊走之太欲自歸於晉陽武行徳使人誘太曰我禆校也公舊帥此地今虚位相待太信之至河陽為行徳所殺蕭翰遣髙謨翰援送劉晞自許還洛陽晞疑潘環構其衆逐已使謨翰殺之戊辰武行友至晉陽庚午史𢎞肇奏遣先鋒將馬海擊契丹斬首千餘級時耿崇美崔廷勲至澤州聞𢎞肇兵已入潞州不敢進引兵而南𢎞肇遣海追擊破之崇美廷勲與奚王伊喇退保懐州辛未以武行徳為河陽節度使契丹主聞河陽亂嘆曰我有三失宜天下之叛我也諸道括錢一失也令上國人打草榖二失也不早遣節度還鎮三失也五代史雜傳曰馮道朝耶律徳光於京師徳光責道事晉無狀道不能對又問曰何以來朝對曰無城無兵安敢不來徳光誚之曰尔是何等老子對曰無才無徳癡頑老子徳光喜以道為太傅徳光北歸從至常山漢髙祖立乃歸漢徳光嘗問道曰天下百姓如何救得道為俳語以對曰此世佛出救不得惟皇帝救得人皆以為契丹不夷㓕中國之人者頼道一言之善也北夢𤨏言曰和凝少年時好為曲子詞布於汴洛洎入相専託人收拾焚毁不暇契丹入夷門號曲子相公戊辰次髙邑不豫丁丑崩于欒城年四十六是嵗九月壬子朔塟于鳯山陵曰懐陵廟號太宗洛中紀異曰太宗在欒城病時上京西八十里有獵人見太宗容貌如故乗白馬追奔一白狐因射殺之獵人驚國主南征未囬何忽至此因獲其死狐并箭失國主所在不浹旬而凶問至騐其日乃得疾之日騐其箭則國主南征所帶之箭失其一矣國人於其地置堂塑白狐形并箭在焉名曰白狐堂資治通鑑曰乙亥契丹主至臨城得疾及欒城病甚苦熱聚氷於胷腹手足且啖之丙子至殺狐林而卒國人剖其腹實鹽數斗載之北去晉人謂之帝羓張舜民使遼録曰契丹太宗北歸于鄴西愁死岡得疾至欒城殺狐林而崩愁死岡者本魏陳思王不為文帝所容于此悲哀呌號名愁思岡訛為愁死殺狐林者村民於林中射殺一狐因以名之趙與時賔退録曰蘭亭石刻惟定武者得其真葢唐太宗以真蹟刻之學士院朱梁徙置汴都石晉亡耶律徳光輦而歸徳光道卒輜重俱棄之中山慶厯中為土人李學究所得桑世昌蘭亭考曰定武蘭亭石世傳善本宣和中從仕中山詢訪故老以謂石晉之末契丹自中原輦載寳貨圖書而北至真定徳光卒漢祖起太原永康自立而歸與其祖母交兵於國棄此石於中山慶厯中土人李學究者得之不以視人韓忠獻之守定武也李生始以墨本獻後守者堅索之生乃瘞之地中又一紀李生謝世其子乃出石散摸售人毎本須錢一千由是好事者爭取之其後李氏子負緡無從取償時宋景文守定武乃以公帑金代輸之因取石匣藏于庫非貴㳺交舊不可得也熈寜間薛師正出牧其子紹彭又刻别本留之中山易古石刻携歸長安大觀中詔取其石置宣和殿中外間不便見矣俞松蘭亭續考曰右軍序字為遺蹤之冠太宗寤寐求之以王氏家傳在其孫智永之弟辨才處用房元齡計得之及攷紀聞所載乃云元帖為隋末時五羊一僧所藏誓於死守太宗以威驅勢脅而得之二説之不同如此自匣殉之後獲見硬黄響榻者且為欣幸迨明皇始刋之於學士院洎顯宗朝又刋於翰林待詔所考其二石一乃懐仁所臨前廋而後肥一乃王承規模刻豐殺得所轉折精神至石晉時耶律輦藏北去遺是石於中山遂號之為定武本亦不知其學士院本耶或待詔所本也詩話總龜曰幽薊數州自石晉敗後懐中華不已有使北者見燕京傳舍寫墨鴉甚精旁題詩曰星稀月明夜皆欲向南飛遼史拾遺卷三
