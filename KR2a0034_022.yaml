body:
  text: 遼史拾遺卷二十二錢塘厲鶚撰二國外紀第四十五高麗資治通鑑曰唐滅高麗天祐初高麗石窟寺眇僧躬乂聚衆據開州稱王號大封國性殘忍海軍統帥王建殺之自立復稱高麗王以開州為東京平壤為西京建儉約寬厚國人安之徐兢宣和奉使高麗圖經曰王氏之先蓋高麗大族也當高氏政衰國人以建賢遂共立為君長後唐長興三年遂自稱權知國事請命于明宗乃拜建元菟州都督充大義軍使封高麗王開運二年建卒子武立漢乾祐末武卒子昭立至皇朝建隆二年昭遣使來朝賜以功臣之號仍加食邑開寶九年昭卒子佃立遣使請命封高麗國王太平興國七年佃卒弟治上章乞襲封從之淳化六年契丹攻之治畏懦無守臣事北朝遂闕朝貢治卒弟誦立祥符七年誦卒弟詢權知國事大破契丹天聖中屢與女真偕來貢方物詢卒子隆立優柔不斷政荒力屈憚于北朝遂復臣事之貢使又絶隆卒私諡曰正子德王欽欽子穆王享皆朝貢不通朝廷亦罷遣使享子徽熙寧四年以權知國事復條貢方物元豐三年四年遣使來朝六年徽卒立凡三十八年諡曰文世子勳立百日卒弟原國公運立元祐四年卒諡曰宣子堯立未閲嵗以病廢國人乃請其叔熙攝政未幾而堯卒諡曰懷熙乃襲位避契丹嫌名改熙曰顒崇寧二年顒卒子俁立石林燕語曰高麗自三國以來見於史者句驪其國號高其姓也隋去句字故自唐以來止稱高麗五代史記後唐同光元年韓申來其王尚姓高則自三國至五代止傳一姓長興中始稱權知國事王建王氏代高當在同光長興之間而史失其傳元豐初王徽遣使金梯入貢建之七世孫也其表章稱知國王事蓋習用其舊而年稱甲子以其受契丹正朔故也續資治通鑑長編曰高麗國王誦卒其弟詢權領國事嘗築六城於境上曰興化曰鐵州曰通州曰龍州曰龜州曰郭州契丹以為二於已遣使求六城詢不許遂舉兵奄至城下焚蕩宫室剽劫居人詢徙居辨羅州以避之兵退乃遣使請和宣和奉使高麗圖經曰嵩山廟在王府之北出北昌門行五里許山路﨑嶇喬松森隂俯視城中如指諸掌其神本曰高山國人相傳祥符中契丹侵逼王城神乃夜化松數萬作人語敵疑有援即引去後封其山為嵩以祠奉其神也葉夢得石林詩話曰高麗自太宗後久不入貢至元豐初始遣使來朝神宗以張誠一館伴令問其復朝之意云其國與契丹為鄰每因契丹誅求不能堪國主王徽常誦華嚴經祈生中國一夕忽夢至京師備見城邑宫闕之盛覺而慕之乃為詩以記曰惡業因緣近契丹一年朝貢幾多般移身忽到中華地可惜中宵漏滴殘孫公談圃曰契丹有一佛寺甚壯麗使者至必焚香寺有大佛銀鑄金鍍豐稷奉使見其供具器皿皆神宗賜高麗之物蓋高麗制于契丹每遇契丹使至其國所居殿上鴟尾皆暫撤去文獻通考曰高麗自王徽以降雖通使於我然受契丹封册奉其正朔上朝廷及他文書蓋有稱甲子者嵗貢契丹至於六而誅求不已常云高麗乃我奴耳南朝何以厚待之遼使至其國尤倨暴館伴及公卿小失意輒行捽箠聞我使至必假他事來覘分取賜物嘗詰其南向修貢事髙麗人表謝其略曰中國五甲子方得一朝大邦一周天每修六貢契丹悟乃得免孫穆雞林類事曰高麗王建自後唐長興中始代高氏為君長傳位不欲與其孫乃及於弟生女不與國臣為姻而令兄弟自妻之言王姫之貴不當下嫁也國人姻嫁無聘財令人通説或男女相欲為夫婦則為之夏日羣沭於溪流男女無别父母病閉於室中穴孔與藥餌死不送又曰國城三靣負山北最高峻有溪曲折貫城中西南當下流故地稍平衍城周二十餘里雖雜沙礫築之勢亦堅壯又曰國官月下朝參文班百七十二員六拜舞蹈而退國王躬身還禮稟事則膝下而前得旨復行而退國人卑者見尊者亦如之其軍民見國官甚恭尋常則屈膝而坐官民子拜父父亦答以半禮風俗不盜少爭訟國法至嚴追呼惟寸紙不至則罰凡人請官府少亦資米數斗民貧甚憚之有犯不去中衣但禠袍帶杖笞頗輕束荆使自擇以牌記其杖數最苦執縛交臂反接量罪為之自一至九又視輕重制其時刻而釋之惟死罪可久甚者髀骨相摩腦皮折裂凡大罪亦刑部拘役也周嵗待決終不逃其法惡逆及罵父母斬餘止杖亦不甚楚嵗以八月論囚諸州不殺咸送三府夷姓人至期多赦宥或配送青嶼黑水永不得還五榖皆有之梁最大無秫糯以粳米為酒少絲蠶每一羅直銀十兩故國中多衣麻苧地瘠惟生人參松子龍須席藤席視日早晚為市皆婦人挈一桞箱一小升以六合為一刀以升為刀以稗米定物之價而貿易之他皆視此為高下若數多則以銀瓶每重一斤工人製用銀十二兩半入銅二兩半作一斤以銅當工之直癸未年倣本朝鑄錢交易以海東三韓通寶為記王雲雞林志曰龜山有佛龕林木盛遂傳云羅漢三藏行化至此滌齒揚枝插地生此木淨水所著今為清泉國人以佛法始興之地極所崇奉又曰高麗僧住寺修行者或犯戒律配白黑二山輕亦斥遣籍其子孫仍髠受差役又曰高麗善染采紅紫尤妙紫草大梗如牡丹搗汁染帛又曰高麗黃漆生島山六月刺取瀋色若金日暴則乾本出百濟今漆人號新羅漆又曰高麗王於國中出債收有陳道曽入其國為啇云今以官奴求息俾之日納磨絲貌好者倍其收若得子則沒為奴婢宣和奉使高麗圖經曰在家和尚不服袈裟不持戒律白紵窄衣束腰皂帛徒跣以行間有穿履者自為居室取婦鞠子其于公上負戴器用掃除道路間治溝洫修築城室悉以從事邉陲有警則團結而出雖不間于馳逐然頗勇壯其趨軍旅之事則人自裹糧故國用不費而能戰也中間契丹為麗人所敗正賴此輩朝鮮志曰朴淵在天磨聖居兩山之間狀若石甕窺之正黑有盤石涌出中心曰島巖水赴絶壁怒瀑下垂可十餘丈宛如白虹諺傅昔有朴進士者吹笛淵上龍女感之引以為夫故名朴淵上有祠旱禱輒應高麗文宗嘗遊此登島巖上風雨暴作文宗驚怖時季靈幹作書數龍之罪投于淵龍即出其脊乃杖之水為之盡赤西夏曽鞏隆平集曰夏國姓拓拔其逺祖仁福者思恭之族也唐僖宗始以思恭為夏州節度使賜國姓思恭族亂仁福繼之故亦稱李氏仁福死子彛超彛興相繼為定難軍節度使彛超而上五代史有傳彛興死子光睿繼光睿死子繼筠襲繼筠死弟繼捧襲位其從父綏州刺史克文言繼捧不當襲請遣使與偕至夏州諭令入覲繼捧乃舉族歸朝其弟繼遷在銀州太宗賜以國姓俾𨽻屬籍又賜繼捧名曰保忠繼遷名曰保吉為夏州節度使歸鎮續資治通鑑長編曰李繼遷之陷西涼也都首領潘羅支偽降繼遷受之不疑未幾羅支遞集六谷蕃部及者龍族合擊之繼遷大敗中流矢創甚至靈州界三十里死其子阿移嗣位又曰夏王德明凡娶三姓米母氏生元昊咩迷氏生成遇訛藏屈􅀈氏生成嵬元昊小名崖埋羌語謂惜為崖富貴為埋性凶鷙猜忍圓靣高凖長五尺餘少時衣長袖緋衣冠黑冠佩弓矢從衛步卒張青蓋出乘馬以二旗引百餘騎自幼曉浮屠學通蕃漢文字案上置法律書常攜野戰歌太一金鑑太平治迹通類曰元昊以兵法部勒諸羌始衣白窄衫氊冠紅裹頂冠後垂紅結綬自號嵬名吾祖凡六日九日則見官屬其偽官則分文武或靴笏幞頭或冠金帖縷冠緋衣金塗銀黑束帶佩蹀躞穿靴或金帖紙冠間起雲銀帖紙冠餘皆禿髮耳重環紫旋襴六垂束帶佩解結錐短刀矢弓韣乘鯢皮鞍打跨鈸拂民庶衣青緑用此以别貴賤自制蕃書十二卷字畫繁冗曲屈類符篆教國人紀事悉用蕃書夏文彥圖繪寶鑑曰夏國英宗元昊通蕃漢文字善繪畫儒林公議曰夏國元昊取契丹女號曰興平公主乃宗真之姊也元昊待之甚薄因晚被病元昊亦不往視之以至殁宗真雖忿恨然亦無如之何但遣使慰問之而已朝廷不知其故以為元昊畏耶律之強諷宗真使促元昊歸欵失之甚矣又曰富弼使契丹報聘再立盟約時吕夷簡方在相位命弼諷契丹諭元昊使納欵宗真是其言謂可指麾立定遂遣使詣元昊諭以朝廷之意元昊但依隨而已及楊守素至延州道元昊語曰朝廷果欲議和當下諭本國何煩轉求契丹契丹界夾山部落呆家等族離叛多附元昊契丹以詞責問元昊辭不報自稱西朝謂契丹為北邉又言請職所部落所貴不失兩朝歡好宗真既以強盛誇於中國深恥之乃舉衆西伐聚兵於雲州西約五百里夾山之側國內擾動糧餽相繼先是契丹預峙芻茭以備冬計元昊密令人焚之殆盡兵多餓死及與戰遂敗懼朝廷知之乃出榜幽州稱元昊歸欵自以誇大其略云元昊曩自先朝求為巨援據一方之裂壤逮三世以襲封又云梟音易變犬態多端忘牢豢之深恩肆狂悖之凶性擅誘邉俗巧諜歡鄰罪既貫盈理當難赦是用躬驅鋭旅往覆危巢方邇賊庭乞修覲禮云云然燕人皆知其妄我之諜者又見輿尸重傷者相繼自西而至其敗益明然深自蔽藏懼為朝廷所知夢溪筆談日景祐中黨項首領趙德明卒其子元昊嗣立朝廷遣郎中楊告入蕃弔祭告至其國中元昊遷延遙立屢促之然後至前受詔及拜起顧其左右曰先王大錯有國如此而乃臣屬於人既而饗告於庭其東屋後若千百人煆聲告隂知其有異志還朝祕不敢言未幾元昊果叛其徒遇乞先創造蕃書獨居一樓上纍年方成至是獻之元昊乃改元制衣冠禮樂下令國中悉用蕃書蕃禮自稱大夏朝廷興師問罪彌嵗元昊戰士益少而舊臣宿將如剛浪唆遇野利輩多以事誅元昊力孤復奉表稱蕃朝廷因赦之許其自新元昊乃更稱兀卒曩霄慶曆中契丹舉兵討元昊元昊與之戰屢勝而契丹至者日益加衆元昊望之大駭曰何如此之多也乃使人行成退數十里以避之契丹不許引兵壓西師陳元昊又為之退舍如是者三几退百餘里每退必盡焚其草萊契丹之馬無所食因其退乃許平元昊遷延數日以老北師契丹馬益病亟引軍攻之大敗契丹於金肅城獲共乘輿服器子壻近臣數十人而還先是元昊後房生一子曰寧令受寧令者華言大王也其後又納沒藏訛厖之妹生諒祚而愛之寧令受之母恚忌欲除沒藏氏授戈於寧令受使圖之寧令受間入元昊之室卒與元昊遇遂刺之不殊而走諸大臣沒藏訛厖輩仆寧令受梟之明日元昊死立諒祚而舅訛厖相之有梁氏者其先中國人為訛厖子婦諒祚私焉日視事於國夜則從諸沒藏氏訛哤懟甚謀伏甲梁氏之宫須其入而殺之梁氏私以告諒祚乃使召訛哤執於內室沒藏強宗也子弟族人在外者八十餘人悉誅之夷其宗以梁氏為妻又命其弟乞埋為家相許其世襲諒祚凶忍好為亂治平中遂舉兵犯慶州大順城諒祚乘駱馬張黃屋自出督戰牌者彍弩射之中乃解圍去創甚馳入一佛祠有牧牛兒不得出懼伏佛座下見其脫鞾血涴於踝使人裹創舁載而去至其國死子秉常立而梁氏自主國事梁乞埋死其子移逋繼之謂之沒寧令沒寧令者華言天大王也秉常之世執國政者有嵬名浪遇元昊之弟也最老於軍事以不附諸梁遷下治而死存者三人移逋以世襲居長其次曰都羅馬尾又次曰關萌訛略知書私侍梁氏移逋萌訛皆以昵幸進唯馬尾粗有戰功然皆庸才秉常不得志素慕中國有李青者本秦人亡㢚中秉常昵之因説秉常以河南歸朝廷其謀泄青為梁氏所誅而秉常廢續資治通鑑長編曰曩霄凡七娶一曰米母氏舅女也生一子以貌類他人殺之二曰索氏始曩霄攻貓牛山傳者以為戰沒索氏喜日調音樂及曩霄還懼而自殺三曰都羅氏早死四曰咩迷氏生子阿里謀殺曩霄為卧香乞所告沈於河殺咩迷氏於王亭鎮五曰野利氏遇乞從女也頎長有智謀曩霄畏之戴金起雲冠令他人不得冠生三子曰寧明喜方術從道士路修篁學辟榖氣忤而死次寧令哥以貌類已特愛之以為太子次薛埋早死後復納沒移皆山女營天都山以居之野利之族宣言曰吾女嫁二十年止故居而沒移女乃為修內曩霄怒會有告遇乞兄弟謀以寧令哥娶婦之日作亂曩霄遂族遇乞剛浪凌城逋等三家既而野利氏訴我兄弟無罪見殺曩霄悔恨下令訪遺口得遇乞妻閻于三香家後與之私通野里覺之不忍誅遇乞妻乃出為尼號沒藏大師六曰耶律氏七曰沒移氏初欲納為寧令哥妻曩霄見其美自取之號為新皇后寧令哥憤而殺曩霄不死劓其鼻而去匿黃蘆訛厖家為訛厖所殺曩霄遂因鼻創死年四十六沒藏氏初為尼寓於偽興州之戒壇院既娠而曩霄死曩霄遺言立從弟委哥寧令其大酋誤移賞都埋移香熱嵬浪布野也浪囉囉與沒藏訛厖議所立沒藏大族也訛厖為之長衆欲如遺言立委哥寧令訛厖弗許曰委哥寧令非先王子安得有國夏自祖考以來父死子繼今沒王尼娠先王之遺腹幸而生子則可以嗣先王矣誰敢不服衆曰然遂立沒藏氏偽號太后曩霄既死三月諒祚生以毛惟昌高懷正之妻更乳之而政在沒藏氏惟昌懷正皆漢人本遇乞帳下故親待之已而懷正貸銀夏人惟昌竊衣曩霄所與盤龍服皆為訛厖所殺鶚案曩霄為子寧令哥所殺始末沈括與李燾所述不同當以燾為正九朝編年備要曰曩霄既死而諒祚生諒祚母沒藏氏既通李守貴又通保細吃多已守貴怒併殺之訛厖族守貴後以女妻諒祚諒祚益長而驕心忌沒臧訛厖専且通訛厖子妻梁氏梁氏密告訛厖將叛諒祚乃與左右舉兵共誅訛厖滅其族殺妻沒藏氏而以梁氏忠於已因以為妻諒祚性狂脫無常時遇酋豪大家輒私其婦女酋豪多怨納叛人景詢親而用之以為樞密使棄蕃禮用漢制康譽之昨夢録曰西夏有竹牛重數百斤角甚長而黃黑相間用以製弓極佳尤且健徑其近弝黑者謂之後醮近弰近弝俱黑而弓面黃者謂之玉腰夏人常雜犀角以市人莫有知者莊綽雞肋編曰西夏興州出良弓中國購得之每張數百千太平老人袖中錦曰契丹鞍夏國劔高麗祕色皆為天下第一他處雖效之終不及遼史拾遺卷二十二
