body:
  text: 遼史拾遺卷十四錢塘厲鶚撰志第十地理志四南京道南京析津府諸官名補梳妝樓補㑹同館補望京館補居庸松亭榆林之關古北之口桑乾河髙梁河大安山燕山採魏院補蕭太后城補白塔補契丹國志曰南京本幽州地乃古冀州之域舜以冀州南北廣遠分置幽州以其地在北方隂幽也東有朝鮮遼東北有樓煩白檀西有雲中九原南有滹沱易水唐置范陽節度臨制奚契丹自晉割棄建為南京又為燕京析津府戶口三十萬大內壯麗城北有市陸海百貨聚于其中僧居佛寺冠於北方錦繡組綺精絶天下膏蔬蓏果實稻梁之類靡不畢出而桑柘麻麥羊豕雉兔不問可知水甘土厚人多技藝秀者學讀書次則習騎射耐勞苦石晉未割棄已前其中蕃漢雜居勝負不相當既築城後數十里間宛然如帶回環繚繞形勢雄傑真用武之國也王士㸃禁扁曰遼以幽州為南京宫之扁曰永興曰積慶曰延昌曰章敏曰長寧曰崇德曰興聖曰敦睦曰永昌曰延慶曰長春曰太和曰延和殿之扁曰清涼曰元和曰嘉寧堂之扁曰天膳樓之扁曰五花曰五鳳曰迎日閣之扁曰乾文門之扁曰元和曰南端曰萬春曰千秋曰鳯凰園曰栁園沈德符野獲編曰大內北苑中有廣寒殿者舊聞為耶律后梳妝樓髙士竒金鼇退食筆記曰瓊華島在太液池中其巔古殿相傳為遼后梳妝臺范成大攬轡録曰㑹同館燕山客館也遼亦有之孫承澤春明夢餘録曰望京館在城東北五十里孫候村遼建為南北使臣宿息餞飲之所宋王曾上契丹事曰出燕北門至望京館即此樂史太平寰宇記曰居庸關在昌平縣西北北齊改為納欵淮南子云天下九塞居庸是其一北邉備對曰太行山南自河陽懷縣迤湟北出直至燕北無有間斷此其為山不同他地蓋數千百里自麓至脊皆險峻不可登越獨有八處粗通微徑名之曰陘居庸關者其最北之第八陘也此陘東西橫亘五十里而中間通行之地才濶五步羅璧識遺曰河北以居庸諸關為險蓋居燕百里外關外名虎北口即漢上谷郡其山西連太行東亘遼海狼諸胥諸山為襟帶關南北通處路繞兩崖間風起人行或為所掀彭文子謂隘如線側如傾其峻絶天其降趨井下有澗巨石磊塊凡四十五里艱折萬狀山外寒氣先山南兩月燕之東百里曰榆關蓋自虎北口下皆亂山層復至此循海方有狹徑實遼東諸州之障阻昔時守以土步敵不能入自石晉割關南十六州劉仁恭割營平灤三州賂契丹由是北自定武逹灤海千里失險方輿紀要曰松亭關在喜峯口北百二十里遼人自燕之中京每自松亭趨栁河許亢宗奉使行程録曰出榆關以東山川風物與中原殊異當契丹全盛時但土城存居民數十百家及官舍三數椽不及中朝一小鎮强名為州又曰第十四程自營州一百里至潤州離營州東行六十里至榆關並無保鄣但存遺址有居民三四家登髙四望東自碣石西徹五臺幽州之地沃野千里北限大山重巒中有五關居庸可以通大車運轉餉松亭金坡古北口止行人馬不可行車外有十八路盡兔徑鳥道止能通人不可行馬山之南地則五榖百果良材美木無所不有出關未數十里則山童水濁皆瘠鹵彌望黃茅白葦莫知其極蓋天設此以限南北也胡三省資治通鑑注引沈括曰檀州東北五十里有金溝館自館少東北乍原乍隰三十餘里至中頓過頓曲折北行峽中濟灤水通三十餘里鉤折投山隙以度所謂古北口也髙士竒塞北小鈔曰古北口僧寺刻宋蘇文定轍古北口道中詩曰亂山環合疑無路小徑縈回長傍溪髣佛夢中尋蜀道興州東谷鳯州西宋史元祐間轍嘗代軾為翰林學士尋權吏部尚書使契丹館客者侍讀學士王師儒能誦洵軾之文及轍茯苓賦此蓋奉使時所題也韓琦安陽集虎北口詩曰東西層巘鬱嵯峨關口才容數騎過天意本將南北限即今天意又如何顧炎武昌平山水記曰古北口城北口外有楊業祠業以雍熙中為雲州觀察使契丹陷寰州遇於雁門北陳家谷力戰不支被擒不食三日死忠矣然雁門之北口非古北口也祠於斯者誤也劉敬公是先生集楊無敵廟詩曰西流不返日滔滔隴上猶歌七尺刀慟哭應知賈誼意世人生死兩鴻毛自注云在古北口其下水西流蘇轍欒城集古北口楊無敵廟詩曰行祠寂寞寄關門野草何知避血㾗一敗可憐非戰罪太剛嗟獨畏人言馳驅本為中原用嘗享能令異域尊我欲比君周子隱誅彤聊足慰忠魂鶚案古北口楊無敵祠顧氏以為誤考劉邍父蘇子由二詩在奉使時作則祠創自遼日可知無敵忠義感動敵境又何論古北口之非陳家谷也范成大石湖集曰盧溝去燕山三十五里宋敏求謂蘆菰河即桑乾河也太平寰宇記曰髙梁河水在薊縣東四里南流合桑乾水桑乾水西北自昌平縣界來南流經府西又東流經府南又東南與髙梁河合又水經云桑乾水東與洗馬溝水合方輿記要曰大安山在房山縣北八十里山髙險薛居正曰大安幽州西名山也又曰燕山在玉田縣西北二十五里晉咸康四年石虎攻假遼遼將北平相陽裕登燕山以自固即此水經注云燕山上懸巖之側有石鼓去地百餘丈望若數百石囷有石梁貫之鼓之東南有石人援桴狀同擊勢耆舊言燕山石鼓鳴則主有兵春明夢餘録曰採魏院石塔記遼景福元年建燕京寶塔寺講律沙門如正述塔今在蕃育署劉定之呆齊集曰京師西南五六里外有舊城唐藩鎮遼金别都之城也元遷都稍東於是舊城東半遂入於朝市間而西半猶存號為蕭太后城蕭太后者遼后皆以蕭為姓有子為帝則太后别居宫城統部屬故其亡也末帝淳之妻猶得獨存稱太后以主其國踰年乃滅也劉侗帝京景物略曰白塔建自遼夀昌二年相傳藏法寶種種靜夜有光至元八年世祖發視之舍利二十粒青泥小塔二千石函銅瓶香水盈滿前二龍王跪而守護案上無垢浮光陀羅尼五部軸以水晶金石珠琢異果十種列為供瓶底一錢錢文至元通寶四字也世祖驚異乃加崇飾或言遼至燕京五方各鎮以塔塔五色兵燹後惟白塔存蔣一葵長安客話曰妙應寺在阜城門內寺右偏有白塔創自遼夀昌二年為釋迦佛舍利建析津府薊丘補清類天文分野之書曰大興秦薊縣漢為廣陽國東漢為郡兼立幽州仍為薊縣晉屬燕國元魏亦為幽州立燕郡隋為涿郡唐為幽州治所開元二十三年升為望縣建中二年析西界置幽都縣五代亦為薊縣石晉割地豫遼開泰元年更縣為析津金天德五年改為大興京東考古録曰漢書薊古燕國召公所封後漢書薊本燕國刺史治水經注城內西北隅有薊邱因邱以名邑也唐書地理志幽州范陽郡治薊開元十八年析置薊州漁陽郡治漁陽及遼改薊為析津縣因此薊之名遂沒於此而在於彼今人乃以漁陽為薊而忘其本矣史記樂毅書薊丘之植植於汶篁一統志城西北隅即古薊門舊有樓館並廢但門外存二土阜旁多林木頗為近之宛平縣香山玉泉山五華山仰山菩薩山盧師山覺山雙泉山俱補元混一輿地要覽曰宛平本幽都縣薊縣西界地唐為燕州朱希彩奏為廣寧縣後為朱滔所陷廢燕州立幽都縣遼改宛平香山玉泉山五華山仰山菩薩山俱在西北盧師山覺山雙泉山俱在西徐善泠然志曰香山寺址遼中丞阿里吉所捨宋啓明長安可遊記曰香山有乳峯石時噓雲霧類匡廬香爐峰故名鶚案北遼宣宗耶律淳葬燕西香山永安陵香山之名已見遼史孫國敉燕都游覽志曰玉泉山有巨穴泉噴而上淙淙有聲或名之噴雪泉長安客話曰盧師山以神僧得名師來居此山能馴二龍子山有潭覆以巨石其下深不可測二龍潜焉嵗旱禱雨輒應明一統志曰覺山在府西三十里懸崖之上與盧師平坡鼎峙西有三泉曰清泠曰清㫖曰洊至燕都遊覽志曰覺山漢左馮翊韓延夀墓在焉五華雙泉翠微仰山諸峰環之如屏明一統志曰菩薩崖在府西北一百二十里山畔有三石像長安客話曰仰山峯巒拱秀中頂如蓮花心有五峯曰獨秀翠微案蓋妙髙紫微中多禪剎更在西山外四十餘里人跡罕到昌平縣軍都山補溼榆河補九聖寺補太平寰宇記曰軍都山又名居庸山在縣西北十里後漢書曰尚書盧植隱居上谷軍都山立黌教授學者自遠而至輿地廣記曰縣北十五里有軍都陘西北三十五里有欵納門即居庸故關亦謂之軍都關崔學履昌平州志曰濕榆河在州治東南五十里源出軍都山南流又折而東以入於潞河又曰九聖寺在州治東遼乾統五年建良鄉縣鹽溝河補樂毅墓補許亢宗奉使行程録曰良鄉縣乃唐莊宗時趙德鈞所鎮也幽州嵗苦契丹侵抄轉餉乃于鹽溝置良鄉縣鶚案鹽溝通鑑作閻溝皇甫鑑域冡記曰燕廣城君樂毅墓在縣南三里牛象坤良鄉縣志曰鹽溝河發源自宛平縣龍門關東南流經縣境陶村里入桑乾河潞縣平谷縣故城安樂縣故城補潞水通潞亭補通典曰漢平谷縣故城在今縣北又有漢安樂縣故城在西北太平寰宇記曰潞河一名沽河一名鮑丘水北自檀州密雲縣界流入水經云鮑邱水東厯夏溓澤後魏諸州地記云潞縣城西三十里有潞河源出此山南流謂此水也水經注曰髙梁水東至潞縣注於鮑邱之水又南徑潞縣故城西王莽之通潞亭也安次縣石梁城常道城桃水補定覺寺補劉琨墓補韓澤墓補留犢村補方輿紀要曰石梁城在舊州頭東南五十里或云南北朝時所置戍守城也其地又有嵩州城相傳遼實哷王所置又曰常道城在舊州頭西五里三國魏燕王宇之子璜封常道鄉公甘露五年司馬昭迎立之北魏主宏封宇文英為常道鄉公皆此城也張文舉東安縣志曰桃水道首受淶水分東至安次入河見漢志又曰定覺寺在縣西北七十里常道鄉唐垂拱三年賜額五代燬於兵遼天慶間承直郎張銑重建明一統志曰劉琨墓在東安縣東二十里東安縣志曰遼中丞韓澤墓在縣西北五十里乾統八年葬曹學佺名勝志曰留犢村在縣西北六十里魏巨鹿時苖為夀春令及歸留犢而行回經于此因以名里鶚案元初克燕改縣為東安州明初降為東安縣永清縣方輿紀要曰永清縣石晉時沒于契丹周世宗復取之宋初為霸州治景祐二年并入文安縣金復置鶚案永清自周世宗復取後已入南朝版圖宋史政和三年賜霸州郡名永清似不當存遼史地理志武清縣雍奴廣濟寺補直沽補順天府志曰三角淀南武清縣南圍二百里古之雍奴也自范甕口王家陀河劉道口魚兒里諸水所聚㑹大沽港水經注曰南極呼池西至泉州雍奴東極于海謂之雍奴藪其澤野有九十九淀徐昌祚燕山叢録曰武清三角淀云是舊城隂晦之夕漁人多見城堞市里人物填集寶坻縣志曰廣濟寺有遼碑二一銀青榮祿大夫檢校司徒宋璋佛殿記太平五年立一重熙五年立查為仁盤山記遊集曰寶坻古廣濟寺殿有透靈碑相傳可以隔望此言雖不足證然光澤如鏡亦異事也碑側記皇朝建號太平十有一載仲夏之月商稅麴鐵都監提㸃造船韓紹孚時建供奉班祇候前𣙜鹽使監造海行舟船劉可度重熙五年十二月二十九日受敕碑正面題檢校司徒使持節儒州諸軍事儒州刺史兼御史大夫上柱國廣平縣開國男食邑三百户宋璋撰文縣志載寺有遼碑二此碑記重熙五年受敕當即是第二碑前一碑太平五年立者已失武清縣志曰大河以北之水多從直沽入海此即古者九河入海之處鶚案寶坻本遼武清縣新倉地金大定中置縣香河縣海運故道補長安客話曰香河縣境南有大龍灣小龍灣二水夏秋始合流經寶坻縣入七里海相傳遼時海運故道玉河縣劉仁恭於大安山創宫觀師煉丹羽化之術於方士王若訥因割薊縣分置以供給之宋祁唐書曰劉仁恭從方士王若訥學長年築館大安山掠子女充之又招浮屠與講法以堇土為錢斂真錢穴山藏之殺匠滅口禁南方茶自擷山為茶號山曰大恩以邀利漷隂縣獨秀園亭補張祥漷縣志曰獨秀園亭在縣北二里遼司徒郭世珍建宋王曾上契丹事督亢亭劉李河憫忠寺太平寰宇記曰督亢陂在范陽縣東南十里劉向别録督亢燕膏腴之地孫暢之述畫云燕太子丹使荆軻齎督亢地圖入秦謀殺秦王尋為秦滅也郡國志引徐野曰方城縣有督亢亭范成大石湖集曰琉璃河又名劉李河在涿州北三十里水極清泚茂林環之尤多鴛鴦千百成羣此河大中祥符間路振乘軺録亦謂琉璃河唯嘉祐中宋敏求入蕃録乃謂之六里河文惟簡北使事實曰燕山京城東壁有大寺一區名憫忠廊下有石刻云唐太宗征遼東髙麗回念忠臣孝子沒於王事者所以建此寺而薦福也東西有兩甎塔髙可十丈云是安祿山史思明所建順州歸化軍中節度溫榆河黍谷山牛闌山補齊長城駮補王應麟通鑑地理通釋曰石晉十六州考云順州順義郡在范陽郡城唐天寶初置治賔義縣九域志化外順州領賔義一縣唐志突厥州順州貞觀四年平突厥以其部落置於幽靈之境後僑治幽州城中胡三省資治通鑑注引沈括曰幽州東北三十里有望京館東行少北十餘里出古長城又二十里至中頓又踰孫侯河行二十里至順州土厚冝稼顧炎武昌平山水記曰溫餘河即昌平之榆河下流為沙河入順義西南界下至通州入潞河順義謂之西河金人名縣曰溫陽以此遼史作溫榆河本水經注之濕餘河以字相似而訛也朱彛尊日下舊聞曰後漢書王霸為上谷太守陳委輸可從溫水漕以省陸輸之勞事皆施行章懷太子注引水經注本作溫餘水遼史順州有溫榆河金更懷柔縣為溫陽豈盡無據又昌平多溫泉有流入雙塔河者溫餘之名竊疑因此水經注既無善本今人習見坊刻遂指溫字為濕字之訛正恐類昔人所云以不悖為悖也楊霆順義縣志曰溫榆河在縣治西南三十里起于口北由沙河下逹于漕河中有三渡俗名葦溝河明一統志曰黍谷山在懷柔縣東四十里跨密雲界亦名燕谷山文昌雜録曰余奉使北遼過順州有黍谷坊接伴副使王仲淵指以謂副使文供備云觀此可知其寒也劉向别傳曰燕地谷美而寒不生五榖鄒子吹律召溫氣至五榖生至今名黍谷北遼士子多燕人故亦頗知學問也塞北小鈔曰牛闌山在順義縣北二十里相傳山有中峰洞洞內金牛時常出現山不甚髙逺望之僅蜿蜒一邱耳鶚案牛闌山見王沂公上契丹事昌平山水記曰順義縣西南二十里有天柱村三十里有葦溝村村東臨溫餘河渡南有長城遺跡遼史順州南有齊長城城東東北有華林天柱二莊遼建涼殿春賞花夏納涼者也齊長城齊天保中所築沈括曰幽州東北三十里有望京館東北行少北十里餘出古長城即此羅願爾雅翼曰劉原父奉使契丹時聞順州山中有異獸如馬食虎豹契丹人不識以問之曰此所謂駮也為言形狀聲音皆是契丹人歎服懷柔縣呼奴山補看花臺補周仲士懷柔縣志曰呼奴山縣東南三十里漢鄧禹子訓與上谷太守任興屯兵防丐奴烏桓于此又曰看花臺縣北三十里遼蕭后避暑北上常登臺看花明一統志曰呼奴山亦名狐奴山昌平山水記曰狐奴山西南百步有漢狐奴縣址魏文帝黃初二年省檀州武威軍下刺史桑溪鮑丘水桃花山螺山劉敞公是先生集檀州詩曰窮谷回看盡孤城平望遙自古北口山至此都盡市聲衙日集此州衛日市集海蓋午時消每旦海氣如霧至午消盡土人謂之海蓋冠帶才通漢山河更入遼春風解氷雪最覺馬蹄驕太平寰宇記曰三城河即沽水也東北塞外流入桑溪水經注云三城水即經伏凌山南與石門水合是水有桑溪之名蓋源出桑溪故也右注鮑丘水水經注鮑邱水又東南龍芻溪水注之是也水經注云鮑丘水又南徑傂奚縣故城東王莽更之曰敦德也太平寰宇記曰桃花山在漁陽西北十五里明一統志曰紅螺山在懷柔縣北二十里髙二百仞下有潭潭中常有二螺色殷紅夕吐光焰土人異之因以名山密雲縣潮河密雲山白檀山普濟寺治山寺劉存規墓俱補續通典曰檀州密雲縣即漢厗奚縣舊治厗音蹄塞北小鈔曰潮河在縣東南自古北口流入縣界西南流至順義縣合於白河昌平山水記曰密雲山一名橫山郡所以名也劉效祖密雲縣志曰普濟寺縣東北八十里遼統和五年建清寧二年重修內有顯公和尚祠冶山上寺冶山下寺遼重熙八年建又曰劉存規字守範仕遼為積慶宫都提轄使金紫榮祿大夫檢校司空兼御史大夫上柱國卒于應厯五年葬密雲縣嘉禾鄉有墓志涿州永泰軍上刺史大房山孔水洞補六聘山涿水樓桑河祁溝河范村補陀羅口補涿鹿山補雲居寺補許亢宗奉使行程録曰涿州昔為契丹南寨邊城樓壁俱存及郭藥師舉城內屬不經兵火人物富盛井邑繁庶近城有涿河劉李河合范河東流入海故名范陽通鑑地理通釋曰涿州涿郡唐大厯四年節度使朱希彩表析幽州之范陽歸義固安置治范陽王安石臨川集涿州詩曰涿州沙土望桑乾鞍馬春風特地寒萬里如今持漢節郤尋此路使呼韓太平寰宇記曰大防山在良鄉縣西北三十五里山下有石穴史恆德涿鹿記曰房山在涿郡曲北五十里北接居庸東抵漁陽西連紫荆所謂幽燕奧室也曹學佺名勝志曰大房山南晉霍原隱處黃榜房山縣志曰孔水洞在大房山東北其上縣崖千尺其下石竇如門流水湧出深不可測時有白龍出游往往樵牧聞絲竹之音開元間旱每遣人投以金龍玉璧禱之輒應明一統志曰六聘山在房山縣西三十里太平寰宇記曰涿水源出縣西土山下東北流經縣北五里又東流注壁水應劭注漢水涿水出上谷涿鹿縣水西入海十三州志云涿郡南有涿水北至上谷為涿鹿河其支入丐奴中者謂之涿耶水水經注曰樓桑里劉備之舊里也長安客話曰州西南五十里岐溝宋時置關以備契丹者方輿紀要曰范村在州西南宋宣和四年童貫伐遼遣辛興宗揔西路兵趨范村為遼人所敗又曰駝羅口在州東北宋雍熙中圍涿州契丹主隆緒由駝羅口應援即此唐舜卿涿州志曰獨鹿山即涿鹿山也在州城之西一十五里遼沙門志才涿鹿山雲居寺續祕藏石經塔記曰古之碑者用木為之乃葬祭聘饗之際所植一大木而字從石者取其堅久也秦漢以降凡有功德政事亦碑之欲圖不朽易之以石雖失其本從來所尚不可廢焉浮圖經教來自西國梵文貝葉此譯華言盡書竹帛或邪見而毁壞或兵火而焚爇或時久而螙爛孰更印度求諸與有隋沙門靜琬深慮此事屬志發願於大業年中至涿鹿山以大藏經刻于貞珉藏諸山竇大願不終而奄化門人道公議公暹公法公資資相踵五代造經亦未滿師願至遼劉公法師奏聞聖宗皇帝賜普渡壇利錢續造次興宗皇帝賜錢又造相國楊公遵勗梁公潁奏道宗皇帝賜錢造經四十七帙通前上石共計一百八十七帙已厝東峰七石室內見今大藏仍未及半有通理大師經林拔秀名實俱髙教風一扇草偃八紘其餘德業俱載寶峰本寺遺行碑中師於茲山寓宿有續造念興無緣慈為不請友至大安九年正月一日遂於茲寺放開戒壇士庶道俗入山受戒叵以數知方盡暮春始得終罷所獲錢施及萬鏹付門人右街僧録通慧圓照大師善定校勘刻石石類印板背面俱用鐫經兩紙至大安十年錢已盡功且止碑四千八十片經四十四帙題名目録刻如左未知後代誰更繼之又有門人講經沙門善鋭念先遺風不能續扇經碑未藏或有殘壞與定師共議募功至天慶七年於寺內西南隅穿地為穴道宗皇帝所辦石經大碑一百八十片通理大師所辦石經小碑四千八十片藏瘞地穴之內上築臺砌磚建塔一座刻文標記石經所在于奕正天下金石志曰雲居寺續鐫石經記趙遵仁撰清寧四年沙門智光重修雲居寺記曰應厯十四載寺主謙諷完葺一寺結邑千人請右補闕琅琊王公正作碑頃因兵火遂至傷缺補闕子諸行宫都部置判官都官員外郎賜紫金魚袋敦念先人遺跡出俸錢冉修以釋智光乃考之執友也故命刋述勒之時睿德神略應運啓化承天皇太后至德廣孝昭聖皇帝御極之二十三年統和乙已嵗八月丁丑朔十一日丁亥記帝京景物略曰房山縣西南四十里有山曰白帶山生􅟗題草又曰􅟗題山藏石經者千年矣故曰石經山亦曰小西天云鶚案房山縣金為奉先縣元改房山遼時未有縣地屬涿州白帶山即涿鹿山也王正碑文已入文苑傳補范陽縣涿州范水水經注云涿水出涿鹿山世謂之張公泉東北流徑涿鹿縣故城王莽所謂禠陸也黃帝與蚩尤戰于涿鹿之野留其民於涿鹿之阿即於是處名勝志曰范水在州西南水北曰陽范陽郡名以此固安縣渾河補韓城武陽城法華寺歸依寺大師塔俱補蘇志臯固安縣志曰渾河在縣西二十餘里本桑乾河又名漯河俗呼渾河亦曰小黃河以流濁故也源出山西大同府馬邑縣東北十里桑乾山南經縣境至武清縣小直沽與衛河合流入于海水經注曰固安東南徑韓城東詩韓奕章曰溥彼韓城燕師所完王肅曰今涿郡方城縣有韓侯城世謂寒號非也固安縣志曰武陽城在縣西北燕昭王之所築也又曰法華寺在縣東二十五里石碣有云大遼國燕京涿州固安縣萬春鄉皇臺里鄉貢進士張希顏述考將仕郎試太子正字前守涿州司法參軍張鞏書重熙間重修募緣碣有云時遷嵗暮隳殘螮蝀之梁雨壞風摧打碎鴛鴦之瓦又云若抽鵝眼之資必值龍華之㑹等語又曰歸依寺在縣東北十八里遼天慶七年立幢大師塔在東徐村遼奉聖州司候判官給事郎試太子校書郎騎都尉蔡咨彥立碣有進士焦山等字天慶元年建新城縣白溝河時承諫墓俱補程正惠公卓使金録曰嘉定四年十二月二十三日過白溝河昔與遼人分界又十里過大白溝河亦名巨馬河何濟新城縣志曰白溝河在縣南三十里出山西代郡深山由淶水定興為馬河至新城南為白溝河即宋遼分界處又曰時承諫墓在縣東北二里本遼人金贈鎮東節度使兼侍中金李晏時立愛墓志銘曰公父諱承諫積纍巨萬發倉貸人每折其劵負郭沮洳常阻行路創石為梁人得平步善慶攸鍾是生我公鶚案金史時立愛傳承諫作承謙誤歸義縣易京重脣魚俱補通典曰歸義縣漢易縣地公孫瓉于此置易京在今縣南十八里又有巨馬水涿州志曰重脣魚惟巨萬馬河有之因此地魚重脣故名易州髙陽軍上刺史易水黃金臺補燕子城補狼山大寧山樊館山補荆軻山補吟詩臺五華樓補福感寺補靜覺寺補輿地廣記曰漢安故縣故城在今縣南易水所出燕太子丹送荆軻入秦祖道於水上輒起為夀歌曰風蕭蕭兮易水寒壯士一去兮不復還即此戴銑易州志曰黃金臺在州治東南四十里昔燕昭王師事郭隗築臺置千金於上以延天下士士爭趨燕故號黃金臺周密癸辛雜識曰保定府之西有易州即郭藥師起兵處在易水北州東南有故城土人號曰燕子城明一統志曰郎山在保定府城西北五十里一名狼山其峯尖鋭如削皎然玉立又曰大寧山在易州西五十里中有大寧寺冊府元龜曰劉昫涿州人唐天祐中契丹陷其郡昫被俘至新州逃而獲免隱居上谷大寧山林烇章易水志曰樊館山在州西七里是樊於期授首處荆軻山在州西五里昔燕丹尊軻上卿館此潘自牧記纂淵海曰吟詩臺在易州西大寧山五代馮道吟詩於此明一統志曰五華樓在易州治即燕候雲物臺遼聖宗嘗御此樓書刺史馬質兵監趙質姓名于西壁易水志曰福感寺在州東一里遼統和二十八年建上中下靜覺寺在大寧山遼大安二年建淶水縣本漢道縣周大象十八年改淶水縣在州東四十里有淶水易州志曰拒馬河在淶水縣治東一里許源出廣昌淶山又東南至定興縣西與白澗河合又東至新城縣界為白溝河又東注霸州合直沽入于海一名淶水以其發源淶山得名非實有二也髙士竒扈從西巡日録曰淶水縣城舊在拒馬河西北二里俗名周城灣水經曰拒馬河出代郡廣昌縣淶山酈道元注曰即淶水也鶚案周城灣當即周大象中所改城也容城縣三臺城補記纂淵海曰三臺城在容城縣境昔燕魏分易水為界築三臺以耀武薊州尚武軍上刺史􅌉山石門鎮感化寺獨樂寺祐唐寺韓氏賜田芹菜山俱補夢溪筆談曰豫使遼至古契丹界大薊茇如車蓋中國無此大者其地名薊恐其因此也如楊州冝楊荆州冝荆之類荆或為楚楚亦荆木之别名也熊相薊州志曰􅌉山一名􅌉龍山在州西北二十五里髙二十餘仞周百餘里勢磅礴而􅌉桓因以名之山北數峯陡絶林立如削曰紫蓋曰宿猿尤為竒特最髙者上􅌉有二龍潭禱雨多應稍卑者曰中􅌉東行十餘里蔚然深秀怪石突起曰白崖日暮則山色蒼翠嵐氣溶涇濛然如雨上有古寺七十餘所方輿紀要曰石門鎮在薊州東六十里山峽嶄絶壁立于中洞門俗呼為石門口宋宣和五年遼蕭幹敗宋兵于石門鎮遂陷薊州釋智朴􅌉山志曰感化寺有遼乾統七年碑漁陽南朴撰文沙門肅回書又曰獨樂寺在州治西南不知創自何代至遼時重修有翰林院學士承㫖劉成碑統和四年孟夏立石其文略曰故尚父秦王請談真大師入獨樂寺修觀音閣以統和二年冬十月冉建上下兩級東西五間南北八架大閣一所中重塑十一面觀世音菩薩像又曰祐唐寺有統和五年碑知薊州軍事判官文林郎試袐書省校書郎李仲宣撰文沙門德麟書元好問中州集曰韓繼寧仕石晉為行軍司馬從出帝北遷居析津曾孫知白仕遼為中書令孚為中書門下平章事賜田􅌉山遂為漁陽人郭造鄉碣石叢談曰薊鎮三屯城東北二十五里為芹菜山遼進士馮唐卿于山前結廬種芹自結故名漁陽縣鮑丘水桑欽水經曰鮑丘水從塞外來南過漁陽縣東又南過潞縣西又南至雍奴縣北屈東入于海三河縣本漢臨朐縣地王自謹三河縣志曰縣名三河以地近泃河鮑丘河洳河三水也京東考古録曰一統志三河在漢臨朐縣地今考二漢書並無臨朐縣唐書地理志幽州范陽郡潞縣下云武德二年置臨朐縣貞觀元年省臨朐而薊州漁陽郡三河下云開元四年析潞縣置故知本自一郡先分為臨朐後分為三河皆自唐非漢也鶚案明一統志之誤亦沿襲遼史耳玉田縣無終山燕昭王墓補徐無山補極樂院補太平寰宇記曰無終山一名翁田山又名隂山在漁陽縣西北四里神仙傳云仙人白仲理者遼東人也隱居無終山中和神丹又于山中作金五千斤以救百姓又搜神記云無終山有陽翁玉田昔雍伯雒陽人父母終葬于無終山上無水雍伯汲水作義漿行者皆飲三年有一人就飲以石子一升遺之使于髙平好地有石處種之有徐氏者為右北平著姓有女人多求之不許雍伯試求徐以為狂乃云以白璧一雙當即為婚雍伯至種玉處得五雙白璧徐氏大驚即以女妻之王大智玉田縣志曰燕昭王墓在無終山九州記古漁陽北無終山上有昭王墓薊州志曰徐無山在玉田縣城東北二十里後漢田疇避難于此開山圖載山出不灰之木生火之石石邦政豐潤縣志曰大天宫寺在城西遼清寧元年鹽監張曰成創建有塔一十三級初名南塔院夀昌三年賜額極樂院至金與宋修好行府悉寓于此天㑹五年敕加大天宫寺鶚案豐潤縣本玉田之泳濟務大安初改豐潤景州清安軍下刺史本薊州遵化縣松亭山獨固門石門峽溫泉禪林寺俱補張杰遵化縣志曰松亭山邑東北一百二十里多古松其峯下削腰有洞髙二丈餘深倍之水經注曰沽水南出峽岸有二城世謂之獨固門以其藉嶮慿固易為依据兩壁升聳踈通若門故得是名也名勝志曰獨固門一名龍門在縣南十里上合下開開處髙六丈許水自懸崖傾瀉而下觸石成井奔蕩之聲轟然若雷松亭行記曰石門峽在遵化縣西五十里有石將軍在峽西髙三丈水經注云灅水又東南徑石門峽山髙嶄絶壁立洞開俗謂之石門口漢中平四年漁陽張純反殺右北平太守劉政五年遼東太守楊紘興中郎將孟溢率公孫瓉討純戰于石門大破之即此地王存元豐九域志曰遵化縣福泉山下水沸出溫可燖雞旁引為池方平如鑑遵化縣志曰禪林寺邑東北二十五里姚秦𢎞始中僧至道建稱雲昌寺遼重熙間僧志紀重修改今名平州遼興軍上節度商為孤竹國漢末公孫度據有傳子康孫淵太平寰宇記曰孤竹城在今盧龍縣東殷之諸矦即伯夷叔齊之國又按縣道記云孤竹城在肥如縣南二十里史記謂齊桓公伐山戎北至孤竹又隋圖經云孤竹城漢靈帝時遼西太守亷翻夢人曰孤竹君之子伯夷之弟遼海漂吾棺槨聞君仁善願見覆藏明日水際見浮棺于津收之仍為改葬吏人嗤笑者皆無疾而死今改葬所尚存祠在山下極嚴永平府志曰府西北二十里雙子山有孤竹長君葬馬鞭山有少君墓又五里有次君墓即光和之重葬也京東考古録曰晉書平州禹貢冀州之域於州為幽州界漢屬右北平郡後漢末公孫度自號平州牧及其子康康子淵並據遼東魏分遼東昌黎元菟帶方樂浪等郡國五置平州後還合為幽州咸寧二年分昌黎遼東元莬帶方樂浪等郡國五置平州治昌黎是則公孫度之平州乃遼東而咸寧所置之平州乃栁城即昌黎也魏書營州領郡六其一曰昌黎晉分遼東置領縣三其一曰龍城太平真君八年併栁城昌黎棘城屬焉有堯祠榆頓城狼水隋書遼西郡統縣一柳城本魏龍城縣開皇九年改為龍山縣十八年改為栁城縣而平州之名則自魏更立于遼西魏書平州領郡二其一曰遼西領縣三其一曰肥如獨其于平州之下注云晉置治肥如城未甚詳明其曰晉置者謂平州之名始立于晉也其曰治肥如城者謂魏之平州治肥如也上下本不相蒙且如遼西郡下注云秦置亦謂遼西之名立于秦也豈可以秦之遼西亦治肥如乎以此例之可見矣隋唐二書並未有誤至遼史于平州遼興軍下云漢末公孫度所據有傳子康孫淵是誤以拓拔氏之平州為公孫度之平州矣灤州下亦云不知其時皆曹氏所有也安喜縣龍紀城補白夏遷安縣志曰龍紀城在縣北二十里周圍二百四十步遼蕭后所築鶚案遼安喜縣金大定中改遷安初省入盧龍尋復置明初因之灤州永安軍中刺史黃洛城灤河俞兒扶蘇泉長春淀補臨榆山榆河華嚴寺補卑家寺補偏凉亭補馮唐鄉附許亢宗奉使行程録曰第十一程自清州九十里至灤州州處平地負麓面岡東行三里許亂山重叠形勢險峻河經其間河面濶三百步亦控扼之所也水極清泚臨河有大亭名曰濯清為塞北之絶元混一輿地要覽曰灤州古無之唐末安巴堅陷平營劉守光據幽州暴虐民不堪命多逃亡依安巴堅築此以居之太平寰宇記曰黃洛城殷諸矦之國吳曾能改齊漫録曰竇蘋新唐書音訓本紀灤河云灤力宫切灤水出奚國都水諸書山海經並無此字惟見于切韵又忠義列傳灤河云音欒今大遼平州東臨灤河是也豫按北鄙須知大遼有灤州西至燕京五百里有灤河縣西至灤州四十里平州西至燕京八百里以此見灤河縣在平州之西竇以為在東非也鶚案灤州所統遼史止義豐馬城石城三縣並無灤河北鄙須知誤也松亭行紀曰按灤水前皆無名禹貢夾右碣石入于河注云其水如遼濡滹易皆中髙不與河通故必自北海然後能逹河也漢地里志遼西肥如縣注元水東入濡水濡水南入海陽顔師古曰濡音乃官反遼史黃洛水北出盧龍山南流入于濡水而五音集䪨則云濡水名一作渜在遼西肥如海陽又云濡奴官切蓋音灤也方氏通雅亦云濡水音乃官反今字書韵書失此音据此則今水有灤而無濡且渜灤字形相類古或通用而然耶太平寰宇記曰卑耳溪隋圖經按管子云齊桓公北伐孤竹未至卑耳之溪見一人長尺人物具焉冠右袪衣走馬疾前仲曰登山之神有俞兒霸王之君興而登山之神見且走馬前導也袪衣示前有水也右袪衣從右方涉也至卑耳之溪有贊水者曰從左方涉其深及冠右方涉其深至膝已涉桓公拜曰仲父之聖至此陳士元灤志曰甘泉在城西北十五里味甘秦太子扶蘇築長城駐此飲水又名扶蘇泉又曰長春淀在州城西南一百二十里遼蕭太后建長春行宫太平寰宇記曰臨餘山本名臨榆山音訛為餘有關通內外之路在今盧龍縣東一百八十里灤志曰華嚴寺在城西五十里遼夀昌年建卑家寺在城西南七十里乾統年建又曰偏凉亭在城東北五里橫山頭灤河西岸乾統元年建又曰遼大安元年灤馮唐卿登進士馬城縣樂安鎮補潘敦復樂亭縣志曰唐開元中置馬城縣在今治西北遼于今治置樂安鎮仍屬馬城金大定末於樂安鎮置樂亭縣石城縣碣石補姜將軍斬蛟廟補太平寰宇記曰石城漢舊縣取碣石立如城以名之秦始皇使燕人盧生求羡門刻碣石漢武帝登之望海當山有大石如柱號曰天橋柱往往而見立於巨海之內狀如人造然非人力所能成也太平御覽曰大碣石山在右北平驪城西南王莽改曰碣石也漢昭帝亦嘗登之以望巨海而勒其名于此宛轉有石如甬道數十里當山頂望之大石如柱形往往而見立於海中潮至及潮退不動不沒不知深淺世名之天橋柱豈昭指此以為碣石也閻若璩潜邱劄記曰前漢志右北平郡驪城縣有大碣石山後漢志遼西郡臨渝縣有碣石山文潁漢書注碣石山在遼西絫縣魏地地形志肥如縣有碣石山隋志盧龍縣有碣石山唐志平州石城縣有碣石山明一統志碣石山在昌黎縣西北二十里諸縣或省或改則今之盧龍撫寧昌黎及灤州界耳此山綿跨四地故班固曰大碣石山今人第因天橋柱屬諸昌黎陋矣永平府志曰元張朂灤州石城廢縣姜將軍斬蛟廟碑云後唐潞王從珂清泰間將軍鎮榆關碣石之石城縣坤方山曰唐麓趾曰唐溪臨溪形勢幽阻林壑踈迤將軍卜城居之溪有蛟嵗為害奔雷走電激波溢涯將軍領衆斬蛟於溪上民乃安後葬南山冡若髙山至今民念功建廟將軍夫人有二男女各七配享以上已誕日致祭元至元丙子繕祠壬午畢為記按天贊之元破石城次年陷平州置灤州以領之後唐天成之元平州歸唐三年復陷歸遼至清泰建元則厯七年矣安有唐將軍敢鎮此地儻有之遼事也營州鄰海軍下刺史前燕慕容皓徙都於此京東考古録曰史言慕容皓以栁城之北龍山之西福德之地乃營立宗廟宫闕命曰龍城一統志栁城在永平府西二十里龍山在府西四十里永平府舊志栁城在昌黎縣西南六十里漢末為烏桓所據隋置縣屬遼西郡唐置營州元省入昌黎為靜安社二說不同案唐書營州栁城郡下云城西四百八十里有渝關守捉城又云西北接奚北接契丹通典營州栁城郡下云東至遼河四百八十里南至海二百六十里北至契丹界五十里東南到安東府二百七十里西南到北平郡七百里西北到契丹界七十里東北到契丹界九十里而平州北平郡下云東至栁城郡七百里至漁陽郡三百里東北到栁城郡七百里是栁城在今之永平東北七百里而慕容氏之龍城昌黎及魏以後之營州並在其地唐萬嵗通天元年為契丹所陷聖厯二年僑治漁陽開元五年又還治栁城而今之昌黎乃昔之廣寧縣大定二十九年改為昌黎名同而城異也遼史載興中府栁城為慕容皓建都之地頗為詳偹元世祖至元七年十月己丑降興中府為州以城圖按之當在今前屯衛之北但唐書平州下云又有栁城軍永泰元年置蓋唐時栁城之城屢被陷沒移遷無常此其在平州者或即今之靜安社未可知然不可以永泰元年之栁城為古之栁城也鶚案遼史既載慕容皓栁城於中京興中府之下則平州所屬之營州栁城自屬唐時僑置之名何得以復和龍之地混之乎明一統志及永平府志之誤亦沿遼史廣寧縣漢栁城縣梁忭附元豐九域志曰化外州河北路營州下都督栁城郡領羇縻十四州栁城一縣鶚案漢栁城當作唐栁城元好問遺山文集贊皇郡太君墓銘曰夫人姓梁氏廣寧人曾太父忭遼祕書監遼史拾遺卷十四
