body:
  text: 遼史拾遺卷九錢塘厲鶚撰本紀第十八興宗一興宗神聖孝章皇帝諱宗真字雅布濟小字濟古爾聖宗長子改元景福契丹國志曰興宗皇帝諱宗真番名實卜克聖宗第八子順聖元妃所生帝生于顯州東錐子河秋九月辛亥宋遣王隨曺儀致祭王騣許懷信梅詢張綸來慰兩宫范諷孫繼業賀即位孔道輔魏昭文賀皇太后册禮續資治通鑑長編曰天聖九年夏六月雄州以契丹主聖宗訃聞命御史中丞王隨為祭奠使西上閣門使曺儀副之龍圖閣待制孔道輔為賀登位使崇儀副使孫繼業副之鹽鐡副使司封員外郎王騣為國主弔慰使內殿承制閣門祗候許懷信副之秋七月丙午朔契丹使奉陵軍節度使耶律竒爾錫默告哀戊午命樞密直學士寇瑊為賀契丹登位使改賀登位使孔道輔為契丹毋冊禮使西染院使魏昭文副之鶚按賀即位使長編作寇瑊遼史作范諷未知孰是髙麗史王可道傳曰德宗即位遣工部郎中栁喬郎中金行恭如契丹㑹葬且賀即位可道奏契丹與我通好交贄然每有并吞之志今其主殂駙馬必塔叛據東京宜乘此時請毁鴨緑城橋歸所留我行人若不聽可與之絶乃附表請之契丹不從王從可道議停賀正使仍用聖宗太平年號重熙元年春二月契丹國志曰春二月有星孛于東北光芒長二尺夏六月契丹國志曰夏六月朔日食二年秋八月契丹國志曰秋八月有星孛于張翼長七尺濶五寸十二日而沒三年春正月丁卯宋使章頻卒詔有司賻贈命近侍護喪以歸夢溪筆談曰天聖中侍御史知雜事章頻使遼死于道其地無棺櫬輿至范陽方就殮自後遼人常造數漆棺以銀飾之每有使入境則載以隨行至今為例夏五月皇太后還政于上躬守慶陵契丹國志曰法天皇后専制多殺功臣用蕭氏兄弟分監南北番漢使蕭氏奴為團練防禦觀察節度使者至四十餘人范陽無賴輩多占名樂工為蕭氏奴帝以上尊酒銀帶賜樂工太后鞭樂工文五格帝知內品髙慶郎告太后使左右殺髙慶郎太后愈怒下吏雜治語連于帝帝曰我貴為天子而與囚同答狀耶鬱鬱不樂與耶律喜孫謀率兵逐母法天太后登黃布車載送慶州守聖宗冡遂誅永興軍都總管剛嘎及內侍數十族命內庫都提㸃王繼恩內侍都知趙安仁等監南北面畨漢臣僚每嵗宋朝自聖宗太平四年遣使賀帝生辰及元旦賀太后則别遣使至是不復别遣至重熙八年迎回法天太后乃遣使如故冬十二月宋遣假少連杜仁贊來賀來嵗正旦楊偕李守忠來賀永夀節續資治通鑑長編曰景祐元年八月度支判官兵部員外郎直集賢院謝絳為丹契生辰使內殿承制閣門祗候李守忠副之度支判官刑部員外郎直集賢院假少連為正旦使供奉官閣門祗候杜費副之鶚按史以謝絳為楊偕未知孰是四年契丹國志曰帝因獵過祖州白馬山見齊天太后墳冡荒穢又無影堂及掃灑人户惻然而泣左右皆沾涕因詔上京留守耶律贊寧鹽鐡使郎元化等于祖州陵園內選吉地改葬其影堂廊庫等並同宣獻太后園陵夏五月東國通鑑曰靖宗恭惠王元年五月契丹來逺城牒興化鎮曰竊念貴國元為附庸先帝每賜優洽積有嵗月靡倦梯航昨因伐罪之年致阻來庭之禮既剪除于凶逆合繼續于貢輸曷越數年不尋舊好纍石城而擬遮大路監木寨而欲礙竒兵不知蜀國之中别有石牛之徑舉是役也深取誚也今皇上紹纍聖之基坰統八方之國界南夏帝王永慕義而通歡西上諸王長向風而納欵唯獨東溟之域未賔北極之尊或激怒于雷霆何安寧于黎庶五年秋七月契丹國志曰秋七月有星數百從西南流至壁東其光燭地黑氣長丈餘出畢宿下六年春正月契丹國志曰春正月有衆星西北流秋八月契丹國志曰秋八月熒惑犯南斗冬十二月東國通鑑曰靖宗恭惠王三年冬十二月遣殿中少監崔延嘏如契丹奏狀云當國伏自前皇太后聖帝降冊命以頒宣疏土封而定分但兹東城仰戴北辰連年不絶以勤王遞代相傳而述職頃以先臣亡兄纂承祖業歸附皇朝聞一德之君臨新頒慶澤時兩條之公事専奏宸聰未垂俞允之恩轉積遲疑之慮自從曩嵗以到今辰雖送換于炎凉且久停于朝貢近䝉睿㫖頗愜鄙懷謹當遵太后之遺言固為藩屏撫小邦之弊俗䖍奉闕庭更從文軌以輸誠永效梯航而展禮七年春二月丁丑髙麗遣使來貢東國通鑑曰靖宗恭惠王四年春三月崔延嘏賫詔還自契丹詔曰卿世禀聲朔嵗奉梯航近覽奏章偹觀誠懇嘉嘆良多勉思永圖無曠述職秋八月始行契丹年號遣侍禮使閣門祗候金華彥如契丹東京髙麗史曰靖宗四年正月戊戌朔契丹遣馬保業來夏四月遣尚書左丞金元冲如契丹起居謝恩仍請年號秋七月甲寅金元冲還自契丹詔曰省所上表夏季起居事具悉卿挺生方略善撫世封得愛戴于東韓盡傾䖍于北闕屬歊蒸之在候馳章奏以問安嘉矚之懷每興增切又詔曰省所上表謝恩今朝貢并進捧金吸瓶銀菜瓶幞頭紗紵布貢平布腦原茶大紙細墨龍鬚登席等事具悉卿權司國宇敬奉朝廷昨遣使人逺敷忠欵述纍世傾輸之莭逺近年限阻之由乞重效于梯航願永為于藩翰載觀恭順尋示允從煩致謝章仍陳貢篚顧閲之際愧嘆良深又詔曰省所奏已行用重熙年號事具悉卿昨者乞修朝貢尋允奉陳使介回旋知我紀年之號書文禀用見其向日之誠省覽歡嘉不忘於意八年春正月壬辰朔宋遣韓琦王從益來賀韓琦安陽集使回戲成詩曰専對慙非出使才拭圭申好斂旌回禮煩偏苦元正拜北庭元日拜禮最煩户大猶輕永夀杯永夀北主生辰節名其日以大白酌南使歌枕頓無歸夢耰據鞍潜覺旅懷開明朝便是侵星去不怕東風拂靣來契丹國志曰春正月朔日食髙麗史曰靖宗五年夏四月辛酉朔契丹遣大理卿韓保衡來冊王詔曰地控東域星環北辰愈堅奉上之心宜舉䇿勳之典遐馳使馭載啓王封是謂恩榮所宜祗荷今差大理卿韓保衡往彼賜卿官誥一通敕牒一道到可祗受官誥曰朕體天洪覆酌古通規內則推邦家懷逺之誠外則付王國専征之柄航棧不可以輕入車書不可以妄同庶及羣雄永全大義與其軒習弧矢而夏陳干戚曷苦周分藩屏而漢誓山河其有業重桓文望髙辰卞紹祖宗之云始革先王之不恭貢土疆而廣我提封奉玉帛而首諸方面安和是務忠肅為容宜舉彛章特敷龍數權知髙麗國王竒姿玉瑩偉量淵停鰲丘聳架海之雄旁鍾秀拔龍宿挺麗天之采俯降精英而自守名區大開霸府動靜先遵于典則寐興能制于驕矜千里甸畿先臻富庶一方民俗嵗荷恩榮成奕世之令名得殿邦之異略是用專馳騑轡逺降龍綸元菟全封榮加于一字溫貂峻秩兼示于三師馭賁崇階褒功懿號廣疏井賦茂奬忠庸於戲星辰在拱北之躔則為合度江漢得朝宗之路乃是安流勉服斯言勿煩常訓可授開府儀同三司守太保兼侍中上柱國髙麗國王食邑七千户食實封一千户仍賜輸忠保義奉國六字功臣秋七月丁巳謁慶陵致奠于望仙殿迎皇太后至顯州謁園陵還京契丹國志曰先是帝于重熙三年幽法天太后于慶州既改葬齊天后羣僚勸帝復迎之且以覬宋朝嵗䀻之利皆不從因命僧建佛事聽講報恩經感悟即遣使迎法天太后館置中京門外筮曰以見母子如初隆平集曰天聖末宗真立隆緒之第八子也母曰順聖元妃隆緒遺命以正室齊天皇后為太后元妃蕭氏為太妃太妃殺齊天而自立為太后多殺戮功臣而自用其兄弟御宗真甚嚴宗真不能堪景佑初率兵逐其母使守隆緒冡其國人有勸迎其母以覬朝廷嵗賜之物雖從之而所居相距常十餘里蓋懼其或相害爾九年春正月丙辰朔宋遣王拱辰彭再思來賀夢溪筆談曰慶歷中王君貺使契丹宴君貺于混融江觀釣魚臨歸契丹主置酒謂君貺曰南北修好嵗久恨不得親見南朝兄皇帝托卿為傳一杯酒到南朝乃自起酌酒容甚恭親授君貺舉杯又自鼓琵琶上南朝皇帝千萬嵗先是契主之弟重元為燕王有全燕之衆久蓄異謀契主恐其隂附于朝廷故特效恭順重元後卒以稱亂誅鶚按沈括世父名同故諱混同江為混融江本紀第十九興宗二十年冬十二月丙子朔宋遣劉沆王整來賀應聖節劉攽中山詩話曰劉沆使北契丹館客曰有酒如澠繫行人而不住沆應聲曰在北曰狄吹出塞以何妨十一年春正月庚戌遣南院宣徽使蕭特默翰林院學士劉六符使宋取晉陽及瓦關以南十縣地且問興師伐夏及㳂邊疏濬水澤增益兵戍之故續資治通鑑長編曰慶歷二年三月己巳契丹遣宣徽南院使歸義節度使蕭英翰林學士右諫議大夫知制誥同修國史劉六符來致書曰弟大契丹皇帝謹致書兄大宋皇帝粵自世修歡契時遣使軺封圻殊兩國之名方冊紀一家之美蓋欲洽於綿永固將有以披陳切緣瓦橋關南是石晉所割迄至柴氏以逮郭周興一旦之狂謀掠十縣之故壤人神共怒廟社不延至于貴國祖先肇創基業尋與敝境繼為善鄰暨乎太宗紹登寶位於有征之地才定并汾以無名之師直抵燕薊羽召精鋭禦而獲退遂致移鎮國强兵南北王府并內外諸軍彌年有戍境之勞繼日偹渝盟之事始終反覆前後不常竊審専命將臣往平河右炎凉屢易勝負未聞兼李元昊於北朝今已稱藩纍曽尚主克保君臣之道實為甥舅之親設罪合加誅亦宜垂報邇者郭稹特至杜防又回雖具音題但虞詐諜已舉殘民之伐曽無忌器之嫌營築長堤填塞要路開决塘水添置邊軍既潛稔於猜嫌慮難敦於信睦倘思久好共遣懷疑曷若以晉陽舊附之區關南元割之縣俱歸當國共康黎人如此則益深兄弟之懷長守子孫之計納惟英晤深逺悃悰適届春陽善綏冲裕福祉便蕃淑問遙傳龍光逺被云云太平治迹統類曰慶厯三年春三月劉六符蕭英以書來求關南十縣正月己巳邊吏言契丹泛使且至朝廷為之吁食歷選可使契丹者宰相吕夷簡舉右正言知制誥富弼入對便殿叩頭曰主憂臣辱臣不敢愛其死上為之動色壬申命弼為接伴以二月丙子發京師至雄州久之英等始入境遣中使慰勞英稱足疾不拜弼謂曰吾嘗使北卧病車中聞命輒拜今中使至而君不起此何禮也英矍然起遂使人掖而拜弼察英等自以契丹先違盟及其從者皆有懼色可動故每與之開懷盡言兾以鈎得其情英等以故亦推誠無隱乃密以其主所欲者告弼且曰可從從之不從更以一事塞之王者愛飬生民舊好不可失也弼具以聞及英等至命御史中丞賈曷朝館伴朝廷議所欲與不許割地而許以信安僖簡王允寧女與其子梁王洪基結婚或增嵗賂獨弼以結婚為不可龍川别志曰慶歷中契丹使劉六符求和親賈曷朝館伴未有以拒之先是宗真之弟號太弟者用事橫于國中因信使嘗通書幣仁宗使曷朝謂六符欲因今使答之六符辭曰此於太后甚善然于本朝不便曷朝因曰即如此欲以太宗真宗之子求和親皇帝豈安心乎六符不能答自是和親之議頗息夏五月契丹國志曰夏五月朔日食六月乙亥宋遣富弼張茂實奉書來聘以書答之續資治通鑑長編曰夏四月庚辰詔以右正言知制誥富弼為回謝契丹國信使西上閣門使符惟忠副之復書曰昔我烈考章聖皇帝保有基圖惠飬黎庶與大契丹昭聖皇帝弭兵講好通聘著盟肆余纂承共遵謨訓邊民安堵垂四十年兹者専致使臣特詒緘問且以瓦橋內地晉陽故封拔石氏之割城述周朝之復境繫于異代安及本朝粵自景德之初始敦鄰國之信凡諸細故咸不置懷况太宗皇帝親駕并郊匪圖燕壤當時貴國亟發援兵既交石嶺之鋒遂舉薊門之役義非反覆理有因緣元昊賜姓稱藩禀朔受祿急謀狂僣俶擾邊陲嚮議討除已嘗聞達杜防郭稹傳述偹詳及此西征豈云無報聘軺旁午屢聞嫉惡之談慶問交馳未諭聫親之故忽窺異論良用惘然謂將軫于在原反致譏于忌器復云營築隄埭開決陂塘昨緣霖潦之餘大為衍溢之患既非疏𨗳當稍繕防豈藴猜嫌以虧信睦至于偹塞隘路閲習兵夫盡邊臣謹職之常乃卿兵充籍之舊在于貴境寧撒戍兵一皆示於坦夷兩何形于疑阻顧惟歡契方保悠長遽興請地之言殊非載書之約信辭至悉靈鍳孔昭兩地不得相侵緣邊各守疆界誓書之外一無所求期在久要弗違先約諒惟聼達應切感思甫屬清和妙臻戩榖自餘令弼口陳書詞翰林學士王拱辰所撰也五月癸丑命知具州供偹庫使恩州團練使張茂實為回謝契丹國信副使代符惟忠也惟忠行至武强病卒富弼請以茂實代之詔從其請契丹國志曰初有涿州進士梁濟世嘗主文書于帳下一日得罪歸宋言契丹將有割地之請又知雄州杜惟序亦先得其事以聞至是宋仁宗發書示輔臣色皆不動六符亦疑其書之先漏夏四月宋遣知制誥富弼往契丹為回謝使西上閣門張茂實副之弼至契丹與帝往反論難力拒其割地之意遼帝感悟遂欲求婚弼曰婚姻易于生隙人命修短不可知豈若嵗幣之為堅久本朝長公主出降齎送不過十萬緍豈若嵗幣無窮之利帝曰卿且歸再來當擇一事為報并以誓書來弼歸復命八月丙申宋復遣富弼張茂實奉書來聘乞增嵗幣銀絹以書答之契丹國志曰八月宋再命富弼同張茂實齎書至契丹書曰來書云章聖皇帝與昭聖皇帝誓書每嵗以絹二十萬匹銀十萬兩以助軍旅之費今以兩朝修好三紀於兹關南縣邑本朝傳守已久俱難依從每年更增絹十萬匹銀十萬兩恭惟二聖威靈在天顧兹纂承各當遵奉共循大體無介小嫌餘依景德統和兩朝誓書帝不復求婚而意在增幣乃曰南朝與我書當曰獻否則曰納弼固爭不可帝曰吾當遣人議之于是留所許增幣誓書復使耶律仁先劉六符以誓書詣宋求為獻納弼奏曰臣以死拒之可勿許且無能為也帝從之時契丹固惜盟好特為虗聲以動宋朝宋方困西夏許豫過厚契丹既嵗得金帛五十萬因勒碑紀功擢劉六符為顯官九月壬寅遣北院樞密副使耶律仁先漢人行宫副部署劉六符使宋約和是時富弼為上言大意謂遼與宋和坐獲嵗幣則利在國家臣下無與與宋交兵則利在臣下害在國家上感其言和好始定洪邁容齊四筆曰富公奉使契丹契丹主言欲舉兵公曰北朝與中國通好則人主専其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝羣臣爭言舉兵者此皆其自謀非國計也勝負未可知就使其勝所亡士馬羣臣當之歟抑人主當之歟是時語録傳于四方蘇明允讀至此曰此一假議論古人有之否東坡未十嵗在旁對曰記得嚴安上書云今狥南夷朝夜郎略薉州建城邑深入丐奴燔其龍城議者美之此人臣之利非國家之長䇿也正是此意明允以為然王鞏聞見近録曰寶元康定間西人犯邊用兵纍嵗遼人窺我遣人求關南之地富文忠既行疑時相與已不協輒發國書觀之乃與所授詞果異歸請對具言之詔付文忠詣學士院視學士改書然後行元授五函皆許其添嵗賜也每出一函待不從然後旋出之文忠輒留二函於雄州既至文忠抗論不屈徐出一書遼人意未厭復出一書至於三遼人密探文忠篋中止有三書遂從約文忠使還持二函以歸嵗减聘幣者二十萬太平治迹統類曰富弼張茂實以八月乙未至契丹清泉入金氊館持國書二誓書三以語館伴耶律仁先劉六符問所以然者弼曰姻事合則以姻事誓能令夏國復歸欵則嵗入金帛增二十萬否則十萬國書所以有二誓書所以有三也翌日引弼等見契丹主太弟宗元子梁王洪基侍蕭孝思孝穆馬保忠杜防分立帳外契丹主曰姻事使南朝骨月暌違或公主與梁王不相和恱則將奈何固不若嵗增金帛但患無名耳須於誓書加一獻字富弼曰此乃下奉上之辭非可施于敵國况南朝為兄豈可兄獻于弟乎契主曰改為納字何如弼曰自古惟唐髙祖借兵于突厥故臣事之當日所遺或稱獻納不可知其後頡利為太宗所擒豈復更有此理契丹主默然弼遂面與劉六符言指帳前髙山曰此尚可踰若獻納二字則如天不可得而升也使臣頭可斷此議斷不敢諾於是契丹留所許二十萬誓書復遣耶律仁先劉六符賫其國誓書來仍求納字是月弼等還至雄州詔即以弼為接伴使有朝廷合先知者急置以聞弼奏曰彼求獻納二字既以死拒之契丹氣折矣不可復許然朝廷竟從晏殊議許稱納字弼不預也顧炎武日知録曰宋史富弼傳言使契丹爭獻納二字聲色俱厲契丹主知不可奪乃曰吾當自遣人議之復使劉六符來朝廷竟以納字與之遼史劉六符傳則曰宋遣使增嵗幣以易十六縣六符與耶律仁先使宋定進貢名宋難之六符曰本朝兵强將勇人人願從事于宋若恣其俘獲以飽所欲與進貢字孰多宋乃從之嵗幣稱貢二史並托克托監修而不同如此續資治通鑑長編曰慶歷二年八月乙丑契丹樞密副使保大節度使耶律仁先樞密使禮部侍郎同修國史劉六符入見其誓書云兩朝修睦二紀于此邊鄙用寧干戈載偃追懷先約炳若日月今綿祀已深敦好如故關南縣邑本朝傳守俱難依從别納金帛之儀用代賦稅之物每年增絹一十萬匹銀一十萬兩搬至雄州白溝交割兩界塘淀已前開畝者並依舊例自今以後不得添展其堤堰水口逐時決泄壅塞量差兵夫取便修叠疏𨗳非時霖潦别至大假漲暴並不在關報之限南朝河北沿邊北朝自古北口以南沿邊兵民除見管數目依常教閲無别故不得大假添進兵馬如有别故添屯即令逐州軍移牒關報兩界所屬之處其自來成例更替及本路移易不在關報之限兩界逃走作過諸色人並依本朝誓書外更不得似日前停留容縱恭惟二聖威靈在天顧兹纂承各當遵奉共循大體毋介小嫌且夫守約為信善鄰為義二者缺一罔以守國皇天厚地實聞此盟文藏宗廟副在有司餘並依景德統和兩朝誓書顧惟不德必敦大信苟有食言必如前誓陳振孫書録解題曰奉使别録一卷河南富弼彥國撰慶歷中使契丹歸為語録以進機宜事節則見于此録又一本有兩朝往來書附于末又云契丹講和記一卷不著名氏載契丹初講和本末末有慶歷增幣後誓書韋君安梅澗詩話曰或傳富鄭公奉使遼國遼使者云早登雞子之峰危如纍卵答曰夜宿丈人之館安若泰山又云酒如線因針乃見答曰餅如月遇食則缺冬十一月丁亥羣臣加上尊號曰聰文聖武英略神功睿哲仁孝皇帝冊皇后蕭氏曰貞懿宣慈崇聖皇后髙麗史曰靖宗八年冬十一月契丹遣檢校禮部尚書王永言來詔曰朕以關南十縣我國舊基將舉兵師議復故壤宋朝纍馳専介懇發重言定於舊貢銀絹三十萬兩匹外每年别納金繒之儀用代賦與之物再論盟約永卜歡和其諸道兵馬等優給蠲免賦調並已放還本部夫何眇躬成此美事今文武百辟屢拜封章加豫以懿號鴻名不獲固辭勉依羣請已撰定十一月五日兩宫並行大禮卿稱藩事上望闕輸忠遐想聞知必增慶悅今遣使往諭十二年春正月書録解題曰慶歷正旦國信使録十卷余靖慶厯三年使遼所記郭若虗圖畫見聞志曰皇帝與大遼國馳禮于今僅七十載繼好息民之美曠古未有慶歷中其主號興宗以五幅縑畫千角鹿圖為獻旁題年月日御畫上命張圖于太清樓下召近臣縱觀次日又敕中闈宣命婦觀之畢藏于天章閣鶚按此興宗事不記年月因附見于此髙麗史世家曰靖宗九年冬十一月辛巳契丹遣冊封使蕭慎微使副韓紹文都部署利川管內觀察留後劉日行押冊使殿中監馬至柔讀冊將作少監徐化治傳宣檢校左散騎常侍韓貽孫等一百三十三人來丁亥王設壇受命詔曰朕猥以眇德嗣受丕圖賴六聖之垂休致八方之咸服近從羣懇祗受鴻名凡在照臨畢均慶賞卿世欽聲朔地襲土茅航深馨述職之儀事大竭為臣之節屬陳巨禮載舉彛章特推進秩之恩併茂疇庸之數今遣使左監門衛上將軍蕭慎微使副尚書禮部侍郎韓紹文持節偹禮冊命并賜車服冠劍印綬及國信等物具如别録到可祇受冊文曰朕膺穹旻之寄紹祖宗之基四表歸仁偃靈旗而定霸百官考禮鏤寶冊以加尊遐眷帝臣踐開國社航海之誠靡怠帶河之誓愈堅屬覃慶之在辰冝頒恩而及逺式遵徽典特舉寵章咨爾輸忠保義奉國功臣開府儀同三司守太保兼侍中上柱國髙麗國王食邑七千户食實封一千户王亨英哲間時仁慈纘服張皇土宇亘日域以分圻尊奬天朝仰宸居而送欵戴舜樹弼成之業匡周規夾輔之勳化被蒼隅聲敷青畎朕昨戒嚴駕巡撫京畿邦户展肆覲之儀都人契來蘇之望干戈不試獄市惟齊羣方則慕義向風交馳玉帛鄰國則畏威懷德增納金縑聿臻纍洽之期適享虛名之册是推皇澤首及王藩進絶席之崇資正專車之峻秩爰田益賦美號褒功是用遣使蕭愼微使副韓紹文持節偹禮冊命汝為守太傅兼中書令加食邑三千户食實封三百户仍賜同德致理四字功臣散官勳爵如故於戲守君子國冠諸侯王論道而為周師奮庸而登漢相維堅臣節以答皇家享富貴于昌時傳功名于長世輝流竹素永維欽哉十三年夏四月契丹國志曰夏四月朔日食六月以將伐夏遣延曷宫使耶律髙嘉努告宋九朝編年偹要曰慶歷四年秋七月契丹來告伐元昊曰元昊負中國當誅今將兵臨賊境或元昊乞稱臣幸無亟許其實以納契丹降人討之託中國為名也復書略曰聞親總師徒直臨賊境若以元昊於北朝失事大之禮則自宜問罪若以其於本朝稽效順之故則不煩出師况延州近奏元昊已遣楊宗素賫誓文入界若不依初約則猶可沮還如盡遵承則何以却之也乃命右正言余靖報使冬十月辛亥元昊遣使來進方物詔北院樞密副使蕭革迓之壬子軍于河曲革言元昊親率党項三部來詔革詰其納叛背盟元昊服罪賜酒許以自新遣之召羣臣議皆以大軍既集宜加討伐癸丑督數路兵掩襲殺數千人駙馬都尉蕭呼都克為夏人所執九朝編年偹要曰宗真親將至夏國境上各據山嚴兵相待曩霄奉巵酒為夀大合樂折箭為誓及罷契丹夜以兵劫曩霄反為所敗曩霄縱其去十四年春正月續資治通鑑長編曰慶歷五年正月丙子契丹遣林牙彰聖軍節度使耶律宗睦來告討夏人回春三月夏六月契丹國志曰春三月朔日食夏六月有流星出營室南大如杯其光燭地隱然有聲秋八月續資治通鑑長編曰八月甲子監察御史包拯為契丹正旦使閣門通事舍人郭琮副之本紀第二十興宗三十七年春正月二月秋九月契丹國志曰春正月朔日食二月彗出虛晨見東方指西南歷紫微垣至婁凡一百二十四日而滅高麗史世家曰文宗元年春二月壬戌契丹遣忠順軍莭度使蕭慎微守殿中少監康化成等來祭靖宗于虞宫王往參之秋九月壬午契丹遣福州管內觀察使宗璘來册王其冊曰眷乃馬韓之地素稱龍節之邦代襲王封品髙人爵分頒金盩表榮觀於諸侯申鍚彤旅得顓征于四履爰屬傑時之器允膺纘服之權載厯臧時式均徽典權知髙麗國王事王徽應基運之數鍾英異之靈天麟逈首於龜龍遹明嘉瑞日觀遍崇于嵩華夙煥函經負文武之全才識忠孝之大本粵自勝衣有始構室推良靜守貞純動循禮樂慕桓文之霸業精衛霍之兵符富厥令圖稔兹淑㑹洎帥臣之告闕亟藩國之歸尊而能惠一方情協羣望及露章而斯暨故寵數以難稽是用宜顯被於紫綸俾特建於元社倚為左相峻秩三師超躋馭貴之階優賜褒功之號盈疏實賦劇轉清勳於戲周天王之重非熊止遙分於齊壤漢髙祖之刑白馬仍納約於劉宗順考古先罕偕恩禮用卜悠長之祚愈堅匡合之誠勉佩訓言仰迪神祐可特授開府儀同三司守太保兼侍中上柱國封髙麗國王食邑七千户食實封一千户兼賜匡時致理竭節功臣之號十八年春正月東國通鑑曰文宗仁孝王二年春正月契丹遣千牛衛上將軍蕭維德御史大夫王守道來冊王為守太傅兼中書令髙麗國王加食邑三千户食實封三百户仍賜資忠奉上四字功臣階勳如故并賜車服冠劔印綬及衣帶匹假等物王受冊於南郊十九年春二月續資治通鑑長編曰皇祐二年春二月庚子契丹遣殿前副㸃檢中正節度使耶律益彰德節度使趙柬之來告伐夏國還益自言契丹三路進討契丹主出中路兵至西京府獲羊百萬橐駝二十萬牛五百俘老幼甚衆惟南路小失利恐夏人妄說軍勝誇南朝然得邊奏皆以謂契丹主濟河不遇賊無水草馬多死耶律貫寧大敗于師子口惟劉五常獲陕西所陷屬户羌二十餘人因而來獻其言多俘獲蓋妄也已酉翰林學士刑部郎中知制誥趙槩為回謝契丹國信使西上閣門使貴州團練使錢晦副之東都事略曰趙槩字叔平應天府虞城人也入翰林為學士皇祐二年館伴契丹泛使遂報聘焉契丹請賦信誓如山河詩詩成契丹主親酌玉杯以勸且以素扇授其近臣劉六符寫槩詩置之懷䄂二十年秋八月續資治通鑑長編曰皇祐三年秋八月乙未翰林學士刑部郎中知制誥兼侍講史館修撰曽公亮為契丹國母生辰使至鞾淀契丹使劉六符來伴宴且言耶律防善畫向持禮南朝寫聖容歸欲持至館中王洙曰此非瞻拜之地也六符言恐未得其真欲遣防再往傳繪洙力拒之二十一年夏四月續資治通鑑長編曰皇祐四年夏四月丙戌契丹國母遣順義節度使右監門衛上將軍蕭昌右諫議大夫劉嗣復契丹主遣彰國節度使蕭昱益州防禦使劉士方來賀乾元節其國書始去國號而稱南北朝且言書稱大宋大契丹非兄弟之義帝召二府議之參知政事梁適曰宋之為宋受之于天不可改契丹亦其國名自古豈有無名之國又下兩制臺諫官議皆以講和以來國書有定式不可輒許乃詔學士院答書仍稱大宋大契丹其後契丹復有書亦稱契丹如故王暐道山清話曰契丹遣使論國書中所稱大宋大契丹似非兄弟之國今宜易曰南北朝上詔中書密院共議時輔臣多言此不計利害不從徒生怨隙梁莊肅曰此易屈耳但答言宋蓋本朝受命之土契丹亦彼國號無故而自去非策其年賀正使復稱大契丹如故二十二年夏四月契丹國志曰夏四月朔日食二十三年秋九月續資治通鑑長編曰至和元年秋九月乙亥契丹遣忠正節度使同平章事蕭德翰林學士左諫議大夫知制誥史館修撰吳湛來告與夏國平且言通好五十年契丹主思南朝皇帝無由一㑹見嘗遣耶律防來使竊畫聖容曾未得其真故交馳畫像庶瞻覿之以紓兄弟之情或者慮契丹得御容敢行咒詛趙抃言其不然卒許之辛巳三司使吏部侍郎王拱宸為回謝契丹使德州刺史李珣副之拱辰見契丹主于混同江契丹每嵗春漲于水上置宴釣魚惟貴族近臣得與每得魚必親酌勸拱宸又親鼓琵琶侑之謂其相劉六符曰南朝少年狀元入翰林十五年矣吾故厚待之冬十一月東都事略曰吳奎遷知制誥使契丹遇契丹主加稱尊號邀使者入賀奎自以使事有職不為往比還中道與契丹衣服以金冠為重紗冠次之而使人輒欲以紗冠邀漢使盛服奎不許而殺其禮見之坐是黜知夀州二十四年周輝清波雜志曰至和二年劉原父敞使契丹檀守李翰勞其行役對云跋涉不辭但山路迂曲自過長興却西北行六程到栁河方稍南行意甚不快又云聞有直路自松亭關往中京才十餘日程自栁河才二百餘里翰笑曰盡如所示乃初踏逐修館舍己定至今迂曲八月己丑帝崩于行宫年四十遺詔燕趙國王洪基嗣位清寧元年十月庚子上尊諡為神聖章孝皇帝廟號興宗契丹國志曰八月國主崩先是日食正陽客星出于昴宋著作佐郎劉羲叟曰遼主其死乎至是果驗續資治通鑑長編曰至和二年八月己酉契丹主宗真卒年四十一諡文成皇帝廟號興宗宗真性佻嘗與教坊使王稅輕等數十人約為兄弟出入其家至拜其父母數變服入酒肆佛寺道觀王綱姚景熙馮立輩遇之于微行後皆任顯官尤重浮圖法僧有正拜三公三師兼政事令者凡二十人馬保忠嘗勸以臣下無勳勞宜且序進之怫然怒曰若爾是君不得專豈社稷之福耶保忠恐自是欲有遷除必先厚賜貴臣以絶其言故親信者哈喇王等數十人皆拔處將相嘗夜燕與劉四端兄弟王綱入樂命君妃易衣為女道士后父蕭瑪展曰漢官皆在后妃入戲恐非所宜宗真毆瑪展敗面曰我尚為之若女何人耶宗真善畫鹿嘗以所畫鵝雁來獻上作飛白書答之遼史拾遺卷九
