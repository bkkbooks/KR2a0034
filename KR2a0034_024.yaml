body:
  text: 遼史拾遺卷二十四錢塘厲鶚撰補國語解鶚案遼火國語解亦有不專為國語者如君基太一神葉格戲果下馬堂印堂帖之類豫於史文所有而注未詳者列於前史文所未有今補者列於後國語之外風俗物産皆綴緝焉貔狸案此條內移離畢應改伊勒希巴賀跋支應改噶必齊匹裂應改丕勒因係韻語今並存原文夢溪筆談曰刁約使契丹為北語詩云押燕移離畢移離畢官名如中國執政看房賀跋支賀跋支如中國防閣餞行三匹裂匹裂似小木罌以木為之加黃漆密賜十貔貍形如鼠而大穴居食彀梁啫肉北朝為珍膳味如豚肉而脆張舜民畫墁録曰契丹使賀正旦生辰馳至京見畢密賜大使一千五百兩副使一千三百兩中金也南使至契丹見畢亦密賜羊豝十枚毗黎邦十頭毗黎邦大鼠也契丹上供物善糜物如豬䝎若以一臠置十斤肉鼎即糜爛臣下不敢蓄唯以待南使紹聖初備員北使亦䝉此賜余得之即縱諸田館伴大駭亟求不見乃曰奈何以此縱之本國嵗貢其方更無租徭唯此採捕十數以擬上貢一則以待南使也如帳前問之今已四散收捕因辭以不殺無用自爾直至還界無日不嗟惜之周密齊東野語曰澠水燕談載契丹國産大鼠曰毗貍形類鼠而足極短肥其國以為殊味穴地取之以供國王之膳陸氏舊聞云狀類大鼠極肥腯甚畏日為隙光所射輒死亦竹􅥡獾貍之類耳近世乃不聞有此扣之北客亦多不知何耶赦例郎君王鞏甲申雜記曰大遼謂天使為赦例郎君依赦例日行五百里也曜辣江鄰幾雜志曰契丹謂圭為曜辣笪却日南部新書曰盧文進范陽人也至江南李氏封范陽王嘗云陷契丹中屢入絶塞正書方獵忽天色晦黑衆星燦然問番人云所謂笪却日也以此為常頃之乃明方午也設罷劉攽中山詩話曰余靖尚書使契丹為北語詩云夜筵設罷侈盛也臣拜洗受賜也兩朝厥荷通好也情幹勒厚重也微臣稚魯拜舞也祝若統福祐也聖壽鐵擺嶌高也俱可忒無極也契丹主大笑遂為釂觴塔哩燕北雜記曰契丹呼種田為塔哩治夔離燕北録曰北主太后嚏噴時但是近位番漢臣僚等并齊道治夔離漢語萬嵗也綽哈雅布燕北雜記曰臘月戎裝飲酒呼為綽哈雅布猶言行兵也尼雅庫喇契丹國志曰凡男女拜皆同一足跪一足著地以手動為節數止於三四彼言尼雅庫喇者即跪也倍其不離鼓燕北雜記曰北主别有鼓十六面發更時擂動至二㸃住三更再擂呼為倍其不離鼓是驚鬼省事三清異録曰北方蓮實狀長少味出藕頗佳然止三孔用漢語轉譯其名曰省事三喫雀坤不克燕北録曰北主及契丹臣庶每聞霹靂聲各相鉤中指口作喫雀聲以為禳厭北主及契丹臣庶等如見旋風時便合眼用鞭子空中打四十九下口道坤不克七聲漢語魂風也以為禳厭蔞珍思燕北録曰凡兵馬應是漢兵多以得勝及必勝二字為號諸蕃兵以蔞珍思三字為號漢語熊虎二字也旱金花青囊花胡嶠陷北記曰至湯城淀地氣最溫契丹苦大寒則就溫於此其水泉清冷草軟如茸可藉以寢而多異花記其二種一曰旱金大如掌金色爍人一曰青囊如中國金燈而色類藍可愛賜拐五代史曰漢高祖封北平王遣牙將王峻奉表契丹耶律德光呼之為兒賜以木拐一木拐契丹貴之如中國几杖非優大臣不可得峻持拐歸契丹人望之皆避道佛裝細娘張舜民使遼録曰婦人以黃物塗靣謂之佛裝雞肋編曰北方倡伎皆用子為名若香子花子之類無寒暑必繫綿裙其良家士族女子皆髠首許嫁方留髮冬月以括蔞塗靣謂之佛裝但加傅而不洗至春暖方滌去久不為風日所侵故潔白如玉也嚴繩孫西神脞說曰遼時婦人有顔色者目為細娘靣塗黃謂之佛裝宋彭汝礪詩有女夭夭稱細娘真珠絡臂靣塗黃南人見怪疑為瘴墨吏矜誇是佛裝是也鐵腳草王氏談録曰契丹中有鐵腳草採取隂乾投之沸湯中頃之莖葉舒卷如生骨里叵燕北録曰正月十三日放國人作賊三日如盜及十貫以上依法行遣北人呼為骨里叵漢人譯云骨里是偷叵是時也稱小人錢世昭錢氏私志曰燕北風俗不問士庶皆自稱小人宣和問有遼國右金吾衛上將軍韓正歸朝授撿校少保節度使對中人以上說話即稱小人中人以下即稱我家每日到漏舍誦天童經數十遍其聲朗朗然且云對天童說話豈可稱我自皇天生我皆改為小人云皇天生小人皇地載小人日月照小人北斗輔小人前後二十餘句凡稱我者皆改為小人誦畢贊歎云這天童極靈聖王少師云若無靈聖如何持得許多小人牛馬熟范鎮東齊紀事曰契丹使者蕭慶言契丹牛馬有熟時一如南朝飬蠶也有雪而露出草一寸許此時牛馬大熟若無雪或雪沒草則不熟獨子青清異録曰遼東一處有瓜若澆沃則以酒代水實成破為十段每段中止有一子而長數寸食一寸可作十日糧國人珍之名獨子青轉篷陳長方步里客談曰古人多用轉篷竟不知何物外祖林公使遼見篷花枝葉相屬團圞在地遇風即轉問之云轉篷也花宴烏熊皮蔡絛鐵圍山叢談曰李丞相士美在北門與善同班綴嘗言將聘大遼赴其花宴時北主坐御牀上後有烏熊皮䝉一物頗高大久而似疲則以身依之意其如古設扆狀耳俄於烏皮間時露一二人手足則罔測其故也及日宴時乃見數番小兒在其中李為吾言每哂之吾即答曰此乃鮮卑之舊俗如髙歡立孝武皇帝以黑氊覆七人拜其上而歡居其一殆亦是類乎銀貂駝鹿江鄰幾雜志曰北使云青貂穴死牛腹掩取之紫貂升木射取之黃色乃其老者銀貂最貴契丹主服之又云駝鹿重三百斤效其聲致之茸如茄者切食之又云大寒之毒如中湯火著人皮膚成紫氷梨文昌雜録曰余奉使北遼至松子嶺舊例置酒酒三行時方窮臘坐上有北京壓沙梨氷凍不可食接伴使耶律筠取冷水浸之氷皆外結已而敲去梨已融釋自爾凡所攜柑橘之類皆用此法味即如故也南征馬汪藻録曰契丹馬三萬匹嵗牧于雄霸間謂之南征馬意欲誇示中國實備燕雲緩急之用羅草蘇頌魏公集曰凡人以百騎飛放謂之羅草終日才獲兔數枚頗有愧色顧謂豫曰道次小圍不足觀常時千人已上為大圍則所獲甚多其樂無涯也車渡張舜民使遼録曰過盧溝河伴使云恐乘轎危莫若車渡極安且可速濟南人不曉其法兜元國張舜民使遼録曰契丹上京曽有人見二青衣駕赤犢出耳中别有天地花木繁茂云此兜元國也氷實羊腸江鄰幾雜志曰北遼氷實羊腸繞頭上治上熱食肉去皮王銍國老談苑曰滕涉以户部副使聘北朝主客謂涉曰南朝食肉何故不去皮涉曰本朝出産絲蠶故肉不去皮耳九月薦瓜國老談苑曰趙世長以宗正卿北使時九月既宴薦瓜主客舉謂世長曰此方氣候誠早彼想未也世長對曰本朝來嵗季夏此味方盛陽嵓鎮造墨蘇軾東坡全集曰雲菴有墨銘云陽嵓鎮造云是北遼墨陸子履奉使得之者攜壺吕大臨考古圖曰攜壺得於京師高八寸有半深七寸有半徑寸有三分容二升二合無銘識李氏録云吏部蘇尚書子容頃使契丹於帳中親見之鷹背狗永平府志曰鷹而生犬遼史以之紀異凡北方皂鵰作巢所在官司必令人窮巢探卵較其多寡如一巢而三卵者置卒守護日視之及其成鷇一乃狗耳取飼以進於朝其狀與狗無異但耳尾上多毛羽數莖而已田獵鵰則戾天狗則走陸所逐同速名曰鷹背狗呵膠陳繼儒真珠船曰呵膠出契丹可以羽箭又宜婦人貼花鈿呵噓隨融故謂之呵膠劉貢父有和陸子履詩云此膠出從遼水魚白羽補綴隨呵噓魚形靣花江鄰幾雜志曰契丹鴨淥水牛魚鰾製為魚形贈遺婦人貼靣花篷子胭脂燕北録曰契丹婦人産時望日番拜後入帳內臥甘草苗若生男兒其夫靣塗篷子胭脂其篷子八月收以粗布絞汁用時以布浸水塗頭靣番婦人亦常時用作妝飾或生女時靣塗突墨産母服黑豆湯調鹽番言用此二物塗靣時宜男女貧者不用此儀遼史拾遺卷二十四
