body:
  text: 遼史拾遺卷二十錢塘厲鶚撰列傳第四韓延徽契丹國志曰韓延徽仕劉守光為幕府參軍守光與六鎮搆怨自稱燕帝延徽諫之不從守光置斧于庭曰敢諌者斬孫光鶴力諫守光殺之延徽以幕府之舊且素重之得全守光末年衰困盧龍巡屬皆入于晉遣延徽求援于契丹太祖怒其不拜留之令牧馬于野資治通鑑曰延徽為契丹相晉王遣使至契丹延徽寓書于晉王叙所以北去之意且曰非不戀英主非不思故鄉所以不留正懼王緘之讒耳因以老母為託且曰延徽在此契丹必不南牧故終同光之世契丹不深入者延徽之力也列傳第五王郁資治通鑑曰義武節度使兼中書令王處直未有子妖人李應之得小兒劉雲郎于陘邑以遺處直曰是郎有貴相使養為子名之曰都及壯便佞多詐處直愛之置新軍使典之處直有孽子郁無寵奔晉晉王克用以女妻之累遷至新州防禦使及晉王存朂討張文禮處直以鎮定相為脣齒患之以新州地鄰契丹乃潜遣人語郁使賂契丹召令犯塞以解鎮州之圍郁素疾都冐繼其宗乃邀處直求為嗣許之軍府之人皆不欲召契丹都亦盧郁奪其處乃隂與書吏和昭訓謀劫處直㑹處直與張文禮使宴于城東暮歸都以新軍數百伏于府第大譟劫之曰將士不欲以城召契丹請令公歸西第乃并其妻妾幽之都自為留後列傳第六趙延夀子匡賛補冊府元龜曰趙延夀少時有相者云此官豈止於是耶後必有甲兵大權位極列土人或詰云此人妍柔如女子安有大兵權乎俄遷盟津許田汴水宋城連帥宣徽使樞宻使兼領河陽清泰中復為樞宻使資治通鑑曰契丹主入汴唐王淑妃與郇公從益居洛陽趙延夀娶明宗女為夫人淑妃詣大梁㑹禮契丹主見而拜之曰吾嫂也五代史曰契丹犯京師趙延夀所尚明宗公主已死徳光乃為延夀娶許王從益妹是為永安公主冊府元龜曰晉天福三年九月庚申契丹使頁允廷信押按各馬往雒京般取後唐公主丙寅趙延夀進馬二匹謝恩放燕國長公主歸幽州契丹國志曰晉軍降契丹太宗悉收其鎧仗數萬貯恒州驅馬數萬歸其國遣杜重威將其衆從已而南及河太宗以晉兵之衆恐其為變欲悉以北騎擁而納之河或諫曰晉兵在他所者尚多使聞降者盡死必皆拒命為患不若且撫之徐思其䇿太宗乃使杜重威以其衆屯陳橋㑹乆雪官無供給士卒凍餒咸怨重威相聚而泣重威毎出道旁人皆罵之太宗猶欲誅晉兵延夀言於太宗曰皇帝親冐矢石以取晉國欲自有之乎將為他人取之乎太宗變色曰朕舉國南征五年不解甲僅能得之豈為他人乎延夀曰晉國南有唐西有蜀常為仇敵皇帝亦知之乎曰知之延夀曰晉國東自沂宻西及秦鳳延袤數千里邊於呉蜀常以兵戍之南方暑溼上國人不能居也他日車駕北歸以晉國如此之大無兵守之呉蜀必相與乗虚入㓂如此豈非為他人取之乎太宗曰朕不知也然則奈何延夀曰陳橋降卒可分以戍南邊則吳蜀不能為患矣太宗曰朕昔在上黨失於斷割悉以唐兵授晉既而反為仇讎北面與我戰爭勤兵累年僅能勝之今幸入吾手不因此時悉除之豈可留以為患乎延夀曰向留晉兵於河南不質其妻子故有此患今若悉徙其家於恒定雲朔之間每嵗分番使戍南邊何憂其為變哉此上䇿也太宗悦曰善惟大王所以處之由是陳橋兵始得免分遣還營玉堂閑話曰五代契丹入㓂之初所在羣盜蜂起北人患之陳州有一婦人為賊帥號曰白頸雅形質簏陋髪黄體黑求詣北主稱男子姓名衣冠拜跪皆如男子北主以為懷化將軍委之招輯山東諸盜其屬數千皆男子前後有夫數十人少不如意皆手刃之偽燕趙延夀問之自云能左右射被雙鞬日可行三百里盤矛撃劔皆所長也後為兗州刺史馮彦卿戮之太平廣記曰趙延夀將家子幼習武畧即戎之暇復以篇什為意甞在遼廷賦詩曰黄沙風捲半空抛雲重隂山雪滿郊探水人迴移帳就射鵰箭落著弓抄鳥逢霜果飢還啄馬渡氷河渇自跑占得高原肥草地夜深生火折林梢南人往往傳之出趙延夀傳東都事畧曰劉温叟仕晉為翰林學士契丹犯京師温叟懼隨契丹北徙與承㫖張允求去職契丹主怒欲黜為縣令趙延夀曰學士不稱職而求解者罷之可也得不黜十國春秋曰趙匡賛字元輔本名美後更今名幽州薊人也祖徳鈞後唐盧龍節度使封北平王父延夀尚明宗女至忠武軍節度使匡賛幼聰慧應神童舉明宗詔賜童子及第仍附禮部春牓清泰末晉髙祖起并州命延夀將兵屯上黨徳鈞將本軍自幽州來㑹時晉髙祖以契丹之援引兵南下徳鈞父子降晉契丹主盡錮之北去匡賛獨與母公主留西洛未幾晉髙祖命匡賛奉母歸薊門契丹署為金吾將軍數年契丹以延夀為范陽節度使又署匡賛為牙内都校開運末契丹主將謀南侵委政延夀及平原陷匡賛復受契丹署為河中節度使延夀從契丹北歸匡賛得留鎮河中未幾漢髙祖起晉陽匡賛奉表勸進加撿校太尉仍鎮河東改京兆尹晉昌軍節度使匡賛懼漢疑已蜀廣政十年冬十月奉表降於後主復歸漢為左驍衛上將軍又仕周累遷保信軍節度使入宋加撿校太師封衛國公卒年五十五趙思温冊府元龜曰晉髙祖天福二年十一月詔賜北朝赫嚕相公聶相公幽州趙思温繒帛器皿以前屯瀛州援王師討魏故也資治通鑑曰契丹既得幽州命曰南京以唐降將趙思温為留守思温子延照在晉帝以為祁州刺史思温宻令延照言敵情終變請以幽州内附帝不許延照後入契丹鶚案延照史作延昭王惲秋澗集題遼太師趙思温族系後曰遼氏開國二百載跨有燕雲雄長夷夏雖其創業之君規模宏逺守成之主善於繼述亦由一時謀臣猛將與夫子孫蕃衍衆多克肖肯構有以維持藩翰趙公早以驍勇善戰受知遼太祖烜赫貴顯生子十有二人其後支分𣲖别官三事使相宣徽節度團練觀察刺史下逮州縣職餘二百人迄今燕之故老談勲閥富盛照映前後者必曰韓劉馬趙四大族焉鳴呼盛哉孟子稱故國非謂喬木而有世臣者其是之謂歟張礪耶律隆鄂特滿逹附冊府元龜曰張礪初為舉子在梁依翰林學士李愚貞明中礪自河陽北歸莊宗版授太原府掾出入崇達之間揄揚愚之節槩及愚所為文仲尼遇顔回夀夷齊非餓等篇人望風稱之資治通鑑曰天成元年同光四年春正月魏王繼岌將發成都馬彦珪至以皇后教示繼岌甲子旦召郭崇韜計事繼岌登樓避之崇韜方升階繼岌從者李環撾碎其首并殺其子廷誨廷信崇韜左右皆竄匿獨掌書記滏陽張礪詣魏王府慟哭久之冊府元龜曰張礪為遼主翰林學士開運末與遼主俱南松門之内軒轡交織多繼燭接語無厭倦色因宻言曰契丹用法如此豈能久處漢地及北去道路有觴酒豆肉必遺故客屬僚死之日囊裝唯酒食器皿而已識者無不髙之契丹國志曰耶律隆鄂特國主族人也太宗攻晉隆鄂特扈從累有戰功太宗入大梁以隆鄂特為鎮寧節度使隆鄂特性殘虐澶州人苦之賊帥王縵率其徒千餘人襲據南北渡浮航縱兵大掠圍隆鄂特於牙城隆鄂特聞漢平鄴與滿逹等焚掠定州悉驅其人北去方廣千里剽掠殆盡滿達太宗之從弟也㑹同九年契丹攻黎陽滿逹先驅晉博州刺史周儒以城降未幾周儒引滿逹自馬家口濟河營于東岸攻鄆州北津又陷徳州擒刺史尹居璠太宗南入大梁以滿逹為安國節度使又以為中京留守至恒州崔廷勲見滿逹拜跪献酒滿逹踞而受之麻荅貪殘猾忍民間有珍寳美女必奪取之又捕村民誣以為叛披面斷腕焚炙而殺之欲以威衆遣使督運於邢州防禦使薛懷讓聞漢髙祖入大梁殺其使者舉州降滿逹僅八百人漢兵突入府中與契丹戰㑹日暮有村民數千噪於城外欲奪北兵寳貨婦女北兵懼而北遁滿逹劉晞崔廷勲皆奔定州與義成節度使耶律隆鄂特合漢有白再榮者拘人取財恒州謂之白滿逹虐可知矣滿逹歸世宗殺之鶚案耶律隆鄂特滿逹見張礪傳中附詳於此列傳第十張儉續資治通鑑長編曰河北既罷兵知雄州李允則治城壘不輟遼主問其相張儉曰聞南朝尚修城備得無違誓約儉曰李雄州為安撫使其人長者不足疑邢抱朴大同府志曰龍首書院在應州西南遼翰林學士邢抱朴建列傳第十一王繼忠王文正筆録曰王繼忠性謹飭純固有守事真宗儲邸厯年最久羣輩中為之冠首衆皆憚其嚴整宫中事有所未便常盡規諫上毎為之斂容聴納及上即位咸平中邊鄙尚聳與今侍中張耆同典禁兵戍守鎮定㑹戎馬大至晨薄我軍亟命出兵為左右翼以禦之陣之西偏最為兵衝繼忠固請代耆西往及我師敗績繼忠遂為契丹所獲因授以官爵為其婚娶大加委用繼忠亦悉心勤職由是漸被親任乃從容進説曰竊觀契丹與南朝為仇敵每嵗賦車籍馬國内騷然未見其利孰若馳一介㝷舊盟結好息民休兵解甲為彼此之計無出此者國母春秋已髙國主承襲已久共忻納之咸平六年夏四月石普方守莫州素與繼忠同在東宫乃命致書于普請遣使至北境特議和好普具奏其事朝廷弗之信止令普荅其書而已是秋繼忠書復至意甚切令普荅書且曰俟彼先遣使至即議修和冬契丹舉兵深入貝魏邊烽警急上在澶淵乃遣曹利用馳往許以通聘利用至魏參知政事王公欽若鎮天雄留而不遣及徳清通利兩軍被圍急上令參政王公旦作手書以諭欽若始聴其北去契丹國母見利用大喜曰何來之晩也即日議定其事遣使丁振偕來又命李繼昌報聘於是兵罷改元景徳車駕還京是舉也雖宸謀善斷亦繼忠能揣敵情而啟導之自是生辰正旦信使往還皆賜繼忠手詔器玩服帶甚厚仍通其家信嵗以為常至其身没乃止繼忠為人有誠信北境甚重之封河間王彼土人士或稱之曰古人盡忠止能忠於一主今河間王結南北歡好若此可謂盡忠於兩國主然則繼忠身陷異國不能即死與夫無益而苟活者異矣東都事畧曰王繼忠開封人也父為軍校戍邊而死繼忠因得補殿直真宗在東宫得給事左右累擢至雲州觀察使咸平末契丹入㓂繼忠帥定武出戰於望都之北自以被遇之厚力戰圖報而服飾稍異契丹識之轉鬬累日援兵不至遂陷於契丹隆平集曰王繼忠開封人咸平末陷契丹初謂已死贈大同軍節度使録其于懐敏懐徳懐政皆加等景徳初契丹俾繼忠奉章道意請修和好朝廷允其請戢兵息民與有力焉自是朝廷每遣使至契丹必厚賜繼忠對使必泣下嘗附表請還上以誓好既定姑諭之契丹主待之益厚改其姓曰耶律名曰顯忠又曰宗信封為吳王列傳耶律隆運契丹國志曰隆運自在景宗朝翼决庶政帝后少年有辟陽之幸景宗疾亟隆運不俟詔宻召其親屬等十餘人並赴行帳時諸王宗室二百餘人擁兵握政盈布朝廷后當朝雖久然少姻戚援助諸皇子幼穉内外震恐隆運請於后易置大臣勅諸王各歸第不得私相燕㑹隨機應變奪其兵權時趙王等俱在上京隆運奏召其妻子赴闕景宗崩事出倉卒乃集蕃漢臣僚立梁王隆緒為皇帝帝以隆運輔翼功前後少比乃賜鐵劵誓文躬自親書齋戒焚香於北斗星下讀之宣示蕃漢諸臣又以隆運一旌附籍横帳列於景宗廟位契丹横帳猶宋朝玉牒所也改封晉王左右䕶位特置百人北法䕶位惟國主有之帝以隆運勲大恩數優渥見則盡敬秦國二王毎日一問起居至隆運所居帳二里外已去葢下車徒步而進暨其回也列揖於帳外隆運受之帝或至其帳五十餘步下車隆運出迎盡禮帝亦先為之揖及薨帝與后諸王公主已下并内外臣僚制服行䘮葬禮一依承天太后故事靈柩將發帝自挽車哭送羣臣泣諫百餘步乃止陪葬乾陵側詔影堂制度一同乾陵又詔諸處應有景宗御容殿皆以隆運真容置之殿内郭世珍補張祥漷縣志曰郭世珍漷隂人仕遼至司徒時承天太后侵宋俘獲甚衆師次范陽世珍上言降卒皆有懷土之情驅之而北終不為用太后嘉納縱活數萬人列傳第十五蕭逹林子繅古契丹國志曰蕭安扎其畨名曰繅古燕京統軍使塔勒滿即逹林之子塔勒滿於統和中攻南宋澶州為矢所中死城下安扎以父戰功為祇侯郎君遷林牙契丹諸行宫都部署又遷彰國節度使安扎雖家門貴盛而虚已接物汲引諸名士時論賢之宋張昇來使奥只以侍中為館伴使從容言兩朝盟好誓若山河毋以小嫌遽傷大信與昇談論移日曲盡其懽昇亦云侍中北朝儀表也深敬異之後授北宰相宣徽使封鄭王列傳第十六劉六符陸游老學菴筆記曰遼人劉六符所謂劉燕公者建議於其國謂燕薊雲朔皆中國人不樂屬我非有以大收其心必不能久遼主宗真問曰如何可收其心曰歛於民者十减其四五則民惟恐不為北朝人矣遼主曰如國用何曰臣願使南朝求割闗南地而増戍閲兵以脅之南朝重於割地必求増嵗幣我託不得已受之俟得幣則以其數對减民賦可也宗真大以為然卒用其䇿得増幣而他大臣背約纔以幣之十二减賦民固已喜及洪基嗣立六符為相復請用元議洪基亦仁厚遂盡用銀絹二十萬之數减燕雲租賦仁宗皇帝慶厯中甞賜遼使劉六符飛白書八字曰南北兩朝永通和好㑹六符知貢舉乃以兩朝永通和好為賦題而以南北兩朝永通和好為韻云出南朝皇帝飛白書六符葢為遼畫䇿増嵗幣者然其尊戴中國尚如此則盟好中絶誠可惜也郝經陵川文集曰漢中山靖王之後唐盧龍節度使怦有幽州傳姓授節數世入契丹為王公數十人如劉六符等尤其貴顯者也終始契丹二百餘年入金源氏為燕四大族號劉韓馬趙氏杜防陳師道後山談叢曰杜防契丹名相也謂和親為便民戒契丹世世相受謹守其約又虞中國之敗約也凡十年遣使以事動四國而堅其約列傳第十七蕭孝穆契丹國志曰孝穆機悟有才藝馳馬立射五的時人莫能及列傳第十九馬保忠補契丹國志曰馬保忠營州人也踈眉豐目謹重寡欲斤斤自修人賢其行自力讀書不謁州縣節用以給親族大穰則振其餘於鄉黨太平間授洗馬改著作郎殿中丞興宗朝為樞宻使守太師兼平章政事封燕國公甞上言强天下者儒道弱天下者吏道今之授官大率吏而不儒崇儒道則鄉黨之行修修徳行則冠冕之緒崇自今其有非聖帝明王孔孟之教者望下明詔痛禁絶之其篤意風教如此卒賜謚曰剛簡列傳第二十八耶律儼契丹國志曰李儼姿性巧猾善諛佞甞與知樞宻院事牛温舒有隙各進所親厚朋黨紛然恃蕭奉先為内主温舒不能勝雲莊四六餘話曰紹聖中蔡京為館伴時遼使李儼葢汎使者留館頗久一日儼方飲次忽將盤中杏曰來未開花如今多杏幸京即舉梨謂之曰去雖落葉那可輕梨離列傳第三十二蕭奉先弟保先附契丹國志曰蕭保先亦奉先弟也為渤海留守少師政令嚴酷女真之亂被殺張琳契丹國志曰天祚立琳兩為戸部使負東京人望女真日熾髙永昌叛於渤海時天慶六年也永昌叛遼東五十餘州盡没獨瀋州未下琳痛念鄉村欲自討之契丹屢敗精兵鋭卒十無一存琳縛手無䇿始招所謂轉户軍葢遼東渤海乃夙所仇若其轉戸則使役良家庶幾捐軀奮命命下得兵二萬餘琳自顯州進兵止備遼河三义口琳遣羸卒數千陽為來攻間道以精騎直趨瀋州渤海始覺經三十餘戰渤海乃走保東京後女真援師至師自驚恐望風而潰失亡不可勝計琳遁入遼州謫授遼興節度使乃平州也耶律伊都沈良靖康遺録曰先是斡里雅布退師回燕山遣蕭慶來催所許金帛送蕭慶於都亭驛一小屋中封其戸傳食以過凡數日徐處仁吳敏當國建議謂蕭慶本契丹人為金所滅不能無怨因請賜伊都書令慶賫去厚禮待之慶得書遂行使車過河即宣言南朝有書令我約契丹共滅大金并書馳驛送至尼堪由是愈忿矣靖康要盟録曰靖康元年四月因金使蕭仲恭等還朝宻賜耶律太師書以黄絹冩之云大宋皇帝致書於左金吾上將軍右都監耶律太師昔我烈祖章聖皇帝與大遼結好於澶淵惇信修睦百有餘年邊境晏安蒼生䝉福義同一家靡有兵革戰闘之事通和逺久振古所無金人不道稱兵朔方拘縻天祚剪滅其國在於中國誓好之舊義當興師以拯顛危而姦臣童貫等迷國擅命沮遏信使結納仇讎購以金繒分據燕土金匱之約藏在廟祧委棄勿遵人神怨恫致金人之强暴敢肆陸梁俶擾邊境達於都城則唯此之故道君太上皇帝深悼前非因成内禪肆朕初即大位惟懷永圖念烈祖之遺徳思大遼之舊好輟食興念無時敢忘凡前日大臣先誤國搆禍皆已竄逐思欲親仁善隣以為兩國生靈無窮之福此志既定未有以達而使人蕭仲恭趙輪等能道遼國與燕雲之遺民不忘耶律氏之徳冀假中國詔令擁立耆哲衆望所屬宜國人無如金吾者適諧至意良用欣懷昔聞金吾前為遼國將兵數有大功謀立晉王實為大遼宗社之計不幸事不克就避禍去國向使前之計行晉王有國則天祚安享榮養耶律氏不亡於天祚不害其孝而於耶律氏之計誠至忠矣宗社之英天人所相為宜繼有遼國克紹前休以慰遺民之思方今總兵於外且有西南招討太師之助一徳恊心足以共成大事以中書之勢竭力擁衛何有不成謀事貴斷時不可失惟金吾圖之書不盡言已令蕭仲恭趙輪回奏面道委曲天時蒸染更冀保綏鶚案伊都仕遼為金吾衛將軍降金後天㑹三年大舉伐宋余都為元帥右都監事詳金史靖康帝書中所稱葢兩國之官也松漠紀聞曰伊都之降也金人以為西軍大監軍久不遷常伊都其軍和勒端也失其金牌金人疑其與林牙暗合遂質其妻子伊都始有叛心明年九月約燕京統軍反統軍之兵皆契丹人伊都謀誅西軍之在雲中者盡約雲中河東河北燕京郡守之契丹漢兒令誅女真之在官在軍者天徳知而偽許之遣其妻來告時烏舍為西監軍自雲中來燕㣲聞其事而未信與通事漢兒納延同行數百里納延見二騎馳甚遽問之曰曽見監軍否以不識對問為誰曰伊都下人納延追及烏舍曰適兩契丹云余都下人既在西京何故不識監軍北人稱雲中為西京恐有姦謀遂回馬追獲搜其鞾中得伊都書曰事已泄宜便下手復馳告烏舍即回燕統軍來謁縛而誅之又二日至雲中伊都㣲覺父子以遊獵為名遁入夏國夏人問有兵幾何云親兵二三百遂不納投達靼達靼先受烏舍之命其首領詐出迎具食帳中潜以兵圍之達靼善射無衣甲伊都出敵不勝父子皆死凡預謀者悉誅契丹之黠漢兒之有聲者皆不免遼史拾遺卷二十
