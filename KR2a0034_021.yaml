body:
  text: 遼史拾遺卷二十一錢塘厲鶚撰列傳第三十三文學上李浣資治通鑑曰長興四年十一月秦王從榮之亂河南巡官李浣江文蔚等六人勒歸田里浣回之族曽孫也李回唐武宗朝宰相五代史補曰李浣有逸才每作文則筆不停綴而性嗜酒楊凝式嘗受詔撰錢鏐碑自以作不逮浣於是多市美酒召浣飲俟其酣且使代筆經宿而成凡一萬五千字莫不詞理典贍凝式歎伏久之少主之入蕃也宰相馮道等至鎮州北主皆放還浣時為翰林院學士北主以其才特留之竟卒於蕃中其後人有得其文集者號曰丁年集蓋取蘇武丁年奉使之意又曰李濤為人不拘禮法弟浣娶禮部尚書竇寧固之女年甲稍髙成婚之夕竇氏出參濤輒望塵下拜浣驚曰大哥風狂耶新婦參阿伯豈有答禮儀濤應曰我不風只將謂是親家母浣且慙且怒既坐竇氏復拜濤又叉手當胸作歇後語曰慙無竇建繆作梁山喏喏喏聞者莫不絶倒古今詩話曰李浣及第於和凝榜下後與座主同任學士㑹凝作相浣為承㫖適當批詔次日於玉堂輒開和相舊閣悉取圖書器玩去因留一詩於榻上云座主登庸歸鳯閣門生批詔立鼇頭玉堂舊閣多珍玩可作西齊潤筆不人皆笑其疏縱列傳第三十四文學下王鼎髙麗史崔思諏傳曰思諏宣宗朝拜殿中少監知尚書戶部事出為西京副留守駕幸西京時遼使王鼎來思諏為館伴聞鼎每夜獨坐為文以計取其書奏之乃諫疏也其疏極言遼太平日久不修武備又言大宋伐南夏事王正以下六人補王正燕山雲居寺碑曰雲居寺東一里有髙峰峰之上十餘步有九室室之內有經四百二十萬言本自靜琬始厥謀厯道暹諸公成其事佛宇經厨僧坊鐘閣材唯杞梓砌則琳珉古檜星羅流水環繞缺堤相望門闥洞開風俗以四月八日共慶佛生凡水之濱山之缺不逺百里預饋供糧號為義食先是庚午年寺主謙諷和尚為門徒時僕自皇后臺被褐來游論難數宵以道相得自兹一别僕以職倅於瀛掌記於武定亷察於奉聖陟在憲臺遷在諫署佐兹邦計逮今十五年復㑹於兹寺和尚建庫堂一座五間六架厨房一座五間五架轉輪佛殿一座五間六架暖㕔一座五間五架又化助前燕王侍中蘭陵公建講堂一座五間七架又化助公主建碑樓一座五間六架并諸腰座次建飯廊一十三間四架次又建東庫四間五架次建梵網經廊房八間四架次蓋後門屋一座餘有捨短從長加朱施粉周而復始不可殫論乙丑嵗天順皇帝御宇之十五載丞相秦王統燕之四年泰階平格澤明八風草偃四海鏡清和尚慶此得時懇請求作記僕以謙諷等同德經營協力倡和結一千人之社合一千人之心春不妨耕秋不廢穫立其信導其教無貧富後先無貴賤老少施有定例納有常期貯於庫司補兹寺缺寺不壞於平地經不墜於東峰稽首靈巖載銘貞石鹽鐵判官朝議郎行右補闕賜緋魚袋王正述前鄉貢進士鄭熙書李仲宣盤山志曰李仲宣知薊州軍事判官文林郎試祕書省校書郎祐唐寺創建講堂碑記曰夫幽燕之分列郡有四薊門為上地方千里籍冠百城紅稻香粳實魚鹽之沃壤襟河控嶽當旗㦸之奧區于古堞之外西北一舍有盤山者乃箕尾之巨鎮也深維地軸髙闢天門暖碧凝霄寒青壓海珠樓璇室仰窈窱于崑丘寶洞瓊臺耀旁礴於衡嶽崆峒左倚太行右道懷珠之水𣲖其陽削玉之峰峭其後嶺上時興于瑞霧谷中虛老于喬松竒樹珍禽異花靈草絶頂有龍池焉向旱嵗而能興雷雨岩下有潮井焉依旦暮而不虧盈縮于名山之內最處其佳此境舊有五寺祐唐者乃備其一自昔相傳有尊者挈杖逺至求植足之所僧室東北隔巖下有澄泉恍惚之間見千僧洗鉢瞬息而泯因兹構精舍晏坐矣厥後于溪谷澗石之面刻千佛之像而以顯其殊勝也雖雨漬苔斑眷儀相而猶在陽舒隂慘流善譽而不隳向此藍垣之北長松之下有大石焉重萬餘鈞或遇敬信者微觸而動迄今游閲之士冠蓋相望不絶于阡陌也當昔全盛之時砌叠龍蟠簷排鳳翅晨鐘暮磬上聞兜率禪宗律學宛是祇園駢闐可類于清凉赫奕遙同於白馬乃法侣輻輳之鄉也爰自大兵之後並已爐滅因謂物不可以久廢故享利於德人德人者即寺主大德乃當寺之景𣲖也厥本惟裔其神不測苦隨念盡樂與人同化六趣之茫然歸十方之安隱年臘未晚行業彌髙既多有續之開宜示無窮之績寺主大德俗姓琅琊氏釋諱希悟鎮陽夏博人也爰自聚沙之嵗禮當寺寺主在楚禪師授法焉勦除五蓋慕别四生舍怨棹而誓泛慈舟棄毒藥而願食甘果年二十詣長興寺具尸羅由啓𢎞願延僧一十萬次第竟矣由是謂其友曰聞二儀舒慘四序推遷人生幾何嵗不我與覽斯基址孰忍凄涼野鹿羣麋晝夜而草眠香徑壞碑毀塔髙低而蔓挂藤蘿玉毫消盡于華鬘金磬罷聞于齊懺上漏下濕日就月將徐興再造之心爰起從新之務于是乎手披榛棘力用經營移怪石而截斷雲根伐灌木而摧折烟色應厯十二年化求財賮蓋佛殿一座欒櫨娟妙丹艧新鮮塑佛中央圖像四壁保寧四年又建厨庫僧堂二座俾㸑饈之有所作也賓旅之有所歸也乾亨二年加授紫衣載議門迎廣陌地處幽凉虞生肇之徒見臨顧講讃之所交闕乃于僧室之隂叠磷磷之石瀹瑟瑟之泉髙廣數尋駢羅萬樹剃除沙礫俯就基坰而又請邑人醵緡聚賂四逺之樂施者如鱗介之歸巨海也即乃市木雲嶠采石烟巖窮斤斧之力極磨礱之妙初心才啓大厦攸成式導昏衢彌光世德其堂也保寧十年創建帶雲川之渺渺總逺岫之峩峩東觀種玉之田西掞築金之闕蘭楹鏤彩桂柱凝丹月入秋窗風含夏戶簷外之杉松郁鬱檻前之烟水潺湲所貴安苾芻僧置狻猊座髙談玉偈然慧炬而絶煩惱薪妙演金文揮智刃而剖無明長依佛住永壓山門對延靈岫之峯闡說瑜伽之㫖此皆邑人等心獨慕善志乃忘筌知浮生石火以難停覺幻質風烟而易滅各捐淨施共搆良因即寺主希悟大德激勸之所致也緣惠之所被也厥外井有甘泉地多腴壤間栽珍果棋布蔬畦清風起兮緑幹香細雨霽兮紅葵茂淨供必飭白足咸來其供給之費恆不闕于只贍者大德寺主力辦也蓋惟寺主大德道洽空有識洞幽冥全資化導于多方以至圓成于能事所冀皇嗣永安神業矣相國長調鼎鼐矣京尹之仁無秕稗矣郡牧之信及竹童矣一切含靈同沾利樂一切惑溺並向真如爰述懿徽俾雕翠琰其邑人姓號具列碑隂仲宣靡職之嵗華構方成命修辭以序之序之伊何即為銘而記之曰峭壯靈峯創興華宇式開講肆用陳法侣物置人多利圓三寶庶幾乎作善之祥傳名曠古統和五年嵗次丁亥四月八日南抃盤山志曰南抃薊州人官少府少監知祕書少監上方感化寺碑記曰噫西聖人教既一唱而東也應而和者其徒半天下是以城閭邑聚塔廟日興後數百年競相髙以奢麗有大苾芻衆樂諸阿蘭若巖居野處如鷲峯鹿苑者比比而是方之城邑則又過焉漁陽古郡之西北叢岫迤邐其勢雄氣秀曰田盤山岡巒倚叠富有名寺而感化者舊號元宫物無常名事窮則變㑹幽州主帥清和張公奏請之故因以是額易其前號獨亢爽清勝確乎不移既肘腋于絶巘又襟袖于列剎故自往昔目為上方非清信舍財而附益髙流擇地以來集則何以增崇垂逺至于是哉魏太和十九年無終縣民田氏兹焉營辦唐太和咸通間道宗常實二大師前季後昆繼踵而至故碑遺像文迹俱存爾後人多住持處亦成就布金之地廣在山麓法堂佛宇敝乎下禪竇經龕出乎松杪雲際髙低相望居然緇屬殆至三百自師資傳衣而後無城郭乞食之勞以其創始以來占籍斯廣野有良田百餘頃園有甘栗萬餘株清泉茂林半在疆域斯為許久之業又在形勝之境宜乎與法常住如山不騫是使居之則安不為爭者所奪奈何太康初鄰者侵競割據嵓壑鬬諍堅固適在此時徒積訟源久不能决先于薊之屬縣三河北鄉自乾亨前有莊一所闢土三十頃閒藝麥千畝皆原隰沃壤可謂上腴營佃距今即有年祀利資日用衆實賴之大安中燕地通括天荒使者馳至按視厥土以幸民所首謂執契不明遂圍以官封曠為牧地吞我林麓既如彼廢我田壤又若此使庖舍缺薪蒸之供齊堂乏餅餌之給而至於是可歎香火寺僧法雲暨法逍次言及衆曰先世有所遺籍吾儕不能嗣守亦空門之不肖者也安忍坐受其弊拱默而已相與詣闕陳訴厯官辨論一旦得直其誣兩者復為所有尋奉上命就委長吏辨封立表取舊為定自是樵㸑耕穫之利隨用而足以小大協力始終一心而令釋氏家肥不减疇昔赫矣能事于前有光雖汶陽歸已侵之疆興平還既奪之地不是過也乾統六年冬老比丘崇簡與前薊州管內都綱提㸃寺事前沙門士賢元悟上座僧士侃都和僧圓淨等以嘗往時具嚮之始末紀石為謂㑹余有故不果頃又走書來速文勤至再三豈可無述夫藏用於形迹者莫妙於理智顯用于事為者莫大乎勢力佛之道理與智也𢎞之在人勢與力也若兹寺者像設攸在法相所寄智與形㑹理隨事集向內不資徒侣之力外不託王臣之勢則有所廢矣孰能興之今豪奪者止誣取者豫使禪枝律裔保有其業良以此也後之補處是者其念之乎乾統七年春正月元日耶律某詩話總龜曰北遼多有文籍亦以文雅相尚王矩為工部郎中本燕人為遼將耶律某忘其名掌書記嘗從其出入耶律兄及兄之子太平興國中戰歿于大郡後耶律經舊戰處覽其遺迹作詩矩記其兩句云父子盡從蛇陳歿弟兄空望雁門悲馬堯俊文昌雜録曰元豐三年髙麗國王王徽以疾表乞太醫朝廷遺閣門通事舍人王舜封押至彼國舜封上言十二月一日徽生辰北遼遣起居郎知制誥馬堯俊充使留仙賔館堯俊獻徽詩曰始從鉤裂海東天世世英雄稟自然掌上寶符鈐造化胸中神劒畫山川太宗莫取龍州道煬帝難乘鴨緑船真是金輪長理國豈論八萬四千年徽以錦紬八百匹為謝云無名使臣能改齊漫録曰崇寧三年大遼賀生辰使至賜宴且賜柑有謝表云聘禮適陳祝帝齡於紫闕恩華固異錫仙實於公郵方厥包來貢之期捧兹德惟馨之賜天香滿袖染淮水之清霜雲液盈盤挹洞庭之餘潤梓里豈遑於遺母公朝切願於獻君感德滋深諭言罔既列傳第三十六卓行唐中和以下二人補江鄰幾雜志曰豫奉使迓遼賀正使於雄州介曰唐中和自作借職割俸錢與弟請至今四十年士大夫恐罕能如此鶚案遼史載卓行三人皆止足恬退之流如中和者篤念天顯為人所難何異李充繆肜乎應從後漢書獨行傳之例入卓行傳張潜許鋌武清縣志曰遼張潜邑人精于易不樂仕進安貧樂道鄉里稱其賢有餽以瓜田者辭不受卒于家列傳第三十七列女邢簡妻陳氏大同府志曰一經樓在應州城內遼郎中邢簡妻陳夫人教子讀書處韓慶民妻補金史曰韓慶民妻者不知何許人亦不知其姓氏慶民事遼為宜州節度使天㑹中攻破宜州慶民不屈而死以其妻配將士其妻誓死不從遂自殺世宗讀太宗實録見慶民夫婦事歎曰如此節操可謂難矣鶚案天祚亡殉國者寥寥故遼史無忠義傳慶民亦忠義中一人史何以不為立傳其妻不屈于金而死宜改入遼史列女傳列傳第三十八方技王白文瑩續湘山野録曰太祖收晉水侵河東之年晉侯使僞命殿直程再榮間道入契丹求救兵至西樓叩於契丹宣徽使王白曰南朝今收敝國危蹙不保乞師救之白深于術數謂再榮曰晉必無患南兵五月十七日當回晉次日必大濟再榮因問他日安危之數白曰後十年晉破破即掃地矣非唯晉破而契丹亦裒然扶困郤犯中原飲馬黃河而返子但記之是時王師果不克晉殆後十年當太平興國四年方平晉壘又白嘗謂契丹扶困再犯之事者即太宗征漁陽旋兵雍熙丙戌嵗會曹武惠彬伐燕不利是年冬契丹報役王師失勢於河間契丹乘勝抵黃河而退皆如白言年八十卒劉鑾以下六人補郝經陵川文集四賢祠碑略曰辛亥之秋過督亢至易水投文酌酒弔太子丹聞水汭有祠國公劉鑾所塑技極精巧不知為何神遂往觀之四像皆南面列坐一王者拱其側衣冠極古殆皆周制問諸守祠丈人言祠故有榜曰四賢不知為何代之賢契丹時有題曰樂將軍者亦不知孰為樂將軍也某乃大悟其列坐曰郭隗樂毅劇辛鄒衍拱而侍其側者燕昭王也山西通志曰劉鑾寺在大同府城外鑾遼人能塑諸佛像因以名寺乃其家佛堂也析津日記曰京師像設之竒古者曰劉鑾塑說者疑鑾與元音相近而誤考郝伯常陵川集燕有四賢祠其像塑自劉鑾則鑾别是一人著名於正奉之先者也元史方技傳劉元字東元薊之寶坻人蕭瀜繪事備考曰蕭瀜遼之貴族官至南院樞密使好讀書親翰墨尤善丹青慕唐裴寬邊鸞之蹟凡奉使入宋者必命購求有名蹟不惜重價裝潢既就而後攜歸本國臨摹咸有法則興宗清寧中以義宗千角鹿圖賜焉陳升圖繪寶鑑補遺曰陳升聖宗翰林侍詔嘗奉詔寫南征得勝圖常思言郭若虛圖畫見聞志曰余熙寧辛亥冬被命接勞北使為輔行日與其副燕人馬禋邢希古結駟並馳希古恭順詳敏有儒者之風從容語及圖畫且云燕京有一布衣常其姓思言其名善畫山水林木求之者甚衆然必在渠樂與即為之既不可以利誘復不可以勢動此其所以難得也吳九州鄧椿畫繼曰吳九州燕人善畫鹿窮盡蕃鹿之態牛鹿馬鹿養葺退角老嫩之别無不曲盡其似樂先生洪邁夷堅志曰契丹季年常勝軍校龎太保妻耶律氏詣燕山樂先生卜肆問命卦成樂驚曰平生所閲人無如夫人之貴非后妃不足以當之今服飾若此何也耶律笑曰吾夫一營卒耳近以微功方遷隊首猶未免飢寒安望王侯樂曰夫人不大貴吾當焚五行之書既而金人滅契丹首領烏珠至燕見耶律氏美納之而殺其夫後封越國王妃妃方頥修額明眸華髮權略過男子烏珠敬畏之先公在燕時熟識其狀豫奉使日接伴使曰工部侍郎龎顯忠蓋耶律在龎氏時所生也劉操以下道釋五人附都邛三餘贅筆曰道家有南北二宗其南宗自東華少陽君得老聃之道以授漢鍾離權權授唐進士吕巖巖授遼進士劉操薛大訓神仙通鑑曰劉元英字宗成號海蟾子初名操字昭逺後得道改稱焉燕地廣陵人也一云大遼人以明經擢第仕燕主劉守光為相素喜性命之說欽崇黃老之教一日忽有道人來謁海蟾乃邀坐堂上待以賓禮問其氏族名氏俱不對但自稱正陽子海蟾順風請益道人為演清靜無為之宗金液還丹之要既竟乃索雞卵十枚金錢十文以一文置之几上纍十卵於錢若浮圖之狀海蟾驚異之歎曰危哉道人曰人居榮祿之場履憂患之地其危有甚於此者復盡以其錢擘破為二擲之而去海蟾因此大悟翌早解印辭朝易服從道有詩云拋離火宅三千指屏去門兵十萬家紀當時之實也後遇吕洞賔得金丹之祕㫖自此往來終南泰華間後結張無夢神放訪陳希夷先生為方外友亦間作詩有詩集行於世其詠修鍊則有還金篇行於世法均釋明河補續髙僧傳曰法均族里失詳蘭茁幽潛珠英祕潤人莫之知唯京西紫金寺非辱律師異之收為童子究律學謹持犯得性自然非矯揉也雖行在毗尼而志尚禪悅尋師求指者决十餘年清寧中被徵較定諸家章抄或有豔之謀為代者師力求退與息貪競時議多之道聲遐震授紫方袍師號久之歸隱馬鞍山逺近挹其清風咸雍間上以金臺僧務繁劇須才德並茂者録其事僉以非師不可命亟下雖欲退辭不得也當是時戒壇肇闢來集如雲師為大和尚儼臨萬衆雖遐荒絶域冒險輕生自萬里而來暨一瞻慈範一領音教如獲至寶而還似有神物告語而然者遼主渴思一見上待以師禮后妃以下皆展接足之敬特㫖授榮祿大夫守司空并傳戒大師之號寵以詩章有行高峰頂松千尺戒淨天心月一輪之句其見重如此太康元年三月四日怡然别衆而逝世夀五十五僧臘三十九訃聞遼主悼歎命太常卿楊溫嶠董後事茶毗收靈骨搭于方丈之右繼其道者曰裕窺守德嚴戒有師之風遼主嘉之仍襲傳大師賜崇祿大夫檢校太尉提㸃天慶寺并賜製菩提心戒本命開戒壇說一如師在日年七十而化鶚案道宗紀咸雍七年十二月戊午加圓釋法鈞二僧並守司空名已見遼史矣均史作鈞常在王圻續文獻通考曰釋常在遼重熙間在寶坻縣城南隅渠水之隂建彌陀佛舍結廬其旁持經侍佛棲心入道淡然而居其中後趺坐而化茶毗之日火身不灰僧徒以其身立于佛側已而髮再生焉踰月則削之後有女子以手捫其頂髮遂不生非覺盤山志曰遼非覺大師塔太康三年癸亥七月十七日建其文曰師諱非覺俗姓劉氏析津良鄉人有大名聞車駕幸燕重師道德詔入內說法特賜紫衣併賜號儀範大師春秋七十二僧臘四十七示化大昊天寺歸葬甘泉普濟寺等偉盤山志曰遼嚴慧大師名等偉俗姓李氏析津龎津人太康元年剃落禮儀範大師為師從師住慧濟寺受戒宣充三學殿主賜號嚴慧後示疾而終茶毗舌根不燼如青蓮色列傳第四十姦臣上耶律伊遜文獻通考曰洪基能守成柔惠愛民安靜不撓然嬖幸其臣耶律英弼即伊遜纍封魏王北人諺云寧違敕㫖無違魏王白帖子列傳第四十三逆臣中蕭翰契丹國志曰蕭翰從太宗入大梁以汴州為宣武軍翰為節度使滋德宫有宫人五十餘人翰欲取之宦者張環不與翰欲鎖奪宫人執環灼鐵燒之腹爛而死五代㑹要曰唐明宗第五子從益許王開運三年契丹犯京師為首將蕭翰僞立為帝知南朝軍國事漢高祖入洛遇害五代史唐家人傳曰德光北歸留蕭翰守汴州漢髙祖起太原翰欲北去乃使人召從益委以中國從益母子逃于徽陵域中以避使者使者迫之以東遂以從益權知南朝軍國事從益御崇元殿翰率契丹諸將拜殿上晉羣臣拜殿下羣臣入謁太妃妃曰吾家子母孤弱為翰所迫此豈福耶禍行至矣乃以王松趙上交為左右丞相李式翟光鄴為樞密使燕將劉祚為侍衛親軍都指揮使翰留契丹兵千人屬祚而去漢高祖擁兵而南從益遣人召高行周武行德等為拒行周等皆不至乃與王松謀以燕兵閉城自守妃曰吾家亡國之餘安敢與人爭天下乃遣人上書迎漢高祖高祖聞其嘗召行周而不至遣郭從義先入京師殺妃母子妃臨死呼曰吾家母子何罪何不留吾兒使每嵗寒食持一盂飯灑明宗墳上聞者悲之從益死時年十七鶚案從益翰傳作從敏誤遼史拾遺卷二十一
